<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorr · CIO</title>
<style>
  :root {
    --bg: #060b14;
    --surface: #0d1a2c;
    --surface2: #10223a;
    --border: #1c3450;
    --cyan: #27d3f5;
    --blue: #2f7bff;
    --green: #27e08a;
    --amber: #f5b733;
    --red: #ff4d6a;
    --text: #e8f0fe;
    --muted: #6b8cad;
    --font: 'IBM Plex Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 1200px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 16px; font-weight: 700; letter-spacing: 0.08em; color: var(--cyan); }
  .logo span { color: var(--muted); font-weight: 400; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .model-toggle {
    display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px;
  }
  .model-btn {
    padding: 3px 10px; border-radius: 3px; border: none; cursor: pointer;
    font-family: var(--font); font-size: 11px; background: transparent; color: var(--muted);
    transition: all 0.15s;
  }
  .model-btn.active { background: var(--blue); color: #fff; }

  /* Quick actions */
  .quick-bar {
    display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface); overflow-x: auto; flex-shrink: 0;
  }
  .quick-bar::-webkit-scrollbar { display: none; }
  .qbtn {
    padding: 4px 12px; border-radius: 3px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); cursor: pointer;
    font-family: var(--font); font-size: 11px; white-space: nowrap;
    transition: all 0.15s;
  }
  .qbtn:hover { border-color: var(--cyan); color: var(--cyan); }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 10px; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 26px; height: 26px; border-radius: 4px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
  }
  .msg.user .msg-avatar { background: var(--blue); color: #fff; }
  .msg.assistant .msg-avatar { background: var(--surface2); color: var(--cyan); border: 1px solid var(--border); }
  .msg-body { max-width: 85%; }
  .msg-bubble {
    padding: 10px 14px; border-radius: 6px; line-height: 1.6;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-bubble { background: var(--blue); color: #fff; }
  .msg.assistant .msg-bubble { background: var(--surface); border: 1px solid var(--border); }
  .msg-meta { font-size: 10px; color: var(--muted); margin-top: 4px; padding: 0 2px; }
  .msg.user .msg-meta { text-align: right; }

  /* Attachments display */
  .attachments { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .attachment-badge {
    padding: 3px 10px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border);
    font-size: 10px; color: var(--amber); display: flex; align-items: center; gap: 4px;
  }
  .attachment-badge .close-btn {
    cursor: pointer; color: var(--red); font-weight: bold;
  }

  /* Tool calls badge */
  .tools-used {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
  }
  .tool-badge {
    padding: 2px 8px; border-radius: 2px; background: var(--surface2);
    border: 1px solid var(--border); font-size: 10px; color: var(--amber);
  }

  /* Tables in responses */
  .msg-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; }
  .msg-bubble th { background: var(--surface2); color: var(--cyan); padding: 5px 10px; text-align: left; border: 1px solid var(--border); }
  .msg-bubble td { padding: 4px 10px; border: 1px solid var(--border); }
  .msg-bubble tr:hover td { background: var(--surface2); }

  /* Typing indicator */
  .typing { display: none; align-items: center; gap: 6px; padding: 10px 14px; }
  .typing.show { display: flex; }
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--cyan); animation: blink 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

  /* Cost bar */
  .cost-bar {
    padding: 4px 16px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; font-size: 10px; color: var(--muted);
  }

  /* Input area */
  .input-area {
    padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface);
    display: flex; gap: 8px; flex-direction: column;
  }
  .input-controls { display: flex; gap: 8px; align-items: flex-end; }
  .input-wrap { flex: 1; position: relative; }
  #userInput {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: var(--font); font-size: 13px;
    padding: 9px 12px; resize: none; min-height: 40px; max-height: 120px; outline: none;
    line-height: 1.5; transition: border-color 0.15s;
  }
  #userInput:focus { border-color: var(--cyan); }
  #userInput::placeholder { color: var(--muted); }
  .btn {
    padding: 9px 16px; background: var(--blue); color: #fff; border: none; border-radius: 4px;
    cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 600;
    transition: opacity 0.15s; white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.secondary { background: var(--surface2); color: var(--cyan); border: 1px solid var(--border); }

  /* File input */
  #fileInput { display: none; }
  .file-list {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; font-size: 11px;
  }
  .file-item {
    padding: 4px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
    display: flex; align-items: center; gap: 6px; color: var(--text);
  }
  .file-item .remove { cursor: pointer; color: var(--red); font-weight: bold; }

  /* Welcome */
  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; gap: 8px; color: var(--muted); text-align: center; padding: 40px;
  }
  .welcome-logo { font-size: 28px; font-weight: 700; color: var(--cyan); letter-spacing: 0.1em; }
  .welcome-sub { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="status-dot" id="statusDot"></div>
      <div class="logo">SCORR <span>· CIO</span></div>
    </div>
    <div class="model-toggle">
      <button class="model-btn active" id="btnHaiku" onclick="setModel('haiku')">HAIKU</button>
      <button class="model-btn" id="btnSonnet" onclick="setModel('sonnet')">SONNET</button>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="quick-bar">
    <button class="qbtn" onclick="quickAsk('V8 dashboard')">V8 Dashboard</button>
    <button class="qbtn" onclick="quickAsk('Show open paper positions with P&L')">Open Positions</button>
    <button class="qbtn" onclick="quickAsk('Market mood now — ADR, Nifty gate status, buy/sell slots')">Market Mood</button>
    <button class="qbtn" onclick="quickAsk('QB summary — basket wise P&L')">QB Summary</button>
    <button class="qbtn" onclick="quickAsk('Top qualified stocks across all V8 baskets right now')">Qualified Now</button>
    <button class="qbtn" onclick="quickAsk('System health check')">Health</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">MAX</div>
      <div class="welcome-sub">Your AI Chief Investment Officer · Scorr</div>
      <div style="margin-top:12px; font-size:11px; color: var(--muted); max-width:400px; line-height:1.8;">
        Full access to Railway DB · V8 signals · QB positions · GVM scores · GitHub push · File upload · URL fetch
      </div>
    </div>
  </div>

  <!-- Typing -->
  <div style="padding: 0 16px 4px; display:none" id="typingWrap">
    <div class="msg">
      <div class="msg-avatar">MAX</div>
      <div class="typing show">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- Cost bar -->
  <div class="cost-bar">
    <span id="sessionCost">Session cost: $0.000000</span>
    <span id="tokenCount">Tokens: 0 in / 0 out</span>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="file-list" id="fileList"></div>
    <div class="input-controls">
      <input type="file" id="fileInput" multiple accept=".pdf,.csv,.json,.txt,.xlsx,.png,.jpg,.jpeg,.gif" />
      <button class="btn secondary" onclick="document.getElementById('fileInput').click();" title="Attach file (PDF, CSV, JSON, TXT, XLSX, PNG, JPG, GIF)">📎 ATTACH</button>
      <div class="input-wrap">
        <textarea id="userInput" placeholder="Ask Max anything — paste URLs, upload files, analyze trades, deploy... Enter to send, Shift+Enter for newline" rows="1"></textarea>
      </div>
      <button class="btn" id="sendBtn" onclick="sendMessage()">SEND</button>
    </div>
  </div>

</div>

<script>
const API_BASE = '';
let currentModel = 'claude-haiku-4-5-20251001';
let conversationHistory = [];
let totalCost = 0;
let totalIn = 0;
let totalOut = 0;
let attachedFiles = [];

function setModel(m) {
  if (m === 'haiku') {
    currentModel = 'claude-haiku-4-5-20251001';
    document.getElementById('btnHaiku').classList.add('active');
    document.getElementById('btnSonnet').classList.remove('active');
  } else {
    currentModel = 'claude-sonnet-4-6';
    document.getElementById('btnSonnet').classList.add('active');
    document.getElementById('btnHaiku').classList.remove('active');
  }
}

function quickAsk(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function formatReply(text) {
  const lines = text.split('\n');
  let html = '';
  let inTable = false;
  let tableLines = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
      if (!inTable) { inTable = true; tableLines = []; }
      tableLines.push(line);
    } else {
      if (inTable) {
        html += renderTable(tableLines);
        inTable = false; tableLines = [];
      }
      html += escapeHtml(line) + '\n';
    }
  }
  if (inTable) html += renderTable(tableLines);
  return html;
}

function renderTable(lines) {
  if (lines.length < 2) return lines.map(l => escapeHtml(l)).join('\n');
  let html = '<table>';
  lines.forEach((line, i) => {
    if (i === 1 && /^[\s|:-]+$/.test(line)) return;
    const cells = line.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
    const tag = i === 0 ? 'th' : 'td';
    html += '<tr>' + cells.map(c => `<${tag}>${escapeHtml(c.trim())}</${tag}>`).join('') + '</tr>';
  });
  return html + '</table>';
}

function addMessage(role, content, meta = {}) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = role === 'user' ? 'YOU' : 'MAX';
  const bubbleContent = role === 'assistant' ? formatReply(content) : escapeHtml(content);

  let toolsHtml = '';
  if (meta.toolCalls && meta.toolCalls.length > 0) {
    toolsHtml = `<div class="tools-used">${meta.toolCalls.map(t =>
      `<span class="tool-badge">⚙ ${t.name}</span>`).join('')}</div>`;
  }

  let filesHtml = '';
  if (meta.files && meta.files.length > 0) {
    filesHtml = `<div class="attachments">${meta.files.map(f =>
      `<span class="attachment-badge">📄 ${f}</span>`).join('')}</div>`;
  }

  const metaText = meta.model
    ? `${meta.model.includes('haiku') ? 'haiku' : 'sonnet'} · ${meta.duration_ms}ms · $${meta.cost}`
    : '';

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-bubble">${bubbleContent}</div>
      ${filesHtml}
      ${toolsHtml}
      ${metaText ? `<div class="msg-meta">${metaText}</div>` : ''}
    </div>`;

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// File handling
document.getElementById('fileInput').addEventListener('change', function(e) {
  attachedFiles = [];
  const fileList = document.getElementById('fileList');
  fileList.innerHTML = '';
  
  Array.from(e.target.files).forEach(file => {
    attachedFiles.push(file);
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `📄 ${file.name} <span class="remove" onclick="removeFile('${file.name}')">✕</span>`;
    fileList.appendChild(item);
  });
});

function removeFile(name) {
  attachedFiles = attachedFiles.filter(f => f.name !== name);
  document.getElementById('fileInput').value = '';
  const fileList = document.getElementById('fileList');
  fileList.innerHTML = '';
  attachedFiles.forEach(file => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `📄 ${file.name} <span class="remove" onclick="removeFile('${file.name}')">✕</span>`;
    fileList.appendChild(item);
  });
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text && attachedFiles.length === 0) return;

  let userMessage = text;
  let fileNames = [];

  // Build content array for files
  let contentParts = [];
  if (text) {
    contentParts.push({ type: 'text', text: text });
  }

  // Add files to content
  for (const file of attachedFiles) {
    fileNames.push(file.name);
    if (file.type.startsWith('image/')) {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = () => rej(new Error('File read failed'));
        r.readAsDataURL(file);
      });
      contentParts.push({
        type: 'image',
        source: { type: 'base64', media_type: file.type, data: base64 }
      });
    } else if (file.type === 'application/pdf') {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = () => rej(new Error('File read failed'));
        r.readAsDataURL(file);
      });
      contentParts.push({
        type: 'document',
        source: { type: 'base64', media_type: 'application/pdf', data: base64 }
      });
    } else {
      const text = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = () => rej(new Error('File read failed'));
        r.readAsText(file);
      });
      contentParts.push({ type: 'text', text: `[File: ${file.name}]\n${text}` });
    }
  }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  // Display message with files
  addMessage('user', userMessage, { files: fileNames });
  conversationHistory.push({
    role: 'user',
    content: contentParts.length > 1 ? contentParts : userMessage
  });

  // Clear files
  attachedFiles = [];
  document.getElementById('fileInput').value = '';
  document.getElementById('fileList').innerHTML = '';

  document.getElementById('typingWrap').style.display = 'block';
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

  try {
    const resp = await fetch(`${API_BASE}/api/scorr/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: conversationHistory,
        model: currentModel,
        use_tools: true,
      })
    });

    const data = await resp.json();
    document.getElementById('typingWrap').style.display = 'none';

    if (!resp.ok) {
      addMessage('assistant', `Error: ${data.detail || JSON.stringify(data)}`);
      return;
    }

    const reply = data.reply || '(no response)';
    conversationHistory.push({ role: 'assistant', content: reply });

    addMessage('assistant', reply, {
      model: data.model,
      duration_ms: data.duration_ms,
      cost: data.usage?.cost_usd?.toFixed(6),
      toolCalls: data.tool_calls || [],
    });

    totalCost += data.usage?.cost_usd || 0;
    totalIn += data.usage?.input_tokens || 0;
    totalOut += data.usage?.output_tokens || 0;
    document.getElementById('sessionCost').textContent = `Session cost: $${totalCost.toFixed(6)}`;
    document.getElementById('tokenCount').textContent = `Tokens: ${totalIn} in / ${totalOut} out`;

  } catch (e) {
    document.getElementById('typingWrap').style.display = 'none';
    addMessage('assistant', `Network error: ${e.message}`);
  } finally {
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

// Auto-resize textarea
document.getElementById('userInput').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter for newline)
document.getElementById('userInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Check health on load
(async () => {
  try {
    const r = await fetch('/api/scorr/chat/health');
    const d = await r.json();
    const dot = document.getElementById('statusDot');
    if (d.status === 'ok' && d.anthropic_api_key_set) {
      dot.style.background = '#27e08a';
    } else {
      dot.style.background = '#ff4d6a';
    }
  } catch { document.getElementById('statusDot').style.background = '#ff4d6a'; }
})();
</script>
</body>
</html>
