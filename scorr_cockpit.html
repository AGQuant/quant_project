<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max AICIO · Scorr</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@400;500;600;700;800&display=swap');

  :root{
    --bg:#f6f8fb; --bg2:#fbfcfe; --panel:#ffffff; --panel2:#f1f4f9; --panel3:#e8ecf3;
    --line:#e4e9f1; --line2:#d4dbe7;
    --txt:#1c2536; --mut:#5a6781; --dim:#8a96ad;
    --grn:#0fa968; --grn-d:#e8f9f1; --grn-b:#c3edd8;
    --red:#e23744; --red-d:#fdf0f1; --red-b:#f5c6ca;
    --blu:#2563eb; --blu-d:#eff4ff;
    --cyan:#0891b2; --cyan-d:#e0f5fb;
    --amber:#d97706; --amber-d:#fef3e2; --amber-b:#fcd89a;
    --font:'Sora',system-ui,-apple-system,sans-serif;
    --mono:'Space Mono','SF Mono',Consolas,monospace;
    --shadow:0 1px 4px rgba(20,35,70,.06);
    --shadow-md:0 4px 16px rgba(20,35,70,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--txt);
    font-family:var(--font);font-size:13px;line-height:1.55;-webkit-font-smoothing:antialiased}

  .model-nav{display:flex;align-items:center;gap:2px;height:46px;background:var(--panel);
    border-bottom:1px solid var(--line);padding:0 16px;overflow-x:auto;scrollbar-width:none;
    position:sticky;top:0;z-index:30;box-shadow:var(--shadow);flex-shrink:0}
  .model-nav::-webkit-scrollbar{display:none}
  .mnav-item{display:flex;align-items:center;gap:5px;padding:0 11px;height:46px;cursor:pointer;
    border-bottom:2px solid transparent;text-decoration:none;white-space:nowrap;flex-shrink:0;
    color:var(--mut);font-size:11.5px;font-weight:600;transition:.12s}
  .mnav-item:hover{color:var(--txt)}
  .mnav-item.active{border-bottom-color:var(--cyan);color:var(--cyan)}
  .mnav-item.soon{opacity:.35;cursor:default;pointer-events:none}
  .mnav-sep{width:1px;height:20px;background:var(--line);flex-shrink:0;margin:0 4px}

  .app{display:flex;flex-direction:column;height:calc(100vh - 46px);max-width:880px;margin:0 auto}

  .head{display:flex;align-items:center;gap:12px;padding:14px 18px 10px;flex-shrink:0}
  .h-brand{display:flex;flex-direction:column}
  .h-title{font-size:20px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
  .h-title b{color:var(--cyan)}
  .h-status{width:8px;height:8px;border-radius:50%;background:var(--grn);
    box-shadow:0 0 6px rgba(15,169,104,.4);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .h-sub{font-size:10px;color:var(--dim);letter-spacing:1.8px;text-transform:uppercase;margin-top:2px}
  .h-spacer{flex:1}
  .h-btn{display:flex;align-items:center;gap:6px;background:var(--panel);
    border:1px solid var(--line2);border-radius:7px;padding:7px 11px;cursor:pointer;
    font-size:11px;font-weight:600;color:var(--mut);user-select:none;transition:.15s;
    font-family:var(--font)}
  .h-btn:hover{border-color:var(--cyan);color:var(--cyan)}
  .h-btn.reason.on{border-color:var(--grn);background:var(--grn-d);color:var(--grn)}
  .h-btn .dot{width:7px;height:7px;border-radius:50%;background:var(--dim);transition:.15s}
  .h-btn.reason.on .dot{background:var(--grn)}

  .recent{display:none;align-items:center;gap:6px;padding:0 18px 10px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
  .recent::-webkit-scrollbar{display:none}
  .recent.show{display:flex}
  .recent-label{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;
    flex-shrink:0;font-weight:700}
  .recent-chip{padding:4px 10px;border-radius:14px;border:1px solid var(--line);
    background:var(--panel);color:var(--mut);cursor:pointer;font-size:11px;
    white-space:nowrap;transition:.12s;font-weight:500;max-width:200px;
    overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
  .recent-chip:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-d)}

  .welcome{flex:1;overflow-y:auto;padding:8px 18px 20px;display:flex;flex-direction:column;gap:18px}
  .welcome::-webkit-scrollbar{width:4px}
  .welcome::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
  .w-hero{text-align:center;padding:24px 12px 8px}
  .w-logo{font-size:34px;font-weight:800;letter-spacing:-1px;color:var(--txt);line-height:1}
  .w-logo b{color:var(--cyan)}
  .w-tag{font-size:12px;color:var(--mut);margin-top:8px;font-weight:500}
  .w-desc{font-size:11px;color:var(--dim);margin-top:5px;letter-spacing:.5px}

  .cat-section{display:flex;flex-direction:column;gap:8px}
  .cat-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;
    letter-spacing:1.5px;padding:0 2px}

  /* compact quick-link chips */
  .chip-wrap{display:flex;flex-wrap:wrap;gap:7px}
  .qchip{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;background:var(--panel);
    border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:.12s;
    font-family:var(--font);box-shadow:var(--shadow);max-width:100%}
  .qchip:hover{border-color:var(--cyan);background:var(--cyan-d);transform:translateY(-1px)}
  .qchip .qc-ic{font-size:13px;color:var(--cyan);flex-shrink:0;line-height:1}
  .qchip .qc-lb{font-size:12px;font-weight:600;color:var(--txt);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .qchip.quick{border-color:var(--cyan)}

  /* chip search bar */
  .chip-search{display:flex;gap:8px;margin:0 0 4px;position:sticky;top:0;z-index:5}
  .chip-search input{flex:1;background:var(--panel);border:1.5px solid var(--line2);
    border-radius:9px;color:var(--txt);font-family:var(--font);font-size:13px;font-weight:600;
    padding:10px 13px;outline:none;transition:.15s}
  .chip-search input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(8,145,178,.08)}
  .chip-search input::placeholder{color:var(--dim);font-weight:400}
  .chip-search-btn{flex-shrink:0;border:none;border-radius:9px;background:var(--cyan);color:#fff;
    font-size:15px;font-weight:700;padding:0 15px;cursor:pointer;transition:.15s}
  .chip-search-btn:hover{background:#0a7d99}

  .msgs{flex:1;overflow-y:auto;padding:14px 18px;display:none;flex-direction:column;gap:14px;
    -webkit-overflow-scrolling:touch}
  .msgs.show{display:flex}
  .msgs::-webkit-scrollbar{width:4px}
  .msgs::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
  .msg{display:flex;gap:10px}
  .msg.user{flex-direction:row-reverse}
  .av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;
    justify-content:center;font-size:10px;font-weight:700;letter-spacing:.5px}
  .msg.user .av{background:var(--blu);color:#fff}
  .msg.bot .av{background:var(--cyan-d);color:var(--cyan);border:1px solid #b7e0eb}
  .body{max-width:90%;min-width:0}
  .bubble{padding:11px 14px;border-radius:10px;word-break:break-word;font-size:13px}
  .msg.user .bubble{background:var(--blu);color:#fff;white-space:pre-wrap;border-bottom-right-radius:3px}
  .msg.bot .bubble{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    border-bottom-left-radius:3px;box-shadow:var(--shadow)}
  .meta{font-size:10px;color:var(--dim);margin-top:4px;padding:0 4px}
  .msg.user .meta{text-align:right}
  .tools-used{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
  .tool-badge{padding:2px 8px;border-radius:4px;background:var(--cyan-d);
    border:1px solid #b7e0eb;font-size:9.5px;color:var(--cyan);font-weight:600;
    font-family:var(--mono)}

  .md h1,.md h2,.md h3{font-weight:700;margin:10px 0 5px;color:var(--txt);line-height:1.3}
  .md h1{font-size:16px}.md h2{font-size:14px}.md h3{font-size:13px}
  .md h1:first-child,.md h2:first-child,.md h3:first-child,.md p:first-child{margin-top:0}
  .md p{margin:5px 0}
  .md ul,.md ol{margin:5px 0;padding-left:20px}.md li{margin:2px 0}
  .md strong{font-weight:700;color:var(--txt)}.md em{font-style:italic;color:var(--mut)}
  .md code.inline{background:var(--bg2);border:1px solid var(--line2);border-radius:4px;
    padding:1px 5px;font-family:var(--mono);font-size:12px;color:var(--cyan)}
  .md pre{background:#1a1f2e;color:#e8e8e8;border-radius:8px;padding:10px 12px;
    overflow-x:auto;margin:7px 0;font-family:var(--mono);font-size:11.5px;line-height:1.5}
  .md hr{border:none;border-top:1px solid var(--line);margin:10px 0}
  .md blockquote{border-left:3px solid var(--line2);padding-left:10px;margin:6px 0;color:var(--mut)}
  .md a{color:var(--blu);text-decoration:underline}
  .md table{border-collapse:collapse;width:100%;margin:8px 0;font-size:11.5px;display:block;
    overflow-x:auto;-webkit-overflow-scrolling:touch}
  .md th{background:var(--panel2);color:var(--mut);padding:6px 9px;text-align:left;
    border:1px solid var(--line2);font-weight:600;white-space:nowrap;font-family:var(--mono);
    font-size:10.5px;letter-spacing:.3px}
  .md td{padding:5px 9px;border:1px solid var(--line);white-space:nowrap;font-family:var(--mono);
    font-size:11px}
  .pnl-pos{color:var(--grn);font-weight:700}
  .pnl-neg{color:var(--red);font-weight:700}

  .typing{display:none;align-items:center;gap:10px;padding:10px 18px;flex-shrink:0}
  .typing.show{display:flex}
  .tdot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:bl 1.2s infinite}
  .tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,80%,100%{opacity:.3}40%{opacity:1}}

  .costbar{padding:6px 18px;background:var(--bg2);border-top:1px solid var(--line);
    display:flex;justify-content:space-between;font-size:10px;color:var(--dim);flex-shrink:0}
  .costbar .ar-dot{display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--grn);margin-right:4px;animation:pulse 2s infinite}

  .input-wrap{border-top:1px solid var(--line);background:var(--panel);
    padding:10px 14px;flex-shrink:0;position:relative}
  .suggest-drop{display:none;position:absolute;bottom:calc(100% + 6px);left:14px;right:14px;
    background:var(--panel);border:1px solid var(--line2);border-radius:10px;
    box-shadow:var(--shadow-md);overflow:hidden;z-index:20;max-height:280px;overflow-y:auto}
  .suggest-drop.show{display:block}
  .suggest-drop::-webkit-scrollbar{width:4px}
  .suggest-drop::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
  .sg-section{font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;
    letter-spacing:1.5px;padding:8px 14px 4px;background:var(--bg2);border-bottom:1px solid var(--line)}
  .sg-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;
    border-bottom:1px solid var(--line);transition:.1s}
  .sg-item:last-child{border-bottom:none}
  .sg-item:hover,.sg-item.sel{background:var(--panel2)}
  .sg-ic{width:24px;height:24px;background:var(--panel2);border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-size:12px;
    color:var(--cyan);flex-shrink:0}
  .sg-info{flex:1;min-width:0}
  .sg-label{font-size:12px;font-weight:600;color:var(--txt);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sg-cat{font-size:9.5px;color:var(--mut);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}
  .sg-stk{display:flex;align-items:baseline;gap:8px;flex:1;min-width:0}
  .sg-sym{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--txt);min-width:70px}
  .sg-name{font-size:10.5px;color:var(--mut);flex:1;overflow:hidden;
    white-space:nowrap;text-overflow:ellipsis}
  .sg-gvm{font-size:9.5px;font-weight:700;color:var(--cyan);background:var(--cyan-d);
    padding:1px 6px;border-radius:4px;flex-shrink:0}

  .input-row{display:flex;gap:8px;align-items:flex-end}
  #q{flex:1;background:var(--bg);border:1.5px solid var(--line2);border-radius:9px;
    color:var(--txt);font-family:var(--font);font-size:14px;padding:11px 13px;resize:none;
    min-height:44px;max-height:110px;outline:none;line-height:1.5;transition:.15s}
  #q:focus{border-color:var(--cyan);background:var(--panel);
    box-shadow:0 0 0 3px rgba(8,145,178,.08)}
  #q::placeholder{color:var(--dim)}
  .send-btn{padding:11px 18px;background:var(--blu);color:#fff;border:none;border-radius:9px;
    cursor:pointer;font-family:var(--font);font-size:13px;font-weight:700;white-space:nowrap;
    transition:.15s;box-shadow:0 2px 8px rgba(37,99,235,.25)}
  .send-btn:hover{background:#1d52d5;box-shadow:0 4px 14px rgba(37,99,235,.32)}
  .send-btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
  .send-btn.stop{background:var(--red);box-shadow:0 2px 8px rgba(226,55,68,.25)}
</style>
</head>
<body>
<nav class="model-nav">
  <a class="mnav-item" href="/dashboard"><span>⚡</span>V8</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item" href="/cio2?model=gvm"><span>▦</span>GVM</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item" href="/check"><span>✓</span>Check</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item active" href="/cio"><span>◉</span>Max</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item soon"><span>⌂</span>QB</a>
  <a class="mnav-item soon"><span>⟁</span>V10</a>
</nav>

<div class="app">
  <div class="head">
    <div class="h-brand">
      <div class="h-title">
        <span class="h-status" id="statusDot"></span>
        Max <b>AICIO</b>
      </div>
      <div class="h-sub">Your AI Chief Investment Officer</div>
    </div>
    <div class="h-spacer"></div>
    <button class="h-btn" id="clearBtn" onclick="clearChat()" title="Clear conversation">
      <span style="font-size:13px">↻</span><span>Clear</span>
    </button>
    <button class="h-btn reason" id="reasonBtn" onclick="toggleReason()"
            title="Reasoning OFF = native DB, $0. ON = Sonnet, ~$0.05.">
      <div class="dot"></div><span id="reasonLabel">Reasoning OFF</span>
    </button>
  </div>

  <div class="recent" id="recent">
    <span class="recent-label">Recent</span>
  </div>

  <div class="welcome" id="welcome">
    <div class="w-hero">
      <div class="w-logo">Max <b>AICIO</b></div>
      <div class="w-tag">Six models. One intelligence. Every answer.</div>
      <div class="w-desc">Native $0 · Railway · Auto-refresh ON</div>
    </div>
    <div class="chip-search">
      <input id="chipSearch" placeholder="Search actions… (e.g. pivot, gainers, pharma)" autocomplete="off" spellcheck="false">
      <button class="chip-search-btn" id="chipSearchBtn" title="Search actions">🔍</button>
    </div>
    <div id="catSections"></div>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="typing" id="typing">
    <div class="av">MAX</div>
    <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
  </div>

  <div class="costbar">
    <span><span class="ar-dot" id="arDot"></span><span id="modeLabel">Native mode · $0</span></span>
    <span id="costLabel">Session: $0.000000</span>
  </div>

  <div class="input-wrap">
    <div class="suggest-drop" id="suggestDrop"></div>
    <div class="input-row">
      <textarea id="q" rows="1" placeholder="Type a stock, query, or question — Max suggests as you type…"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
const API='/api/scorr/chat', USER_KEY='scorr_arpit', STORE='scorr_max_v9';
const SONNET='claude-sonnet-4-6', MAX_TOKENS=3000, BUDGET=0.05;
const MAX_RECENT=6;

let reasonOn=false, totalCost=0, busy=false, currentController=null;
let history=[];
let recentQueries=[];
let sgSel=-1, sgItems=[], sgTimer=null, acAbort=null;

const CARDS=[
  {id:'v8-dash', cat:'V8 Signals', icon:'⚡', label:'V8 Dashboard', desc:'Live signals, baskets, slot allocation',
   q:'Virtual Dashboard V8', kw:['v8','dashboard','virtual','signals','live']},
  {id:'v8-mood', cat:'V8 Signals', icon:'◉', label:'Market Mood Gate', desc:'ADR + Nifty D/W/M, slot caps',
   q:'V8 market mood gate and slot allocation', kw:['mood','gate','adr','nifty','slot','market']},
  {id:'v8-qual', cat:'V8 Signals', icon:'✓', label:'Qualified Now', desc:'Stocks passing all filters today',
   q:'qualified now', kw:['qualified','now','signals','today']},
  {id:'v8-buyrev', cat:'V8 Signals', icon:'▲', label:'Buy Reversal', desc:'Reversal long basket',
   q:'V8 buy reversal basket', kw:['buy','reversal','long']},
  {id:'v8-buymom', cat:'V8 Signals', icon:'▲', label:'Buy Momentum', desc:'Momentum long basket',
   q:'V8 buy momentum basket', kw:['buy','momentum','long']},
  {id:'v8-sellrev', cat:'V8 Signals', icon:'▼', label:'Sell Reversal', desc:'Reversal short basket',
   q:'V8 sell reversal basket', kw:['sell','reversal','short']},
  {id:'v8-sellmom', cat:'V8 Signals', icon:'▼', label:'Sell Momentum', desc:'Momentum short basket',
   q:'V8 sell momentum basket', kw:['sell','momentum','short']},
  {id:'v8-sellob', cat:'V8 Signals', icon:'▼', label:'Sell Overbought', desc:'Overbought short basket',
   q:'V8 sell overbought basket', kw:['sell','overbought','short']},
  {id:'v8-paper', cat:'V8 Signals', icon:'⊡', label:'V8 Paper Book', desc:'Open positions, closed trades, P&L',
   q:'V8 paper open positions and closed trades summary', kw:['paper','pnl','open','positions','book']},
  {id:'v8-pivot', cat:'V8 Signals', icon:'⌑', label:'Pivot Levels', desc:'Rolling-5d PP / R1 / S1',
   q:'V8 paper pivot levels', kw:['pivot','levels','support','resistance','pp','r1','s1']},

  {id:'gvm-top', cat:'GVM Engine', icon:'▦', label:'Top 10 by GVM', desc:'Highest quality across all stocks',
   q:'Top 10 stocks by GVM score', kw:['top','gvm','best','quality','rank']},
  {id:'gvm-strong', cat:'GVM Engine', icon:'★', label:'Strong Buy (8+)', desc:'GVM ≥ 8 stocks',
   q:'GVM strong buy list above 8', kw:['strong','buy','accumulate','strongbuy']},
  {id:'gvm-sect', cat:'GVM Engine', icon:'⬚', label:'Sector Ratings', desc:'Mcap-weighted sector GVM',
   q:'Sector ratings', kw:['sector','ratings','rotation','industry']},
  {id:'gvm-pharma', cat:'GVM Engine', icon:'✚', label:'Top Pharma', desc:'Healthcare GVM ≥ 7.5',
   q:'Top 10 pharma GVM above 7.5', kw:['pharma','healthcare','medicine','drug']},
  {id:'gvm-it', cat:'GVM Engine', icon:'☷', label:'Top IT', desc:'Technology sector leaders',
   q:'Top 10 IT GVM above 7', kw:['it','tech','technology','software']},
  {id:'gvm-bank', cat:'GVM Engine', icon:'⌂', label:'Top Banks', desc:'Banking + BFSI leaders',
   q:'Top 10 banking GVM', kw:['bank','banking','financial','bfsi','nbfc']},
  {id:'gvm-auto', cat:'GVM Engine', icon:'⊞', label:'Top Auto', desc:'Auto sector leaders',
   q:'Top 10 auto sector GVM', kw:['auto','automobile','car','vehicle']},
  {id:'gvm-fmcg', cat:'GVM Engine', icon:'⊟', label:'Top FMCG', desc:'Consumer staples leaders',
   q:'Top 10 FMCG GVM', kw:['fmcg','consumer','staples','goods']},

  {id:'tc-long', cat:'Trade Check', icon:'◐', label:'Trade Check LONG', desc:'v3.3 Tier 1 + Tier 2 for long entry',
   q:'trade check {SYMBOL} long', kw:['trade','check','long','review','tier','validate']},
  {id:'tc-short', cat:'Trade Check', icon:'◑', label:'Trade Check SHORT', desc:'v3.3 Tier 1 + Tier 2 for short entry',
   q:'trade check {SYMBOL} short', kw:['trade','check','short','review','tier','validate']},
  {id:'tc-deep', cat:'Trade Check', icon:'◓', label:'Trade Check Deep', desc:'Full Sonnet reasoning + both frameworks',
   q:'Full trade check on {SYMBOL} with v3.3 and v3.4.1 weighted', kw:['deep','full','reasoning','weighted']},
  {id:'tc-card', cat:'Trade Check', icon:'⬔', label:'Trade Card', desc:'Vertical entry/target/stop card',
   q:'Prepare trade card for {SYMBOL} long', kw:['card','trade','idea','entry','target','stoploss']},
  {id:'tc-screen', cat:'Trade Check', icon:'⊞', label:'Open Screener', desc:'Nifty50 / All-208 TC screener (opens /check)',
   url:'/check', kw:['screener','screen','scan','nifty50','all','futures']},
  {id:'tc-intra', cat:'Trade Check', icon:'⏱', label:'Intraday Scan', desc:'TC>=10 + live intraday filters (opens /check)',
   url:'/check', kw:['intraday','live','scan','hourly','volume','momentum']},

const CAT_ORDER=['V8 Signals','GVM Engine','Trade Check','Quant Basket','Daily Digest','V10 Index','Market Intel','V9 Pair','My Journal','System'];

// Most-used quick links, shown first as a priority row.
const MOST_USED=['v8-dash','v8-qual','dd-full','gvm-top','tc-card','qb-sum',
                 'dd-rot','v8-mood','gvm-strong','dd-adr','tc-long','tc-intra'];

function chipEl(c){
  const b=document.createElement('button');
  b.className='qchip'+(MOST_USED.includes(c.id)?' quick':'');
  b.innerHTML=`<span class="qc-ic">${c.icon}</span><span class="qc-lb">${c.label}</span>`;
  b.title=c.desc||c.cat;
  b.onclick=()=>runCard(c);
  return b;
}

function chipSection(title,items){
  const s=document.createElement('div');s.className='cat-section';
  const t=document.createElement('div');t.className='cat-title';t.textContent=title;
  const wrap=document.createElement('div');wrap.className='chip-wrap';
  items.forEach(c=>wrap.appendChild(chipEl(c)));
  s.appendChild(t);s.appendChild(wrap);
  return s;
}

function renderWelcome(){
  const root=document.getElementById('catSections');root.innerHTML='';
  const quick=MOST_USED.map(id=>CARDS.find(c=>c.id===id)).filter(Boolean);
  if(quick.length)root.appendChild(chipSection('★ Quick Access',quick));
  for(const cat of CAT_ORDER){
    const items=CARDS.filter(c=>c.cat===cat);
    if(items.length)root.appendChild(chipSection(cat,items));
  }
}

function filterChips(q){
  const root=document.getElementById('catSections');
  q=(q||'').trim();
  if(q.length<1){renderWelcome();return;}
  const matches=searchCardsAll(q);
  root.innerHTML='';
  if(!matches.length){
    const e=document.createElement('div');e.className='cat-title';
    e.style.padding='10px 2px';e.textContent='No matching actions';
    root.appendChild(e);return;
  }
  root.appendChild(chipSection(`Matches (${matches.length})`,matches));
}

function runCard(c){
  if(c.url){ window.open(c.url,'_blank'); return; }
  if(c.q && c.q.includes('{SYMBOL}')){
    const sym=prompt(`${c.label} — enter symbol:`,'');
    if(!sym)return;
    document.getElementById('q').value=c.q.replace('{SYMBOL}',sym.toUpperCase().trim());
  } else {
    document.getElementById('q').value=c.q;
  }
  send();
}

function searchCards(q){
  if(!q||q.length<2)return[];
  const ql=q.toLowerCase().trim().replace(/[^a-z0-9\s]/g,' ');
  const words=ql.split(/\s+/).filter(w=>w.length>=2);
  if(!words.length)return[];

  const scored=CARDS.map(c=>{
    const bag=(c.label+' '+c.desc+' '+c.kw.join(' ')+' '+c.cat).toLowerCase();
    let s=0;
    if(bag.includes(ql))s+=10;
    for(const w of words){
      if(bag.includes(w))s+=3;
      else if(w.length>=4){
        const stem=w.slice(0,4);
        if(bag.includes(stem))s+=1;
        const stem2=w.slice(-4);
        if(bag.includes(stem2))s+=1;
      } else if(w.length===3){
        if(bag.includes(w.slice(0,3)))s+=1;
      }
    }
    return {c,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,6);
  return scored.map(x=>x.c);
}

// Uncapped variant for the welcome chip filter (shows all matches, not just 6).
function searchCardsAll(q){
  if(!q||q.length<1)return[];
  const ql=q.toLowerCase().trim().replace(/[^a-z0-9\s]/g,' ');
  const words=ql.split(/\s+/).filter(w=>w.length>=1);
  if(!words.length)return[];
  const scored=CARDS.map(c=>{
    const bag=(c.label+' '+c.desc+' '+c.kw.join(' ')+' '+c.cat).toLowerCase();
    let s=0;
    if(bag.includes(ql))s+=10;
    for(const w of words){
      if(bag.includes(w))s+=3;
      else if(w.length>=4&&(bag.includes(w.slice(0,4))||bag.includes(w.slice(-4))))s+=1;
    }
    return {c,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  return scored.map(x=>x.c);
}

async function searchStocks(q){
  if(acAbort)acAbort.abort();
  acAbort=new AbortController();
  try{
    const r=await fetch(`/api/gvm/search?q=${encodeURIComponent(q)}&limit=4`,{signal:acAbort.signal});
    if(!r.ok)return[];
    const d=await r.json();
    return(d.results||d||[]).slice(0,4);
  }catch(e){return[];}
}

async function updateSuggest(){
  const v=document.getElementById('q').value.trim();
  const drop=document.getElementById('suggestDrop');
  if(v.length<2){drop.classList.remove('show');sgItems=[];return;}

  const cards=searchCards(v);
  const stocks=await searchStocks(v);

  sgItems=[];let html='';
  if(cards.length){
    html+='<div class="sg-section">Actions</div>';
    cards.forEach(c=>{
      sgItems.push({type:'card',data:c});
      html+=`<div class="sg-item" data-idx="${sgItems.length-1}">
        <div class="sg-ic">${c.icon}</div>
        <div class="sg-info">
          <div class="sg-label">${c.label}</div>
          <div class="sg-cat">${c.cat}</div>
        </div></div>`;
    });
  }
  if(stocks.length){
    html+='<div class="sg-section">Stocks</div>';
    stocks.forEach(s=>{
      sgItems.push({type:'stock',data:s});
      const gvm=s.gvm_score!=null?parseFloat(s.gvm_score).toFixed(1):null;
      html+=`<div class="sg-item" data-idx="${sgItems.length-1}">
        <div class="sg-stk">
          <span class="sg-sym">${s.symbol||s.nse_code||''}</span>
          <span class="sg-name">${s.company_name||s.name||''}</span>
        </div>
        ${gvm?`<span class="sg-gvm">GVM ${gvm}</span>`:''}
      </div>`;
    });
  }

  if(!sgItems.length){drop.classList.remove('show');return;}
  drop.innerHTML=html;drop.classList.add('show');sgSel=-1;
  drop.querySelectorAll('.sg-item').forEach(el=>{
    el.onmousedown=e=>{e.preventDefault();pickSg(parseInt(el.dataset.idx));};
  });
}

function pickSg(idx){
  const it=sgItems[idx];if(!it)return;
  closeSuggest();
  if(it.type==='card'){
    runCard(it.data);
  } else {
    const sym=(it.data.symbol||it.data.nse_code||'').toUpperCase();
    document.getElementById('q').value=`trade check ${sym} long`;
    send();
  }
}
function closeSuggest(){document.getElementById('suggestDrop').classList.remove('show');sgSel=-1;}
function moveSg(dir){
  const items=document.querySelectorAll('.sg-item');
  if(!items.length)return;
  if(sgSel>=0)items[sgSel].classList.remove('sel');
  sgSel=Math.max(0,Math.min(items.length-1,(sgSel<0?-1:sgSel)+dir));
  items[sgSel].classList.add('sel');
  items[sgSel].scrollIntoView({block:'nearest'});
}

function pushRecent(text){

    b.textContent=t.length>40?t.slice(0,40)+'…':t;b.title=t;

function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function colorCell(raw){const e=esc(raw),m=raw.match(/^([+-])[\d,]*\.?\d+%?$/);
  if(!m)return inlineMd(e);return m[1]==='+'?`<span class="pnl-pos">${e}</span>`:`<span class="pnl-neg">${e}</span>`;}
function inlineMd(s){s=s.replace(/`([^`]+)`/g,(m,c)=>`<code class="inline">${c}</code>`);
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<em>$2</em>');
  s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;}
function renderTable(lines){if(!lines.length)return'';let h='<table>';
  lines.forEach((ln,i)=>{if(i===1&&/^[\s|:-]+$/.test(ln))return;
    const cells=ln.split('|').filter((_,x,a)=>x>0&&x<a.length-1);const tag=i===0?'th':'td';
    h+='<tr>'+cells.map(c=>tag==='th'?`<th>${inlineMd(esc(c.trim()))}</th>`:`<td>${colorCell(c.trim())}</td>`).join('')+'</tr>';});
  return h+'</table>';}
function fmt(text){const lines=text.split('\n');let html='',i=0,lt=null,lb=[];
  const flush=()=>{if(lt){html+=`<${lt}>`+lb.map(x=>`<li>${inlineMd(esc(x))}</li>`).join('')+`</${lt}>`;lt=null;lb=[];}};
  while(i<lines.length){let ln=lines[i];
    if(/^\s*```/.test(ln)){flush();let code=[];i++;while(i<lines.length&&!/^\s*```/.test(lines[i])){code.push(lines[i]);i++;}i++;html+=`<pre><code>${esc(code.join('\n'))}</code></pre>`;continue;}
    if(ln.trim().startsWith('|')&&ln.trim().endsWith('|')){flush();let tb=[];
      while(i<lines.length&&lines[i].trim().startsWith('|')){tb.push(lines[i]);i++;}html+=renderTable(tb);continue;}
    let hm=ln.match(/^(#{1,3})\s+(.*)$/);if(hm){flush();html+=`<h${hm[1].length}>${inlineMd(esc(hm[2]))}</h${hm[1].length}>`;i++;continue;}
    if(/^\s*([-*_])\1{2,}\s*$/.test(ln)){flush();html+='<hr>';i++;continue;}
    if(/^\s*>\s?/.test(ln)){flush();html+=`<blockquote>${inlineMd(esc(ln.replace(/^\s*>\s?/,'')))}</blockquote>`;i++;continue;}
    let um=ln.match(/^\s*[-*•]\s+(.*)$/);if(um){if(lt&&lt!=='ul')flush();lt='ul';lb.push(um[1]);i++;continue;}
    let om=ln.match(/^\s*\d+[.)]\s+(.*)$/);if(om){if(lt&&lt!=='ol')flush();lt='ol';lb.push(om[1]);i++;continue;}
    if(ln.trim()===''){flush();i++;continue;}flush();html+=`<p>${inlineMd(esc(ln))}</p>`;i++;}
  flush();return html;}

function addMsg(role,content,meta){
  const msgs=document.getElementById('msgs');msgs.classList.add('show');
  document.getElementById('welcome').style.display='none';
  const d=document.createElement('div');d.className='msg '+role;
  const bc=role==='bot'?`<div class="md">${fmt(content)}</div>`:esc(content);
  const toolsHtml=meta?.tools?.length?`<div class="tools-used">${meta.tools.map(t=>`<span class="tool-badge">⚙ ${t.name}</span>`).join('')}</div>`:'';
  const tag=meta?.tag||'';
  d.innerHTML=`<div class="av">${role==='user'?'YOU':'MAX'}</div>
    <div class="body"><div class="bubble">${bc}</div>${toolsHtml}${tag?`<div class="meta">${tag}</div>`:''}</div>`;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}

function saveLocal(){try{localStorage.setItem(STORE,JSON.stringify({
  history,recentQueries,reasonOn,totalCost
}));}catch(e){}}
function loadLocal(){try{const r=localStorage.getItem(STORE);
  if(r){const s=JSON.parse(r);
    history=s.history||[];recentQueries=s.recentQueries||[];
    if(s.reasonOn!==undefined)reasonOn=s.reasonOn;
    totalCost=s.totalCost||0;
  }}catch(e){}}

async function dbPersist(){
  try{await fetch('/mcp',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',id:1,method:'tools/call',params:{name:'run_sql',
      arguments:{query:`INSERT INTO max_chats (id,user_key,title,history,cost,tin,tout,renamed,updated_at)
        VALUES ('max_${USER_KEY}','${USER_KEY}','Max session','${JSON.stringify(history).replace(/'/g,"''")}',${totalCost},0,0,false,NOW())
        ON CONFLICT (id) DO UPDATE SET history=EXCLUDED.history,cost=EXCLUDED.cost,updated_at=NOW()`}}})});}catch(e){}
}

async function send(){
  closeSuggest();
  const inp=document.getElementById('q'),text=inp.value.trim();
  if(!text||busy)return;busy=true;
  document.getElementById('sendBtn').disabled=true;

  pushRecent(text);
  addMsg('user',text);
  history.push({role:'user',content:text});
  inp.value='';inp.style.height='auto';
  document.getElementById('typing').classList.add('show');
  document.getElementById('msgs').scrollTop=1e9;

  currentController=new AbortController();
  try{
    const t0=Date.now();
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      signal:currentController.signal,
      body:JSON.stringify({messages:history,model:reasonOn?SONNET:null,
        use_tools:true,max_tokens:reasonOn?MAX_TOKENS:0,claude_on:reasonOn,budget_cap_usd:BUDGET})});
    const d=await r.json();
    document.getElementById('typing').classList.remove('show');
    if(!r.ok){addMsg('bot',`Error: ${d.detail||('HTTP '+r.status)}`,{tag:'error'});}
    else{
      const reply=d.reply||'(no response)';
      history.push({role:'assistant',content:reply});
      const native=!reasonOn||!d.model;
      const cost=d.usage?.cost_usd||0;totalCost+=cost;
      const tag=native?`native · $0 · ${Date.now()-t0}ms`:`sonnet · $${cost.toFixed(6)} · ${Date.now()-t0}ms`;
      addMsg('bot',reply,{tag,tools:d.tool_calls||[]});
      document.getElementById('costLabel').textContent=`Session: $${totalCost.toFixed(6)}`;
      saveLocal();dbPersist();
    }
  }catch(e){
    document.getElementById('typing').classList.remove('show');
    if(e.name!=='AbortError')addMsg('bot',`Network error: ${e.message}`,{tag:'error'});
  }
  busy=false;document.getElementById('sendBtn').disabled=false;inp.focus();
}

const qEl=document.getElementById('q');
qEl.addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px';
  clearTimeout(sgTimer);sgTimer=setTimeout(updateSuggest,180);
});
qEl.addEventListener('keydown',function(e){
  const dropOpen=document.getElementById('suggestDrop').classList.contains('show');
  if(e.key==='ArrowDown'&&dropOpen){e.preventDefault();moveSg(1);}
  else if(e.key==='ArrowUp'&&dropOpen){e.preventDefault();moveSg(-1);}
  else if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    if(dropOpen&&sgSel>=0){pickSg(sgSel);}
    else{send();}
  }
  else if(e.key==='Escape'){closeSuggest();}
});
