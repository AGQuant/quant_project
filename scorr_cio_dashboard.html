const API = "https://quantproject-production.up.railway.app";
const MCP = `${API}/mcp`;

async function mcpCall(tool, args = {}) {
  const r = await fetch(MCP, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ jsonrpc: "2.0", id: 1, method: "tools/call", params: { name: tool, arguments: args } }),
  });
  const j = await r.json();
  const raw = j?.result?.content?.[0]?.text;
  try { return JSON.parse(raw); } catch { return raw; }
}

async function apiGet(path, opts) {
  // cc#268: optional fetch opts (e.g. { signal }) so callers can cancel in-flight requests.
  // Backward-compatible — existing single-arg callers pass opts=undefined (a no-op for fetch).
  const r = await fetch(`${API}${path}`, opts);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

const fmt = (n, d = 0) => n == null ? "—" : Number(n).toLocaleString("en-IN", { maximumFractionDigits: d, minimumFractionDigits: d });
const fmtMcap = (n) => n == null ? "—" : n >= 100000 ? `₹${(n/100000).toFixed(1)}LCr` : n >= 1000 ? `₹${(n/1000).toFixed(1)}KCr` : `₹${Math.round(n)}Cr`;
const gvmColor = (g) => g == null ? C.muted : g >= 8 ? C.green : g >= 7 ? C.gold : g >= 6 ? C.orange : C.red;
const ratingColor = (r) => r == null ? C.muted : r >= 7 ? C.green : r >= 5 ? C.gold : C.red;
const verdictColor = (v = "") => ({ "Excellent": C.green, "Good": C.accent, "Average": C.orange, "Weak": C.red }[v] || C.muted);
const signFmt = (n, d = 2) => n == null ? "—" : (n >= 0 ? "+" : "") + Number(n).toFixed(d);
const deltaColor = (n, threshold = 0.05) => n == null ? C.muted : n > threshold ? C.green : n < -threshold ? C.red : C.muted;

function TrendChart({ points }) {
  if (!points || points.length < 2) return null;
  const W = 280, H = 88, pad = 6;
  const allVals = [];
  points.forEach(p => { ["gvm","g","v","m"].forEach(k => { if (p[k] != null) allVals.push(p[k]); }); });
  const min = Math.min(...allVals) - 0.15, max = Math.max(...allVals) + 0.15;
  const span = (max - min) || 1;
  const X = i => pad + (i / (points.length - 1)) * (W - 2 * pad);
  const Y = v => H - pad - ((v - min) / span) * (H - 2 * pad);
  const mkPath = key => points.map((p, i) =>
    p[key] == null ? "" : `${i === 0 || points[i-1][key] == null ? "M" : "L"}${X(i).toFixed(1)},${Y(p[key]).toFixed(1)}`
  ).join(" ");
  const first = points[0].gvm, last = points[points.length - 1].gvm;
  const delta = (last != null && first != null) ? last - first : 0;
  const mainStroke = delta > 0.05 ? C.green : delta < -0.05 ? C.red : C.muted;
  const lines = [
    { key: "g", color: C.gPillar }, { key: "v", color: C.vPillar }, { key: "m", color: C.mPillar },
  ];
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: ".06em" }}>GVM Trend · {points.length}d</span>
        <span style={{ fontSize: 14, fontWeight: 800, color: mainStroke, fontFamily: "monospace" }}>
          {delta >= 0 ? "▲ " : "▼ "}{signFmt(delta)}
        </span>
      </div>
      <svg width={W} height={H} style={{ overflow: "visible", display: "block" }}>
        {lines.map(l => (
          <path key={l.key} d={mkPath(l.key)} fill="none" stroke={l.color}
            strokeWidth="1" strokeOpacity="0.45" strokeLinejoin="round" />
        ))}
        <path d={mkPath("gvm")} fill="none" stroke={mainStroke} strokeWidth="2.2"
          strokeLinejoin="round" strokeLinecap="round" />
        {points[0]?.gvm != null && (
          <text x={X(0)} y={Y(points[0].gvm) - 6} fontSize="9" fill={mainStroke} fontWeight="700"
            fontFamily="monospace" textAnchor="middle" style={{userSelect:"none"}}>{points[0].gvm.toFixed(2)}</text>
        )}
        {last != null && (
          <>
            <circle cx={X(points.length - 1)} cy={Y(last)} r="3.2" fill={mainStroke} />
            <text x={X(points.length - 1)} y={Y(last) - 7} fontSize="9" fill={mainStroke} fontWeight="700"
              fontFamily="monospace" textAnchor="middle" style={{userSelect:"none"}}>{last.toFixed(2)}</text>
          </>
        )}
      </svg>
      <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
        {lines.map(l => (
          <span key={l.key} style={{ fontSize: 11.5, color: l.color, fontWeight: 700, display: "flex", alignItems: "center", gap: 3 }}>
            <span style={{ width: 10, height: 2, background: l.color, opacity: .6, display: "inline-block" }} />{l.key.toUpperCase()}
          </span>
        ))}
        <span style={{ fontSize: 11.5, color: C.muted, marginLeft: "auto" }}>thin = components</span>
      </div>
    </div>
  );
}

function PillarRadar({ company, sector }) {
  if (!company) return null;
  const W = 90, H = 90, cx = W/2, cy = H/2 + 4, R = 32;
  const ANG = { G: -Math.PI/2, V: Math.PI/6, M: Math.PI*5/6 };
  const pt = (k, val) => {
    const r = Math.max(0, Math.min(10, val || 0)) / 10 * R;
    return [cx + Math.cos(ANG[k]) * r, cy + Math.sin(ANG[k]) * r];
  };
  const triPath = (data, k1, k2, k3) =>
    [pt(k1, data[k1.toLowerCase()]), pt(k2, data[k2.toLowerCase()]), pt(k3, data[k3.toLowerCase()])]
      .map(([x,y], i) => `${i===0?"M":"L"}${x.toFixed(1)},${y.toFixed(1)}`).join(" ") + "Z";
  const compPath = triPath(company, "G", "V", "M");
  const sectorPath = sector ? triPath(sector, "G", "V", "M") : null;
  const axisEnd = k => [cx + Math.cos(ANG[k]) * R, cy + Math.sin(ANG[k]) * R];
  const labelPos = k => [cx + Math.cos(ANG[k]) * (R + 8), cy + Math.sin(ANG[k]) * (R + 8)];
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <svg width={W} height={H + 4}>
        {[0.5, 1.0].map(s => (
          <circle key={s} cx={cx} cy={cy} r={R*s} fill="none" stroke={C.gridLine} strokeWidth="1" />
        ))}
        {["G","V","M"].map(k => {
          const [x,y] = axisEnd(k);
          return <line key={k} x1={cx} y1={cy} x2={x} y2={y} stroke={C.gridLine} strokeWidth="1" />;
        })}
        {sectorPath && <path d={sectorPath} fill={C.muted + "20"} stroke={C.muted} strokeWidth="1" strokeDasharray="2,2" />}
        <path d={compPath} fill={C.accent + "30"} stroke={C.accent} strokeWidth="1.8" />
        {["G","V","M"].map(k => {
          const [x,y] = labelPos(k);
          return <text key={k} x={x} y={y} fontSize="9" fontWeight="800" fill={PILLAR_INFO[k].color}
            textAnchor="middle" dominantBaseline="middle">{k}</text>;
        })}
      </svg>
      <div style={{ fontSize: 11, color: C.muted, marginTop: -4, letterSpacing: ".05em" }}>
        <span style={{ color: C.accent, fontWeight: 700 }}>▪</span> stock {sector && <><span style={{ color: C.muted }}>⊂</span> sector</>}
      </div>
    </div>
  );
}

function ActionStrip({ x }) {
  if (!x) return null;
  const chips = [];
  if (x.tier1) {
    const ok = x.tier1.passed >= Math.ceil(x.tier1.total * 0.7);
    chips.push({
      label: `Tier-1 auto ${x.tier1.passed}/${x.tier1.total}`,
      color: ok ? C.green : x.tier1.passed >= x.tier1.total / 2 ? C.gold : C.red,
      title: (x.tier1.checks || []).map(c => `${c.pass === true ? "✓" : c.pass === false ? "✗" : "·"} ${c.name}`).join("\n"),
    });
  }
  if (x.pivot && x.pivot.pp != null) {
    const cmp = x._cmp;
    let zone = "—", zc = C.muted;
    if (cmp != null) {
      if (cmp >= x.pivot.r1) { zone = "Above R1 — extended"; zc = C.orange; }
      else if (cmp >= x.pivot.pp) { zone = "PP–R1 — LONG zone"; zc = C.green; }
      else if (cmp >= x.pivot.s1) { zone = "S1–PP — below pivot"; zc = C.gold; }
      else { zone = "Below S1 — weak"; zc = C.red; }
    }
    chips.push({ label: `Pivot: ${zone}`, color: zc, title: `PP ${x.pivot.pp} · R1 ${x.pivot.r1} · S1 ${x.pivot.s1}` });
    if (cmp != null && x.pivot.r1 != null && cmp < x.pivot.r1) {
      const room = ((x.pivot.r1 / cmp - 1) * 100);
      chips.push({ label: `Room to R1 ${room.toFixed(1)}%`, color: room >= 1 ? C.green : C.gold });
    }
  }
  if (x.volume && x.volume.verdict) {
    const vc = x.volume.verdict === "ACCUMULATION" ? C.green : x.volume.verdict === "DISTRIBUTION" ? C.red : C.gold;
    chips.push({ label: `30D Vol: ${x.volume.verdict} ${x.volume.ratio != null ? x.volume.ratio + "×" : ""}`, color: vc });
  }
  if (x.earnings) {
    chips.push({
      label: x.earnings.blackout ? `⚠ ${x.earnings.event_type || "Event"} in ${x.earnings.days_to}d — BLACKOUT` : `Next event ${x.earnings.next_date} (${x.earnings.days_to}d)`,
      color: x.earnings.blackout ? C.red : C.muted,
    });
  } else {
    chips.push({ label: "No upcoming event", color: C.muted });
  }
  if (x.percentile) {
    const z = x.percentile.z_score;
    chips.push({
      label: `#${x.percentile.universe_rank}/${x.percentile.universe_total}${z != null ? ` · Z=${signFmt(z, 2)}` : ""}`,
      color: C.purple,
      title: z != null ? `GVM mean ${x.percentile.mean} · stdev ${x.percentile.stdev} · Z = (gvm − μ) / σ` : "GVM rank in scored universe",
    });
  }
  if (!chips.length) return null;
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 14px", marginBottom: 16,
      display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
      <span style={{ fontSize: 12, fontWeight: 800, color: C.muted, textTransform: "uppercase", letterSpacing: ".08em", marginRight: 4 }}>Snapshot</span>
      {chips.map((ch, i) => (
        <span key={i} title={ch.title || ""}
          style={{ fontSize: 13, fontWeight: 700, color: ch.color, background: `${ch.color}14`,
            border: `1px solid ${ch.color}35`, borderRadius: 14, padding: "4px 11px", cursor: ch.title ? "help" : "default" }}>
          {ch.label}
        </span>
      ))}
    </div>
  );
}

function SegmentContextCard({ ctx, stockSym }) {
  if (!ctx) return null;
  const vc = verdictColor(ctx.verdict);
  const cell = (lbl, val, sub, color) => (
    <div style={{ background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 8, padding: "10px 13px", flex: 1, minWidth: 110, minHeight: 56 }}>
      <div style={{ fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 2 }}>{lbl}</div>
      <div style={{ fontSize: 16, fontWeight: 800, fontFamily: "monospace", color: color || C.text, lineHeight: 1.3 }}>{val}</div>
      {sub && <div style={{ fontSize: 12, color: C.muted, fontFamily: "monospace", marginTop: 2 }}>{sub}</div>}
    </div>
  );
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 18px", marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 800, color: C.purple, letterSpacing: ".03em" }}>Segment Context</div>
          <div style={{ fontSize: 13, color: C.muted, marginTop: 1 }}>{ctx.segment} · {ctx.stocks_count} stocks · ₹{fmt((ctx.total_mcap||0)/100, 0)} Cr total MCap</div>
        </div>
        <Tag color={vc}>{ctx.verdict || "—"}</Tag>
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {cell("Sector GVM", ctx.mcap_wtd_gvm != null ? ctx.mcap_wtd_gvm : "—",
          ctx.simple_avg_gvm != null ? `simple avg ${ctx.simple_avg_gvm}` : null,
          gvmColor(ctx.mcap_wtd_gvm))}
        {cell("Sector Rank",
          ctx.sector_rank != null ? `#${ctx.sector_rank}/${ctx.sector_total}` : "—",
          ctx.sector_rank != null && ctx.sector_total ? `top ${((ctx.sector_rank/ctx.sector_total)*100).toFixed(0)}%` : null,
          ctx.sector_rank != null && ctx.sector_total && ctx.sector_rank <= ctx.sector_total / 4 ? C.green :
            ctx.sector_rank != null && ctx.sector_total && ctx.sector_rank <= ctx.sector_total / 2 ? C.gold : C.red)}
        {cell("Week %", ctx.week_return_avg != null ? signFmt(ctx.week_return_avg, 2) + "%" : "—", "segment avg", deltaColor(ctx.week_return_avg, 0.5))}
        {cell("Month %", ctx.month_return_avg != null ? signFmt(ctx.month_return_avg, 2) + "%" : "—", "segment avg", deltaColor(ctx.month_return_avg, 1))}
        {cell("Year %", ctx.year_return_avg != null ? signFmt(ctx.year_return_avg, 1) + "%" : "—", "segment avg", deltaColor(ctx.year_return_avg, 3))}
        {cell("Top Stock", ctx.top_stock || "—",
          ctx.top_stock_gvm != null ? `GVM ${ctx.top_stock_gvm}` : null,
          C.accent)}
        {ctx.stock_vs_sector != null && cell(`${stockSym} vs Sector`,
          signFmt(ctx.stock_vs_sector, 2),
          ctx.stock_vs_sector > 0 ? "leader" : "laggard",
          deltaColor(ctx.stock_vs_sector, 0.1))}
      </div>
    </div>
  );
}

function PivotLadder({ p, cmp }) {
  if (!p || p.s2 == null || p.r2 == null || p.r2 <= p.s2) return (
    <div style={{ fontSize: 13.5, color: C.muted, padding: 12 }}>No pivot levels available.</div>
  );
  const levels = [
    { k: "S2", v: p.s2, c: C.red }, { k: "S1", v: p.s1, c: C.red },
    { k: "PP", v: p.pp, c: C.muted }, { k: "R1", v: p.r1, c: C.green },
    { k: "R2", v: p.r2, c: C.green },
  ];
  const lo = p.s2, hi = p.r2, span = hi - lo;
  const X = v => Math.min(99, Math.max(1, (v - lo) / span * 100));
  const cmpX = cmp != null ? X(cmp) : null;
  const cmpCol = cmp == null ? C.muted : cmp >= p.r1 ? C.orange : cmp >= p.pp ? C.green : cmp >= p.s1 ? C.gold : C.red;
  return (
    <div>
      <div style={{ position: "relative", height: 56, marginTop: 18 }}>
        {cmpX != null && (
          <div style={{ position: "absolute", left: `${cmpX}%`, top: -16, transform: "translateX(-50%)",
            fontSize: 13, fontWeight: 800, color: cmpCol, fontFamily: "monospace", whiteSpace: "nowrap" }}>
            ▼ ₹{fmt(cmp, 1)}
          </div>
        )}
        <div style={{ position: "absolute", top: 8, left: 0, right: 0, height: 5, borderRadius: 3,
          background: `linear-gradient(90deg, ${C.red}30 0%, ${C.red}18 ${X(p.pp)}%, ${C.green}18 ${X(p.pp)}%, ${C.green}30 100%)` }} />
        {cmpX != null && (
          <div style={{ position: "absolute", left: `${cmpX}%`, top: 3, width: 3, height: 15,
            background: cmpCol, borderRadius: 2, transform: "translateX(-50%)" }} />
        )}
        {levels.map(l => l.v != null && (
          <React.Fragment key={l.k}>
            <div style={{ position: "absolute", left: `${X(l.v)}%`, top: 5, width: 2, height: 11,
              background: l.c, transform: "translateX(-50%)", opacity: .8 }} />
            <div style={{ position: "absolute", left: `${X(l.v)}%`, top: 26, transform: "translateX(-50%)",
              textAlign: "center", lineHeight: 1.25 }}>
              <div style={{ fontSize: 12, fontWeight: 800, color: l.c }}>{l.k}</div>
              <div style={{ fontSize: 12, color: C.muted, fontFamily: "monospace" }}>{fmt(l.v, 0)}</div>
            </div>
          </React.Fragment>
        ))}
      </div>
      <div style={{ fontSize: 12, color: C.muted, marginTop: 8 }}>
        Rolling-5-day pivots · built {p.pivot_date || "—"}
        {cmp != null && p.r1 != null && cmp < p.r1 && (
          <span style={{ color: C.green, fontWeight: 700 }}> · room to R1 {((p.r1 / cmp - 1) * 100).toFixed(1)}%</span>
        )}
      </div>
    </div>
  );
}

function FlowStrip({ flow, val }) {
  if (!flow && !val) return null;
  const cell = (k, v, sub, color) => (
    <div key={k} style={{ background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 8, padding: "8px 12px", minWidth: 96 }}>
      <div style={{ fontSize: 11.5, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em" }}>{k}</div>
      <div style={{ fontSize: 14, fontWeight: 800, fontFamily: "monospace", color: color || C.text }}>{v}</div>
      {sub && <div style={{ fontSize: 12, color: C.muted, fontFamily: "monospace" }}>{sub}</div>}
    </div>
  );
  const cells = [];
  if (flow) {
    const ic = flow.inst_chg;
    const ic_c = ic == null ? C.text : ic >= 0 ? C.green : C.red;
    cells.push(cell("FII Hold", flow.fii != null ? flow.fii + "%" : "—", flow.fii_chg != null ? `Δ ${signFmt(flow.fii_chg)}%` : null,
      flow.fii_chg == null ? C.text : flow.fii_chg >= 0 ? C.green : C.red));
    cells.push(cell("DII Hold", flow.dii != null ? flow.dii + "%" : "—", flow.dii_chg != null ? `Δ ${signFmt(flow.dii_chg)}%` : null,
      flow.dii_chg == null ? C.text : flow.dii_chg >= 0 ? C.green : C.red));
    if (ic != null) cells.push(cell("Net FII+DII", signFmt(ic) + "%", "net institutional flow", ic_c));
    cells.push(cell("Promoter", flow.promoter != null ? flow.promoter + "%" : "—", null, C.text));
  }
  if (val) {
    const rc = val.rerating_pct == null ? C.text : val.rerating_pct > 25 ? C.red : val.rerating_pct > 0 ? C.gold : C.green;
    cells.push(cell("PE", val.pe != null ? val.pe + "x" : "—",
      val.historical_pe != null ? `hist ${val.historical_pe}x · seg ${val.segment_pe != null ? val.segment_pe + "x" : "—"}` : null, C.text));
    if (val.rerating_pct != null) cells.push(cell("Re-rating", signFmt(val.rerating_pct, 1) + "%", "vs own history", rc));
    if (val.annual_upside != null) cells.push(cell("Annual Upside", signFmt(val.annual_upside, 1) + "%",
      val.fy27_growth != null ? `FY27 growth ${val.fy27_growth}%` : null,
      val.annual_upside >= 15 ? C.green : val.annual_upside >= 0 ? C.gold : C.red));
    if (val.pb != null) cells.push(cell("P/B", val.pb + "x", null, C.text));
    if (val.peg != null) cells.push(cell("PEG", val.peg, null, val.peg > 2 ? C.red : val.peg > 1 ? C.gold : C.green));
    if (val.ev_ebitda != null) cells.push(cell("EV/EBITDA", val.ev_ebitda + "x", null, C.text));
  }
  if (!cells.length) return null;
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", marginBottom: 16 }}>
      <div style={{ fontSize: 13.5, fontWeight: 700, color: C.accent, marginBottom: 10 }}>Ownership Flow & Valuation Context</div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>{cells}</div>
    </div>
  );
}

function cellColor(rating) {
  if (rating == null) return { bg: "rgba(148,166,210,.1)", bd: "rgba(148,166,210,.24)", fg: "#8C99BD" };
  if (rating >= 6.5) return { bg: "rgba(47,212,139,.14)", bd: "#2FD48B", fg: "#2FD48B" };
  if (rating >= 4)   return { bg: "rgba(245,185,74,.14)", bd: "#F5B94A", fg: "#F5B94A" };
  return { bg: "rgba(255,92,108,.13)", bd: "#FF5C6C", fg: "#FF5C6C" };
}

const OPS_LOWER_BETTER = new Set([
  "gnpa_pct", "nnpa_pct", "cost_to_income", "credit_cost", "slippage_ratio",
  "gross_npa", "net_npa", "pcr_ex", "opex_ratio",
  "claims_ratio", "combined_ratio", "expense_ratio",
  "debt_to_equity", "net_debt_to_ebitda", "inventory_days", "receivable_days", "churn_pct",
]);
const OPS_MIN_PEERS = 3;

function OpsMetrics({ symbol, segment }) {
  const [metrics, setMetrics] = useState(null);
  const [loading, setLoading] = useState(true);
  const [curQ, setCurQ] = useState(null);

  useEffect(() => {
    if (!symbol) return;
    setLoading(true);
    setMetrics(null);
    mcpCall("run_sql", {
      query: `SELECT som.symbol, som.metric_name, som.metric_value, som.unit,
                     som.confidence, som.quarter, som.notes
              FROM sector_ops_metrics som
              JOIN gvm_scores g ON g.symbol = som.symbol
              WHERE g.segment = (SELECT segment FROM gvm_scores WHERE symbol='${symbol}')
                AND som.quarter = (SELECT MAX(quarter) FROM sector_ops_metrics)
              ORDER BY som.metric_name ASC`
    }).then(d => {
      const raw = d?.rows || [];
      if (raw.length) setCurQ(raw[0].quarter);
      const byMetric = {};
      raw.forEach(r => {
        const k = r.metric_name;
        if (!byMetric[k]) byMetric[k] = [];
        const v = r.metric_value != null ? Number(r.metric_value) : null;
        if (v != null && !isNaN(v)) byMetric[k].push({ sym: r.symbol, v, unit: r.unit, conf: r.confidence, notes: r.notes });
      });
      const out = [];
      Object.keys(byMetric).forEach(k => {
        const peers = byMetric[k];
        if (peers.length < OPS_MIN_PEERS) return;
        const lowerBetter = OPS_LOWER_BETTER.has(k.toLowerCase());
        const self = peers.find(p => p.sym === symbol) || null;
        const vals = peers.map(p => p.v);
        const peerAvg = vals.reduce((a, b) => a + b, 0) / vals.length;
        const sorted = [...peers].sort((a, b) => lowerBetter ? a.v - b.v : b.v - a.v);
        const best = sorted[0], worst = sorted[sorted.length - 1];
        const rank = self ? sorted.findIndex(p => p.sym === symbol) + 1 : null;
        out.push({
          metric_name: k, unit: self?.unit || peers[0].unit,
          confidence: self?.conf || null, notes: self?.notes || null,
          company: self ? self.v : null,
          peer_avg: Math.round(peerAvg * 100) / 100,
          rank, peer_n: peers.length,
          best: { sym: best.sym, v: best.v }, worst: { sym: worst.sym, v: worst.v },
          lower_better: lowerBetter,
        });
      });
      out.sort((a, b) => (b.company != null) - (a.company != null) || b.peer_n - a.peer_n || a.metric_name.localeCompare(b.metric_name));
      setMetrics(out);
    }).catch(() => setMetrics([])).finally(() => setLoading(false));
  }, [symbol]);

  if (loading) return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 14 }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: C.purple, marginBottom: 8 }}>Operational Metrics</div>
      <div style={{ fontSize: 13.5, color: C.muted }}>Loading…</div>
    </div>
  );

  if (!metrics || !metrics.length) return null;

  const fmtVal = (v, u) => {
    if (v == null) return "—";
    const n = Number(v);
    if (isNaN(n)) return String(v);
    const abs = Math.abs(n);
    const f = abs >= 100000 ? (n/100000).toFixed(2) + "L"
      : abs >= 1000 ? (n/1000).toFixed(1) + "K"
      : abs >= 1 ? n.toFixed(2)
      : n.toFixed(4);
    return f + (u ? " " + u : "");
  };

  const cellTone = (m) => {
    if (m.company == null) return { bg: "rgba(148,166,210,.1)", bd: "rgba(148,166,210,.24)", fg: "#8C99BD" };
    const better = m.lower_better ? m.company < m.peer_avg : m.company > m.peer_avg;
    const worse  = m.lower_better ? m.company > m.peer_avg : m.company < m.peer_avg;
    if (better) return { bg: "rgba(47,212,139,.14)", bd: "#2FD48B", fg: "#2FD48B" };
    if (worse)  return { bg: "rgba(255,92,108,.13)", bd: "#FF5C6C", fg: "#FF5C6C" };
    return { bg: "rgba(245,185,74,.14)", bd: "#F5B94A", fg: "#F5B94A" };
  };

  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 800, color: C.purple }}>Operational Metrics · Peer Benchmarked</div>
          <div style={{ fontSize: 13, color: C.muted, marginTop: 2 }}>
            {metrics.length} metrics · {curQ || "—"} · {segment || "segment"} · ≥{OPS_MIN_PEERS} peers · earnings calls & filings
          </div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(205px, 1fr))", gap: 10 }}>
        {metrics.map((m, i) => {
          const c = cellTone(m);
          const label = (m.metric_name || "").replace(/_/g, " ").replace(/\bpct\b/i, "%").replace(/\b\w/g, l => l.toUpperCase());
          const dirHint = m.lower_better ? "lower is better" : "higher is better";
          let verdict = { txt: "NO DATA", col: C.muted };
          if (m.company != null && m.peer_avg != null) {
            const better = m.lower_better ? m.company < m.peer_avg : m.company > m.peer_avg;
            const worse  = m.lower_better ? m.company > m.peer_avg : m.company < m.peer_avg;
            verdict = better ? { txt: "BEATS PEER", col: "#2FD48B" }
                    : worse  ? { txt: "TRAILS PEER", col: "#FF5C6C" }
                    : { txt: "IN-LINE", col: "#F5B94A" };
          }
          return (
            <div key={i} title={m.notes || ""}
              style={{ background: c.bg, border: `1px solid ${c.bd}`, borderRadius: 11, padding: "13px 15px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6, gap: 6 }}>
                <div style={{ fontSize: 14, fontWeight: 800, color: c.fg, lineHeight: 1.25 }}>{label}</div>
                <span style={{ fontSize: 12, fontWeight: 800, letterSpacing: ".04em", color: verdict.col,
                  background: verdict.col + "18", border: `1px solid ${verdict.col}33`, borderRadius: 5,
                  padding: "2px 6px", flexShrink: 0, whiteSpace: "nowrap" }}>{verdict.txt}</span>
              </div>
              <div style={{ fontSize: 29, fontWeight: 900, fontFamily: "monospace", color: "#1c2536", lineHeight: 1.05, marginBottom: 2 }}>
                {m.company != null ? fmtVal(m.company, m.unit) : "—"}
              </div>
              <div style={{ fontSize: 12.5, color: C.muted, marginBottom: 5, letterSpacing: ".02em" }}>{dirHint}</div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 14, color: "#8C99BD", fontFamily: "monospace" }}>
                <span>peer {fmtVal(m.peer_avg, m.unit)} <span style={{color:"#b0b8c8",fontSize:12}}>({m.peer_n})</span></span>
                {m.company != null && m.peer_avg != null && m.peer_avg !== 0 && (() => {
                  const diff = m.lower_better
                    ? (m.peer_avg - m.company) / Math.abs(m.peer_avg) * 100
                    : (m.company - m.peer_avg) / Math.abs(m.peer_avg) * 100;
                  return <span style={{fontWeight:700, color: diff >= 0 ? "#2FD48B" : "#FF5C6C", fontSize:13.5}}>
                    {diff >= 0 ? `▲${diff.toFixed(1)}%` : `▼${(-diff).toFixed(1)}%`}
                  </span>;
                })()}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: "#9aa4b5", fontFamily: "monospace", marginTop: 3,
                borderTop: `1px solid ${c.bd}`, paddingTop: 3 }}>
                <span style={{ color: C.green }}>▲ {m.best.sym} {fmtVal(m.best.v, "")}</span>
                <span style={{ color: C.red }}>▼ {m.worst.sym} {fmtVal(m.worst.v, "")}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// cc#300: Fibcheck relocated here from the Trade Check page and rebuilt natively in React
// (was a standalone SVG string in scorr_check.html). Opened from the GVM hero card CMP block.
// Reuses GET /api/trade-check/fibcheck (all downstream math unchanged). Ranges 1M/3M/6M/1Y/All;
// 1Y maps to the backend 12m param, All is the new full-history mode (backend cc#300).
const FIB_RANGES = [["1M","1m"],["3M","3m"],["6M","6m"],["1Y","12m"],["All","all"]];

function FibChartSvg({ d }) {
  const W = 680, H = 340, L = 8, R = 92, T = 16, B = 24;
  const ser = (d.series || []).filter(p => p.close != null);
  const n = ser.length;
  if (n < 2) return <div style={{ fontSize: 12.5, color: C.muted, padding: "24px 0", textAlign: "center" }}>No price path available.</div>;
  const fl = d.fib_levels || [];
  const lo = d.swing_low.price, hi = d.swing_high.price, cmp = d.cmp;
  const vals = ser.map(p => p.close).concat([lo, hi]);
  if (cmp != null) vals.push(cmp);
  let ymin = Math.min(...vals), ymax = Math.max(...vals);
  const ypad = (ymax - ymin) * 0.05 || 1; ymin -= ypad; ymax += ypad;
  const xF = i => L + (i / (n - 1)) * (W - L - R);
  const yF = p => T + (ymax - p) / (ymax - ymin) * (H - T - B);
  // shaded band split at the fib level nearest CMP (green reclaimed below, red remaining above)
  let split = hi;
  if (cmp != null && fl.length) { let bd = 1e18; fl.forEach(f => { const dd = Math.abs(f.price - cmp); if (dd < bd) { bd = dd; split = f.price; } }); }
  const ySplit = yF(split), yBot = yF(lo), yTop = yF(hi);
  const dpath = ser.map((p, i) => (i ? "L" : "M") + xF(i).toFixed(1) + " " + yF(p.close).toFixed(1)).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet"
      style={{ width: "100%", height: "auto", display: "block", border: `1px solid ${C.border}`, borderRadius: 10, background: C.bg }}>
      <rect x={L} y={ySplit.toFixed(1)} width={W - L - R} height={Math.max(0, yBot - ySplit).toFixed(1)} fill={C.green} opacity="0.06" />
      <rect x={L} y={yTop.toFixed(1)} width={W - L - R} height={Math.max(0, ySplit - yTop).toFixed(1)} fill={C.red} opacity="0.06" />
      {fl.map((f, i) => {
        const y = yF(f.price);
        return (
          <g key={i}>
            <line x1={L} y1={y.toFixed(1)} x2={W - R} y2={y.toFixed(1)} stroke={C.muted} strokeWidth="1" strokeDasharray="4 3" strokeOpacity="0.5" />
            <text x={W - R + 4} y={(y + 3.5).toFixed(1)} fontSize="10" fontFamily="monospace" fill={C.muted}>{f.pct.toFixed(1)}% · {f.price.toFixed(2)}</text>
          </g>
        );
      })}
      <path d={dpath} fill="none" stroke={C.accent} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      {cmp != null && (
        <g>
          <circle cx={xF(n - 1).toFixed(1)} cy={yF(cmp).toFixed(1)} r="4" fill={C.accent} stroke="#fff" strokeWidth="1.5" />
          <text x={(xF(n - 1) - 6).toFixed(1)} y={(yF(cmp) - 7).toFixed(1)} fontSize="11" fontFamily="monospace" fontWeight="700" fill={C.text} textAnchor="end">Prev Close {cmp.toFixed(2)}</text>
        </g>
      )}
    </svg>
  );
}

function FibStat({ label, children }) {
  return (
    <span style={{ background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 7, padding: "5px 9px", color: C.text }}>
      <b style={{ color: C.muted, fontWeight: 600 }}>{label}</b> {children}
    </span>
  );
}

function FibPopout({ symbol, onClose }) {
  const [lookback, setLookback] = useState("3m");   // default 3M (matches backend default)
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);

  useEffect(() => {
    const onKey = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  useEffect(() => {
    let alive = true;
    setLoading(true); setErr(null);
    apiGet(`/api/trade-check/fibcheck?symbol=${encodeURIComponent(symbol)}&lookback=${lookback}`)
      .then(d => { if (!alive) return; if (d.error) setErr(d.error); else setData(d); })
      .catch(e => { if (alive) setErr(`Server error ${e.message} — fibcheck failed.`); })
      .finally(() => { if (alive) setLoading(false); });
    return () => { alive = false; };
  }, [symbol, lookback]);

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(20,28,45,0.55)", zIndex: 200,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`,
        boxShadow: "0 12px 40px rgba(20,28,45,0.25)", width: "min(760px, 96vw)", maxHeight: "92vh", overflowY: "auto", padding: "18px 20px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <div style={{ fontSize: 16, fontWeight: 800, color: C.text }}>Fibcheck — {symbol}</div>
          <button onClick={onClose} title="Close (Esc)"
            style={{ background: "none", border: "none", fontSize: 24, lineHeight: 1, color: C.muted, cursor: "pointer", padding: 0 }}>×</button>
        </div>
        <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
          {FIB_RANGES.map(([lbl, val]) => (
            <button key={val} onClick={() => setLookback(val)}
              style={{ padding: "5px 13px", borderRadius: 7, fontSize: 12.5, fontWeight: 700, cursor: "pointer",
                border: `1px solid ${lookback === val ? C.accent : C.border}`,
                background: lookback === val ? C.accent : C.card,
                color: lookback === val ? "#fff" : C.muted }}>
              {lbl}
            </button>
          ))}
        </div>
        {loading && <div style={{ padding: "40px 0", textAlign: "center", color: C.muted, fontSize: 13 }}>Drawing Fibonacci retracement…</div>}
        {err && !loading && <div style={{ padding: "24px 0", textAlign: "center", color: C.red, fontSize: 13 }}>{err}</div>}
        {data && !loading && !err && (
          <React.Fragment>
            <FibChartSvg d={data} />
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 12, fontFamily: "monospace", fontSize: 11.5 }}>
              <FibStat label="Swing">{fmt(data.swing_low.price, 2)} → {fmt(data.swing_high.price, 2)}</FibStat>
              <FibStat label={(data.anchor_label || "CMP") + (data.anchor_date ? ` ${data.anchor_date}` : "")}>{fmt(data.cmp, 2)}{data.cmp_retracement_pct != null ? ` (${data.cmp_retracement_pct.toFixed(1)}%)` : ""}</FibStat>
              {data.nearest_level_above && (
                <FibStat label="Next resist">{data.nearest_level_above.pct.toFixed(1)}% @ {fmt(data.nearest_level_above.price, 2)}</FibStat>
              )}
              <span style={{ background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 7, padding: "5px 9px", color: C.muted }}>
                {(data.is_live ? "live" : "EOD")} · {data.lookback_days || 0} bars
              </span>
            </div>
            {data.commentary && (
              <div style={{ fontSize: 12.5, color: C.muted, lineHeight: 1.6, marginTop: 12, background: C.bg, borderRadius: 10, padding: "12px 14px" }}>
                {data.commentary}
              </div>
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function GvmReport({ r, hist }) {
  const [view, setView] = useState("matrix");
  const [fibOpen, setFibOpen] = useState(false);   // cc#300: Fibcheck popout
  const s = r.scores || {};
  const vc = verdictColor(r.verdict);
  const x = r.extras || {};
  if (x && x.pivot) x._cmp = r.price;
  const segCtx = x.segment_ctx || null;

  const benchByPillar = { G: [], V: [], M: [], _: [] };
  (r.benchmark || []).forEach(b => {
    const p = b.pillar || GVM_PILLAR_MAP[b.key] || "_";
    benchByPillar[p].push(b);
  });

  const verdictDist = {};
  (r.ladder || []).forEach(row => {
    verdictDist[row.verdict] = (verdictDist[row.verdict] || 0) + 1;
  });

  const pillarScore = (pillar) => {
    if (pillar === "G") return s.g;
    if (pillar === "V") return s.v;
    if (pillar === "M") return s.m;
    return null;
  };

  const sectorPillars = segCtx ? { g: segCtx.weighted_g, v: segCtx.weighted_v, m: segCtx.weighted_m } : null;
  const companyPillars = { g: s.g, v: s.v, m: s.m };

  const trendPoints = (x.trend && x.trend.length > 1)
    ? x.trend
    : (hist && hist.length > 1 ? hist.map(p => ({ d: p.score_date, gvm: p.gvm_score })) : null);

  const r52 = x.range52;
  const cmp = r.price;
  const pos52 = (r52 && r52.hi && r52.lo && cmp != null && r52.hi > r52.lo)
    ? Math.min(100, Math.max(0, (cmp - r52.lo) / (r52.hi - r52.lo) * 100))
    : null;
  const fromHigh = (r52 && r52.hi && cmp != null) ? (cmp / r52.hi - 1) * 100 : null;

  return (
    <div style={{ paddingBottom: 80 }}>
      {fibOpen && <FibPopout symbol={r.symbol} onClose={() => setFibOpen(false)} />}
      <div className="no-print" style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
        <button onClick={() => window.print()}
          style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 14px",
            background: "#121A33", border: `1px solid ${C.border}`, borderRadius: 7,
            fontSize: 13, fontWeight: 700, color: C.muted, cursor: "pointer",
            boxShadow: "0 1px 4px rgba(25,40,70,0.06)" }}>
          ↓ Download PDF
        </button>
      </div>

      <div style={{ background: C.card, border: `1px solid ${vc}40`, borderRadius: 12, padding: "20px 24px", marginBottom: 16 }}>
        <div style={{ display: "flex", gap: 22, alignItems: "flex-start", flexWrap: "wrap" }}>
          <div style={{ textAlign: "center", minWidth: 110 }}>
            <div style={{ fontSize: 52, fontWeight: 900, color: gvmColor(s.gvm), fontFamily: "monospace", lineHeight: 1 }}>{s.gvm?.toFixed(2)}</div>
            <div style={{ fontSize: 13, color: C.muted, margin: "4px 0 6px" }}>GVM Score</div>
            <Tag color={vc}>{r.verdict}</Tag>
            {x.percentile && (
              <div style={{ fontSize: 12, color: C.purple, fontWeight: 700, marginTop: 6, lineHeight: 1.3 }}>
                #{fmt(x.percentile.universe_rank)} / {fmt(x.percentile.universe_total)}
                {x.percentile.z_score != null && <div>Z = {signFmt(x.percentile.z_score, 2)}</div>}
              </div>
            )}
          </div>

          <div style={{ flex: 1.2, minWidth: 280 }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>{r.company_name}</div>
            <div style={{ fontSize: 13.5, color: C.muted, marginTop: 2, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
              <span>{r.symbol}</span><span>·</span><span>{r.segment}</span><span>·</span>
              <span style={{ fontWeight: 700, color: C.accent }}>#{r.segment_rank}/{r.segment_total} in segment</span>
              {r.mcap_rank && <span>· MCap #{r.mcap_rank}</span>}
              {r.cap_category && <Tag color={C.muted}>{r.cap_category}</Tag>}
              {r.is_bfsi && <Tag color={C.purple}>BFSI</Tag>}
              {x.earnings && x.earnings.blackout && <Tag color={C.red}>⚠ Blackout {x.earnings.days_to}d</Tag>}
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "nowrap", overflowX: "auto" }}>
              {["G","V","M"].map(pillar => {
                const pi = PILLAR_INFO[pillar];
                const score = pillarScore(pillar);
                return (
                  <div key={pillar} style={{ background: pi.bg, border: `1px solid ${pi.color}40`,
                    borderRadius: 10, padding: "9px 14px", flex: 1, minWidth: 80, textAlign: "center" }}>

            {pos52 != null && (

function _timeAgo(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  if (isNaN(d.getTime())) return "";
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return "just now";
  const m = Math.floor(s / 60); if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60); if (h < 24) return `${h}h ago`;
  const dd = Math.floor(h / 24); if (dd < 30) return `${dd}d ago`;
  const mo = Math.floor(dd / 30); return `${mo}mo ago`;
}

// cc#210: minimal, XSS-safe markdown renderer (AI Editorials use ### headers, bullets,
// **bold**). Builds React elements — never dangerouslySetInnerHTML.
function _mdInline(text) {
  return String(text).split(/(\*\*[^*]+\*\*)/g).map((p, i) =>
    /^\*\*[^*]+\*\*$/.test(p) ? <strong key={i}>{p.slice(2, -2)}</strong> : p);
}
function renderMd(text, C) {
  const lines = String(text || "").replace(/\r/g, "").split("\n");
  const out = []; let list = null; let k = 0;
  const flush = () => { if (list) { out.push(<ul key={"u" + k++} style={{ margin: "6px 0 6px 18px", padding: 0 }}>{list}</ul>); list = null; } };
  lines.forEach(raw => {
    const line = raw.trim();
    if (!line) { flush(); return; }
    let m;
    if ((m = line.match(/^(#{1,4})\s+(.*)$/))) {
      flush(); const lvl = m[1].length, fs = lvl <= 1 ? 15.5 : lvl === 2 ? 14.5 : 13.5;
      out.push(<div key={k++} style={{ fontSize: fs, fontWeight: 800, color: C.text, margin: "11px 0 4px" }}>{_mdInline(m[2])}</div>);
    } else if ((m = line.match(/^[-*]\s+(.*)$/))) {
      if (!list) list = [];
      list.push(<li key={"li" + k++} style={{ marginBottom: 3, lineHeight: 1.55 }}>{_mdInline(m[1])}</li>);
    } else {
      flush(); out.push(<p key={k++} style={{ margin: "6px 0", lineHeight: 1.6 }}>{_mdInline(line)}</p>);
    }
  });
  flush();
  return out;
}

    if (!symbol) return;
    setArticles(null); setRowOpen(-1);

    apiGet(`/api/news/company/${encodeURIComponent(symbol)}`)
      .then(d => setArticles(Array.isArray(d?.articles) ? d.articles.slice(0, 5) : []))
      .catch(() => setArticles([]));
  }, [symbol]);

  // cc#210: DB stores sentiment as Bullish/Bearish/Neutral and impact as High/Medium/Low
  // (capitalized) — normalize so the chips are actually coloured, not all-grey.
  const _sentCol = (s) => { const v = String(s || "").toLowerCase();
    return (v === "positive" || v === "bullish") ? C.green : (v === "negative" || v === "bearish") ? C.red : C.muted; };
  const _impCol = (im) => { const v = String(im || "").toLowerCase();

          ) : !articles.length ? (

          ) : articles.map((a, i) => {
            const isOpen = rowOpen === i;

            const firstMentioned = isMentioned && (i === 0 || articles[i - 1].tier !== "mentioned");

function GvmModule() {
  const [query, setQuery] = useState("");
  const [suggest, setSuggest] = useState([]);
  const [showSug, setShowSug] = useState(false);
  const [symbol, setSymbol] = useState(null);
  const [report, setReport] = useState(null);
  const [hist, setHist] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const boxRef = useRef(null);
  const inputRef = useRef(null);
  const debounce = useRef(null);
  const searchAbort = useRef(null);   // cc#268: cancels the in-flight suggestion fetch

  useEffect(() => {
    if (!query || query.length < 1) {
      // cc#268: also cancel any in-flight fetch when the query empties, else its late
      // response could re-open the dropdown after the field was cleared.
      if (searchAbort.current) searchAbort.current.abort();
      setSuggest([]); return;
    }
    clearTimeout(debounce.current);
    debounce.current = setTimeout(async () => {
      // cc#268: abort the prior in-flight suggestion fetch so an out-of-order (stale)
      // response can never win and re-open the dropdown. Each cycle gets its own controller.
      if (searchAbort.current) searchAbort.current.abort();
      const ac = new AbortController();
      searchAbort.current = ac;
      try {
        const d = await apiGet(`/api/gvm/search?q=${encodeURIComponent(query)}&limit=8`, { signal: ac.signal });
        if (ac.signal.aborted) return;               // superseded mid-flight — ignore
        setSuggest(d.results || []); setShowSug(true);
      } catch (e) {
        if (e && e.name === "AbortError") return;     // cancelled — leave state untouched
        setSuggest([]);
      }
    }, 180);
    return () => clearTimeout(debounce.current);
  }, [query]);

  useEffect(() => {
    const h = (e) => { if (boxRef.current && !boxRef.current.contains(e.target)) setShowSug(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const loadReport = async (sym) => {
    // cc#268: kill any in-flight suggestion fetch BEFORE loading — this is the actual bug fix.
    // Without this, a suggestion request still in flight when the user clicks Search / hits Enter
    // / clicks a suggestion resolves later and unconditionally re-opens the dropdown over the
    // now-loaded report. Aborting it means its .then/.catch bails out (AbortError) and touches no state.
    if (searchAbort.current) searchAbort.current.abort();
    setSymbol(sym); setShowSug(false); setSuggest([]); setQuery(sym); setLoading(true); setErr(null); setReport(null); setHist(null);
    inputRef.current?.blur();
    try {
      const d = await apiGet(`/api/gvm/company/${encodeURIComponent(sym)}`);
      setReport(d);
      if (!d.extras || !d.extras.trend || d.extras.trend.length < 2) {
        mcpCall("gvm_history", { symbol: sym, days: 90 }).then(h => setHist(h && h.points ? h.points : null)).catch(() => {});
      }
    } catch (e) { setErr(`Could not load ${sym}. Try another symbol.`); }
    finally { setLoading(false); }
  };

  return (
    <div className="print-scroll" style={{ height: "100%", overflowY: "auto", padding: "24px 24px 80px" }}>
      <div style={{ maxWidth: 1180, margin: "0 auto" }}>
        <div ref={boxRef} style={{ position: "relative", maxWidth: 520, margin: "0 auto 24px" }}>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ position: "relative", flex: 1 }}>
              <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: C.muted, fontSize: 15 }}>⌕</span>
              <input
                ref={inputRef}
                value={query}
                onChange={e => setQuery(e.target.value.toUpperCase())}
                onFocus={() => suggest.length && setShowSug(true)}
                onKeyDown={e => { if (e.key === "Enter" && suggest[0]) loadReport(suggest[0].symbol); }}
                placeholder="Search company — TCS, RELIANCE, HDFCBANK…"
                style={{ width: "100%", padding: "12px 14px 12px 38px", borderRadius: 10, border: `1px solid ${C.border}`, background: C.card, color: C.text, fontSize: 14, outline: "none" }}
              />
            </div>
            <button onClick={() => suggest[0] && loadReport(suggest[0].symbol)}
              style={{ padding: "0 20px", borderRadius: 10, border: "none", background: C.gold, color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
              Search
            </button>
          </div>
          {showSug && suggest.length > 0 && (
            <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden", zIndex: 50, boxShadow: "0 8px 24px rgba(25,40,70,0.12)" }}>
              {suggest.map(s => (
                <div key={s.symbol} onClick={() => loadReport(s.symbol)}
                  style={{ padding: "10px 14px", cursor: "pointer", borderBottom: `1px solid ${C.gridLine}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}
                  onMouseEnter={e => e.currentTarget.style.background = C.border}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <div>
                    <span style={{ fontSize: 14, fontWeight: 700, color: C.accent }}>{s.symbol}</span>
                    <span style={{ fontSize: 13.5, color: C.muted, marginLeft: 8 }}>{s.company_name}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 13.5, fontWeight: 700, color: gvmColor(s.gvm_score), fontFamily: "monospace" }}>{s.gvm_score?.toFixed(2)}</span>
                    <Tag color={verdictColor(s.verdict)}>{s.verdict}</Tag>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        {!symbol && !loading && <GvmEmptyState onPick={loadReport} />}
        {loading && <Loader msg={`Building ${symbol} peer-benchmark report…`} />}
        {err && <div style={{ textAlign: "center", color: C.red, padding: 24 }}>{err}</div>}
        {report && !loading && <GvmReport r={report} hist={hist} />}
      </div>
    </div>
  );
}

function GvmEmptyState({ onPick }) {
  const [top, setTop] = useState([]);
  useEffect(() => { mcpCall("get_top_stocks", { n: 8, verdict: "Excellent" }).then(d => setTop(Array.isArray(d) ? d : [])); }, []);
  return (
    <div style={{ textAlign: "center", padding: "20px 0" }}>
      <div style={{ fontSize: 14, color: C.muted, marginBottom: 16 }}>Search a company above, or start with a top-rated pick:</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", maxWidth: 700, margin: "0 auto" }}>
        {top.map(s => (
          <button key={s.symbol} onClick={() => onPick(s.symbol)}
            style={{ padding: "8px 14px", borderRadius: 8, border: `1px solid ${C.gold}40`, background: C.card, cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: C.accent }}>{s.symbol}</span>
            <span style={{ fontSize: 13.5, fontWeight: 700, color: gvmColor(s.gvm_score), fontFamily: "monospace" }}>{Number(s.gvm_score).toFixed(2)}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function ComingSoon({ mod }) {
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "80px 20px" }}>
      <div style={{ fontSize: 48, marginBottom: 16, opacity: 0.4 }}>{mod.icon}</div>
      <div style={{ fontSize: 18, fontWeight: 800, color: C.text }}>{mod.full}</div>
      <div style={{ marginTop: 16 }}><Tag color={mod.color}>Building in coming days</Tag></div>
    </div>
  );
}

function App() {
  const urlModel = new URLSearchParams(window.location.search).get("model");
  if (urlModel === "news") { window.location.replace("/news"); }
  const valid = MODELS.find(m => m.id === urlModel && m.live);
  const [page, setPageRaw] = useState(valid ? valid.id : "v8");
  const setPage = (id) => {
    setPageRaw(id);
    try { window.history.replaceState(null, "", `?model=${id}`); } catch (e) {}
  };
  const mod = MODELS.find(m => m.id === page);

  let body;
  if (page === "home")       body = <FrameModule src={`${API}/?embed=1`} />;
  else if (page === "v8")       body = <FrameModule src={`${API}/dashboard?embed=1`} />;
  else if (page === "sector")   body = <FrameModule src={`${API}/sector?embed=1`} />;
  else if (page === "max")      body = <FrameModule src={`${API}/cio?embed=1`} />;
  else if (page === "check")    body = <FrameModule src={`${API}/check?embed=1`} />;
  else if (page === "scanners") body = <FrameModule src={`${API}/scanners?embed=1`} />;
  else if (page === "fpc")      body = <FrameModule src={`${API}/fpc?embed=1`} />;
  else if (page === "qb")       body = <FrameModule src={`${API}/quant-basket?embed=1`} />;
  else if (page === "holdings") body = <FrameModule src={`${API}/holdings?embed=1`} />;
  else if (page === "screener") body = <FrameModule src={`${API}/screener?embed=1`} />;
  else if (page === "gvm")      body = <GvmModule />;
  else body = <ComingSoon mod={mod} />;

  return (
    <div className="app-shell" style={{ height: "100vh", width: "100vw", background: C.bg, color: C.text,
      fontFamily: "-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif",
      display: "flex", flexDirection: "column", position: "relative", overflow: "hidden" }}>
      <style>{`
        @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f4f6f9; }
        ::-webkit-scrollbar-thumb { background: #cfd8e3; border-radius: 3px; }
        button { transition: all 0.15s ease; }
        input::placeholder { color: #9aa4b5; }
        #scorr-lo { display: none !important; }
        @media (max-width: 768px) {
          table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
          svg { max-width: 100%; }
          .print-scroll { padding: 16px 12px 70px !important; }
          /* cc#333 P7: per-parameter + peer tables keep their metric/name column
             pinned while the table scrolls horizontally (identity persists). */
          table th:first-child, table td:first-child {
            position: sticky; left: 0; background: #fff; z-index: 1;
          }
        }
      `}</style>
      {/* cc#174: ShellNav removed (founder decision) -- the pwa.js canonical shared
          nav is the single nav on every page; it creates #scorr-nav as the first
          body child here. Model switching = canonical nav route links
          (/cio2?model=gvm etc.), which this page already reads from the URL. */}
      <div className="app-body" style={{ flex: 1, width: "100%", overflow: "hidden" }}>
        {body}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script src="/nav_toggle.js" defer></script>
</body>
</html>
