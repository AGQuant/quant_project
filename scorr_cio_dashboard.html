<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CIO · Models</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  html,body{margin:0;padding:0;background:#f4f6f9;height:100%;overflow:hidden;}
  #root{height:100vh;}
  *{box-sizing:border-box;}
  @media print{
    html,body{height:auto!important;overflow:visible!important;background:#fff!important;}
    #root{height:auto!important;overflow:visible!important;}
    .app-shell,.app-body{height:auto!important;overflow:visible!important;position:static!important;}
    .no-print{display:none!important;}
    .print-scroll{overflow:visible!important;height:auto!important;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = "https://quantproject-production.up.railway.app";
const MCP = `${API}/mcp`;

async function mcpCall(tool, args = {}) {
  const r = await fetch(MCP, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ jsonrpc: "2.0", id: 1, method: "tools/call", params: { name: tool, arguments: args } }),
  });
  const j = await r.json();
  const raw = j?.result?.content?.[0]?.text;
  try { return JSON.parse(raw); } catch { return raw; }
}

async function apiGet(path) {
  const r = await fetch(`${API}${path}`);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

const C = {
  bg: "#f4f6f9", card: "#ffffff", border: "#e2e7ee",
  accent: "#2563eb", gold: "#b45309", green: "#0a9e63",
  red: "#dd3a4a", orange: "#d97706", purple: "#7c3aed",
  text: "#1c2536", muted: "#5a6781", gridLine: "#edf1f6",
  nav: "#ffffff",
  gPillar: "#0a9e63", vPillar: "#b45309", mPillar: "#2563eb",
};

const GVM_PILLAR_MAP = {
  sales_5y:"G", sales_3y:"G", profit_5y:"G", profit_3y:"G",
  qoq_sales:"G", qoq_profit:"G", opm:"G", opm_exp:"G",
  fa_growth:"G", inst_abs:"G", inst_chg:"G", roce:"G",
  int_cov:"G", div_yield:"G",
  pe:"V", upside:"V",
  ret_1m:"M", ret_1y:"M", ret_3y:"M", dma_50:"M", dma_200:"M", ret_52w_idx:"M",
  rsi_month:"M", vol_trend:"M",
};

const PILLAR_INFO = {
  G: { label:"G — Growth", color: C.gPillar, bg:"#e3f6ed", desc:"Profitability" },
  V: { label:"V — Value",  color: C.vPillar, bg:"#fdf3df", desc:"Valuation" },
  M: { label:"M — Momentum", color: C.mPillar, bg:"#e8effd", desc:"Price returns" },
};

const MODELS = [
  { id: "home",   icon: "⌂", label: "Home",   full: "Home",              color: C.muted,   live: true },
  { id: "v8",     icon: "⚡", label: "V8",     full: "V8 Long-Short",     color: C.accent,  live: true },
  { id: "gvm",    icon: "◦", label: "GVM",    full: "GVM Scoring",       color: C.gold,    live: true },
  { id: "sector", icon: "◷", label: "Sector", full: "Sector Rotation",   color: C.purple,  live: true },
  { id: "check",  icon: "✓", label: "Check",  full: "Trade Check",       color: C.green,   live: true },
  { id: "max",    icon: "◉", label: "Max",    full: "Max Chat",          color: "#6d4fe0", live: true },
  { id: "qb",     icon: "▦", label: "QB",     full: "Quant Basket",      color: C.green,   live: false },
  { id: "v10",    icon: "⟁", label: "V10",   full: "Nifty Options V10", color: "#db2777", live: false },
];

const fmt = (n, d = 0) => n == null ? "—" : Number(n).toLocaleString("en-IN", { maximumFractionDigits: d, minimumFractionDigits: d });
const fmtMcap = (n) => n == null ? "—" : n >= 100000 ? `₹${(n/100000).toFixed(1)}LCr` : n >= 1000 ? `₹${(n/1000).toFixed(1)}KCr` : `₹${Math.round(n)}Cr`;
const gvmColor = (g) => g == null ? C.muted : g >= 8 ? C.green : g >= 7 ? C.gold : g >= 6 ? C.orange : C.red;
const ratingColor = (r) => r == null ? C.muted : r >= 7 ? C.green : r >= 5 ? C.gold : C.red;
const verdictColor = (v = "") => ({ "Strong Buy": C.green, "Buy": "#22a06b", "Watch": C.gold, "Exit": C.red }[v] || C.muted);
const signFmt = (n, d = 2) => n == null ? "—" : (n >= 0 ? "+" : "") + Number(n).toFixed(d);
const deltaColor = (n, threshold = 0.05) => n == null ? C.muted : n > threshold ? C.green : n < -threshold ? C.red : C.muted;

function Loader({ msg }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "60px", gap: 14 }}>
      <div style={{ display: "flex", gap: 10 }}>
        {[0,.2,.4].map(d => (
          <div key={d} style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent, animation: `pulse 1s ease-in-out ${d}s infinite` }} />
        ))}
      </div>
      {msg && <div style={{ fontSize: 12, color: C.muted }}>{msg}</div>}
    </div>
  );
}

function Tag({ children, color = C.accent }) {
  return (
    <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", color, background: color + "20", border: `1px solid ${color}40`, borderRadius: 4, padding: "2px 7px", textTransform: "uppercase" }}>{children}</span>
  );
}

function Switcher({ current, onPick }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  const cur = MODELS.find(m => m.id === current);
  return (
    <div ref={ref} className="no-print" style={{ position: "fixed", top: 12, right: 14, zIndex: 1000 }}>
      <button onClick={() => setOpen(o => !o)} aria-label="Switch model"
        style={{ display: "flex", alignItems: "center", gap: 8, height: 38, padding: "0 12px",
          borderRadius: 9, border: `1px solid ${C.border}`, background: C.card,
          cursor: "pointer", boxShadow: "0 2px 8px rgba(25,40,70,0.06)" }}>
        <span style={{ fontSize: 14, color: cur ? cur.color : C.muted }}>{cur ? cur.icon : "⋯"}</span>
        <span style={{ fontSize: 12, fontWeight: 700, color: C.text }}>{cur ? cur.label : "Models"}</span>
        <span style={{ fontSize: 16, color: C.muted, lineHeight: 1 }}>⋮</span>
      </button>
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 6px)", right: 0, minWidth: 178,
          background: C.card, border: `1px solid ${C.border}`, borderRadius: 12,
          boxShadow: "0 8px 28px rgba(25,40,70,0.14)", padding: 6 }}>
          {MODELS.map(m => {
            const active = current === m.id;
            return (
              <button key={m.id} disabled={!m.live}
                onClick={() => { if (m.live) { onPick(m.id); setOpen(false); } }}
                style={{ width: "100%", display: "flex", alignItems: "center", gap: 10,
                  padding: "9px 12px", borderRadius: 8, border: "none",
                  background: active ? `${m.color}12` : "transparent",
                  cursor: m.live ? "pointer" : "not-allowed", opacity: m.live ? 1 : 0.45,
                  textAlign: "left", transition: "all 0.12s" }}>
                <span style={{ fontSize: 14, width: 18, textAlign: "center", color: active ? m.color : C.muted }}>{m.icon}</span>
                <span style={{ fontSize: 13, fontWeight: active ? 700 : 600, color: active ? m.color : C.text }}>{m.label}</span>
                {!m.live && <span style={{ fontSize: 9, marginLeft: "auto", color: C.muted, letterSpacing: ".3px" }}>soon</span>}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function FrameModule({ src }) {
  return <iframe src={src} title="frame" style={{ width: "100%", height: "100%", border: "none", display: "block", background: "#fff" }} />;
}

function TrendChart({ points }) {
  if (!points || points.length < 2) return null;
  const W = 280, H = 88, pad = 6;
  const allVals = [];
  points.forEach(p => { ["gvm","g","v","m"].forEach(k => { if (p[k] != null) allVals.push(p[k]); }); });
  const min = Math.min(...allVals) - 0.15, max = Math.max(...allVals) + 0.15;
  const span = (max - min) || 1;
  const X = i => pad + (i / (points.length - 1)) * (W - 2 * pad);
  const Y = v => H - pad - ((v - min) / span) * (H - 2 * pad);
  const mkPath = key => points.map((p, i) =>
    p[key] == null ? "" : `${i === 0 || points[i-1][key] == null ? "M" : "L"}${X(i).toFixed(1)},${Y(p[key]).toFixed(1)}`
  ).join(" ");
  const first = points[0].gvm, last = points[points.length - 1].gvm;
  const delta = (last != null && first != null) ? last - first : 0;
  const mainStroke = delta > 0.05 ? C.green : delta < -0.05 ? C.red : C.muted;
  const lines = [
    { key: "g", color: C.gPillar }, { key: "v", color: C.vPillar }, { key: "m", color: C.mPillar },
  ];
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
        <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: ".06em" }}>GVM Trend · {points.length}d</span>
        <span style={{ fontSize: 13, fontWeight: 800, color: mainStroke, fontFamily: "monospace" }}>
          {delta >= 0 ? "▲ " : "▼ "}{signFmt(delta)}
        </span>
      </div>
      <svg width={W} height={H} style={{ overflow: "visible", display: "block" }}>
        {lines.map(l => (
          <path key={l.key} d={mkPath(l.key)} fill="none" stroke={l.color}
            strokeWidth="1" strokeOpacity="0.45" strokeLinejoin="round" />
        ))}
        <path d={mkPath("gvm")} fill="none" stroke={mainStroke} strokeWidth="2.2"
          strokeLinejoin="round" strokeLinecap="round" />
        {points[0]?.gvm != null && (
          <text x={X(0)} y={Y(points[0].gvm) - 6} fontSize="9" fill={mainStroke} fontWeight="700"
            fontFamily="monospace" textAnchor="middle" style={{userSelect:"none"}}>{points[0].gvm.toFixed(2)}</text>
        )}
        {last != null && (
          <>
            <circle cx={X(points.length - 1)} cy={Y(last)} r="3.2" fill={mainStroke} />
            <text x={X(points.length - 1)} y={Y(last) - 7} fontSize="9" fill={mainStroke} fontWeight="700"
              fontFamily="monospace" textAnchor="middle" style={{userSelect:"none"}}>{last.toFixed(2)}</text>
          </>
        )}
      </svg>
      <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
        {lines.map(l => (
          <span key={l.key} style={{ fontSize: 9, color: l.color, fontWeight: 700, display: "flex", alignItems: "center", gap: 3 }}>
            <span style={{ width: 10, height: 2, background: l.color, opacity: .6, display: "inline-block" }} />{l.key.toUpperCase()}
          </span>
        ))}
        <span style={{ fontSize: 9, color: C.muted, marginLeft: "auto" }}>thin = components</span>
      </div>
    </div>
  );
}

function PillarRadar({ company, sector }) {
  if (!company) return null;
  const W = 90, H = 90, cx = W/2, cy = H/2 + 4, R = 32;
  const ANG = { G: -Math.PI/2, V: Math.PI/6, M: Math.PI*5/6 };
  const pt = (k, val) => {
    const r = Math.max(0, Math.min(10, val || 0)) / 10 * R;
    return [cx + Math.cos(ANG[k]) * r, cy + Math.sin(ANG[k]) * r];
  };
  const triPath = (data, k1, k2, k3) =>
    [pt(k1, data[k1.toLowerCase()]), pt(k2, data[k2.toLowerCase()]), pt(k3, data[k3.toLowerCase()])]
      .map(([x,y], i) => `${i===0?"M":"L"}${x.toFixed(1)},${y.toFixed(1)}`).join(" ") + "Z";
  const compPath = triPath(company, "G", "V", "M");
  const sectorPath = sector ? triPath(sector, "G", "V", "M") : null;
  const axisEnd = k => [cx + Math.cos(ANG[k]) * R, cy + Math.sin(ANG[k]) * R];
  const labelPos = k => [cx + Math.cos(ANG[k]) * (R + 8), cy + Math.sin(ANG[k]) * (R + 8)];
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <svg width={W} height={H + 4}>
        {[0.5, 1.0].map(s => (
          <circle key={s} cx={cx} cy={cy} r={R*s} fill="none" stroke={C.gridLine} strokeWidth="1" />
        ))}
        {["G","V","M"].map(k => {
          const [x,y] = axisEnd(k);
          return <line key={k} x1={cx} y1={cy} x2={x} y2={y} stroke={C.gridLine} strokeWidth="1" />;
        })}
        {sectorPath && <path d={sectorPath} fill={C.muted + "20"} stroke={C.muted} strokeWidth="1" strokeDasharray="2,2" />}
        <path d={compPath} fill={C.accent + "30"} stroke={C.accent} strokeWidth="1.8" />
        {["G","V","M"].map(k => {
          const [x,y] = labelPos(k);
          return <text key={k} x={x} y={y} fontSize="9" fontWeight="800" fill={PILLAR_INFO[k].color}
            textAnchor="middle" dominantBaseline="middle">{k}</text>;
        })}
      </svg>
      <div style={{ fontSize: 8, color: C.muted, marginTop: -4, letterSpacing: ".05em" }}>
        <span style={{ color: C.accent, fontWeight: 700 }}>■</span> stock {sector && <><span style={{ color: C.muted }}>┄</span> sector</>}
      </div>
    </div>
  );
}

function ActionStrip({ x }) {
  if (!x) return null;
  const chips = [];
  if (x.tier1) {
    const ok = x.tier1.passed >= Math.ceil(x.tier1.total * 0.7);
    chips.push({
      label: `Tier-1 auto ${x.tier1.passed}/${x.tier1.total}`,
      color: ok ? C.green : x.tier1.passed >= x.tier1.total / 2 ? C.gold : C.red,
      title: (x.tier1.checks || []).map(c => `${c.pass === true ? "✓" : c.pass === false ? "✗" : "·"} ${c.name}`).join("\n"),
    });
  }
  if (x.pivot && x.pivot.pp != null) {
    const cmp = x._cmp;
    let zone = "—", zc = C.muted;
    if (cmp != null) {
      if (cmp >= x.pivot.r1) { zone = "Above R1 — extended"; zc = C.orange; }
      else if (cmp >= x.pivot.pp) { zone = "PP–R1 — LONG zone"; zc = C.green; }
      else if (cmp >= x.pivot.s1) { zone = "S1–PP — below pivot"; zc = C.gold; }
      else { zone = "Below S1 — weak"; zc = C.red; }
    }
    chips.push({ label: `Pivot: ${zone}`, color: zc, title: `PP ${x.pivot.pp} · R1 ${x.pivot.r1} · S1 ${x.pivot.s1}` });
    if (cmp != null && x.pivot.r1 != null && cmp < x.pivot.r1) {
      const room = ((x.pivot.r1 / cmp - 1) * 100);
      chips.push({ label: `Room to R1 ${room.toFixed(1)}%`, color: room >= 1 ? C.green : C.gold });
    }
  }
  if (x.volume && x.volume.verdict) {
    const vc = x.volume.verdict === "ACCUMULATION" ? C.green : x.volume.verdict === "DISTRIBUTION" ? C.red : C.gold;
    chips.push({ label: `30D Vol: ${x.volume.verdict} ${x.volume.ratio != null ? x.volume.ratio + "×" : ""}`, color: vc });
  }
  if (x.earnings) {
    chips.push({
      label: x.earnings.blackout ? `⚠ ${x.earnings.event_type || "Event"} in ${x.earnings.days_to}d — BLACKOUT` : `Next event ${x.earnings.next_date} (${x.earnings.days_to}d)`,
      color: x.earnings.blackout ? C.red : C.muted,
    });
  } else {
    chips.push({ label: "No upcoming event", color: C.muted });
  }
  if (x.percentile) {
    const z = x.percentile.z_score;
    chips.push({
      label: `#${x.percentile.universe_rank}/${x.percentile.universe_total}${z != null ? ` · Z=${signFmt(z, 2)}` : ""}`,
      color: C.purple,
      title: z != null ? `GVM mean ${x.percentile.mean} · stdev ${x.percentile.stdev} · Z = (gvm − μ) / σ` : "GVM rank in scored universe",
    });
  }
  if (!chips.length) return null;
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 14px", marginBottom: 16,
      display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
      <span style={{ fontSize: 10, fontWeight: 800, color: C.muted, textTransform: "uppercase", letterSpacing: ".08em", marginRight: 4 }}>Snapshot</span>
      {chips.map((ch, i) => (
        <span key={i} title={ch.title || ""}
          style={{ fontSize: 11, fontWeight: 700, color: ch.color, background: `${ch.color}14`,
            border: `1px solid ${ch.color}35`, borderRadius: 14, padding: "4px 11px", cursor: ch.title ? "help" : "default" }}>
          {ch.label}
        </span>
      ))}
    </div>
  );
}

function SegmentContextCard({ ctx, stockSym }) {
  if (!ctx) return null;
  const vc = verdictColor(ctx.verdict);
  const cell = (lbl, val, sub, color) => (
    <div style={{ background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 8, padding: "10px 13px", flex: 1, minWidth: 110, minHeight: 56 }}>
      <div style={{ fontSize: 9.5, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 2 }}>{lbl}</div>
      <div style={{ fontSize: 16, fontWeight: 800, fontFamily: "monospace", color: color || C.text, lineHeight: 1.3 }}>{val}</div>
      {sub && <div style={{ fontSize: 10, color: C.muted, fontFamily: "monospace", marginTop: 2 }}>{sub}</div>}
    </div>
  );
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 18px", marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 800, color: C.purple, letterSpacing: ".03em" }}>Segment Context</div>
          <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>{ctx.segment} · {ctx.stocks_count} stocks · ₹{fmt((ctx.total_mcap||0)/100, 0)} Cr total MCap</div>
        </div>
        <Tag color={vc}>{ctx.verdict || "—"}</Tag>
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {cell("Sector GVM", ctx.mcap_wtd_gvm != null ? ctx.mcap_wtd_gvm : "—",
          ctx.simple_avg_gvm != null ? `simple avg ${ctx.simple_avg_gvm}` : null,
          gvmColor(ctx.mcap_wtd_gvm))}
        {cell("Sector Rank",
          ctx.sector_rank != null ? `#${ctx.sector_rank}/${ctx.sector_total}` : "—",
          ctx.sector_rank != null && ctx.sector_total ? `top ${((ctx.sector_rank/ctx.sector_total)*100).toFixed(0)}%` : null,
          ctx.sector_rank != null && ctx.sector_total && ctx.sector_rank <= ctx.sector_total / 4 ? C.green :
            ctx.sector_rank != null && ctx.sector_total && ctx.sector_rank <= ctx.sector_total / 2 ? C.gold : C.red)}
        {cell("Week %", ctx.week_return_avg != null ? signFmt(ctx.week_return_avg, 2) + "%" : "—", "segment avg", deltaColor(ctx.week_return_avg, 0.5))}
        {cell("Month %", ctx.month_return_avg != null ? signFmt(ctx.month_return_avg, 2) + "%" : "—", "segment avg", deltaColor(ctx.month_return_avg, 1))}
        {cell("Year %", ctx.year_return_avg != null ? signFmt(ctx.year_return_avg, 1) + "%" : "—", "segment avg", deltaColor(ctx.year_return_avg, 3))}
        {cell("Top Stock", ctx.top_stock || "—",
          ctx.top_stock_gvm != null ? `GVM ${ctx.top_stock_gvm}` : null,
          C.accent)}
        {ctx.stock_vs_sector != null && cell(`${stockSym} vs Sector`,
          signFmt(ctx.stock_vs_sector, 2),
          ctx.stock_vs_sector > 0 ? "leader" : "laggard",
          deltaColor(ctx.stock_vs_sector, 0.1))}
      </div>
    </div>
  );
}

function PivotLadder({ p, cmp }) {
  if (!p || p.s2 == null || p.r2 == null || p.r2 <= p.s2) return (
    <div style={{ fontSize: 12, color: C.muted, padding: 12 }}>No pivot levels available.</div>
  );
  const levels = [
    { k: "S2", v: p.s2, c: C.red }, { k: "S1", v: p.s1, c: C.red },
    { k: "PP", v: p.pp, c: C.muted }, { k: "R1", v: p.r1, c: C.green },
    { k: "R2", v: p.r2, c: C.green },
  ];
  const lo = p.s2, hi = p.r2, span = hi - lo;
  const X = v => Math.min(99, Math.max(1, (v - lo) / span * 100));
  const cmpX = cmp != null ? X(cmp) : null;
  const cmpCol = cmp == null ? C.muted : cmp >= p.r1 ? C.orange : cmp >= p.pp ? C.green : cmp >= p.s1 ? C.gold : C.red;
  return (
    <div>
      <div style={{ position: "relative", height: 56, marginTop: 18 }}>
        {cmpX != null && (
          <div style={{ position: "absolute", left: `${cmpX}%`, top: -16, transform: "translateX(-50%)",
            fontSize: 11, fontWeight: 800, color: cmpCol, fontFamily: "monospace", whiteSpace: "nowrap" }}>
            ▼ ₹{fmt(cmp, 1)}
          </div>
        )}
        <div style={{ position: "absolute", top: 8, left: 0, right: 0, height: 5, borderRadius: 3,
          background: `linear-gradient(90deg, ${C.red}30 0%, ${C.red}18 ${X(p.pp)}%, ${C.green}18 ${X(p.pp)}%, ${C.green}30 100%)` }} />
        {cmpX != null && (
          <div style={{ position: "absolute", left: `${cmpX}%`, top: 3, width: 3, height: 15,
            background: cmpCol, borderRadius: 2, transform: "translateX(-50%)" }} />
        )}
        {levels.map(l => l.v != null && (
          <React.Fragment key={l.k}>
            <div style={{ position: "absolute", left: `${X(l.v)}%`, top: 5, width: 2, height: 11,
              background: l.c, transform: "translateX(-50%)", opacity: .8 }} />

function FlowStrip({ flow, val }) {
  if (!flow && !val) return null;
  const cell = (k, v, sub, color) => (
    <div key={k} style={{ background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 8, padding: "8px 12px", minWidth: 96 }}>
      <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em" }}>{k}</div>
      <div style={{ fontSize: 14, fontWeight: 800, fontFamily: "monospace", color: color || C.text }}>{v}</div>
      {sub && <div style={{ fontSize: 9.5, color: C.muted, fontFamily: "monospace" }}>{sub}</div>}
    </div>
  );
  const cells = [];
  if (flow) {
    const ic = flow.inst_chg;
    const ic_c = ic == null ? C.text : ic >= 0 ? C.green : C.red;
    cells.push(cell("FII", flow.fii != null ? flow.fii + "%" : "—", flow.fii_chg != null ? `QoQ ${signFmt(flow.fii_chg)}%` : null,
      flow.fii_chg == null ? C.text : flow.fii_chg >= 0 ? C.green : C.red));
    cells.push(cell("DII", flow.dii != null ? flow.dii + "%" : "—", flow.dii_chg != null ? `QoQ ${signFmt(flow.dii_chg)}%` : null,
      flow.dii_chg == null ? C.text : flow.dii_chg >= 0 ? C.green : C.red));
    if (ic != null) cells.push(cell("Inst Chg (combined)", signFmt(ic) + "%", "FII + DII delta", ic_c));
    cells.push(cell("Promoter", flow.promoter != null ? flow.promoter + "%" : "—", null, C.text));
  }
  if (val) {
    const rc = val.rerating_pct == null ? C.text : val.rerating_pct > 25 ? C.red : val.rerating_pct > 0 ? C.gold : C.green;
    cells.push(cell("PE", val.pe != null ? val.pe + "x" : "—",
      val.historical_pe != null ? `hist ${val.historical_pe}x · seg ${val.segment_pe != null ? val.segment_pe + "x" : "—"}` : null, C.text));
    if (val.rerating_pct != null) cells.push(cell("Re-rating", signFmt(val.rerating_pct, 1) + "%", "vs own history", rc));
    if (val.annual_upside != null) cells.push(cell("Annual Upside", signFmt(val.annual_upside, 1) + "%",
      val.fy27_growth != null ? `FY27 growth ${val.fy27_growth}%` : null,
      val.annual_upside >= 15 ? C.green : val.annual_upside >= 0 ? C.gold : C.red));
    if (val.pb != null) cells.push(cell("P/B", val.pb + "x", null, C.text));
    if (val.peg != null) cells.push(cell("PEG", val.peg, null, val.peg > 2 ? C.red : val.peg > 1 ? C.gold : C.green));
    if (val.ev_ebitda != null) cells.push(cell("EV/EBITDA", val.ev_ebitda + "x", null, C.text));
  }
  if (!cells.length) return null;
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", marginBottom: 16 }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 10 }}>Ownership Flow & Valuation Context</div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>{cells}</div>
    </div>
  );
}

}

// ── Operational Metrics (peer-benchmarked) ─────────────────────────
// LOWER_BETTER metrics: risk/cost ratios where a smaller number is better.
const OPS_LOWER_BETTER = new Set([
  // Banking / NBFC — risk & cost ratios
  "gnpa_pct", "nnpa_pct", "cost_to_income", "credit_cost", "slippage_ratio",
  "gross_npa", "net_npa", "pcr_ex", "opex_ratio",
  // Insurance — lower is better
  "claims_ratio", "combined_ratio", "expense_ratio",
  // Generic cost/leverage ratios
  "debt_to_equity", "net_debt_to_ebitda", "inventory_days", "receivable_days", "churn_pct",
]);
const OPS_MIN_PEERS = 3;

function OpsMetrics({ symbol, segment }) {
  const [metrics, setMetrics] = useState(null);
  const [loading, setLoading] = useState(true);
  const [curQ, setCurQ] = useState(null);

  useEffect(() => {
    if (!symbol) return;
    setLoading(true);
    setMetrics(null);
    // Pull the whole segment's latest-quarter ops metrics in one query.
    mcpCall("run_sql", {
      query: `SELECT som.symbol, som.metric_name, som.metric_value, som.unit,
                     som.confidence, som.quarter, som.notes
              FROM sector_ops_metrics som
              JOIN gvm_scores g ON g.symbol = som.symbol
              WHERE g.segment = (SELECT segment FROM gvm_scores WHERE symbol='${symbol}')
                AND som.quarter = (SELECT MAX(quarter) FROM sector_ops_metrics)
              ORDER BY som.metric_name ASC`
    }).then(d => {
      const raw = d?.rows || [];
      if (raw.length) setCurQ(raw[0].quarter);
      // Group by metric_name across peers.
      const byMetric = {};
      raw.forEach(r => {
        const k = r.metric_name;
        if (!byMetric[k]) byMetric[k] = [];
        const v = r.metric_value != null ? Number(r.metric_value) : null;
        if (v != null && !isNaN(v)) byMetric[k].push({ sym: r.symbol, v, unit: r.unit, conf: r.confidence, notes: r.notes });
      });
      const out = [];
      Object.keys(byMetric).forEach(k => {
        const peers = byMetric[k];
        if (peers.length < OPS_MIN_PEERS) return;            // ≥3-peer threshold
        const lowerBetter = OPS_LOWER_BETTER.has(k.toLowerCase());
        const self = peers.find(p => p.sym === symbol) || null;
        const vals = peers.map(p => p.v);
        const peerAvg = vals.reduce((a, b) => a + b, 0) / vals.length;
        const sorted = [...peers].sort((a, b) => lowerBetter ? a.v - b.v : b.v - a.v);
        const best = sorted[0], worst = sorted[sorted.length - 1];
        const rank = self ? sorted.findIndex(p => p.sym === symbol) + 1 : null;
        out.push({
          metric_name: k, unit: self?.unit || peers[0].unit,
          confidence: self?.conf || null, notes: self?.notes || null,
          company: self ? self.v : null,
          peer_avg: Math.round(peerAvg * 100) / 100,
          rank, peer_n: peers.length,
          best: { sym: best.sym, v: best.v }, worst: { sym: worst.sym, v: worst.v },
          lower_better: lowerBetter,
        });
      });
      // Sort: metrics the company actually has first, then by peer count.
      out.sort((a, b) => (b.company != null) - (a.company != null) || b.peer_n - a.peer_n || a.metric_name.localeCompare(b.metric_name));
      setMetrics(out);
    }).catch(() => setMetrics([])).finally(() => setLoading(false));
  }, [symbol]);

  if (loading) return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 14 }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: C.purple, marginBottom: 8 }}>Operational Metrics</div>
      <div style={{ fontSize: 12, color: C.muted }}>Loading…</div>
    </div>
  );

  if (!metrics || !metrics.length) return null;

  const fmtVal = (v, u) => {
    if (v == null) return "—";
    const n = Number(v);
    if (isNaN(n)) return String(v);
    const abs = Math.abs(n);
    const f = abs >= 100000 ? (n/100000).toFixed(2) + "L"
      : abs >= 1000 ? (n/1000).toFixed(1) + "K"
      : abs >= 1 ? n.toFixed(2)
      : n.toFixed(4);
    return f + (u ? " " + u : "");
  };

  // Rating proxy for cell color: company vs peer avg, direction-aware.
  const cellTone = (m) => {
    if (m.company == null) return { bg: "#eef1f5", bd: "#dde3ea", fg: "#5a6781" };
    const better = m.lower_better ? m.company < m.peer_avg : m.company > m.peer_avg;
    const worse  = m.lower_better ? m.company > m.peer_avg : m.company < m.peer_avg;
    if (better) return { bg: "#e3f6ed", bd: "#0a9e63", fg: "#0a7a4d" };
    if (worse)  return { bg: "#fceaec", bd: "#dd3a4a", fg: "#bf2230" };
    return { bg: "#fdf3df", bd: "#d9a73a", fg: "#9a6a00" };
  };

  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 800, color: C.purple }}>Operational Metrics · Peer Benchmarked</div>
          <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>
            {metrics.length} metrics · {curQ || "—"} · {segment || "segment"} · ≥{OPS_MIN_PEERS} peers · earnings calls & filings
          </div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(205px, 1fr))", gap: 10 }}>
        {metrics.map((m, i) => {
          const c = cellTone(m);
          const label = (m.metric_name || "").replace(/_/g, " ").replace(/\bpct\b/i, "%").replace(/\b\w/g, l => l.toUpperCase());
          const dirHint = m.lower_better ? "lower is better" : "higher is better";
          let verdict = { txt: "NO DATA", col: C.muted };
          if (m.company != null && m.peer_avg != null) {
            const better = m.lower_better ? m.company < m.peer_avg : m.company > m.peer_avg;
            const worse  = m.lower_better ? m.company > m.peer_avg : m.company < m.peer_avg;
            verdict = better ? { txt: "BEATS PEER", col: "#0a7a4d" }
                    : worse  ? { txt: "TRAILS PEER", col: "#bf2230" }
                    : { txt: "IN-LINE", col: "#9a6a00" };
          }
          return (
            <div key={i} title={m.notes || ""}
              style={{ background: c.bg, border: `1px solid ${c.bd}`, borderRadius: 11, padding: "13px 15px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6, gap: 6 }}>
                <div style={{ fontSize: 11, fontWeight: 800, color: c.fg, lineHeight: 1.25 }}>{label}</div>
                <span style={{ fontSize: 8.5, fontWeight: 800, letterSpacing: ".04em", color: verdict.col,
                  background: verdict.col + "18", border: `1px solid ${verdict.col}33`, borderRadius: 5,
                  padding: "2px 6px", flexShrink: 0, whiteSpace: "nowrap" }}>{verdict.txt}</span>
              </div>
              <div style={{ fontSize: 27, fontWeight: 900, fontFamily: "monospace", color: "#1c2536", lineHeight: 1.05, marginBottom: 2 }}>
                {m.company != null ? fmtVal(m.company, m.unit) : "—"}
              </div>
              <div style={{ fontSize: 8.5, color: C.muted, marginBottom: 5, letterSpacing: ".02em" }}>{dirHint}</div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 9.5, color: "#5a6781", fontFamily: "monospace" }}>
                <span>peer {fmtVal(m.peer_avg, m.unit)} <span style={{color:"#b0b8c8",fontSize:8}}>({m.peer_n})</span></span>
                {m.company != null && m.peer_avg != null && m.peer_avg !== 0 && (() => {
                  const diff = m.lower_better
                    ? (m.peer_avg - m.company) / Math.abs(m.peer_avg) * 100
                    : (m.company - m.peer_avg) / Math.abs(m.peer_avg) * 100;
                  return <span style={{fontWeight:700, color: diff >= 0 ? "#0a7a4d" : "#bf2230", fontSize:9}}>
                    {diff >= 0 ? `▲${diff.toFixed(1)}%` : `▼${(-diff).toFixed(1)}%`}
                  </span>;
                })()}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 8.5, color: "#9aa4b5", fontFamily: "monospace", marginTop: 3,
                borderTop: `1px solid ${c.bd}`, paddingTop: 3 }}>
                <span style={{ color: C.green }}>▲ {m.best.sym} {fmtVal(m.best.v, "")}</span>
                <span style={{ color: C.red }}>▼ {m.worst.sym} {fmtVal(m.worst.v, "")}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function GvmReport({ r, hist }) {
  const [view, setView] = useState("matrix");
  const s = r.scores || {};
  const vc = verdictColor(r.verdict);
  const x = r.extras || {};
  if (x && x.pivot) x._cmp = r.price;
  const segCtx = x.segment_ctx || null;

  const benchByPillar = { G: [], V: [], M: [], _: [] };
  (r.benchmark || []).forEach(b => {
    const p = b.pillar || GVM_PILLAR_MAP[b.key] || "_";
    benchByPillar[p].push(b);
  });

  const verdictDist = {};
  (r.ladder || []).forEach(row => {
    verdictDist[row.verdict] = (verdictDist[row.verdict] || 0) + 1;
  });

  const pillarScore = (pillar) => {
    if (pillar === "G") return s.g;
    if (pillar === "V") return s.v;
    if (pillar === "M") return s.m;
    return null;
  };

  const sectorPillars = segCtx ? { g: segCtx.weighted_g, v: segCtx.weighted_v, m: segCtx.weighted_m } : null;
  const companyPillars = { g: s.g, v: s.v, m: s.m };

  const trendPoints = (x.trend && x.trend.length > 1)
    ? x.trend
    : (hist && hist.length > 1 ? hist.map(p => ({ d: p.score_date, gvm: p.gvm_score })) : null);

  const r52 = x.range52;
  const cmp = r.price;
  const pos52 = (r52 && r52.hi && r52.lo && cmp != null && r52.hi > r52.lo)
    ? Math.min(100, Math.max(0, (cmp - r52.lo) / (r52.hi - r52.lo) * 100))
    : null;
  const fromHigh = (r52 && r52.hi && cmp != null) ? (cmp / r52.hi - 1) * 100 : null;

  return (
    <div style={{ paddingBottom: 80 }}>

      <div className="no-print" style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
        <button onClick={() => window.print()}
          style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 14px",
            background: "#fff", border: `1px solid ${C.border}`, borderRadius: 7,
            fontSize: 11, fontWeight: 700, color: C.muted, cursor: "pointer",
            boxShadow: "0 1px 4px rgba(25,40,70,0.06)" }}>
          ↓ Download PDF
        </button>
      </div>

      <div style={{ background: C.card, border: `1px solid ${vc}40`, borderRadius: 12, padding: "20px 24px", marginBottom: 16 }}>
        <div style={{ display: "flex", gap: 22, alignItems: "flex-start", flexWrap: "wrap" }}>
          <div style={{ textAlign: "center", minWidth: 110 }}>
            <div style={{ fontSize: 52, fontWeight: 900, color: gvmColor(s.gvm), fontFamily: "monospace", lineHeight: 1 }}>{s.gvm?.toFixed(2)}</div>
            <div style={{ fontSize: 11, color: C.muted, margin: "4px 0 6px" }}>GVM Score</div>
            <Tag color={vc}>{r.verdict}</Tag>
            {x.percentile && (
              <div style={{ fontSize: 9.5, color: C.purple, fontWeight: 700, marginTop: 6, lineHeight: 1.3 }}>
                #{fmt(x.percentile.universe_rank)} / {fmt(x.percentile.universe_total)}
                {x.percentile.z_score != null && <div>Z = {signFmt(x.percentile.z_score, 2)}</div>}
              </div>
            )}
          </div>

          <div style={{ flex: 1.2, minWidth: 280 }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>{r.company_name}</div>
            <div style={{ fontSize: 12, color: C.muted, marginTop: 2, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
              <span>{r.symbol}</span><span>·</span><span>{r.segment}</span><span>·</span>
              <span style={{ fontWeight: 700, color: C.accent }}>#{r.segment_rank}/{r.segment_total} in segment</span>
              {r.mcap_rank && <span>· MCap #{r.mcap_rank}</span>}
              {r.cap_category && <Tag color={C.muted}>{r.cap_category}</Tag>}
              {r.is_bfsi && <Tag color={C.purple}>BFSI</Tag>}
              {x.earnings && x.earnings.blackout && <Tag color={C.red}>⚠ Blackout {x.earnings.days_to}d</Tag>}
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "nowrap", overflowX: "auto" }}>
              {["G","V","M"].map(pillar => {
                const pi = PILLAR_INFO[pillar];
                const score = pillarScore(pillar);
                return (
                  <div key={pillar} style={{ background: pi.bg, border: `1px solid ${pi.color}40`,
                    borderRadius: 10, padding: "9px 14px", flex: 1, minWidth: 80, textAlign: "center" }}>
                    <div style={{ fontSize: 10.5, fontWeight: 700, color: pi.color, textTransform: "uppercase", letterSpacing: ".05em" }}>{pillar}</div>
                    <div style={{ fontSize: 24, fontWeight: 900, color: gvmColor(score), fontFamily: "monospace", lineHeight: 1.1 }}>
                      {score?.toFixed(2) ?? "—"}
                    </div>
                    <div style={{ fontSize: 9, color: C.muted, marginTop: 2 }}>{pi.desc}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            {trendPoints && (
              <div style={{ minWidth: 280, background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 10, padding: "12px 14px" }}>
                <TrendChart points={trendPoints} />
              </div>
            )}
            <div style={{ background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 10, padding: "8px 10px 6px" }}>
              <PillarRadar company={companyPillars} sector={sectorPillars} />
            </div>
          </div>

          <div style={{ textAlign: "right", minWidth: 170 }}>
            <div style={{ fontSize: 11, color: C.muted }}>CMP</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: C.text, fontFamily: "monospace" }}>₹{fmt(cmp, 1)}</div>
            <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>MCap ₹{fmt(r.market_cap / 100, 0)} Cr</div>
            {pos52 != null && (
              <div style={{ marginTop: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, fontFamily: "monospace",
                  color: pos52 >= 75 ? C.green : pos52 >= 40 ? C.gold : C.red }}>
                  {pos52.toFixed(0)}% of 52W · {signFmt(fromHigh, 1)}% from high
                </div>
              </div>
            )}
            {Object.keys(verdictDist).length > 0 && (
              <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 3, alignItems: "flex-end" }}>
                <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em" }}>Segment peers</div>
                {Object.entries(verdictDist).map(([v, n]) => (
                  <div key={v} style={{ fontSize: 10, color: verdictColor(v), fontWeight: 700 }}>{n}× {v}</div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {r.punchline && (
        <div style={{ background: `${vc}10`, border: `1px solid ${vc}30`, borderRadius: 10, padding: "12px 16px", marginBottom: 16 }}>
          <div style={{ fontSize: 10, color: vc, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>Model Verdict</div>
          <div style={{ fontSize: 13, color: C.text, lineHeight: 1.5 }}>{r.punchline}</div>
        </div>
      )}

      <ActionStrip x={x} />
      <SegmentContextCard ctx={segCtx} stockSym={r.symbol} />

      {(() => {
        const realWeaknesses = (r.negatives || []).filter(p => p.rating != null && p.rating < 5);
        return (
          <div style={{ display: "grid", gridTemplateColumns: realWeaknesses.length ? "1fr 1fr" : "1fr", gap: 16, marginBottom: 16 }}>
            <div style={{ background: C.card, border: `1px solid ${C.green}30`, borderRadius: 10, padding: "14px 16px" }}>
              <div style={{ fontSize: 11, color: C.green, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>✓ Key Strengths</div>
              {(r.positives || []).length ? r.positives.map((p, i) => (
                <div key={i} style={{ fontSize: 12, color: C.text, padding: "5px 0", borderBottom: i < r.positives.length - 1 ? `1px solid ${C.gridLine}` : "none" }}>
                  <span style={{ color: C.green, fontWeight: 700 }}>{p.label}</span> — {p.company?.toFixed(2)}{p.unit} vs peer {p.peer_avg?.toFixed(2)}{p.unit}
                  <span style={{ color: C.muted }}> ({p.rating.toFixed(1)})</span>
                  <span style={{ fontSize: 9, color: C.muted, marginLeft: 6 }}>[{p.pillar || "G"}]</span>
                </div>
              )) : <div style={{ fontSize: 12, color: C.muted }}>No standout strengths vs peers.</div>}
            </div>
            {realWeaknesses.length > 0 && (
              <div style={{ background: C.card, border: `1px solid ${C.red}30`, borderRadius: 10, padding: "14px 16px" }}>
                <div style={{ fontSize: 11, color: C.red, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>⚠ Key Weaknesses</div>
                {realWeaknesses.map((p, i) => (
                  <div key={i} style={{ fontSize: 12, color: C.text, padding: "5px 0", borderBottom: i < realWeaknesses.length - 1 ? `1px solid ${C.gridLine}` : "none" }}>
                    <span style={{ color: C.red, fontWeight: 700 }}>{p.label}</span> — {p.company?.toFixed(2)}{p.unit} vs peer {p.peer_avg?.toFixed(2)}{p.unit}
                    <span style={{ color: C.muted }}> ({p.rating.toFixed(1)})</span>
                    <span style={{ fontSize: 9, color: C.muted, marginLeft: 6 }}>[{p.pillar || "G"}]</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}

      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "18px 20px", marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, paddingBottom: 10, borderBottom: `1px solid ${C.border}` }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.gold }}>Peer Benchmarking</div>
            <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>
              vs {r.peer_count} peers in {r.segment}{r.is_bfsi ? " · BFSI rule applied (Int.Cov excluded)" : ""}
            </div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            {[["matrix","Heat Strips"],["grouped","G/V/M Cards"]].map(([v,l]) => (
              <button key={v} onClick={() => setView(v)}
                style={{ fontSize: 11, fontWeight: 700, padding: "6px 12px", borderRadius: 7,
                  border: `1px solid ${view===v ? C.accent : C.border}`,
                  background: view===v ? `${C.accent}15` : "transparent",
                  color: view===v ? C.accent : C.muted, cursor: "pointer" }}>{l}</button>
            ))}
          </div>
        </div>

        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 14, fontSize: 10.5 }}>
          <span style={{ display: "flex", alignItems: "center", gap: 5, color: C.muted }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: "#0a9e63" }} />Better than segment
          </span>
          <span style={{ display: "flex", alignItems: "center", gap: 5, color: C.muted }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: "#d9a73a" }} />In-line
          </span>
          <span style={{ display: "flex", alignItems: "center", gap: 5, color: C.muted }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: "#dd3a4a" }} />Lower than segment
          </span>
          <span style={{ color: C.muted }}>· canonical engine-scored metrics only</span>
        </div>

        {view === "matrix" && (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ borderBottom: `2px solid ${C.border}` }}>
                  {["Pillar","Metric","Company","Peer Avg","Rating","Rank","Best","Worst"].map(h => (
                    <th key={h} style={{ padding: "8px 10px", textAlign: "left", fontSize: 10,
                      fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em",
                      background: "#f8fafc", whiteSpace: "nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {["G","V","M"].flatMap(pillar => {
                  const items = benchByPillar[pillar] || [];
                  if (!items.length) return [];
                  const pi = PILLAR_INFO[pillar];
                  const score = pillarScore(pillar);
                  return [
                    <tr key={`hdr-${pillar}`}>
                      <td colSpan={8} style={{ padding: "10px 10px 6px", background: pi.bg }}>
                        <span style={{ fontSize: 12, fontWeight: 800, color: pi.color }}>{pi.label}</span>
                        <span style={{ fontSize: 10, color: C.muted, marginLeft: 8 }}>{pi.desc}</span>
                        {score != null && <span style={{ float: "right", fontSize: 14, fontWeight: 900, color: gvmColor(score), fontFamily: "monospace" }}>{score.toFixed(2)}</span>}
                      </td>
                    </tr>,
                    ...items.map(b => <MatrixRow key={b.key} b={b} pillar={pillar} />)
                  ];
                })}
              </tbody>
            </table>
          </div>
        )}

        {view === "grouped" && ["G","V","M"].map(pillar => {
          const items = benchByPillar[pillar];
          if (!items.length) return null;
          const pi = PILLAR_INFO[pillar];
          const score = pillarScore(pillar);
          return (
            <div key={pillar} style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10,
                padding: "8px 12px", background: pi.bg, borderRadius: 8, border: `1px solid ${pi.color}30` }}>
                <span style={{ fontSize: 18, fontWeight: 900, color: pi.color, fontFamily: "monospace" }}>{pillar}</span>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: pi.color }}>{pi.label}</div>
                  <div style={{ fontSize: 10, color: C.muted }}>{pi.desc}</div>
                </div>
                {score != null && (
                  <span style={{ marginLeft: "auto", fontSize: 20, fontWeight: 900, color: gvmColor(score), fontFamily: "monospace" }}>
                    {score.toFixed(2)}
                  </span>
                )}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 8 }}>
                {items.map(b => <BenchCell key={b.key} b={b} />)}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 4 }}>Pivot Range</div>
          <PivotLadder p={x.pivot} cmp={r.price} />
        </div>
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 4 }}>30-Day Volume · Accumulation / Distribution</div>
          <VolumePanel va={x.volume} volRatio={x.vol_ratio_10_30} />
        </div>
      </div>

      <FlowStrip flow={x.flow} val={x.valuation} />
      <SegmentRankLadder ladder={r.ladder} segment={r.segment} stockSym={r.symbol} />

      {r.content?.overview && <ContentCard title="Company Overview" color={C.accent} body={r.content.overview} updated={r.content.last_overview_updated} />}
      {r.content?.key_takeaway && <ContentCard title="Key Takeaways" color={C.gold} body={r.content.key_takeaway} updated={r.content.last_takeaway_updated} />}
      {r.content?.result_analysis && <ContentCard title="Result Analysis" color={C.green} body={r.content.result_analysis} updated={r.content.last_result_analysis_updated} />}

      <OpsMetrics symbol={r.symbol} segment={r.segment} />

      <div style={{ fontSize: 10, color: C.muted, textAlign: "center", padding: "8px 0 24px" }}>
        Generated {r.generated_at} · peer benchmark computed live · {r.persisted ? "saved to DB" : "not persisted"}
        {r.persist_error && <span style={{ color: C.red }}> · persist error (schema migration pending)</span>}
      </div>
    </div>
  );
}

function ContentCard({ title, color, body, updated }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color }}>{title}</div>
        {updated && <div style={{ fontSize: 10, color: C.muted }}>Updated {updated}</div>}
      </div>
      <div style={{ fontSize: 13, color: C.text, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{body}</div>
    </div>
  );
}

function GvmModule() {
  const [query, setQuery] = useState("");
  const [suggest, setSuggest] = useState([]);
  const [showSug, setShowSug] = useState(false);
  const [symbol, setSymbol] = useState(null);
  const [report, setReport] = useState(null);
  const [hist, setHist] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const boxRef = useRef(null);
  const debounce = useRef(null);

  useEffect(() => {
    if (!query || query.length < 1) { setSuggest([]); return; }
    clearTimeout(debounce.current);
    debounce.current = setTimeout(async () => {
      try {
        const d = await apiGet(`/api/gvm/search?q=${encodeURIComponent(query)}&limit=8`);
        setSuggest(d.results || []); setShowSug(true);
      } catch { setSuggest([]); }
    }, 180);
    return () => clearTimeout(debounce.current);
  }, [query]);

  useEffect(() => {
    const h = (e) => { if (boxRef.current && !boxRef.current.contains(e.target)) setShowSug(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const loadReport = async (sym) => {
    setSymbol(sym); setShowSug(false); setQuery(sym); setLoading(true); setErr(null); setReport(null); setHist(null);
    try {
      const d = await apiGet(`/api/gvm/company/${encodeURIComponent(sym)}`);
      setReport(d);
      if (!d.extras || !d.extras.trend || d.extras.trend.length < 2) {
        mcpCall("gvm_history", { symbol: sym, days: 90 }).then(h => setHist(h && h.points ? h.points : null)).catch(() => {});
      }
    } catch (e) { setErr(`Could not load ${sym}. Try another symbol.`); }
    finally { setLoading(false); }
  };

  return (
    <div className="print-scroll" style={{ height: "100%", overflowY: "auto", padding: "24px 24px 80px" }}>
      <div style={{ maxWidth: 1180, margin: "0 auto" }}>
        <div ref={boxRef} style={{ position: "relative", maxWidth: 520, margin: "0 auto 24px" }}>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ position: "relative", flex: 1 }}>
              <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: C.muted, fontSize: 15 }}>⌕</span>
              <input
                value={query}
                onChange={e => setQuery(e.target.value.toUpperCase())}
                onFocus={() => suggest.length && setShowSug(true)}
                onKeyDown={e => { if (e.key === "Enter" && suggest[0]) loadReport(suggest[0].symbol); }}
                placeholder="Search company — TCS, RELIANCE, HDFCBANK…"
                style={{ width: "100%", padding: "12px 14px 12px 38px", borderRadius: 10, border: `1px solid ${C.border}`, background: C.card, color: C.text, fontSize: 14, outline: "none" }}
              />
            </div>
            <button onClick={() => suggest[0] && loadReport(suggest[0].symbol)}
              style={{ padding: "0 20px", borderRadius: 10, border: "none", background: C.gold, color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              Search
            </button>
          </div>
          {showSug && suggest.length > 0 && (
            <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden", zIndex: 50, boxShadow: "0 8px 24px rgba(25,40,70,0.12)" }}>
              {suggest.map(s => (
                <div key={s.symbol} onClick={() => loadReport(s.symbol)}
                  style={{ padding: "10px 14px", cursor: "pointer", borderBottom: `1px solid ${C.gridLine}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}
                  onMouseEnter={e => e.currentTarget.style.background = C.border}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <div>
                    <span style={{ fontSize: 13, fontWeight: 700, color: C.accent }}>{s.symbol}</span>
                    <span style={{ fontSize: 12, color: C.muted, marginLeft: 8 }}>{s.company_name}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: gvmColor(s.gvm_score), fontFamily: "monospace" }}>{s.gvm_score?.toFixed(2)}</span>
                    <Tag color={verdictColor(s.verdict)}>{s.verdict}</Tag>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        {!symbol && !loading && <GvmEmptyState onPick={loadReport} />}
        {loading && <Loader msg={`Building ${symbol} peer-benchmark report…`} />}
        {err && <div style={{ textAlign: "center", color: C.red, padding: 24 }}>{err}</div>}
        {report && !loading && <GvmReport r={report} hist={hist} />}
      </div>
    </div>
  );
}

function GvmEmptyState({ onPick }) {
  const [top, setTop] = useState([]);
  useEffect(() => { mcpCall("get_top_stocks", { n: 8, verdict: "Strong Buy" }).then(d => setTop(Array.isArray(d) ? d : [])); }, []);
  return (
    <div style={{ textAlign: "center", padding: "20px 0" }}>
      <div style={{ fontSize: 13, color: C.muted, marginBottom: 16 }}>Search a company above, or start with a top-rated pick:</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", maxWidth: 700, margin: "0 auto" }}>
        {top.map(s => (
          <button key={s.symbol} onClick={() => onPick(s.symbol)}
            style={{ padding: "8px 14px", borderRadius: 8, border: `1px solid ${C.gold}40`, background: C.card, cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accent }}>{s.symbol}</span>
            <span style={{ fontSize: 12, fontWeight: 700, color: gvmColor(s.gvm_score), fontFamily: "monospace" }}>{Number(s.gvm_score).toFixed(2)}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function ComingSoon({ mod }) {
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "80px 20px" }}>
      <div style={{ fontSize: 48, marginBottom: 16, opacity: 0.4 }}>{mod.icon}</div>
      <div style={{ fontSize: 18, fontWeight: 800, color: C.text }}>{mod.full}</div>
      <div style={{ marginTop: 16 }}><Tag color={mod.color}>Building in coming days</Tag></div>
    </div>
  );
}

function App() {
  const urlModel = new URLSearchParams(window.location.search).get("model");
  const valid = MODELS.find(m => m.id === urlModel && m.live);
  const [page, setPageRaw] = useState(valid ? valid.id : "v8");
  const setPage = (id) => {
    setPageRaw(id);
    try { window.history.replaceState(null, "", `?model=${id}`); } catch (e) {}
  };
  const mod = MODELS.find(m => m.id === page);

  let body;
  if (page === "home")  body = <FrameModule src={`${API}/?embed=1`} />;
  else if (page === "v8")    body = <FrameModule src={`${API}/dashboard?embed=1`} />;
  else if (page === "sector") body = <FrameModule src={`${API}/sector?embed=1`} />;
  else if (page === "max")   body = <FrameModule src={`${API}/cio?embed=1`} />;
  else if (page === "check") body = <FrameModule src={`${API}/check?embed=1`} />;
  else if (page === "gvm")   body = <GvmModule />;
  else body = <ComingSoon mod={mod} />;

  return (
    <div className="app-shell" style={{ height: "100vh", width: "100vw", background: C.bg, color: C.text,
      fontFamily: "-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif",
      position: "relative", overflow: "hidden" }}>
      <style>{`
        @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f4f6f9; }
        ::-webkit-scrollbar-thumb { background: #cfd8e3; border-radius: 3px; }
        button { transition: all 0.15s ease; }
        input::placeholder { color: #9aa4b5; }
      `}</style>
      <Switcher current={page} onPick={setPage} />
      <div className="app-body" style={{ height: "100%", width: "100%", overflow: "hidden" }}>
        {body}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
