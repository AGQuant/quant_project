const API = "https://quantproject-production.up.railway.app";
const MCP = `${API}/mcp`;

async function mcpCall(tool, args = {}) {
  const r = await fetch(MCP, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ jsonrpc: "2.0", id: 1, method: "tools/call", params: { name: tool, arguments: args } }),
  });
  const j = await r.json();
  const raw = j?.result?.content?.[0]?.text;
  try { return JSON.parse(raw); } catch { return raw; }
}

async function apiGet(path, opts) {
  // cc#268: optional fetch opts (e.g. { signal }) so callers can cancel in-flight requests.
  // Backward-compatible — existing single-arg callers pass opts=undefined (a no-op for fetch).
  const r = await fetch(`${API}${path}`, opts);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

const fmt = (n, d = 0) => n == null ? "—" : Number(n).toLocaleString("en-IN", { maximumFractionDigits: d, minimumFractionDigits: d });
const fmtMcap = (n) => n == null ? "—" : n >= 100000 ? `₹${(n/100000).toFixed(1)}LCr` : n >= 1000 ? `₹${(n/1000).toFixed(1)}KCr` : `₹${Math.round(n)}Cr`;
const gvmColor = (g) => g == null ? C.muted : g >= 8 ? C.green : g >= 7 ? C.gold : g >= 6 ? C.orange : C.red;
const ratingColor = (r) => r == null ? C.muted : r >= 7 ? C.green : r >= 5 ? C.gold : C.red;
const verdictColor = (v = "") => ({ "Excellent": C.green, "Good": C.accent, "Average": C.orange, "Weak": C.red }[v] || C.muted);
const signFmt = (n, d = 2) => n == null ? "—" : (n >= 0 ? "+" : "") + Number(n).toFixed(d);
const deltaColor = (n, threshold = 0.05) => n == null ? C.muted : n > threshold ? C.green : n < -threshold ? C.red : C.muted;

function TrendChart({ points }) {
  if (!points || points.length < 2) return null;
  const W = 280, H = 88, pad = 6;
  const allVals = [];
  points.forEach(p => { ["gvm","g","v","m"].forEach(k => { if (p[k] != null) allVals.push(p[k]); }); });
  const min = Math.min(...allVals) - 0.15, max = Math.max(...allVals) + 0.15;
  const span = (max - min) || 1;
  const X = i => pad + (i / (points.length - 1)) * (W - 2 * pad);
  const Y = v => H - pad - ((v - min) / span) * (H - 2 * pad);
  const mkPath = key => points.map((p, i) =>
    p[key] == null ? "" : `${i === 0 || points[i-1][key] == null ? "M" : "L"}${X(i).toFixed(1)},${Y(p[key]).toFixed(1)}`
  ).join(" ");
  const first = points[0].gvm, last = points[points.length - 1].gvm;
  const delta = (last != null && first != null) ? last - first : 0;
  const mainStroke = delta > 0.05 ? C.green : delta < -0.05 ? C.red : C.muted;
  const lines = [
    { key: "g", color: C.gPillar }, { key: "v", color: C.vPillar }, { key: "m", color: C.mPillar },
  ];
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: ".06em" }}>GVM Trend · {points.length}d</span>
        <span style={{ fontSize: 14, fontWeight: 800, color: mainStroke, fontFamily: "monospace" }}>
          {delta >= 0 ? "▲ " : "▼ "}{signFmt(delta)}
        </span>
      </div>
      <svg width={W} height={H} style={{ overflow: "visible", display: "block" }}>
        {lines.map(l => (
          <path key={l.key} d={mkPath(l.key)} fill="none" stroke={l.color}
            strokeWidth="1" strokeOpacity="0.45" strokeLinejoin="round" />
        ))}
        <path d={mkPath("gvm")} fill="none" stroke={mainStroke} strokeWidth="2.2"
          strokeLinejoin="round" strokeLinecap="round" />
        {points[0]?.gvm != null && (
          <text x={X(0)} y={Y(points[0].gvm) - 6} fontSize="9" fill={mainStroke} fontWeight="700"
            fontFamily="monospace" textAnchor="middle" style={{userSelect:"none"}}>{points[0].gvm.toFixed(2)}</text>
        )}
        {last != null && (
          <>
            <circle cx={X(points.length - 1)} cy={Y(last)} r="3.2" fill={mainStroke} />
            <text x={X(points.length - 1)} y={Y(last) - 7} fontSize="9" fill={mainStroke} fontWeight="700"
              fontFamily="monospace" textAnchor="middle" style={{userSelect:"none"}}>{last.toFixed(2)}</text>
          </>
        )}
      </svg>
      <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
        {lines.map(l => (
          <span key={l.key} style={{ fontSize: 11.5, color: l.color, fontWeight: 700, display: "flex", alignItems: "center", gap: 3 }}>
            <span style={{ width: 10, height: 2, background: l.color, opacity: .6, display: "inline-block" }} />{l.key.toUpperCase()}
          </span>
        ))}
        <span style={{ fontSize: 11.5, color: C.muted, marginLeft: "auto" }}>thin = components</span>
      </div>
    </div>
  );
}

function PillarRadar({ company, sector }) {
  if (!company) return null;
  const W = 90, H = 90, cx = W/2, cy = H/2 + 4, R = 32;
  const ANG = { G: -Math.PI/2, V: Math.PI/6, M: Math.PI*5/6 };
  const pt = (k, val) => {
    const r = Math.max(0, Math.min(10, val || 0)) / 10 * R;
    return [cx + Math.cos(ANG[k]) * r, cy + Math.sin(ANG[k]) * r];
  };
  const triPath = (data, k1, k2, k3) =>
    [pt(k1, data[k1.toLowerCase()]), pt(k2, data[k2.toLowerCase()]), pt(k3, data[k3.toLowerCase()])]
      .map(([x,y], i) => `${i===0?"M":"L"}${x.toFixed(1)},${y.toFixed(1)}`).join(" ") + "Z";
  const compPath = triPath(company, "G", "V", "M");
  const sectorPath = sector ? triPath(sector, "G", "V", "M") : null;
  const axisEnd = k => [cx + Math.cos(ANG[k]) * R, cy + Math.sin(ANG[k]) * R];
  const labelPos = k => [cx + Math.cos(ANG[k]) * (R + 8), cy + Math.sin(ANG[k]) * (R + 8)];
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <svg width={W} height={H + 4}>
        {[0.5, 1.0].map(s => (
          <circle key={s} cx={cx} cy={cy} r={R*s} fill="none" stroke={C.gridLine} strokeWidth="1" />
        ))}
        {["G","V","M"].map(k => {
          const [x,y] = axisEnd(k);
          return <line key={k} x1={cx} y1={cy} x2={x} y2={y} stroke={C.gridLine} strokeWidth="1" />;
        })}
        {sectorPath && <path d={sectorPath} fill={C.muted + "20"} stroke={C.muted} strokeWidth="1" strokeDasharray="2,2" />}
        <path d={compPath} fill={C.accent + "30"} stroke={C.accent} strokeWidth="1.8" />
        {["G","V","M"].map(k => {
          const [x,y] = labelPos(k);
          return <text key={k} x={x} y={y} fontSize="9" fontWeight="800" fill={PILLAR_INFO[k].color}
            textAnchor="middle" dominantBaseline="middle">{k}</text>;
        })}
      </svg>
      <div style={{ fontSize: 11, color: C.muted, marginTop: -4, letterSpacing: ".05em" }}>
        <span style={{ color: C.accent, fontWeight: 700 }}>▪</span> stock {sector && <><span style={{ color: C.muted }}>⊂</span> sector</>}
      </div>
    </div>
  );
}

function ActionStrip({ x }) {
  if (!x) return null;
  const chips = [];
  if (x.tier1) {
    const ok = x.tier1.passed >= Math.ceil(x.tier1.total * 0.7);
    chips.push({
      label: `Tier-1 auto ${x.tier1.passed}/${x.tier1.total}`,
      color: ok ? C.green : x.tier1.passed >= x.tier1.total / 2 ? C.gold : C.red,
      title: (x.tier1.checks || []).map(c => `${c.pass === true ? "✓" : c.pass === false ? "✗" : "·"} ${c.name}`).join("\n"),
    });
  }
  if (x.pivot && x.pivot.pp != null) {
    const cmp = x._cmp;
    let zone = "—", zc = C.muted;
    if (cmp != null) {
      if (cmp >= x.pivot.r1) { zone = "Above R1 — extended"; zc = C.orange; }
      else if (cmp >= x.pivot.pp) { zone = "PP–R1 — LONG zone"; zc = C.green; }
      else if (cmp >= x.pivot.s1) { zone = "S1–PP — below pivot"; zc = C.gold; }
      else { zone = "Below S1 — weak"; zc = C.red; }
    }
    chips.push({ label: `Pivot: ${zone}`, color: zc, title: `PP ${x.pivot.pp} · R1 ${x.pivot.r1} · S1 ${x.pivot.s1}` });
    if (cmp != null && x.pivot.r1 != null && cmp < x.pivot.r1) {
      const room = ((x.pivot.r1 / cmp - 1) * 100);
      chips.push({ label: `Room to R1 ${room.toFixed(1)}%`, color: room >= 1 ? C.green : C.gold });
    }
  }
  if (x.volume && x.volume.verdict) {
    const vc = x.volume.verdict === "ACCUMULATION" ? C.green : x.volume.verdict === "DISTRIBUTION" ? C.red : C.gold;
    chips.push({ label: `30D Vol: ${x.volume.verdict} ${x.volume.ratio != null ? x.volume.ratio + "×" : ""}`, color: vc });
  }
  if (x.earnings) {
    chips.push({
      label: x.earnings.blackout ? `⚠ ${x.earnings.event_type || "Event"} in ${x.earnings.days_to}d — BLACKOUT` : `Next event ${x.earnings.next_date} (${x.earnings.days_to}d)`,
      color: x.earnings.blackout ? C.red : C.muted,
    });
  } else {
    chips.push({ label: "No upcoming event", color: C.muted });
  }
  if (x.percentile) {
    const z = x.percentile.z_score;
    chips.push({
      label: `#${x.percentile.universe_rank}/${x.percentile.universe_total}${z != null ? ` · Z=${signFmt(z, 2)}` : ""}`,
      color: C.purple,
      title: z != null ? `GVM mean ${x.percentile.mean} · stdev ${x.percentile.stdev} · Z = (gvm − μ) / σ` : "GVM rank in scored universe",
    });
  }
  if (!chips.length) return null;
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 14px", marginBottom: 16,
      display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
      <span style={{ fontSize: 12, fontWeight: 800, color: C.muted, textTransform: "uppercase", letterSpacing: ".08em", marginRight: 4 }}>Snapshot</span>
      {chips.map((ch, i) => (
        <span key={i} title={ch.title || ""}
          style={{ fontSize: 13, fontWeight: 700, color: ch.color, background: `${ch.color}14`,
            border: `1px solid ${ch.color}35`, borderRadius: 14, padding: "4px 11px", cursor: ch.title ? "help" : "default" }}>
          {ch.label}
        </span>
      ))}
    </div>
  );
}

function SegmentContextCard({ ctx, stockSym }) {
  if (!ctx) return null;
  const vc = verdictColor(ctx.verdict);
  const cell = (lbl, val, sub, color) => (
    <div style={{ background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 8, padding: "10px 13px", flex: 1, minWidth: 110, minHeight: 56 }}>
      <div style={{ fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 2 }}>{lbl}</div>
      <div style={{ fontSize: 16, fontWeight: 800, fontFamily: "monospace", color: color || C.text, lineHeight: 1.3 }}>{val}</div>
      {sub && <div style={{ fontSize: 12, color: C.muted, fontFamily: "monospace", marginTop: 2 }}>{sub}</div>}
    </div>
  );
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 18px", marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 800, color: C.purple, letterSpacing: ".03em" }}>Segment Context</div>
          <div style={{ fontSize: 13, color: C.muted, marginTop: 1 }}>{ctx.segment} · {ctx.stocks_count} stocks · ₹{fmt((ctx.total_mcap||0)/100, 0)} Cr total MCap</div>
        </div>
        <Tag color={vc}>{ctx.verdict || "—"}</Tag>
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {cell("Sector GVM", ctx.mcap_wtd_gvm != null ? ctx.mcap_wtd_gvm : "—",
          ctx.simple_avg_gvm != null ? `simple avg ${ctx.simple_avg_gvm}` : null,
          gvmColor(ctx.mcap_wtd_gvm))}
        {cell("Sector Rank",
          ctx.sector_rank != null ? `#${ctx.sector_rank}/${ctx.sector_total}` : "—",
          ctx.sector_rank != null && ctx.sector_total ? `top ${((ctx.sector_rank/ctx.sector_total)*100).toFixed(0)}%` : null,
          ctx.sector_rank != null && ctx.sector_total && ctx.sector_rank <= ctx.sector_total / 4 ? C.green :
            ctx.sector_rank != null && ctx.sector_total && ctx.sector_rank <= ctx.sector_total / 2 ? C.gold : C.red)}
        {cell("Week %", ctx.week_return_avg != null ? signFmt(ctx.week_return_avg, 2) + "%" : "—", "segment avg", deltaColor(ctx.week_return_avg, 0.5))}
        {cell("Month %", ctx.month_return_avg != null ? signFmt(ctx.month_return_avg, 2) + "%" : "—", "segment avg", deltaColor(ctx.month_return_avg, 1))}
        {cell("Year %", ctx.year_return_avg != null ? signFmt(ctx.year_return_avg, 1) + "%" : "—", "segment avg", deltaColor(ctx.year_return_avg, 3))}
        {cell("Top Stock", ctx.top_stock || "—",
          ctx.top_stock_gvm != null ? `GVM ${ctx.top_stock_gvm}` : null,
          C.accent)}
        {ctx.stock_vs_sector != null && cell(`${stockSym} vs Sector`,
          signFmt(ctx.stock_vs_sector, 2),
          ctx.stock_vs_sector > 0 ? "leader" : "laggard",
          deltaColor(ctx.stock_vs_sector, 0.1))}
      </div>
    </div>
  );
}

function PivotLadder({ p, cmp }) {
  if (!p || p.s2 == null || p.r2 == null || p.r2 <= p.s2) return (
    <div style={{ fontSize: 13.5, color: C.muted, padding: 12 }}>No pivot levels available.</div>
  );
  const levels = [
    { k: "S2", v: p.s2, c: C.red }, { k: "S1", v: p.s1, c: C.red },
    { k: "PP", v: p.pp, c: C.muted }, { k: "R1", v: p.r1, c: C.green },
    { k: "R2", v: p.r2, c: C.green },
  ];
  const lo = p.s2, hi = p.r2, span = hi - lo;
  const X = v => Math.min(99, Math.max(1, (v - lo) / span * 100));
  const cmpX = cmp != null ? X(cmp) : null;
  const cmpCol = cmp == null ? C.muted : cmp >= p.r1 ? C.orange : cmp >= p.pp ? C.green : cmp >= p.s1 ? C.gold : C.red;
  return (
    <div>
      <div style={{ position: "relative", height: 56, marginTop: 18 }}>
        {cmpX != null && (
          <div style={{ position: "absolute", left: `${cmpX}%`, top: -16, transform: "translateX(-50%)",
            fontSize: 13, fontWeight: 800, color: cmpCol, fontFamily: "monospace", whiteSpace: "nowrap" }}>
            ▼ ₹{fmt(cmp, 1)}
          </div>
        )}
        <div style={{ position: "absolute", top: 8, left: 0, right: 0, height: 5, borderRadius: 3,
          background: `linear-gradient(90deg, ${C.red}30 0%, ${C.red}18 ${X(p.pp)}%, ${C.green}18 ${X(p.pp)}%, ${C.green}30 100%)` }} />
        {cmpX != null && (
          <div style={{ position: "absolute", left: `${cmpX}%`, top: 3, width: 3, height: 15,
            background: cmpCol, borderRadius: 2, transform: "translateX(-50%)" }} />
        )}
        {levels.map(l => l.v != null && (
          <React.Fragment key={l.k}>
            <div style={{ position: "absolute", left: `${X(l.v)}%`, top: 5, width: 2, height: 11,
              background: l.c, transform: "translateX(-50%)", opacity: .8 }} />
            <div style={{ position: "absolute", left: `${X(l.v)}%`, top: 26, transform: "translateX(-50%)",
              textAlign: "center", lineHeight: 1.25 }}>
              <div style={{ fontSize: 12, fontWeight: 800, color: l.c }}>{l.k}</div>
              <div style={{ fontSize: 12, color: C.muted, fontFamily: "monospace" }}>{fmt(l.v, 0)}</div>
            </div>
          </React.Fragment>
        ))}
      </div>
      <div style={{ fontSize: 12, color: C.muted, marginTop: 8 }}>
        Rolling-5-day pivots · built {p.pivot_date || "—"}
        {cmp != null && p.r1 != null && cmp < p.r1 && (
          <span style={{ color: C.green, fontWeight: 700 }}> · room to R1 {((p.r1 / cmp - 1) * 100).toFixed(1)}%</span>
        )}
      </div>
    </div>
  );
}

// cc#507: FlowStrip ("Ownership Flow & Valuation Context") RETIRED entirely (founder-directed
// 18-Jul-2026). Every chip it showed is now either a scored table row (FII+DII rows already in
// G; PE/Forward PE/Historical PE/P-B/EV-EBITDA/PEG/Annual Upside rows in V) or a marker inside
// the PE row's peer-ladder chart (historical PE / re-rating -- see PeerLadderModal). Promoter
// Holding has no replacement surface (it was never a scored G/V/M metric, cc#223) and is
// intentionally dropped with the strip, per the founder's explicit removal instruction.

function cellColor(rating) {
  if (rating == null) return { bg: "rgba(148,166,210,.1)", bd: "rgba(148,166,210,.24)", fg: "#8C99BD" };
  if (rating >= 6.5) return { bg: "rgba(47,212,139,.14)", bd: "#2FD48B", fg: "#2FD48B" };
  if (rating >= 4)   return { bg: "rgba(245,185,74,.14)", bd: "#F5B94A", fg: "#F5B94A" };
  return { bg: "rgba(255,92,108,.13)", bd: "#FF5C6C", fg: "#FF5C6C" };
}

// cc#507: fixed zone-line markers for metrics with a universal (not per-company) threshold.
// PE's "own 5y avg" marker is dynamic (backend-supplied via b.extra_marker) and handled separately.
const PEER_LADDER_FIXED_MARKERS = {
  annual_upside: [{ label: "0", value: 0 }],
  dma_50:        [{ label: "0", value: 0 }],
  dma_200:       [{ label: "0", value: 0 }],

// cc#507: the ONE reusable peer-benchmark visualization for every scored (and context) row --
// horizontal bars, all segment peers sorted best->worst, company's bar highlighted, a dashed
// line at the segment median, plus metric-specific extra markers.
const _PE_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function _peMonthYear(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  return `${_PE_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

// cc#521: quarterly TTM PE dual-axis chart (EPS bars + PE line) replacing the cc#512 5-pt annual
// line. Standalone component (not inline in PeerLadderModal) so it can hold its own hover/touch
// state -- Rules of Hooks forbids a conditional useState inside the parent's branch.
function PeTrendChart({ b, onClose }) {
  const pts = b.pe_trend || [];
  const [hoverI, setHoverI] = useState(null);
  const svgRef = useRef(null);

  if (!pts.length) {
    return (
      <>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
          <span style={{ fontSize: 15, fontWeight: 800, color: C.text }}>{b.label}</span>
          <span onClick={onClose} style={{ cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</span>
        </div>
        <div style={{ fontSize: 13, color: C.muted }}>No PE trend data available for this metric.</div>
      </>
    );
  }

  const curPe = b.current_pe, medPe = b.median_pe;
  const peVals = pts.map(p => p.pe).concat(curPe != null ? [curPe] : []).concat(medPe != null ? [medPe] : []);
  const peLo = Math.min(...peVals), peHi = Math.max(...peVals);
  const pePad = (peHi - peLo) * 0.15 || Math.abs(peLo) * 0.15 || 1;
  const peMin = Math.max(0, peLo - pePad), peMax = peHi + pePad;
  const epsMax = Math.max(...pts.map(p => p.ttm_eps), 0) * 1.2 || 1;

  const W = 520, H = 250, padL = 40, padR = 40, padT = 14, padB = 32;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const xAt = i => padL + (pts.length > 1 ? (i / (pts.length - 1)) * plotW : plotW / 2);
  const yPe = v => padT + plotH - ((v - peMin) / (peMax - peMin || 1)) * plotH;
  const yEps = v => padT + plotH - (Math.max(0, v) / epsMax) * plotH;
  const barW = Math.max(4, (plotW / pts.length) * 0.46);

  // gap detection: a >100-day jump between consecutive plotted quarters means a quarter was
  // skipped server-side (TTM EPS<=0 or missing price) -- break the line there instead of
  // silently joining across it (cc#521 "render gap" requirement).
  const segments = [];
  let cur = [0];
  for (let i = 1; i < pts.length; i++) {
    const gapDays = (new Date(pts[i].period_end) - new Date(pts[i - 1].period_end)) / 86400000;
    if (gapDays > 100) { segments.push(cur); cur = [i]; } else cur.push(i);
  }
  segments.push(cur);
  const linePaths = segments.map(seg => seg.map((i, k) => `${k === 0 ? "M" : "L"}${xAt(i).toFixed(1)},${yPe(pts[i].pe).toFixed(1)}`).join(" "));

  const labelStep = Math.max(1, Math.ceil(pts.length / 8));
  const hp = hoverI != null ? pts[hoverI] : null;

  function moveTo(clientX) {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const localX = (clientX - rect.left) * (W / rect.width);
    let best = 0, bestDist = Infinity;
    pts.forEach((p, i) => { const d = Math.abs(xAt(i) - localX); if (d < bestDist) { bestDist = d; best = i; } });
    setHoverI(best);
  }

  return (
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}>
        <span style={{ fontSize: 15, fontWeight: 800, color: C.text }}>{b.label}</span>
        <span onClick={onClose} style={{ cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</span>
      </div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>
        {curPe != null && <span>current {curPe.toFixed(1)}x</span>}
        {medPe != null && <span> · median {medPe.toFixed(1)}x</span>}
        <span> · {pts.length} quarters</span>
      </div>
      <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block", touchAction: "pan-y" }}
        onMouseMove={e => moveTo(e.clientX)}
        onMouseLeave={() => setHoverI(null)}
        onTouchStart={e => moveTo(e.touches[0].clientX)}
        onTouchMove={e => { e.preventDefault(); moveTo(e.touches[0].clientX); }}>
        {pts.map((p, i) => (
          <rect key={`b${i}`} x={xAt(i) - barW / 2} y={yEps(p.ttm_eps)} width={barW}
            height={Math.max(0, yEps(0) - yEps(p.ttm_eps))} fill="#8C99BD" opacity={0.28} rx={1.5} />
        ))}
        {medPe != null && (
          <line x1={padL} x2={W - padR} y1={yPe(medPe)} y2={yPe(medPe)} stroke={C.gold} strokeWidth={1.5} strokeDasharray="4,3" />
        )}
        {curPe != null && (
          <line x1={padL} x2={W - padR} y1={yPe(curPe)} y2={yPe(curPe)} stroke={C.accent} strokeWidth={1.5} />
        )}
        {linePaths.map((d, i) => <path key={`l${i}`} d={d} fill="none" stroke={C.accent} strokeWidth={2} />)}
        {pts.map((p, i) => (
          <circle key={`c${i}`} cx={xAt(i)} cy={yPe(p.pe)} r={p.is_artifact ? 4 : (i === hoverI ? 4.5 : 3)}
            fill={p.is_artifact ? "transparent" : (i === hoverI ? C.text : C.accent)}
            stroke={C.accent} strokeWidth={p.is_artifact ? 1.5 : (i === hoverI ? 2 : 0)} />
        ))}
        {hp && (
          <line x1={xAt(hoverI)} x2={xAt(hoverI)} y1={padT} y2={padT + plotH} stroke={C.muted} strokeWidth={1} strokeDasharray="2,2" opacity={0.6} />
        )}
        {pts.map((p, i) => (i % labelStep === 0 || i === pts.length - 1) && (
          <text key={`t${i}`} x={xAt(i)} y={H - 6} fontSize={9} fill={C.muted} textAnchor="middle" fontFamily="monospace">{p.q}</text>
        ))}
      </svg>
      {hp && (
        <div style={{ fontSize: 11.5, fontFamily: "monospace", color: C.text, background: C.bg,
          border: `1px solid ${C.border}`, borderRadius: 7, padding: "5px 9px", display: "inline-block", marginTop: 4 }}>
          {_peMonthYear(hp.period_end)} · PE {hp.pe.toFixed(1)}x · TTM EPS {hp.ttm_eps.toFixed(2)}
        </div>
      )}
      <div style={{ fontSize: 11, color: C.muted, marginTop: 8, display: "flex", gap: 12, flexWrap: "wrap" }}>
        <span><span style={{ color: C.accent }}>—</span> PE line</span>
        <span><span style={{ color: C.gold }}>- -</span> Median PE</span>
        <span><span style={{ color: "#8C99BD" }}>▮</span> TTM EPS bars</span>
        {pts.some(p => p.is_artifact) && <span>hollow point = possible data artifact (&gt;3× median)</span>}
      </div>
    </>
  );
}

function PeerLadderModal({ b, sym, onClose }) {
  if (!b) return null;
  const peers = b.peers || [];
  const overlay = { position: "fixed", inset: 0, background: "rgba(6,10,22,.55)", zIndex: 500,
    display: "flex", alignItems: "center", justifyContent: "center", padding: 16 };
  const box = { background: C.card, border: `1px solid ${C.border}`, borderRadius: 12,
    padding: "18px 20px", width: "min(560px, 100%)", maxHeight: "82vh", overflowY: "auto",
    boxShadow: "0 20px 60px rgba(0,0,0,.35)" };

  // cc#521: Historical PE row swaps the peer-ladder bars for a quarterly TTM PE dual-axis chart
  // (EPS bars + PE line, hover/touch tooltip) -- see PeTrendChart above.
  if (b.chart_type === "pe_trend") {
    return (
      <div style={overlay} onClick={onClose}>
        <div style={{ ...box, width: "min(600px, 100%)" }} onClick={e => e.stopPropagation()}>
          <PeTrendChart b={b} onClose={onClose} />
        </div>
      </div>
    );
  }

  if (!peers.length) {
    return (
      <div style={overlay} onClick={onClose}>
        <div style={box} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontSize: 15, fontWeight: 800, color: C.text }}>{b.label}</span>
            <span onClick={onClose} style={{ cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</span>
          </div>
          <div style={{ fontSize: 13, color: C.muted }}>No peer data available for this metric.</div>
        </div>
      </div>
    );
  }

  const median  = b.peer_median != null ? b.peer_median : b.peer_avg;
  const markers = [];
  if (b.key === "pe" && b.extra_marker) markers.push(b.extra_marker);
  (PEER_LADDER_FIXED_MARKERS[b.key] || []).forEach(m => markers.push(m));

  const vals   = peers.map(p => p.value).concat(median != null ? [median] : []).concat(markers.map(m => m.value));
  const lo     = Math.min(...vals), hi = Math.max(...vals);
  const pad    = (hi - lo) * 0.1 || Math.abs(lo) * 0.1 || 1;
  const min    = lo - pad, max = hi + pad;
  const pct    = v => Math.min(100, Math.max(0, ((v - min) / (max - min)) * 100));
  const fmtV   = v => `${Number(v).toFixed(2)}${b.unit || ""}`;

  return (
    <div style={overlay} onClick={onClose}>
      <div style={box} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}>
          <span style={{ fontSize: 15, fontWeight: 800, color: C.text }}>{b.label}</span>
          <span onClick={onClose} style={{ cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</span>
        </div>
        <div style={{ fontSize: 12, color: C.muted, marginBottom: 14 }}>
          {peers.length} peers · median {median != null ? fmtV(median) : "—"}
          {markers.map((m, i) => <span key={i}> · {m.label} {fmtV(m.value)}</span>)}
        </div>
        <div style={{ position: "relative" }}>
          {/* cc#521: the segment-median and own-5y-avg dashed vertical lines were removed from
              every ladder chart (founder: visual clutter over the bars) -- median/marker values
              stay in the header text line above, just no overlay lines in the chart area. */}
          {peers.map(p => {
            const isSelf = p.symbol === sym;
            return (
              <div key={p.symbol} style={{ display: "flex", alignItems: "center", gap: 8, minHeight: 14, margin: "4px 0" }}>
                <span style={{ width: 76, flexShrink: 0, fontSize: 11.5, fontWeight: isSelf ? 800 : 600,
                  color: isSelf ? C.accent : C.muted, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.symbol}</span>
                <div style={{ flex: 1, position: "relative", height: 14, background: C.bg, borderRadius: 3, border: `1px solid ${C.gridLine}` }}>
                  <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, width: `${pct(p.value)}%`,
                    background: isSelf ? C.accent : "#8C99BD90", borderRadius: 3 }} />
                </div>
                <span style={{ width: 64, flexShrink: 0, fontSize: 11.5, textAlign: "right", fontFamily: "monospace",
                  fontWeight: isSelf ? 800 : 500, color: isSelf ? C.accent : C.muted }}>{fmtV(p.value)}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// cc#512: verdict.color (red/amber/green, founder-locked bands) -> theme constant.
const VERDICT_COLOR = { red: () => C.red, amber: () => C.gold, green: () => C.green };
function _verdictColor(v) { return v && VERDICT_COLOR[v.color] ? VERDICT_COLOR[v.color]() : C.muted; }

          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 20,
            borderRadius: 4, border: `1px solid ${vColor}`, background: `${vColor}22` }}>

              {b.verdict ? b.verdict.label : "—"}{b.rerating_pct != null ? ` · ${signFmt(b.rerating_pct, 1)}%` : ""}
            </span>

          <div style={{ position: "relative", height: 20, background: C.bg, borderRadius: 4, border: `1px solid ${C.gridLine}` }}>

            <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, right: 0,

              <span style={{ fontSize: 13, fontWeight: 800, color: ratingColor(b.rating), fontFamily: "monospace" }}>

        )}

      <td style={{ padding: "8px 10px", fontSize: 12, color: C.muted }}>#{b.rank ?? "—"}/{b.peer_n}</td>
      <td style={{ padding: "8px 10px", fontSize: 12, color: C.green, fontFamily: "monospace" }}>
        {b.best?.symbol || "—"}

      <td style={{ padding: "8px 10px", fontSize: 12, color: C.red, fontFamily: "monospace" }}>
        {b.worst?.symbol || "—"}

    </tr>
  );
}

const OPS_MIN_PEERS = 3;

// cc#523: 8-quarter mini sparkline for one metric's trend. Bars, latest bar highlighted.
function OpsTrend({ trend, lowerBetter }) {
  const vals = trend.map(t => t.value).filter(v => v != null);
  if (vals.length < 2) return null;
  const lo = Math.min(...vals), hi = Math.max(...vals);
  const rng = (hi - lo) || Math.abs(hi) || 1;
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 22, marginTop: 4 }}>
      {trend.map((t, i) => {
        const isLast = i === trend.length - 1;
        const h = t.value == null ? 2 : Math.max(3, ((t.value - lo) / rng) * 18 + 3);
        return (
          <div key={i} title={`${t.quarter}: ${t.value != null ? t.value : "—"}`}
            style={{ width: 6, height: h, borderRadius: 1.5,
              background: t.value == null ? "rgba(148,166,210,.18)" : (isLast ? "#8C99BD" : "#8C99BD70") }} />
        );
      })}
    </div>
  );
}

// cc#523: latest-quarter concall summary card, collapsible, placed above OpsMetrics.
function ConcallSummary({ symbol }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);

  useEffect(() => {
    if (!symbol) return;
    setLoading(true);
    setData(null);
    mcpCall("run_sql", {
      query: `SELECT quarter, summary, guidance, tone, computed_at FROM concall_summaries
              WHERE symbol='${symbol}' ORDER BY computed_at DESC LIMIT 1`
    }).then(d => setData((d?.rows || [])[0] || null)).catch(() => setData(null)).finally(() => setLoading(false));
  }, [symbol]);

  if (loading || !data || !data.summary) return null;

  const toneColor = { confident: C.green, cautious: C.gold, defensive: C.red, mixed: C.gold }[data.tone] || C.muted;
  const bullets = (data.summary || "").split("\n").map(s => s.replace(/^-\s*/, "").trim()).filter(Boolean);

  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}
        onClick={() => setOpen(o => !o)}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 800, color: C.purple }}>Concall Summary · {data.quarter}</div>
          <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>
            {data.tone && <span style={{ color: toneColor, fontWeight: 700, textTransform: "capitalize" }}>{data.tone}</span>}
            {data.tone && " tone · "}{bullets.length} highlights{open ? "" : " · tap to expand"}
          </div>
        </div>
        <span style={{ color: C.muted, fontSize: 18 }}>{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div style={{ marginTop: 12 }}>
          <ul style={{ margin: 0, paddingLeft: 18, fontSize: 13, color: C.text, lineHeight: 1.7 }}>
            {bullets.map((b, i) => <li key={i}>{b}</li>)}

              <div style={{ fontSize: 11, fontWeight: 700, color: C.gold, marginBottom: 3, letterSpacing: ".04em" }}>GUIDANCE</div>

            </div>

}

function OpsMetrics({ symbol, segment }) {
  const [metrics, setMetrics] = useState(null);
  const [loading, setLoading] = useState(true);
  const [curQ, setCurQ] = useState(null);
  const [nReported, setNReported] = useState(null);
  const [divergence, setDivergence] = useState([]);
  const [guidance, setGuidance] = useState(null);

  // cc#524 items c+e: guidance track record + divergence flags come from the dedicated
  // endpoint (both need server-side computation -- LLM comparison for guidance, cross-symbol
  // trend comparison for divergence -- not reasonable to replicate client-side).
  useEffect(() => {
    if (!symbol) return;
    apiGet(`/api/ops_metrics/company/${encodeURIComponent(symbol)}`)
      .then(d => { setDivergence(d?.divergence_flags || []); setGuidance(d?.guidance_track_record || null); })
      .catch(() => { setDivergence([]); setGuidance(null); });
  }, [symbol]);

  useEffect(() => {
    if (!symbol) return;
    setLoading(true);
    setMetrics(null);
    Promise.all([
      mcpCall("run_sql", {
        query: `SELECT som.symbol, som.metric_name, som.metric_value, som.unit, som.quarter,
                       som.confidence, som.source_1, som.source_2, som.discrepancy_pct, som.computed_at
                FROM sector_ops_metrics som
                WHERE som.sector = (SELECT sector FROM sector_ops_metrics WHERE symbol='${symbol}' LIMIT 1)
                ORDER BY som.computed_at ASC`
      }),
      mcpCall("run_sql", {
        query: `SELECT metric_name, display_name, unit, direction, tier FROM sector_kpi_registry
                WHERE sector = (SELECT sector FROM sector_ops_metrics WHERE symbol='${symbol}' LIMIT 1)
                ORDER BY tier, metric_name`
      }),
    ]).then(([rawD, regD]) => {
      const raw = rawD?.rows || [];
      const registry = regD?.rows || [];
      const byMetric = {};
      raw.forEach(r => {
        const k = r.metric_name;
        if (!byMetric[k]) byMetric[k] = [];
        const v = r.metric_value != null ? Number(r.metric_value) : null;
        byMetric[k].push({ sym: r.symbol, v, unit: r.unit, conf: r.confidence,
          quarter: r.quarter, s1: r.source_1, s2: r.source_2, disc: r.discrepancy_pct, computed_at: r.computed_at });
      });
      // cc#523: NO DATA cards stay in the grid (per spec, showing which peers DID report)
      // instead of silently vanishing -- so iterate the full REGISTRY, not just byMetric's keys.
      const names = registry.length ? registry.map(r => r.metric_name) : Object.keys(byMetric);
      const out = [];
      let latestQOverall = null;
      names.forEach(k => {
        const reg = registry.find(r => r.metric_name === k);
        const entries = byMetric[k] || [];
        const selfEntries = entries.filter(e => e.sym === symbol);
        const trend = selfEntries.slice(-8).map(e => ({ quarter: e.quarter, value: e.v }));
        const latestQ = selfEntries.length ? selfEntries[selfEntries.length - 1].quarter
          : (entries.length ? entries[entries.length - 1].quarter : null);
        if (selfEntries.length) latestQOverall = latestQ;
        const peers = entries.filter(e => e.quarter === latestQ && e.v != null);
        const lowerBetter = reg ? reg.direction === "lower_better" : false;
        const self = peers.find(p => p.sym === symbol) || null;
        const hasEnoughPeers = peers.length >= OPS_MIN_PEERS;
        const vals = peers.map(p => p.v);
        const peerMedian = hasEnoughPeers ? [...vals].sort((a, b) => a - b)[Math.floor(vals.length / 2)] : null;
        const sorted = hasEnoughPeers ? [...peers].sort((a, b) => lowerBetter ? a.v - b.v : b.v - a.v) : [];
        const rank = (self && hasEnoughPeers) ? sorted.findIndex(p => p.sym === symbol) + 1 : null;
        // cc#524 item a: QoQ/YoY deltas from the trend array already fetched -- each quarter
        // appears once per (symbol, metric), appended chronologically, so trend[-1] vs trend[-2]
        // is QoQ and trend[-1] vs trend[-5] is YoY (4 quarters back) once that many exist.
        const tv = trend.map(t => t.value);
        const n = tv.length;
        const qoqPrev = n >= 2 ? tv[n - 2] : null, yoyPrev = n >= 5 ? tv[n - 5] : null;
        const curV = n >= 1 ? tv[n - 1] : null;
        const qoqPct = (curV != null && qoqPrev != null && qoqPrev !== 0) ? (curV - qoqPrev) / Math.abs(qoqPrev) * 100 : null;
        const yoyPct = (curV != null && yoyPrev != null && yoyPrev !== 0) ? (curV - yoyPrev) / Math.abs(yoyPrev) * 100 : null;
        out.push({
          metric_name: k, display_name: reg?.display_name, unit: self?.unit || reg?.unit || (peers[0] || {}).unit,
          confidence: self?.conf || null, source_1: self?.s1 || null, source_2: self?.s2 || null,
          discrepancy_pct: self?.disc ?? null,
          company: self ? self.v : null, quarter: latestQ, trend,
          qoq_delta_pct: qoqPct, yoy_delta_pct: yoyPct,
          peer_avg: peerMedian != null ? Math.round(peerMedian * 100) / 100 : null,
          rank, peer_n: peers.length,
          reported_peers: peers.filter(p => p.sym !== symbol).map(p => p.sym),
          best: sorted.length ? { sym: sorted[0].sym, v: sorted[0].v } : null,
          worst: sorted.length ? { sym: sorted[sorted.length - 1].sym, v: sorted[sorted.length - 1].v } : null,
          lower_better: lowerBetter,
        });
      });
      out.sort((a, b) => (b.company != null) - (a.company != null) || b.peer_n - a.peer_n || a.metric_name.localeCompare(b.metric_name));
      setMetrics(out);
      setCurQ(latestQOverall);
      if (latestQOverall) {
        setNReported(new Set(raw.filter(r => r.quarter === latestQOverall).map(r => r.symbol)).size);
      }
    }).catch(() => setMetrics([])).finally(() => setLoading(false));
  }, [symbol]);

  if (loading) return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 14 }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: C.purple, marginBottom: 8 }}>Operational Metrics</div>
      <div style={{ fontSize: 13.5, color: C.muted }}>Loading…</div>
    </div>
  );

  // Only show the section once the sector has SOME real pipeline data -- an empty registry
  // (pre-backfill) with every metric NO DATA would otherwise clutter every report page.
  if (!metrics || !metrics.length || !metrics.some(m => m.company != null || m.peer_n > 0)) return null;

  const fmtVal = (v, u) => {
    if (v == null) return "—";
    const n = Number(v);
    if (isNaN(n)) return String(v);
    const abs = Math.abs(n);
    const f = abs >= 100000 ? (n/100000).toFixed(2) + "L"
      : abs >= 1000 ? (n/1000).toFixed(1) + "K"
      : abs >= 1 ? n.toFixed(2)
      : n.toFixed(4);
    return f + (u ? " " + u : "");
  };

  const cellTone = (m) => {
    if (m.company == null || m.peer_avg == null) return { bg: "rgba(148,166,210,.1)", bd: "rgba(148,166,210,.24)", fg: "#8C99BD" };
    const better = m.lower_better ? m.company < m.peer_avg : m.company > m.peer_avg;
    const worse  = m.lower_better ? m.company > m.peer_avg : m.company < m.peer_avg;
    if (better) return { bg: "rgba(47,212,139,.14)", bd: "#2FD48B", fg: "#2FD48B" };
    if (worse)  return { bg: "rgba(255,92,108,.13)", bd: "#FF5C6C", fg: "#FF5C6C" };
    return { bg: "rgba(245,185,74,.14)", bd: "#F5B94A", fg: "#F5B94A" };
  };

  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 800, color: C.purple }}>Operational Metrics · Peer Benchmarked</div>
          <div style={{ fontSize: 13, color: C.muted, marginTop: 2 }}>
            {metrics.length} metrics · as of {curQ || "—"}{nReported != null ? ` · ${nReported} companies reported` : ""} · ≥{OPS_MIN_PEERS} peers · earnings calls &amp; filings
          </div>
        </div>
        {guidance && (() => {
          const met = guidance.MET || 0, total = Object.values(guidance).reduce((a, b) => a + b, 0);
          return (
            <span style={{ fontSize: 11.5, fontWeight: 700, color: C.text, background: C.bg,
              border: `1px solid ${C.border}`, borderRadius: 8, padding: "5px 10px" }}
              title="Guidance track record, last 4Q">
              Guidance: {met}/{total} met
            </span>
          );
        })()}
      </div>
      {divergence.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
          {divergence.map((d, i) => (
            <span key={i} title={d.flag_text} style={{ fontSize: 11, fontWeight: 700, color: C.gold,
              background: "rgba(245,185,74,.14)", border: `1px solid rgba(245,185,74,.35)`,
              borderRadius: 8, padding: "4px 9px" }}>
              ⚠ {d.flag_text}
            </span>
          ))}
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(205px, 1fr))", gap: 10 }}>
        {metrics.map((m, i) => {
          const c = cellTone(m);
          const label = m.display_name || (m.metric_name || "").replace(/_/g, " ").replace(/\bpct\b/i, "%").replace(/\b\w/g, l => l.toUpperCase());
          const dirHint = m.lower_better ? "lower is better" : "higher is better";
          const quote = m.source_1 || m.source_2 || "";
          let verdict = { txt: "NO DATA", col: C.muted };
          if (m.company != null && m.peer_avg != null) {
            const better = m.lower_better ? m.company < m.peer_avg : m.company > m.peer_avg;
            const worse  = m.lower_better ? m.company > m.peer_avg : m.company < m.peer_avg;
            verdict = better ? { txt: "BEATS PEER", col: "#2FD48B" }
                    : worse  ? { txt: "TRAILS PEER", col: "#FF5C6C" }
                    : { txt: "IN-LINE", col: "#F5B94A" };
          }
          return (
            <div key={i} title={quote}
              style={{ background: c.bg, border: `1px solid ${c.bd}`, borderRadius: 11, padding: "13px 15px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6, gap: 6 }}>
                <div style={{ fontSize: 14, fontWeight: 800, color: c.fg, lineHeight: 1.25 }}>{label}</div>
                <span style={{ fontSize: 12, fontWeight: 800, letterSpacing: ".04em", color: verdict.col,
                  background: verdict.col + "18", border: `1px solid ${verdict.col}33`, borderRadius: 5,
                  padding: "2px 6px", flexShrink: 0, whiteSpace: "nowrap" }}>{verdict.txt}</span>
              </div>
              <div style={{ fontSize: 29, fontWeight: 900, fontFamily: "monospace", color: "#1c2536", lineHeight: 1.05, marginBottom: 2 }}>
                {m.company != null ? fmtVal(m.company, m.unit) : "—"}
              </div>
              <div style={{ fontSize: 12.5, color: C.muted, marginBottom: 5, letterSpacing: ".02em" }}>{dirHint}</div>
              {m.peer_avg != null ? (
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 14, color: "#8C99BD", fontFamily: "monospace" }}>
                  <span>peer med {fmtVal(m.peer_avg, m.unit)} <span style={{color:"#b0b8c8",fontSize:12}}>(#{m.rank ?? "—"}/{m.peer_n})</span></span>
                  {m.company != null && m.peer_avg !== 0 && (() => {
                    const diff = m.lower_better
                      ? (m.peer_avg - m.company) / Math.abs(m.peer_avg) * 100
                      : (m.company - m.peer_avg) / Math.abs(m.peer_avg) * 100;
                    return <span style={{fontWeight:700, color: diff >= 0 ? "#2FD48B" : "#FF5C6C", fontSize:13.5}}>
                      {diff >= 0 ? `▲${diff.toFixed(1)}%` : `▼${(-diff).toFixed(1)}%`}
                    </span>;
                  })()}
                </div>
              ) : (
                <div style={{ fontSize: 12, color: "#9aa4b5" }}>
                  {m.reported_peers.length ? `reported: ${m.reported_peers.join(", ")}` : "no peers reported yet"}
                </div>
              )}
              {(m.qoq_delta_pct != null || m.yoy_delta_pct != null) && (
                <div style={{ display: "flex", gap: 10, fontSize: 11, fontFamily: "monospace", marginTop: 3 }}>
                  {m.qoq_delta_pct != null && (() => {
                    const good = m.lower_better ? m.qoq_delta_pct < 0 : m.qoq_delta_pct > 0;
                    return <span style={{ color: good ? C.green : (m.qoq_delta_pct === 0 ? "#9aa4b5" : C.red) }}>
                      QoQ {m.qoq_delta_pct >= 0 ? "+" : ""}{m.qoq_delta_pct.toFixed(1)}%
                    </span>;
                  })()}
                  {m.yoy_delta_pct != null && (() => {
                    const good = m.lower_better ? m.yoy_delta_pct < 0 : m.yoy_delta_pct > 0;
                    return <span style={{ color: good ? C.green : (m.yoy_delta_pct === 0 ? "#9aa4b5" : C.red) }}>
                      YoY {m.yoy_delta_pct >= 0 ? "+" : ""}{m.yoy_delta_pct.toFixed(1)}%
                    </span>;
                  })()}
                </div>
              )}
              <OpsTrend trend={m.trend} lowerBetter={m.lower_better} />
              {m.best && m.worst && (
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: "#9aa4b5", fontFamily: "monospace", marginTop: 3,
                  borderTop: `1px solid ${c.bd}`, paddingTop: 3 }}>
                  <span style={{ color: C.green }}>▲ {m.best.sym} {fmtVal(m.best.v, "")}</span>
                  <span style={{ color: C.red }}>▼ {m.worst.sym} {fmtVal(m.worst.v, "")}</span>
                </div>
              )}
              {m.confidence && (
                <div style={{ fontSize: 10.5, color: "#9aa4b5", marginTop: 3 }}>
                  {m.confidence} confidence{m.discrepancy_pct != null ? ` · ${m.discrepancy_pct}% source discrepancy` : ""}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// cc#300: Fibcheck relocated here from the Trade Check page and rebuilt natively in React
// (was a standalone SVG string in scorr_check.html). Opened from the GVM hero card CMP block.
// Reuses GET /api/trade-check/fibcheck (all downstream math unchanged). Ranges 1M/3M/6M/1Y/All;
// 1Y maps to the backend 12m param, All is the new full-history mode (backend cc#300).
const FIB_RANGES = [["1M","1m"],["3M","3m"],["6M","6m"],["1Y","12m"],["All","all"]];

// cc#409 — Fib Strength Rule (founder-locked). Position in swing range: 0 = swing low, 100 = swing high.
// Display-only (id=143) — never scored. Zones + 123.6 extension target headroom.
const FIB_ZONE_BANDS = [
  { top: 123.6, bot: 100,  key: "breakout" },
  { top: 100,   bot: 78.6, key: "resist" },
  { top: 78.6,  bot: 61.8, key: "strength" },
  { top: 61.8,  bot: 38.2, key: "decision" },
  { top: 38.2,  bot: 23.6, key: "weak" },
  { top: 23.6,  bot: 0,    key: "breakdown" },
];
function fibZoneKey(pct) {
  if (pct == null) return null;
  if (pct >= 100) return "breakout";
  if (pct >= 78.6) return "resist";
  if (pct >= 61.8) return "strength";
  if (pct >= 38.2) return "decision";
  if (pct >= 23.6) return "weak";
  return "breakdown";
}
function fibZoneName(key, SHORT) {
  const L = { breakout: "Breakout", resist: "Resistance Test", strength: "Strength",
              decision: "Decision", weak: "Weak", breakdown: "Breakdown" };
  const S = { breakout: "Extended", resist: "Supply Test", strength: "Weakness",
              decision: "Decision", weak: "Demand Test", breakdown: "Breakdown" };
  return (SHORT ? S : L)[key] || key;
}
function fibZoneColor(key) {
  switch (key) {
    case "breakout":  return [C.green, 0.16];
    case "resist":    return [C.green, 0.14];   // cc#562: 61.8%-100% is structurally bullish (deep-retracement-held) -> green-tinted, was maroon (spec id=6133 Option A)
    case "strength":  return [C.green, 0.09];
    case "decision":  return [C.muted, 0.07];
    case "weak":      return [C.red,   0.07];
    case "breakdown": return [C.red,   0.15];
    default:          return [C.muted, 0.05];
  }
}
function fibZoneInterp(key, SHORT) {
  if (SHORT) {
    switch (key) {
      case "breakout":  return "Extended above the range — overbought for a short; wait for rejection.";
      case "resist":    return "At supply — short trigger if it rejects the prior high.";
      case "strength":  return "Still strong — early for a short; needs to lose 61.8%.";
      case "decision":  return "Decision zone — no short edge yet.";
      case "weak":      return "Weakening — shorts favoured below 38.2%.";
      case "breakdown": return "Broken down — below 23.6%; −23.6 is the first extension target.";
    }
  } else {
    switch (key) {
      case "breakout":  return "Above the swing high — breakout; 123.6 is the first extension target.";
      case "resist":    return "Testing prior-high resistance — a close above 100% confirms the breakout.";
      case "strength":  return "Strength band — dips buyable above 61.8%.";
      case "decision":  return "Decision zone (38.2–61.8%) — no edge; wait for a break either way.";
      case "weak":      return "Weak — below 38.2%; reclaim 50% to stabilise.";
      case "breakdown": return "Breakdown — below 23.6%; structure broken.";
    }
  }
  return "";
}

function FibChartSvg({ d, side, overlay }) {
  // cc#478: overlay = 'fib' (default) | 'pivot' | 'both' | 'none'
  const ov = overlay || "fib";
  const showFib = ov === "fib" || ov === "both";
  const showPiv = ov === "pivot" || ov === "both";
  const piv = d.pivots || null;
  const SHORT = side === "SHORT";
  const W = 680, H = 340, L = 8, R = 92, T = 16, B = 24;
  const ser = (d.series || []).filter(p => p.close != null);
  const n = ser.length;
  if (n < 2) return <div style={{ fontSize: 12.5, color: C.muted, padding: "24px 0", textAlign: "center" }}>No price path available.</div>;
  const fl = d.fib_levels || [];
  const lo = d.swing_low.price, hi = d.swing_high.price, cmp = d.cmp;
  const span = (hi - lo) || 1;
  const pxAt = p => lo + (p / 100) * span;   // position% -> price (0 = low, 100 = high)
  const p1236 = pxAt(123.6), pNeg = pxAt(-23.6);
  // cc#409: extend headroom so the 123.6 extension target (and its dashed line) is always visible.
  // cc#478: y-range adapts to whichever overlays are shown so pivot/fib lines stay on-canvas.
  const vals = ser.map(p => p.close);
  if (cmp != null) vals.push(cmp);
  if (showFib) { vals.push(lo, hi, p1236); if (SHORT) vals.push(pNeg); }
  const pivRows = (showPiv && piv)
    ? [["PP", piv.pp], ["R1", piv.r1], ["R2", piv.r2], ["S1", piv.s1], ["S2", piv.s2]].filter(x => x[1] != null)
    : [];
  pivRows.forEach(x => vals.push(x[1]));
  let ymin = Math.min(...vals), ymax = Math.max(...vals);
  const ypad = (ymax - ymin) * 0.04 || 1; ymin -= ypad; ymax += ypad;
  const xF = i => L + (i / (n - 1)) * (W - L - R);
  const yF = p => T + (ymax - p) / (ymax - ymin) * (H - T - B);
  const clampY = y => Math.max(T, Math.min(H - B, y));
  const dpath = ser.map((p, i) => (i ? "L" : "M") + xF(i).toFixed(1) + " " + yF(p.close).toFixed(1)).join(" ");
  const bands = SHORT ? FIB_ZONE_BANDS.concat([{ top: 0, bot: -23.6, key: "breakdown" }]) : FIB_ZONE_BANDS;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet"
      style={{ width: "100%", height: "auto", display: "block", border: `1px solid ${C.border}`, borderRadius: 10, background: C.bg }}>
      {showFib && bands.map((z, i) => {
        const yt = clampY(yF(pxAt(z.top))), yb = clampY(yF(pxAt(z.bot)));
        const zc = fibZoneColor(z.key);
        return <rect key={"z" + i} x={L} y={Math.min(yt, yb).toFixed(1)} width={W - L - R}
          height={Math.max(0.5, Math.abs(yb - yt)).toFixed(1)} fill={zc[0]} opacity={zc[1]} />;
      })}
      {showFib && bands.map((z, i) => {
        const ymid = clampY((yF(pxAt(z.top)) + yF(pxAt(z.bot))) / 2);
        return <text key={"zt" + i} x={W - R - 4} y={(ymid + 3).toFixed(1)} fontSize="9" fontFamily="monospace"
          fill={C.muted} textAnchor="end" opacity="0.7">{fibZoneName(z.key, SHORT)}</text>;
      })}
      {showFib && fl.map((f, i) => {
        const y = yF(f.price), bold = Math.abs(f.pct - 61.8) < 0.5;   // 61.8 = bull/bear line, bolder
        return (
          <g key={i}>
            <line x1={L} y1={y.toFixed(1)} x2={W - R} y2={y.toFixed(1)} stroke={bold ? C.text : C.muted}
              strokeWidth={bold ? "1.3" : "1"} strokeDasharray={bold ? "6 3" : "4 3"} strokeOpacity={bold ? "0.6" : "0.45"} />
            <text x={W - R + 4} y={(y + 3.5).toFixed(1)} fontSize="10" fontFamily="monospace" fill={C.muted}>{f.pct.toFixed(1)}% · {f.price.toFixed(2)}</text>
          </g>
        );
      })}
      {showFib && (function () {
        const y = yF(p1236);
        return (
          <g>
            <line x1={L} y1={y.toFixed(1)} x2={W - R} y2={y.toFixed(1)} stroke={C.green} strokeWidth="1.2" strokeDasharray="2 2" strokeOpacity="0.85" />
            <text x={W - R + 4} y={(y + 3.5).toFixed(1)} fontSize="10" fontFamily="monospace" fontWeight="700" fill={C.green}>123.6 · {p1236.toFixed(2)} · first target</text>
          </g>
        );
      })()}
      {showFib && SHORT && (function () {
        const y = yF(pNeg);
        return (
          <g>
            <line x1={L} y1={y.toFixed(1)} x2={W - R} y2={y.toFixed(1)} stroke={C.red} strokeWidth="1.2" strokeDasharray="2 2" strokeOpacity="0.85" />
            <text x={W - R + 4} y={(y + 3.5).toFixed(1)} fontSize="10" fontFamily="monospace" fontWeight="700" fill={C.red}>−23.6 · {pNeg.toFixed(2)} · target ext</text>
          </g>
        );
      })()}
      {pivRows.map(([lbl, price], i) => {
        // cc#478: pivot overlay — dashed AMBER lines, right-edge labels, visually distinct from Fib.
        const y = clampY(yF(price)), AMBER = "#d98b1f";
        return (
          <g key={"piv" + i}>
            <line x1={L} y1={y.toFixed(1)} x2={W - R} y2={y.toFixed(1)} stroke={AMBER}
              strokeWidth="1.2" strokeDasharray="5 4" strokeOpacity="0.9" />
            <text x={W - R + 4} y={(y + 3.5).toFixed(1)} fontSize="10" fontFamily="monospace" fontWeight="700" fill={AMBER}>{lbl} · {price.toFixed(2)}</text>
          </g>
        );
      })}
      <path d={dpath} fill="none" stroke={C.accent} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      {cmp != null && (
        <g>
          <circle cx={xF(n - 1).toFixed(1)} cy={yF(cmp).toFixed(1)} r="4" fill={C.accent} stroke="#fff" strokeWidth="1.5" />
          <text x={(xF(n - 1) - 6).toFixed(1)} y={(yF(cmp) - 7).toFixed(1)} fontSize="11" fontFamily="monospace" fontWeight="700" fill={C.text} textAnchor="end">Prev Close {cmp.toFixed(2)}</text>
        </g>
      )}
    </svg>
  );
}

function FibStat({ label, children }) {

    <span style={{ background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 7, padding: "5px 9px", color: C.text }}>

}

function FibPopout({ symbol, onClose, side = "LONG" }) {
  const [lookback, setLookback] = useState("3m");   // default 3M (matches backend default)
  // cc#478: chart overlay choice persists across symbols + sessions (localStorage). Default 'fib'
  // preserves the prior behaviour (Fib levels only).
  const [overlay, setOverlay] = useState(() => {
    try { return localStorage.getItem("gvm_chart_overlay") || "fib"; } catch (e) { return "fib"; }
  });
  const setOverlayPersist = v => {
    setOverlay(v);
    try { localStorage.setItem("gvm_chart_overlay", v); } catch (e) {}
  };
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);

  useEffect(() => {
    const onKey = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  useEffect(() => {
    let alive = true;
    setLoading(true); setErr(null);
    apiGet(`/api/trade-check/fibcheck?symbol=${encodeURIComponent(symbol)}&lookback=${lookback}`)
      .then(d => { if (!alive) return; if (d.error) setErr(d.error); else setData(d); })
      .catch(e => { if (alive) setErr(`Server error ${e.message} — fibcheck failed.`); })
      .finally(() => { if (alive) setLoading(false); });
    return () => { alive = false; };
  }, [symbol, lookback]);

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(20,28,45,0.55)", zIndex: 200,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: C.card, borderRadius: 14, border: `1px solid ${C.border}`,
        boxShadow: "0 12px 40px rgba(20,28,45,0.25)", width: "min(760px, 96vw)", maxHeight: "92vh", overflowY: "auto", padding: "18px 20px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <div style={{ fontSize: 16, fontWeight: 800, color: C.text }}>Fibcheck — {symbol}</div>
          <button onClick={onClose} title="Close (Esc)"
            style={{ background: "none", border: "none", fontSize: 24, lineHeight: 1, color: C.muted, cursor: "pointer", padding: 0 }}>×</button>
        </div>
        <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
          {FIB_RANGES.map(([lbl, val]) => (
            <button key={val} onClick={() => setLookback(val)}
              style={{ padding: "5px 13px", borderRadius: 7, fontSize: 12.5, fontWeight: 700, cursor: "pointer",
                border: `1px solid ${lookback === val ? C.accent : C.border}`,
                background: lookback === val ? C.accent : C.card,
                color: lookback === val ? "#fff" : C.muted }}>
              {lbl}
            </button>
          ))}
          {/* cc#478: overlay selector — 44px tap target + 16px font (MOBILE_UX_STANDARD_V1) */}
          <label style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, color: C.muted }}>
            Overlay
            <select value={overlay} onChange={e => setOverlayPersist(e.target.value)}
              style={{ minHeight: 44, fontSize: 16, padding: "4px 8px", borderRadius: 7,
                border: `1px solid ${C.border}`, background: C.card, color: C.text, cursor: "pointer" }}>
              <option value="fib">Fib levels</option>
              <option value="pivot">Pivot levels</option>
              <option value="both">Both</option>
              <option value="none">None</option>
            </select>
          </label>
        </div>
        {loading && <div style={{ padding: "40px 0", textAlign: "center", color: C.muted, fontSize: 13 }}>Drawing Fibonacci retracement…</div>}
        {err && !loading && <div style={{ padding: "24px 0", textAlign: "center", color: C.red, fontSize: 13 }}>{err}</div>}
        {data && !loading && !err && (
          <React.Fragment>
            <FibChartSvg d={data} side={side} overlay={overlay} />
            {data.cmp_retracement_pct != null && (function () {
              const zk = fibZoneKey(data.cmp_retracement_pct), zc = fibZoneColor(zk)[0], SH = side === "SHORT";
              return (
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 12, flexWrap: "wrap" }}>
                  <span style={{ border: `1px solid ${zc}`, color: zc, background: C.bg, borderRadius: 7,
                    padding: "5px 11px", fontWeight: 800, fontFamily: "monospace", fontSize: 12 }}>
                    {data.cmp_retracement_pct.toFixed(1)}% — {fibZoneName(zk, SH)}
                  </span>
                  <span style={{ fontSize: 12, color: C.muted, lineHeight: 1.5, flex: 1, minWidth: 200 }}>
                    {fibZoneInterp(zk, SH)}
                  </span>
                </div>
              );
            })()}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 12, fontFamily: "monospace", fontSize: 11.5 }}>
              <FibStat label="Swing">{fmt(data.swing_low.price, 2)} → {fmt(data.swing_high.price, 2)}</FibStat>
              <FibStat label={(data.anchor_label || "CMP") + (data.anchor_date ? ` ${data.anchor_date}` : "")}>{fmt(data.cmp, 2)}{data.cmp_retracement_pct != null ? ` (${data.cmp_retracement_pct.toFixed(1)}%)` : ""}</FibStat>
              {data.nearest_level_above && (
                <FibStat label="Next resist">{data.nearest_level_above.pct.toFixed(1)}% @ {fmt(data.nearest_level_above.price, 2)}</FibStat>
              )}
              <span style={{ background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 7, padding: "5px 9px", color: C.muted }}>
                {(data.is_live ? "live" : "EOD")} · {data.lookback_days || 0} bars
              </span>
            </div>
            {data.commentary && (
              <div style={{ fontSize: 12.5, color: C.muted, lineHeight: 1.6, marginTop: 12, background: C.bg, borderRadius: 10, padding: "12px 14px" }}>
                {data.commentary}
              </div>
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

// cc#411: 3M price-trend sparkline for the GVM hero — replaces the G/V/M pillar radar. Reuses the
// existing fibcheck endpoint for the ~3M EOD close path (no new data/engine). "expand" -> Fibcheck.
function PriceSparkline({ symbol, onExpand }) {
  const [d, setD] = useState(null);
  useEffect(() => {
    let alive = true; setD(null);
    apiGet(`/api/trade-check/fibcheck?symbol=${encodeURIComponent(symbol)}&lookback=3m`)
      .then(x => { if (alive && x && !x.error) setD(x); }).catch(() => {});
    return () => { alive = false; };
  }, [symbol]);
  const ser = ((d && d.series) || []).filter(p => p.close != null);
  const W = 264, H = 74, PAD = 4;
  const wrap = kids => (
    <div style={{ minWidth: 280, background: C.bg, border: `1px solid ${C.gridLine}`, borderRadius: 10, padding: "10px 12px" }}>{kids}</div>
  );
  if (ser.length < 2) {
    return wrap(
      <React.Fragment>
        <div style={{ fontSize: 10, letterSpacing: ".08em", color: C.muted, textTransform: "uppercase" }}>Price · 3M</div>
        <div style={{ fontSize: 11, color: C.muted, padding: "20px 0", textAlign: "center" }}>{d ? "no price path" : "loading…"}</div>
      </React.Fragment>
    );
  }
  const closes = ser.map(p => p.close);
  const first = closes[0], last = closes[closes.length - 1];
  const ret = (first ? (last - first) / first * 100 : null);
  const col = ret == null ? C.muted : (ret >= 0 ? C.green : C.red);
  let lo = Math.min(...closes), hi = Math.max(...closes);
  const pad = (hi - lo) * 0.08 || 1; const ymin = lo - pad, ymax = hi + pad;
  const xF = i => PAD + i / (closes.length - 1) * (W - 2 * PAD);
  const yF = v => PAD + (ymax - v) / (ymax - ymin) * (H - 2 * PAD);
  const line = closes.map((v, i) => (i ? "L" : "M") + xF(i).toFixed(1) + " " + yF(v).toFixed(1)).join(" ");
  const area = "M" + xF(0).toFixed(1) + " " + (H - PAD) + " " + line.replace(/^M/, "L") + " L" + xF(closes.length - 1).toFixed(1) + " " + (H - PAD) + " Z";
  const iMin = closes.indexOf(lo), iMax = closes.indexOf(hi);
  return wrap(
    <React.Fragment>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <span style={{ fontSize: 10, letterSpacing: ".08em", color: C.muted, textTransform: "uppercase" }}>Price · 3M</span>
        {ret != null && <span style={{ fontSize: 11.5, fontWeight: 700, fontFamily: "monospace", color: col }}>{signFmt(ret, 1)}%</span>}
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: "100%", height: 74, display: "block" }}>
        <path d={area} fill={col} opacity="0.08" />
        <path d={line} fill="none" stroke={col} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
        <circle cx={xF(iMax).toFixed(1)} cy={yF(hi).toFixed(1)} r="2.2" fill={C.green} />
        <circle cx={xF(iMin).toFixed(1)} cy={yF(lo).toFixed(1)} r="2.2" fill={C.red} />
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 3 }}>
        <span style={{ fontSize: 9.5, fontFamily: "monospace", color: C.muted }}>L {fmt(lo, 1)} · H {fmt(hi, 1)}</span>
        <span onClick={onExpand} style={{ fontSize: 11, color: C.accent, cursor: "pointer" }}>expand</span>
      </div>
    </React.Fragment>
  );
}

// cc#518: FINANCIALS section -- screener.in-style horizontal tables (periods as columns, line
// items as rows, sticky first column, horizontal scroll). Data = fundamentals_history via
// build_financials_block() (gvm_company_report.py), already in the report payload (r.financials) --
// no second fetch. "Indians love screener because of this simplicity" (founder, 18-Jul-2026).
function _finFmt(v, unit) {
  if (v == null) return "—";
  if (unit === "eps") return fmt(v, 2);
  if (unit === "pct") return fmt(v, 1) + "%";
  return fmt(v, 0);   // "cr" | "days" | "count"
}

// cc#518 Part 2 (row-chart): renders from the SAME row.values the table cell renders -- no second
// fetch. Bar for absolute Rs rows, line for %/days/EPS rows; the TTM point (when present) renders
// visually distinct (gold, dashed baseline / hollow-ish ring) and labelled TTM on the x-axis.
function FinRowChart({ row, periods }) {
  const W = 640, H = 130, padL = 10, padR = 10, padT = 12, padB = 22;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const n = row.values.length;
  const vals = row.values.filter(v => v != null);
  if (!vals.length) return <div style={{ fontSize: 11, color: C.muted, padding: "6px 2px" }}>No data.</div>;
  const lo = Math.min(0, ...vals), hi = Math.max(...vals);
  const span = (hi - lo) || 1;
  const yAt = v => padT + plotH - ((v - lo) / span) * plotH;
  const xStep = plotW / n;
  const xAt = i => padL + xStep * i + xStep / 2;
  const isTtmCol = i => periods[i] === "TTM";

  const axis = (
    <React.Fragment>
      {periods.map((p, i) => (
        <text key={i} x={xAt(i)} y={H - 6} fontSize="8.5" fill={C.muted} textAnchor="middle">{p === "TTM" ? "TTM" : String(p).slice(0, 6)}</text>
      ))}
    </React.Fragment>
  );

  if (row.chart_type === "bar") {
    const bw = Math.min(26, xStep * 0.6);
    const y0 = yAt(0);
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
        <line x1={padL} x2={W - padR} y1={y0} y2={y0} stroke={C.gridLine} strokeWidth="1" />
        {row.values.map((v, i) => {
          if (v == null) return null;
          const ttm = isTtmCol(i);
          return <rect key={i} x={xAt(i) - bw / 2} y={Math.min(yAt(v), y0)} width={bw} height={Math.max(1, Math.abs(yAt(v) - y0))}
            fill={ttm ? C.gold + "55" : (v >= 0 ? C.accent + "85" : C.red + "85")}
            stroke={ttm ? C.gold : "none"} strokeWidth={ttm ? 1.3 : 0} strokeDasharray={ttm ? "3,2" : "0"} rx="2" />;
        })}
        {axis}
      </svg>
    );
  }
  // line chart -- segments break across null gaps rather than interpolating through missing data.
  const segs = [];
  let cur = [];
  row.values.forEach((v, i) => {
    if (v == null) { if (cur.length > 1) segs.push(cur); cur = []; return; }
    cur.push([xAt(i), yAt(v)]);
  });
  if (cur.length > 1) segs.push(cur);
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
      {segs.map((seg, si) => <path key={si} fill="none" stroke={C.accent} strokeWidth="1.8"
        d={"M" + seg.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(" L")} />)}
      {row.values.map((v, i) => {
        if (v == null) return null;
        const ttm = isTtmCol(i);
        return <circle key={i} cx={xAt(i)} cy={yAt(v)} r={ttm ? 4 : 2.5}
          fill={ttm ? C.gold : C.accent} stroke={ttm ? "#fff" : "none"} strokeWidth={ttm ? 1 : 0} />;
      })}
      {axis}
    </svg>
  );
}

// cc#541: OPERATIONAL METRICS — per-sector KPIs (NIM/GNPA/CASA for banks, volumes/realization
// for cement, etc) extracted from concalls + investor decks, from r.operational_metrics
// (build_ops_block). Honest empty state: renders nothing when has_data is false (never faked).
// QoQ/YoY deltas are shown in a NEUTRAL colour on purpose — "good/bad" direction differs per KPI
// (a falling GNPA is good, a falling NIM is bad) and the payload doesn't carry direction, so we
// never imply a judgment the data can't support.
function OpsMetricsSection({ ops }) {
  if (!ops || !ops.has_data || !ops.rows || !ops.rows.length) return null;
  const periods = ops.periods || [];
  const fmt = (v, unit) => {
    if (v === null || v === undefined) return "--";
    let n = v;
    if (typeof v === "number") n = (Math.abs(v) >= 100 ? v.toFixed(0) : (v.toFixed(2).replace(/\.?0+$/, "")));
    return unit === "%" ? n + "%" : (unit ? n + " " + unit : "" + n);
  };
  const delta = (d, unit) => {
    if (d === null || d === undefined) return <span style={{ color: C.muted }}>--</span>;
    const sign = d > 0 ? "+" : "";
    return <span style={{ color: C.text, fontWeight: 700, fontSize: 11 }}>{sign}{fmt(d, unit)}</span>;
  };
  return (
    <div id="operational" style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "20px 24px", marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
        <div style={{ fontSize: 17, fontWeight: 800, color: C.text }}>Operational Metrics</div>
        {ops.sector && <Tag color={C.muted}>{String(ops.sector).replace(/_/g, " ")}</Tag>}
      </div>
      <div style={{ fontSize: 11.5, color: C.muted, marginBottom: 16 }}>Sector KPIs extracted from management commentary (earnings calls &amp; investor decks). QoQ / YoY are vs the latest reported quarter.</div>
      <div style={{ overflowX: "auto", border: `1px solid ${C.border}`, borderRadius: 10 }}>
        <table style={{ borderCollapse: "collapse", width: "100%", minWidth: periods.length * 76 + 300, fontSize: 12.5 }}>
          <thead>
            <tr>
              <th style={{ position: "sticky", left: 0, background: C.card, zIndex: 2, textAlign: "left", padding: "8px 12px", borderBottom: `1px solid ${C.border}`, minWidth: 180, color: C.muted, fontSize: 10.5, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".04em" }}>Metric</th>
              {periods.map((p, i) => (
                <th key={i} style={{ padding: "8px 10px", textAlign: "right", borderBottom: `1px solid ${C.border}`, color: C.muted, fontWeight: 700, fontSize: 11, whiteSpace: "nowrap" }}>{p}</th>
              ))}
              <th style={{ padding: "8px 10px", textAlign: "right", borderBottom: `1px solid ${C.border}`, color: C.muted, fontWeight: 700, fontSize: 10.5 }}>QoQ</th>
              <th style={{ padding: "8px 10px", textAlign: "right", borderBottom: `1px solid ${C.border}`, color: C.muted, fontWeight: 700, fontSize: 10.5 }}>YoY</th>
            </tr>
          </thead>
          <tbody>
            {ops.rows.map(row => (
              <tr key={row.metric_name} style={{ borderBottom: `1px solid ${C.gridLine}` }}>
                <td style={{ position: "sticky", left: 0, background: C.card, zIndex: 1, padding: "7px 12px", whiteSpace: "nowrap", color: C.text, fontWeight: 600 }}>{row.label}</td>
                {row.values.map((v, i) => (
                  <td key={i} style={{ padding: "7px 10px", textAlign: "right", fontFamily: "monospace",
                    color: i === row.values.length - 1 ? C.text : C.muted, fontWeight: i === row.values.length - 1 ? 700 : 500 }}>{fmt(v, row.unit)}</td>
                ))}
                <td style={{ padding: "7px 10px", textAlign: "right", fontFamily: "monospace" }}>{delta(row.qoq, row.unit)}</td>
                <td style={{ padding: "7px 10px", textAlign: "right", fontFamily: "monospace" }}>{delta(row.yoy, row.unit)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {ops.concall && (ops.concall.summary || ops.concall.guidance) && (
        <div style={{ marginTop: 16, padding: "12px 14px", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: C.text, marginBottom: 6 }}>
            Earnings Call{ops.concall.quarter ? " — " + ops.concall.quarter : ""}{ops.concall.tone ? " · " + ops.concall.tone : ""}
          </div>
          {ops.concall.summary && <div style={{ fontSize: 12, color: C.muted, whiteSpace: "pre-wrap", lineHeight: 1.55 }}>{ops.concall.summary}</div>}
          {ops.concall.guidance && <div style={{ fontSize: 12, color: C.text, marginTop: 8 }}><b>Guidance:</b> {ops.concall.guidance}</div>}
        </div>
      )}
    </div>
  );
}

function _timeAgo(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  if (isNaN(d.getTime())) return "";
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return "just now";
  const m = Math.floor(s / 60); if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60); if (h < 24) return `${h}h ago`;
  const dd = Math.floor(h / 24); if (dd < 30) return `${dd}d ago`;
  const mo = Math.floor(dd / 30); return `${mo}mo ago`;
}

// cc#210: minimal, XSS-safe markdown renderer (AI Editorials use ### headers, bullets,
// **bold**). Builds React elements — never dangerouslySetInnerHTML.
function _mdInline(text) {
  return String(text).split(/(\*\*[^*]+\*\*)/g).map((p, i) =>
    /^\*\*[^*]+\*\*$/.test(p) ? <strong key={i}>{p.slice(2, -2)}</strong> : p);
}
function renderMd(text, C) {
  const lines = String(text || "").replace(/\r/g, "").split("\n");
  const out = []; let list = null; let k = 0;
  const flush = () => { if (list) { out.push(<ul key={"u" + k++} style={{ margin: "6px 0 6px 18px", padding: 0 }}>{list}</ul>); list = null; } };
  lines.forEach(raw => {
    const line = raw.trim();
    if (!line) { flush(); return; }
    let m;
    if ((m = line.match(/^(#{1,4})\s+(.*)$/))) {
      flush(); const lvl = m[1].length, fs = lvl <= 1 ? 15.5 : lvl === 2 ? 14.5 : 13.5;
      out.push(<div key={k++} style={{ fontSize: fs, fontWeight: 800, color: C.text, margin: "11px 0 4px" }}>{_mdInline(m[2])}</div>);
    } else if ((m = line.match(/^[-*]\s+(.*)$/))) {
      if (!list) list = [];
      list.push(<li key={"li" + k++} style={{ marginBottom: 3, lineHeight: 1.55 }}>{_mdInline(m[1])}</li>);
    } else {
      flush(); out.push(<p key={k++} style={{ margin: "6px 0", lineHeight: 1.6 }}>{_mdInline(line)}</p>);
    }
  });
  flush();
  return out;
}
