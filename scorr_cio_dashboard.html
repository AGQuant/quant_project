<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scorr CIO Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  html,body{margin:0;padding:0;background:#0a0d14;min-height:100vh;}
  *{box-sizing:border-box;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const API = "https://quantproject-production.up.railway.app";
const MCP = `${API}/mcp`;

async function mcpCall(tool, args = {}) {
  const r = await fetch(MCP, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ jsonrpc: "2.0", id: 1, method: "tools/call", params: { name: tool, arguments: args } }),
  });
  const j = await r.json();
  const raw = j?.result?.content?.[0]?.text;
  try { return JSON.parse(raw); } catch { return raw; }
}

const C = {
  bg: "#0a0d14", card: "#0f1420", border: "#1e2540",
  accent: "#00d4ff", gold: "#f0b429", green: "#22c55e",
  red: "#ef4444", orange: "#f97316", purple: "#a855f7",
  text: "#e2e8f0", muted: "#64748b", gridLine: "#151b2e",
};

const MODULES = [
  { id: "v8",     icon: "⇄", label: "V8 Long-Short",       sub: "Futures · 5 Baskets",          color: C.accent,  desc: "Live paper engine · Mood gate · Pivots" },
  { id: "gvm",    icon: "▦", label: "GVM Scoring",         sub: "1,762 stocks · Daily",         color: C.gold,    desc: "Growth · Value · Momentum · Peer-relative" },
  { id: "sector", icon: "◉", label: "Sector Intelligence", sub: "129 segments · mcap-weighted", color: C.purple,  desc: "Rotation map · Top picks by sector" },
  { id: "qb",     icon: "⌂", label: "Quant Basket",        sub: "4 Baskets · Equity",           color: C.green,   desc: "Buy-and-hold · GVM screened · Thematic" },
  { id: "health", icon: "◷", label: "Portfolio Health",    sub: "Score card · Risk",            color: C.orange,  desc: "Winners · Losers · Quality · Valuation" },
  { id: "v10",    icon: "⟁", label: "Nifty Options V10",   sub: "ST + EMA · Advisory",          color: "#ec4899", desc: "SuperTrend 150/3 · EMA 3/10 Gate" },
];

const fmt = (n, d = 0) => n == null ? "—" : Number(n).toLocaleString("en-IN", { maximumFractionDigits: d, minimumFractionDigits: d });
const pct = (n, d = 1) => n == null ? "—" : `${n > 0 ? "+" : ""}${Number(n).toFixed(d)}%`;
const pnlColor = (n) => n > 0 ? C.green : n < 0 ? C.red : C.muted;
const gvmColor = (g) => g >= 8 ? C.green : g >= 7 ? C.gold : g >= 6 ? C.orange : C.red;
const verdictColor = (v = "") => ({ "Strong Buy": C.green, "Buy": "#86efac", "Watch": C.gold, "Exit": C.red }[v] || C.muted);
const moodColor = (m = "") => ({ "Bullish": C.green, "Bearish": C.red, "Neutral": C.gold, "Strong Bullish": "#22ff88" }[m] || C.gold);

function Loader() {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "60px", gap: 12 }}>
      <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent, animation: "pulse 1s ease-in-out infinite" }} />
      <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent, animation: "pulse 1s ease-in-out .2s infinite" }} />
      <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent, animation: "pulse 1s ease-in-out .4s infinite" }} />
    </div>
  );
}

function Tag({ children, color = C.accent }) {
  return (
    <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", color, background: color + "20", border: `1px solid ${color}40`, borderRadius: 4, padding: "2px 7px", textTransform: "uppercase" }}>
      {children}
    </span>
  );
}

function StatBox({ label, value, sub, color = C.text }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "14px 18px" }}>
      <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 20, fontWeight: 700, color, fontFamily: "monospace" }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: C.muted, marginTop: 3 }}>{sub}</div>}
    </div>
  );
}

function ScoreBar({ label, score, color }) {
  const w = Math.max(0, Math.min(100, (score / 10) * 100));
  const c = color || gvmColor(score);
  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: C.muted }}>{label}</span>
        <span style={{ fontSize: 12, fontWeight: 700, color: c, fontFamily: "monospace" }}>{Number(score).toFixed(2)}</span>
      </div>
      <div style={{ height: 5, background: C.border, borderRadius: 3 }}>
        <div style={{ height: "100%", width: `${w}%`, background: c, borderRadius: 3, transition: "width 0.6s ease" }} />
      </div>
    </div>
  );
}

function SectionHeader({ title, sub, color = C.accent }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, paddingBottom: 12, borderBottom: `1px solid ${C.border}` }}>
      <div>
        <div style={{ fontSize: 14, fontWeight: 700, color, letterSpacing: "0.05em" }}>{title}</div>
        {sub && <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{sub}</div>}
      </div>
    </div>
  );
}

function Table({ cols, rows, emptyMsg = "No data" }) {
  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
        <thead>
          <tr>
            {cols.map(c => (
              <th key={c.key} style={{ textAlign: c.align || "left", padding: "8px 10px", color: C.muted, fontWeight: 600, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", borderBottom: `1px solid ${C.border}`, whiteSpace: "nowrap" }}>
                {c.label}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.length === 0 ? (
            <tr><td colSpan={cols.length} style={{ textAlign: "center", padding: 24, color: C.muted }}>{emptyMsg}</td></tr>
          ) : rows.map((row, i) => (
            <tr key={i} style={{ borderBottom: `1px solid ${C.gridLine}` }}>
              {cols.map(c => (
                <td key={c.key} style={{ padding: "9px 10px", color: c.color ? c.color(row) : C.text, textAlign: c.align || "left", fontFamily: c.mono ? "monospace" : "inherit", whiteSpace: "nowrap" }}>
                  {c.render ? c.render(row) : row[c.key]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function V8Module() {
  const [mood, setMood] = useState(null);
  const [paper, setPaper] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("open");

  useEffect(() => {
    Promise.all([mcpCall("v8_market_mood"), mcpCall("paper_status")])
      .then(([m, p]) => { setMood(m); setPaper(p); })
      .finally(() => setLoading(false));
  }, []);

  if (loading) return <Loader />;

  const trades = paper?.recent_trades || [];
  const opens = paper?.open_positions || [];
  const s = paper?.summary || {};
  const winRate = s.trades ? ((s.wins / s.trades) * 100).toFixed(0) : 0;

  const positionCols = [
    { key: "symbol", label: "Symbol", color: () => C.accent },
    { key: "side", label: "Side", render: r => <Tag color={r.side === "LONG" ? C.green : C.red}>{r.side}</Tag> },
    { key: "basket", label: "Basket", color: () => C.muted, render: r => r.basket?.replace(/_/g, " ").toUpperCase() },
    { key: "entry_price", label: "Entry", mono: true },
    { key: "cmp", label: "CMP", mono: true },
    { key: "unrealised_pnl", label: "Unreal P&L", mono: true, color: r => pnlColor(r.unrealised_pnl), render: r => `₹${fmt(r.unrealised_pnl)}` },
    { key: "target", label: "Target", mono: true },
    { key: "stop_loss", label: "SL", mono: true, color: () => C.red },
  ];

  const tradeCols = [
    { key: "symbol", label: "Symbol", color: () => C.accent },
    { key: "side", label: "Side", render: r => <Tag color={r.side === "LONG" ? C.green : C.red}>{r.side}</Tag> },
    { key: "result", label: "Result", render: r => <Tag color={r.result?.includes("SL") ? C.red : C.green}>{r.result?.replace(/_/g, " ")}</Tag> },
    { key: "entry_price", label: "Entry", mono: true },
    { key: "exit_price", label: "Exit", mono: true },
    { key: "pnl", label: "P&L", mono: true, color: r => pnlColor(r.pnl), render: r => `₹${fmt(r.pnl)}` },
    { key: "return_pct", label: "Return", mono: true, color: r => pnlColor(r.return_pct), render: r => pct(r.return_pct) },
    { key: "entry_ts", label: "Entry Date", color: () => C.muted, render: r => r.entry_ts?.slice(0, 10) },
  ];

  return (
    <div>
      <div style={{ background: `${moodColor(mood?.mood)}15`, border: `1px solid ${moodColor(mood?.mood)}40`, borderRadius: 10, padding: "16px 20px", marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 10, height: 10, borderRadius: "50%", background: moodColor(mood?.mood), boxShadow: `0 0 12px ${moodColor(mood?.mood)}` }} />
          <span style={{ fontSize: 18, fontWeight: 800, color: moodColor(mood?.mood), letterSpacing: "0.05em" }}>{mood?.mood?.toUpperCase()}</span>
          <span style={{ color: C.muted, fontSize: 13 }}>Market · {mood?.fails} gate fail{mood?.fails !== 1 ? "s" : ""}</span>
        </div>
        <div style={{ display: "flex", gap: 12 }}>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: C.green }}>{mood?.buy_slots}</div>
            <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase" }}>Buy Slots</div>
          </div>
          <div style={{ width: 1, background: C.border }} />
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: C.red }}>{mood?.sell_slots}</div>
            <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase" }}>Sell Slots</div>
          </div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 20 }}>
        {mood?.checks?.map(c => (
          <div key={c.filter} style={{ background: C.card, border: `1px solid ${c.pass ? C.green + "40" : C.red + "40"}`, borderRadius: 8, padding: "12px 14px" }}>
            <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>{c.filter}</div>
            <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "monospace", color: c.pass ? C.green : C.red }}>{Number(c.value).toFixed(2)}</div>
            <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>need {c.required}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10, marginBottom: 20 }}>
        <StatBox label="Open" value={opens.length} sub="positions" color={C.accent} />
        <StatBox label="Total Trades" value={s.trades || 0} color={C.text} />
        <StatBox label="Win Rate" value={`${winRate}%`} color={winRate >= 60 ? C.green : C.gold} />
        <StatBox label="Net P&L" value={`₹${fmt(s.total_pnl)}`} color={pnlColor(s.total_pnl)} />
        <StatBox label="Avg Return" value={pct(s.avg_ret)} color={pnlColor(s.avg_ret)} />
      </div>

      <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
        {[["open", `Open (${opens.length})`], ["trades", `Closed (${trades.length})`]].map(([id, lbl]) => (
          <button key={id} onClick={() => setTab(id)} style={{ padding: "7px 16px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, background: tab === id ? C.accent : C.border, color: tab === id ? "#000" : C.muted }}>
            {lbl}
          </button>
        ))}
      </div>

      {tab === "open"
        ? <Table cols={positionCols} rows={opens} emptyMsg="No open positions" />
        : <Table cols={tradeCols} rows={trades} emptyMsg="No recent trades" />}
    </div>
  );
}

function GVMModule() {
  const [stocks, setStocks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("Strong Buy");

  useEffect(() => {
    setLoading(true);
    mcpCall("get_top_stocks", { n: 20, verdict: filter })
      .then(d => setStocks(Array.isArray(d) ? d : []))
      .finally(() => setLoading(false));
  }, [filter]);

  const verdicts = ["Strong Buy", "Buy", "Watch", "Exit"];
  const verdictDist = { "Strong Buy": 52, "Buy": 281, "Watch": 546, "Exit": 883 };

  const cols = [
    { key: "rank", label: "#", color: () => C.muted },
    { key: "symbol", label: "Symbol", color: () => C.accent },
    { key: "company_name", label: "Company", color: () => C.text, render: r => r.company_name?.slice(0, 22) },
    { key: "segment", label: "Segment", color: () => C.muted, render: r => r.segment?.slice(0, 22) },
    { key: "gvm_score", label: "GVM", mono: true, color: r => gvmColor(r.gvm_score), render: r => Number(r.gvm_score).toFixed(2) },
    { key: "g_score", label: "G", mono: true, color: r => gvmColor(r.g_score), render: r => Number(r.g_score).toFixed(2) },
    { key: "v_score", label: "V", mono: true, color: r => gvmColor(r.v_score), render: r => Number(r.v_score).toFixed(2) },
    { key: "m_score", label: "M", mono: true, color: r => gvmColor(r.m_score), render: r => Number(r.m_score).toFixed(2) },
    { key: "verdict", label: "Verdict", render: r => <Tag color={verdictColor(r.verdict)}>{r.verdict}</Tag> },
    { key: "market_cap", label: "MCap Cr", mono: true, color: () => C.muted, render: r => fmt(r.market_cap, 0) },
  ];

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 20 }}>
        {verdicts.map(v => (
          <div key={v} style={{ background: C.card, border: `1px solid ${verdictColor(v)}40`, borderRadius: 8, padding: "14px 16px", cursor: "pointer" }} onClick={() => setFilter(v)}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 4 }}>{v}</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: verdictColor(v), fontFamily: "monospace" }}>{verdictDist[v]}</div>
            <div style={{ fontSize: 10, color: C.muted }}>stocks</div>
          </div>
        ))}
      </div>

      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "14px 18px", marginBottom: 20, display: "flex", gap: 24, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ fontSize: 12, color: C.muted }}>Formula</div>
        {["G — Growth (screener_raw)", "V — Value (PE vs peer · Upside)", "M — Momentum (price · DMA · RSI)"].map(f => (
          <div key={f} style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: C.gold }} />
            <span style={{ fontSize: 12, color: C.text }}>{f}</span>
          </div>
        ))}
        <div style={{ marginLeft: "auto", fontFamily: "monospace", fontSize: 13, color: C.gold }}>GVM = (G + V + M) / 3</div>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
        {verdicts.map(v => (
          <button key={v} onClick={() => setFilter(v)} style={{ padding: "6px 14px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, background: filter === v ? verdictColor(v) + "30" : C.border, color: filter === v ? verdictColor(v) : C.muted, borderLeft: filter === v ? `3px solid ${verdictColor(v)}` : "3px solid transparent" }}>
            {v}
          </button>
        ))}
      </div>

      {loading ? <Loader /> : <Table cols={cols} rows={stocks.map((r, i) => ({ ...r, rank: i + 1 }))} emptyMsg="No stocks" />}
    </div>
  );
}

function SectorModule() {
  const [sectors, setSectors] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("all");

  useEffect(() => {
    mcpCall("get_sector_rating")
      .then(d => setSectors(Array.isArray(d) ? d : []))
      .finally(() => setLoading(false));
  }, []);

  const verdicts = ["all", "Buy", "Watch", "Exit"];
  const filtered = filter === "all" ? sectors : sectors.filter(s => s.verdict === filter);
  const topBuy = sectors.filter(s => s.verdict === "Buy").slice(0, 3);
  const topExit = [...sectors].filter(s => s.verdict === "Exit").reverse().slice(0, 3);

  const cols = [
    { key: "rank", label: "#", color: () => C.muted },
    { key: "segment", label: "Segment", color: () => C.text },
    { key: "mcap_weighted_gvm", label: "GVM (mcap)", mono: true, color: r => gvmColor(r.mcap_weighted_gvm), render: r => Number(r.mcap_weighted_gvm).toFixed(2) },
    { key: "avg_gvm", label: "GVM (avg)", mono: true, color: r => gvmColor(r.avg_gvm), render: r => Number(r.avg_gvm).toFixed(2) },
    { key: "stock_count", label: "Stocks", mono: true, color: () => C.muted },
    { key: "verdict", label: "Verdict", render: r => <Tag color={verdictColor(r.verdict)}>{r.verdict}</Tag> },
    { key: "top_stock", label: "Top Stock", color: () => C.accent },
    { key: "top_stock_gvm", label: "Top GVM", mono: true, color: r => gvmColor(r.top_stock_gvm), render: r => Number(r.top_stock_gvm).toFixed(2) },
  ];

  if (loading) return <Loader />;

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
        <div style={{ background: C.card, border: `1px solid ${C.green}30`, borderRadius: 10, padding: "16px 18px" }}>
          <div style={{ fontSize: 11, color: C.green, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>⬆ Top Buy Sectors</div>
          {topBuy.map((s, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: i < 2 ? `1px solid ${C.gridLine}` : "none" }}>
              <div>
                <div style={{ fontSize: 12, color: C.text }}>{s.segment}</div>
                <div style={{ fontSize: 10, color: C.muted }}>{s.stock_count} stocks · Top: {s.top_stock}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: C.green, fontFamily: "monospace" }}>{Number(s.mcap_weighted_gvm).toFixed(2)}</div>
                <div style={{ fontSize: 10, color: C.muted }}>mcap GVM</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ background: C.card, border: `1px solid ${C.red}30`, borderRadius: 10, padding: "16px 18px" }}>
          <div style={{ fontSize: 11, color: C.red, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>⬇ Weakest Sectors</div>
          {topExit.map((s, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: i < 2 ? `1px solid ${C.gridLine}` : "none" }}>
              <div>
                <div style={{ fontSize: 12, color: C.text }}>{s.segment}</div>
                <div style={{ fontSize: 10, color: C.muted }}>{s.stock_count} stocks · Top: {s.top_stock}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: C.red, fontFamily: "monospace" }}>{Number(s.mcap_weighted_gvm).toFixed(2)}</div>
                <div style={{ fontSize: 10, color: C.muted }}>mcap GVM</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        {verdicts.map(v => {
          const count = v === "all" ? sectors.length : sectors.filter(s => s.verdict === v).length;
          return (
            <button key={v} onClick={() => setFilter(v)} style={{ padding: "7px 16px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, background: filter === v ? (v === "all" ? C.accent : verdictColor(v)) + "30" : C.border, color: filter === v ? (v === "all" ? C.accent : verdictColor(v)) : C.muted }}>
              {v === "all" ? `All (${count})` : `${v} (${count})`}
            </button>
          );
        })}
      </div>

      <Table cols={cols} rows={filtered.map((r, i) => ({ ...r, rank: i + 1 }))} emptyMsg="No sectors" />
    </div>
  );
}

function QBModule() {
  const [positions, setPositions] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    mcpCall("qb_positions", {})
      .then(d => setPositions(Array.isArray(d) ? d : []))
      .finally(() => setLoading(false));
  }, []);

  if (loading) return <Loader />;

  const totalCost = positions.reduce((a, p) => a + p.cost_basis, 0);
  const totalValue = positions.reduce((a, p) => a + p.current_value, 0);
  const totalPnl = positions.reduce((a, p) => a + p.pnl, 0);
  const totalPnlPct = totalCost ? (totalPnl / totalCost) * 100 : 0;
  const winners = positions.filter(p => p.pnl > 0).length;
  const losers = positions.filter(p => p.pnl < 0).length;
  const wlRatio = losers ? (winners / losers).toFixed(2) : "—";
  const avgGvm = positions.length ? (positions.reduce((a, p) => a + (p.gvm || 0), 0) / positions.length).toFixed(2) : "—";
  const atRisk = positions.filter(p => p.pnl_pct <= -8);

  const cols = [
    { key: "symbol", label: "Symbol", color: () => C.accent },

function HealthModule() {
  const [positions, setPositions] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    mcpCall("qb_positions", {})
      .then(d => setPositions(Array.isArray(d) ? d : []))
      .finally(() => setLoading(false));
  }, []);

  if (loading) return <Loader />;

  const totalCost = positions.reduce((a, p) => a + p.cost_basis, 0);
  const totalPnl = positions.reduce((a, p) => a + p.pnl, 0);
  const totalPnlPct = totalCost ? (totalPnl / totalCost) * 100 : 0;
  const winners = positions.filter(p => p.pnl > 0);
  const losers = positions.filter(p => p.pnl < 0);
  const avgGvm = positions.length ? (positions.reduce((a, p) => a + (p.gvm || 0), 0) / positions.length) : 0;
  const qualityScore = parseFloat((avgGvm / 10 * 10).toFixed(1));
  const returnScore = parseFloat(Math.min(10, Math.max(0, 5 + totalPnlPct)).toFixed(1));
  const diversScore = parseFloat(Math.min(10, positions.length / 15 * 10).toFixed(1));
  const overallHealth = ((qualityScore + returnScore + diversScore) / 3).toFixed(1);
  const healthLabel = parseFloat(overallHealth) >= 7 ? "Good" : parseFloat(overallHealth) >= 5 ? "Healthy" : "Needs Attention";
  const healthColor = parseFloat(overallHealth) >= 7 ? C.green : parseFloat(overallHealth) >= 5 ? C.gold : C.red;
  const topGainers = [...positions].sort((a, b) => b.pnl_pct - a.pnl_pct).slice(0, 4);
  const topLosers = [...positions].sort((a, b) => a.pnl_pct - b.pnl_pct).slice(0, 4);

  return (
    <div>
      <div style={{ background: C.card, border: `1px solid ${healthColor}40`, borderRadius: 12, padding: "20px 24px", marginBottom: 20, display: "flex", gap: 32, alignItems: "center", flexWrap: "wrap" }}>

          <ScoreBar label="Diversification" score={diversScore} color={C.accent} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <StatBox label="Invested" value={`₹${fmt(totalCost / 100000, 1)}L`} color={C.muted} />
          <StatBox label="P&L" value={`₹${fmt(totalPnl)}`} color={pnlColor(totalPnl)} />
          <StatBox label="Advance" value={winners.length} color={C.green} />
          <StatBox label="Decline" value={losers.length} color={C.red} />

      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "14px 18px", marginBottom: 20 }}>

          { ok: totalPnlPct >= 0, msg: `Portfolio return ${pct(totalPnlPct)} since entry` },

        </div>
      </div>

      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "24px 24px 0" }}>
        {page === "home"
          ? summaryLoading ? <Loader /> : <HomePage onNavigate={setPage} summaryData={summaryData} />
          : <InnerPage moduleId={page} onBack={() => setPage("home")} />
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
