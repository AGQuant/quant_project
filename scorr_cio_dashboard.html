<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V8 Model</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  html,body{margin:0;padding:0;background:#0a0d14;min-height:100vh;}
  *{box-sizing:border-box;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = "https://quantproject-production.up.railway.app";
const MCP = `${API}/mcp`;

async function mcpCall(tool, args = {}) {
  const r = await fetch(MCP, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ jsonrpc: "2.0", id: 1, method: "tools/call", params: { name: tool, arguments: args } }),
  });
  const j = await r.json();
  const raw = j?.result?.content?.[0]?.text;
  try { return JSON.parse(raw); } catch { return raw; }
}

async function apiGet(path) {
  const r = await fetch(`${API}${path}`);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

const C = {
  bg: "#0a0d14", card: "#0f1420", border: "#1e2540",
  accent: "#00d4ff", gold: "#f0b429", green: "#22c55e",
  red: "#ef4444", orange: "#f97316", purple: "#a855f7",
  text: "#e2e8f0", muted: "#64748b", gridLine: "#151b2e",
};

const MODELS = [
  { id: "v8",     icon: "⇄", label: "V8 Long-Short",       sub: "Futures · 5 Baskets",   color: C.accent,  live: true,  desc: "Live paper engine · Mood gate · Pivots" },
  { id: "gvm",    icon: "▦", label: "GVM Scoring",         sub: "1,762 stocks · Peer-rel", color: C.gold,    live: true,  desc: "Search any company · Full peer-benchmark report" },
  { id: "sector", icon: "◉", label: "Sector Intelligence", sub: "129 segments",          color: C.purple,  live: false, desc: "Rotation map · Coming soon" },
  { id: "qb",     icon: "⌂", label: "Quant Basket",        sub: "4 Baskets · Equity",    color: C.green,   live: false, desc: "Buy-and-hold · Coming soon" },
  { id: "health", icon: "◷", label: "Portfolio Health",    sub: "Score card · Risk",     color: C.orange,  live: false, desc: "Winners · Losers · Coming soon" },
  { id: "v10",    icon: "⟁", label: "Nifty Options V10",   sub: "ST + EMA · Advisory",   color: "#ec4899", live: false, desc: "SuperTrend + EMA · Coming soon" },
];

const fmt = (n, d = 0) => n == null ? "—" : Number(n).toLocaleString("en-IN", { maximumFractionDigits: d, minimumFractionDigits: d });
const pct = (n, d = 1) => n == null ? "—" : `${n > 0 ? "+" : ""}${Number(n).toFixed(d)}%`;
const gvmColor = (g) => g == null ? C.muted : g >= 8 ? C.green : g >= 7 ? C.gold : g >= 6 ? C.orange : C.red;
const ratingColor = (r) => r == null ? C.muted : r >= 7 ? C.green : r >= 5 ? C.gold : C.red;
const verdictColor = (v = "") => ({ "Strong Buy": C.green, "Buy": "#86efac", "Watch": C.gold, "Exit": C.red }[v] || C.muted);

function Loader({ msg }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "60px", gap: 14 }}>
      <div style={{ display: "flex", gap: 10 }}>
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent, animation: "pulse 1s ease-in-out infinite" }} />
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent, animation: "pulse 1s ease-in-out .2s infinite" }} />
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent, animation: "pulse 1s ease-in-out .4s infinite" }} />
      </div>
      {msg && <div style={{ fontSize: 12, color: C.muted }}>{msg}</div>}
    </div>
  );
}

function Tag({ children, color = C.accent }) {
  return (
    <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", color, background: color + "20", border: `1px solid ${color}40`, borderRadius: 4, padding: "2px 7px", textTransform: "uppercase" }}>{children}</span>
  );
}

// ── V8: iframe original dashboard ────────────────────────────────────────────
function V8Module() {
  return (
    <div>
      <div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>
        Original V8 dashboard — live from <span style={{ fontFamily: "monospace", color: C.accent }}>/dashboard</span>
      </div>
      <div style={{ borderRadius: 12, overflow: "hidden", border: `1px solid ${C.border}`, background: C.card }}>
        <iframe
          src={`${API}/dashboard`}
          title="V8 Dashboard"
          style={{ width: "100%", height: "calc(100vh - 200px)", minHeight: 600, border: "none", display: "block", background: "#fff" }}
        />
      </div>
    </div>
  );
}

// ── GVM: search + full company report ────────────────────────────────────────
function GvmModule() {
  const [query, setQuery] = useState("");
  const [suggest, setSuggest] = useState([]);
  const [showSug, setShowSug] = useState(false);
  const [symbol, setSymbol] = useState(null);
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const boxRef = useRef(null);
  const debounce = useRef(null);

  // autocomplete
  useEffect(() => {
    if (!query || query.length < 1) { setSuggest([]); return; }
    clearTimeout(debounce.current);
    debounce.current = setTimeout(async () => {
      try {
        const d = await apiGet(`/api/gvm/search?q=${encodeURIComponent(query)}&limit=8`);
        setSuggest(d.results || []); setShowSug(true);
      } catch { setSuggest([]); }
    }, 180);
    return () => clearTimeout(debounce.current);
  }, [query]);

  useEffect(() => {
    const h = (e) => { if (boxRef.current && !boxRef.current.contains(e.target)) setShowSug(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const loadReport = async (sym) => {
    setSymbol(sym); setShowSug(false); setQuery(sym); setLoading(true); setErr(null); setReport(null);
    try {
      const d = await apiGet(`/api/gvm/company/${encodeURIComponent(sym)}`);
      setReport(d);
    } catch (e) { setErr(`Could not load ${sym}. Try another symbol.`); }
    finally { setLoading(false); }
  };

  return (
    <div>
      {/* Search bar */}
      <div ref={boxRef} style={{ position: "relative", maxWidth: 520, margin: "0 auto 24px" }}>
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ position: "relative", flex: 1 }}>
            <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: C.muted, fontSize: 15 }}>⌕</span>
            <input
              value={query}
              onChange={e => setQuery(e.target.value.toUpperCase())}
              onFocus={() => suggest.length && setShowSug(true)}
              onKeyDown={e => { if (e.key === "Enter" && suggest[0]) loadReport(suggest[0].symbol); }}
              placeholder="Search any company — e.g. TCS, RELIANCE, HDFCBANK"
              style={{ width: "100%", padding: "12px 14px 12px 38px", borderRadius: 10, border: `1px solid ${C.border}`, background: C.card, color: C.text, fontSize: 14, outline: "none" }}
            />
          </div>
          <button onClick={() => suggest[0] && loadReport(suggest[0].symbol)}
            style={{ padding: "0 20px", borderRadius: 10, border: "none", background: C.gold, color: "#000", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
            Search
          </button>
        </div>
        {showSug && suggest.length > 0 && (
          <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden", zIndex: 50, boxShadow: "0 8px 24px rgba(0,0,0,0.5)" }}>
            {suggest.map(s => (
              <div key={s.symbol} onClick={() => loadReport(s.symbol)}
                style={{ padding: "10px 14px", cursor: "pointer", borderBottom: `1px solid ${C.gridLine}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}
                onMouseEnter={e => e.currentTarget.style.background = C.border}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <div>
                  <span style={{ fontSize: 13, fontWeight: 700, color: C.accent }}>{s.symbol}</span>
                  <span style={{ fontSize: 12, color: C.muted, marginLeft: 8 }}>{s.company_name}</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: gvmColor(s.gvm_score), fontFamily: "monospace" }}>{s.gvm_score?.toFixed(2)}</span>
                  <Tag color={verdictColor(s.verdict)}>{s.verdict}</Tag>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {!symbol && !loading && <GvmEmptyState onPick={loadReport} />}
      {loading && <Loader msg={`Building ${symbol} peer-benchmark report…`} />}
      {err && <div style={{ textAlign: "center", color: C.red, padding: 24 }}>{err}</div>}
      {report && !loading && <GvmReport r={report} />}
    </div>
  );
}

function GvmEmptyState({ onPick }) {
  const [top, setTop] = useState([]);
  useEffect(() => { mcpCall("get_top_stocks", { n: 8, verdict: "Strong Buy" }).then(d => setTop(Array.isArray(d) ? d : [])); }, []);
  return (
    <div style={{ textAlign: "center", padding: "20px 0" }}>
      <div style={{ fontSize: 13, color: C.muted, marginBottom: 16 }}>Search a company above, or start with a top-rated pick:</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", maxWidth: 700, margin: "0 auto" }}>
        {top.map(s => (
          <button key={s.symbol} onClick={() => onPick(s.symbol)}
            style={{ padding: "8px 14px", borderRadius: 8, border: `1px solid ${C.gold}40`, background: C.card, cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accent }}>{s.symbol}</span>
            <span style={{ fontSize: 12, fontWeight: 700, color: gvmColor(s.gvm_score), fontFamily: "monospace" }}>{Number(s.gvm_score).toFixed(2)}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function BenchRow({ b }) {
  const compW = b.peer_avg != null && b.company != null
    ? Math.min(100, Math.max(4, (b.rating ?? 5) * 10)) : 0;
  return (
    <div style={{ padding: "10px 0", borderBottom: `1px solid ${C.gridLine}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
        <span style={{ fontSize: 12, color: C.text }}>{b.label}</span>
        <span style={{ fontSize: 11, color: C.muted }}>
          Rank {b.rank ?? "—"}/{b.peer_n} · <span style={{ color: ratingColor(b.rating), fontWeight: 700 }}>{b.rating != null ? b.rating.toFixed(1) : "—"}</span>
        </span>
      </div>
      <div style={{ position: "relative", height: 22, background: C.bg, borderRadius: 5, border: `1px solid ${C.gridLine}` }}>
        <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, width: `${compW}%`, background: `${ratingColor(b.rating)}30`, borderRight: `2px solid ${ratingColor(b.rating)}`, borderRadius: 5, transition: "width .5s ease" }} />
        <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, right: 0, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 8px" }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: C.text, fontFamily: "monospace" }}>
            {b.company != null ? `${b.company.toFixed(2)}${b.unit}` : "—"}
          </span>
          <span style={{ fontSize: 10, color: C.muted, fontFamily: "monospace" }}>
            peer {b.peer_avg != null ? `${b.peer_avg.toFixed(2)}${b.unit}` : "—"}
          </span>
        </div>
      </div>
    </div>
  );
}

function GvmReport({ r }) {
  const s = r.scores || {};
  const vc = verdictColor(r.verdict);
  const groupsOrder = ["Trackrecord", "Valuation", "Reliability", "Technicals", "Outlook"];
  const byGroup = {};
  (r.benchmark || []).forEach(b => { (byGroup[b.group] = byGroup[b.group] || []).push(b); });

  return (
    <div>
      {/* Header card */}
      <div style={{ background: C.card, border: `1px solid ${vc}40`, borderRadius: 12, padding: "20px 24px", marginBottom: 16, display: "flex", gap: 28, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ textAlign: "center", minWidth: 120 }}>
          <div style={{ fontSize: 52, fontWeight: 900, color: gvmColor(s.gvm), fontFamily: "monospace", lineHeight: 1 }}>{s.gvm?.toFixed(2)}</div>
          <div style={{ fontSize: 11, color: C.muted, margin: "4px 0 6px" }}>GVM Score</div>
          <Tag color={vc}>{r.verdict}</Tag>
        </div>
        <div style={{ flex: 1, minWidth: 220 }}>
          <div style={{ fontSize: 20, fontWeight: 800, color: C.text }}>{r.company_name}</div>
          <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>
            {r.symbol} · {r.segment} · Rank {r.segment_rank}/{r.segment_total} in segment
          </div>
          <div style={{ display: "flex", gap: 16, marginTop: 12, flexWrap: "wrap" }}>
            {[["G — Growth", s.g], ["V — Value", s.v], ["M — Momentum", s.m]].map(([lbl, val]) => (
              <div key={lbl}>
                <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase" }}>{lbl}</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: gvmColor(val), fontFamily: "monospace" }}>{val?.toFixed(2)}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ textAlign: "right", minWidth: 130 }}>
          <div style={{ fontSize: 11, color: C.muted }}>CMP</div>
          <div style={{ fontSize: 22, fontWeight: 700, color: C.text, fontFamily: "monospace" }}>₹{fmt(r.price, 1)}</div>
          <div style={{ fontSize: 11, color: C.muted, marginTop: 6 }}>MCap ₹{fmt(r.market_cap / 100, 0)} Cr</div>
          {r.mcap_rank && <div style={{ fontSize: 11, color: C.muted }}>MCap rank #{r.mcap_rank}</div>}
        </div>
      </div>

      {/* Punchline */}
      {r.punchline && (
        <div style={{ background: `${vc}10`, border: `1px solid ${vc}30`, borderRadius: 10, padding: "12px 16px", marginBottom: 16 }}>
          <div style={{ fontSize: 10, color: vc, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>Expert Verdict</div>
          <div style={{ fontSize: 13, color: C.text, lineHeight: 1.5 }}>{r.punchline}</div>
        </div>
      )}

      {/* Group ratings */}
      {r.group_scores && Object.keys(r.group_scores).length > 0 && (
        <div style={{ display: "grid", gridTemplateColumns: `repeat(${Math.min(5, Object.keys(r.group_scores).length)},1fr)`, gap: 10, marginBottom: 16 }}>
          {Object.entries(r.group_scores).map(([g, v]) => (
            <div key={g} style={{ background: C.card, border: `1px solid ${ratingColor(v)}40`, borderRadius: 8, padding: "12px 14px", textAlign: "center" }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: ratingColor(v), fontFamily: "monospace" }}>{v.toFixed(1)}</div>
              <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", marginTop: 2 }}>{g}</div>
            </div>
          ))}
        </div>
      )}

      {/* Positives / Negatives */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
        <div style={{ background: C.card, border: `1px solid ${C.green}30`, borderRadius: 10, padding: "14px 16px" }}>
          <div style={{ fontSize: 11, color: C.green, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>✓ Key Strengths</div>
          {(r.positives || []).length ? r.positives.map((p, i) => (
            <div key={i} style={{ fontSize: 12, color: C.text, padding: "5px 0", borderBottom: i < r.positives.length - 1 ? `1px solid ${C.gridLine}` : "none" }}>
              <span style={{ color: C.green, fontWeight: 700 }}>{p.label}</span> — {p.company?.toFixed(2)}{p.unit} vs peer {p.peer_avg?.toFixed(2)}{p.unit} <span style={{ color: C.muted }}>({p.rating.toFixed(1)})</span>
            </div>
          )) : <div style={{ fontSize: 12, color: C.muted }}>No standout strengths vs peers.</div>}
        </div>
        <div style={{ background: C.card, border: `1px solid ${C.red}30`, borderRadius: 10, padding: "14px 16px" }}>
          <div style={{ fontSize: 11, color: C.red, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>⚠ Key Weaknesses</div>
          {(r.negatives || []).length ? r.negatives.map((p, i) => (
            <div key={i} style={{ fontSize: 12, color: C.text, padding: "5px 0", borderBottom: i < r.negatives.length - 1 ? `1px solid ${C.gridLine}` : "none" }}>
              <span style={{ color: C.red, fontWeight: 700 }}>{p.label}</span> — {p.company?.toFixed(2)}{p.unit} vs peer {p.peer_avg?.toFixed(2)}{p.unit} <span style={{ color: C.muted }}>({p.rating.toFixed(1)})</span>
            </div>
          )) : <div style={{ fontSize: 12, color: C.muted }}>No major weaknesses vs peers.</div>}
        </div>
      </div>

      {/* Peer benchmark by group */}
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "18px 20px", marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, paddingBottom: 10, borderBottom: `1px solid ${C.border}` }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.gold }}>Peer Benchmarking</div>
            <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>vs {r.peer_count} peers in {r.segment}{r.is_bfsi ? " · BFSI rule applied (D/E + Int.Cov excluded)" : ""}</div>
          </div>
        </div>
        {groupsOrder.filter(g => byGroup[g]).map(g => (
          <div key={g} style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: C.accent, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6 }}>{g}</div>
            {byGroup[g].map(b => <BenchRow key={b.key} b={b} />)}
          </div>
        ))}
      </div>

      {/* Segment rank ladder */}
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "18px 20px", marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.purple, marginBottom: 4 }}>Segment Rank Ladder</div>
        <div style={{ fontSize: 11, color: C.muted, marginBottom: 12 }}>{r.segment} · ranked by GVM</div>
        {(r.ladder || []).map((row, i) => (
          <div key={row.symbol} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 8px", borderRadius: 6, background: row.is_self ? `${C.accent}12` : "transparent", border: row.is_self ? `1px solid ${C.accent}40` : "1px solid transparent", marginBottom: 2 }}>
            <span style={{ fontSize: 11, color: C.muted, width: 22, fontFamily: "monospace" }}>{i + 1}</span>
            <span style={{ fontSize: 13, fontWeight: row.is_self ? 800 : 600, color: row.is_self ? C.accent : C.text, flex: 1 }}>{row.symbol}</span>
            <span style={{ fontSize: 11, color: C.muted, flex: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.company_name}</span>
            <span style={{ fontSize: 13, fontWeight: 700, color: gvmColor(row.gvm), fontFamily: "monospace", width: 44, textAlign: "right" }}>{row.gvm?.toFixed(2)}</span>
            <div style={{ width: 70, textAlign: "right" }}><Tag color={verdictColor(row.verdict)}>{row.verdict}</Tag></div>
          </div>
        ))}
      </div>

      {/* Company content */}
      {r.content?.overview && (
        <ContentCard title="Company Overview" color={C.accent} body={r.content.overview} updated={r.content.last_overview_updated} />
      )}
      {r.content?.key_takeaway && (
        <ContentCard title="Key Takeaways" color={C.gold} body={r.content.key_takeaway} updated={r.content.last_takeaway_updated} />
      )}
      {r.content?.result_analysis && (
        <ContentCard title="Result Analysis" color={C.green} body={r.content.result_analysis} updated={r.content.last_result_analysis_updated} />
      )}

      <div style={{ fontSize: 10, color: C.muted, textAlign: "center", padding: "8px 0 4px" }}>
        Generated {r.generated_at} · peer benchmark computed live · {r.persisted ? "saved to DB" : "not persisted"}
      </div>
    </div>
  );
}

function ContentCard({ title, color, body, updated }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color }}>{title}</div>
        {updated && <div style={{ fontSize: 10, color: C.muted }}>Updated {updated}</div>}
      </div>
      <div style={{ fontSize: 13, color: C.text, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{body}</div>
    </div>
  );
}

// ── Placeholder for coming models ────────────────────────────────────────────
function ComingSoon({ mod }) {
  return (
    <div style={{ textAlign: "center", padding: "80px 20px" }}>
      <div style={{ fontSize: 48, marginBottom: 16, opacity: 0.4 }}>{mod.icon}</div>
      <div style={{ fontSize: 18, fontWeight: 800, color: C.text }}>{mod.label}</div>
      <div style={{ fontSize: 13, color: C.muted, marginTop: 6 }}>{mod.desc}</div>
      <div style={{ marginTop: 16 }}><Tag color={mod.color}>Building in coming days</Tag></div>
    </div>
  );
}

// ── Home ─────────────────────────────────────────────────────────────────────
function HomePage({ onNavigate }) {
  return (
    <div>
      <div style={{ background: `linear-gradient(135deg, ${C.accent}08 0%, ${C.purple}08 100%)`, border: `1px solid ${C.border}`, borderRadius: 12, padding: "20px 24px", marginBottom: 24 }}>
        <div style={{ fontSize: 22, fontWeight: 900, color: C.text, letterSpacing: "-0.02em" }}>V8 <span style={{ color: C.accent }}>Model</span></div>
        <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>Learn More. Score More. · Proprietary quant models</div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14 }}>
        {MODELS.map(m => (
          <button key={m.id} onClick={() => onNavigate(m.id)}
            style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "22px 20px", cursor: "pointer", textAlign: "left", position: "relative", overflow: "hidden", opacity: m.live ? 1 : 0.78 }}
            onMouseEnter={e => { e.currentTarget.style.border = `1px solid ${m.color}60`; e.currentTarget.style.background = `${m.color}06`; }}
            onMouseLeave={e => { e.currentTarget.style.border = `1px solid ${C.border}`; e.currentTarget.style.background = C.card; }}>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: `linear-gradient(90deg, ${m.color}, ${m.color}40)` }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
              <div style={{ fontSize: 26, width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center", background: m.color + "15", borderRadius: 10, border: `1px solid ${m.color}30`, color: m.color }}>{m.icon}</div>
              <Tag color={m.live ? C.green : C.muted}>{m.live ? "Live" : "Soon"}</Tag>
            </div>
            <div style={{ fontSize: 15, fontWeight: 800, color: C.text, marginBottom: 3 }}>{m.label}</div>
            <div style={{ fontSize: 11, color: m.color, marginBottom: 8 }}>{m.sub}</div>
            <div style={{ fontSize: 11, color: C.muted, lineHeight: 1.5 }}>{m.desc}</div>
            <div style={{ position: "absolute", bottom: 14, right: 16, color: m.color, fontSize: 16, opacity: 0.5 }}>→</div>
          </button>
        ))}
      </div>

      <div style={{ marginTop: 20, padding: "12px 16px", background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontSize: 11, color: C.muted }}>🔴 Live · Railway PostgreSQL · {new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" })} IST</div>
        <div style={{ fontSize: 11, color: C.muted, fontFamily: "monospace" }}>V8 Model · proprietary quant</div>
      </div>
    </div>
  );
}

function InnerPage({ moduleId, onBack }) {
  const mod = MODELS.find(m => m.id === moduleId);
  if (!mod) return null;
  let body;
  if (moduleId === "v8") body = <V8Module />;
  else if (moduleId === "gvm") body = <GvmModule />;
  else body = <ComingSoon mod={mod} />;

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20, paddingBottom: 16, borderBottom: `1px solid ${C.border}` }}>
        <button onClick={onBack} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 6, padding: "7px 14px", cursor: "pointer", fontSize: 12, color: C.muted }}>← Home</button>
        <div style={{ width: 1, height: 16, background: C.border }} />
        <div style={{ width: 32, height: 32, background: mod.color + "15", border: `1px solid ${mod.color}30`, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", color: mod.color, fontSize: 16 }}>{mod.icon}</div>
        <div>
          <div style={{ fontSize: 15, fontWeight: 800, color: C.text }}>{mod.label}</div>
          <div style={{ fontSize: 11, color: C.muted }}>{mod.sub}</div>
        </div>
        <div style={{ marginLeft: "auto", fontSize: 11, color: C.muted, fontFamily: "monospace" }}>
          {new Date().toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata", hour: "2-digit", minute: "2-digit" })} IST
        </div>
      </div>
      {body}
    </div>
  );
}

function App() {
  const [page, setPage] = useState("home");
  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif", paddingBottom: 40 }}>
      <style>{`
        @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0d14; }
        ::-webkit-scrollbar-thumb { background: #1e2540; border-radius: 3px; }
        button { transition: all 0.15s ease; }
        input::placeholder { color: #475569; }
      `}</style>

      <div style={{ background: C.card, borderBottom: `1px solid ${C.border}`, padding: "0 24px", display: "flex", alignItems: "center", gap: 16, height: 52, position: "sticky", top: 0, zIndex: 100 }}>
        <button onClick={() => setPage("home")} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 28, height: 28, background: C.accent, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 900, color: "#000" }}>V8</div>
          <span style={{ fontSize: 14, fontWeight: 800, color: C.text, letterSpacing: "0.05em" }}>V8 MODEL</span>
        </button>
        <div style={{ width: 1, height: 20, background: C.border }} />
        <div style={{ display: "flex", gap: 4, overflowX: "auto" }}>
          {MODELS.map(m => (
            <button key={m.id} onClick={() => setPage(m.id)} style={{ padding: "5px 10px", borderRadius: 5, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600, whiteSpace: "nowrap", background: page === m.id ? m.color + "20" : "transparent", color: page === m.id ? m.color : C.muted, borderBottom: page === m.id ? `2px solid ${m.color}` : "2px solid transparent" }}>
              {m.icon} {m.label}
            </button>
          ))}
        </div>
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
          <div style={{ width: 6, height: 6, borderRadius: "50%", background: C.green, boxShadow: `0 0 6px ${C.green}`, animation: "pulse 2s ease-in-out infinite" }} />
          <span style={{ fontSize: 10, color: C.muted }}>LIVE</span>
        </div>
      </div>

      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "24px 24px 0" }}>
        {page === "home" ? <HomePage onNavigate={setPage} /> : <InnerPage moduleId={page} onBack={() => setPage("home")} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
