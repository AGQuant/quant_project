<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intelligence &#183; Source AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root{
    --bg:#f6f8fb; --card:#fff; --line:#e4e9f1; --line2:#d4dbe7;
    --txt:#1c2536; --mut:#5a6781; --dim:#8a96ad;
    --grn:#0fa968; --red:#e23744; --blu:#2563eb; --amber:#d97706;
    --tag-bg:#F1F0EB; --tag-fg:#5F5E5A;
    --sans:'Sora',system-ui,-apple-system,sans-serif;
    --serif:'Newsreader',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;background:var(--bg);color:var(--txt);
    font-family:var(--sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}

  .model-nav{display:flex;align-items:center;gap:2px;height:46px;background:var(--card);
    border-bottom:1px solid var(--line);padding:0 16px;overflow-x:auto;scrollbar-width:none;
    position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(20,35,70,.06)}
  .model-nav::-webkit-scrollbar{display:none}
  .mnav-item{display:flex;align-items:center;gap:5px;padding:0 11px;height:46px;text-decoration:none;
    white-space:nowrap;flex-shrink:0;color:var(--mut);font-size:11.5px;font-weight:600;
    border-bottom:2px solid transparent;transition:.12s}
  .mnav-item:hover{color:var(--txt)}
  .mnav-item.active{border-bottom-color:var(--blu);color:var(--blu)}
  .mnav-item span{font-size:13px}
  .mnav-sep{width:1px;height:20px;background:var(--line);flex-shrink:0;margin:0 4px}

  .wrap{max-width:760px;margin:0 auto;padding:34px 20px calc(90px + env(safe-area-inset-bottom))}

  .masthead{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;
    padding-bottom:18px;border-bottom:2px solid var(--txt)}
  .mast-title{font-family:var(--serif);font-size:34px;font-weight:700;letter-spacing:-.015em;line-height:1.05}
  .mast-sub{font-size:12.5px;color:var(--mut);margin-top:7px}
  .refresh-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;font-size:12px;font-weight:700;
    color:#fff;background:var(--blu);border:none;border-radius:8px;cursor:pointer;transition:.15s}
  .refresh-btn:hover{filter:brightness(1.07)}
  .refresh-btn:disabled{opacity:.55;cursor:default}
  .meta{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);margin-top:13px;font-weight:600}

  .tabs{display:flex;gap:24px;border-bottom:1px solid var(--line);margin-top:22px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:0 0 13px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--mut);white-space:nowrap;
    border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .12s;background:none;border-top:0;border-left:0;border-right:0;font-family:inherit}
  .tab:hover{color:var(--txt)}
  .tab.active{color:var(--blu);border-bottom-color:var(--blu)}

  .searchbar{margin-top:18px}
  .searchbar input{width:100%;max-width:340px;padding:9px 13px;border-radius:8px;border:1px solid var(--line2);
    background:var(--card);color:var(--txt);font-size:13px;font-family:var(--sans);outline:none}
  .searchbar input:focus{border-color:var(--blu)}

  .art{padding:26px 0;border-bottom:1px solid var(--line);position:relative}
  .art.lead{padding:30px 0 28px}
  .art-head{font-family:var(--serif);font-size:23px;font-weight:600;line-height:1.28;color:var(--txt);text-wrap:pretty;padding-right:40px}
  .art.lead .art-head{font-size:30px;line-height:1.18;letter-spacing:-.01em;text-wrap:balance}
  .imp-high .art-head{font-size:25px}

  .art-metarow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px}
  .art-tag{background:var(--tag-bg);color:var(--tag-fg);padding:2px 8px;font-size:11px;
    font-weight:500;border-radius:20px;white-space:nowrap}
  .art-dot{color:var(--dim);font-size:11px}
  .art-rt{color:var(--mut);font-size:11.5px;font-weight:500}
  .art-sym{color:var(--blu);font-size:11px;font-weight:700}
  .art-impact{font-size:9.5px;font-weight:800;letter-spacing:.04em;padding:3px 8px;border-radius:5px}
  .imp-high .art-impact{background:rgba(226,55,68,.12);color:var(--red)}
  .imp-mid  .art-impact{background:rgba(217,119,6,.14);color:var(--amber)}
  .imp-low  .art-impact{background:rgba(90,103,129,.10);color:var(--mut)}

  .art-stand{font-size:15px;color:var(--mut);margin-top:14px;line-height:1.6;max-width:64ch;font-weight:500}
  .art-body{margin-top:14px;max-width:680px;font-size:15.5px;line-height:1.75;color:var(--txt)}
  .art-body > :first-child{margin-top:0}
  .art-body h1,.art-body h2,.art-body h3,.art-body h4{font-family:var(--serif);line-height:1.25;
    margin:24px 0 10px;font-weight:600;color:var(--txt)}
  .art-body h1{font-size:25px}
  .art-body h2{font-size:21px}
  .art-body h3{font-size:18px}
  .art-body h4{font-size:16px}
  .art-body p{margin:13px 0}
  .art-body ul,.art-body ol{margin:13px 0 13px 22px}
  .art-body li{margin:6px 0}
  .art-body strong{font-weight:700}
  .art-body em{font-style:italic}
  .art-body a{color:var(--blu);text-decoration:underline}
  .art-body blockquote{border-left:3px solid var(--line2);margin:14px 0;padding:2px 0 2px 14px;color:var(--mut)}
  .art-body table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13.5px}
  .art-body th,.art-body td{border:1px solid var(--line);padding:7px 11px;text-align:left;vertical-align:top}
  .art-body th{background:#f1f4f9;font-weight:700;color:var(--txt)}
  .art-body tr:nth-child(even) td{background:#fafbfd}
  .art-body code{background:#eef1f6;padding:1px 5px;border-radius:4px;font-size:13px;font-family:ui-monospace,Menlo,monospace}
  .art-body pre{background:#eef1f6;padding:12px 14px;border-radius:8px;overflow-x:auto;margin:14px 0}
  .art-body pre code{background:none;padding:0}
  .art-body hr{border:0;border-top:1px solid var(--line);margin:20px 0}
  .art-soon{color:var(--dim);font-style:italic;font-size:13px}

  .art-foot{display:flex;align-items:center;gap:8px;margin-top:18px;font-size:11.5px;color:var(--dim);flex-wrap:wrap}
  .art-sent{font-weight:600}
  .art-foot b{color:var(--mut);font-weight:600}

  .art-compact{padding:18px 0}
  .art-compact .art-head{font-size:18px;line-height:1.32}
  .art-compact .art-body{font-size:14.5px;line-height:1.65}
  .art-compact .art-foot{margin-top:11px}
  .art-stand-sm{margin-top:8px;font-size:14px;color:var(--mut);line-height:1.55}
  .cat-pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;
    font-size:10px;font-weight:700;cursor:pointer;border:1px solid transparent;letter-spacing:.02em}
  .cat-pill:hover{filter:brightness(.97)}

  .copy-btn{position:absolute;top:14px;right:0;width:32px;height:32px;display:inline-flex;
    align-items:center;justify-content:center;padding:0;border:none;background:none;color:var(--dim);
    cursor:pointer;border-radius:8px;transition:.15s;z-index:2;-webkit-tap-highlight-color:transparent}
  .copy-btn:hover{color:var(--blu);background:rgba(37,99,235,.08)}
  .copy-btn.copied{color:var(--grn)}
  .copy-btn.failed{color:var(--red)}
  .copy-btn svg{display:block;pointer-events:none}

  .kb-toggle{margin-top:14px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--blu);
    background:rgba(37,99,235,.07);border:1px solid var(--line2);border-radius:8px;cursor:pointer;
    font-family:var(--sans);transition:.15s}
  .kb-toggle:hover{background:rgba(37,99,235,.12)}
  .kb-toggle:disabled{opacity:.55;cursor:default}

  .msg{text-align:center;color:var(--mut);font-size:13px;padding:60px 20px}
  .foot{font-size:10.5px;color:#b3bccd;text-align:center;margin-top:46px;line-height:1.8}

  @media(max-width:520px){
    .mast-title{font-size:28px}
    .art.lead .art-head{font-size:25px}
    .imp-high .art-head{font-size:21px}
    .art-body{font-size:15px}
    .art-compact .art-head{font-size:17px}
  }
</style>
</head>
<body>
<nav class="model-nav" id="scorr-nav">
  <a class="mnav-item" href="/"><span>&#8962;</span>Home</a>
  <div class="mnav-sep"></div>

  <div class="mnav-sep"></div>

  <div class="mnav-sep"></div>

  <div class="mnav-sep"></div>
  <a class="mnav-item" href="/check"><span>&#10003;</span>Check</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item active" href="/news"><span>&#128240;</span>Intel</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item" href="/scanners"><span>&#8862;</span>Scanners</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item" href="/cio"><span>&#9673;</span>Max</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item" href="/fpc"><span>&#9706;</span>FPC</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item" href="/quant-basket"><span>&#9707;</span>QB</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item" href="/holdings"><span>&#9670;</span>Holdings</a>
  <div class="mnav-sep"></div>
  <a class="mnav-item" href="/v10"><span>&#9651;</span>V10</a>
</nav>

<div class="wrap">
  <div class="masthead">
    <div>
      <div class="mast-title">Source AI Intelligence</div>
      <div class="mast-sub">AI-polished market intelligence, updated daily</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">&#8635; Refresh</button>
  </div>

  <div class="meta" id="meta">Loading&hellip;</div>
  <div class="tabs" id="tabs"></div>

  <div class="searchbar" id="searchbar" style="display:none">
    <input id="symSearch" type="text" placeholder="Filter by symbol &mdash; e.g. RELIANCE" oninput="render()">
  </div>

  <div id="feed"><div class="msg">Loading&hellip;</div></div>

  <div class="foot">
    Source AI &middot; polished market intelligence &middot; sources: ET / Moneycontrol / LiveMint / Reuters / Bloomberg / Google News
  </div>
</div>

<script>
const API = "";
const CATS = [
  { id:"all",          label:"All" },
  { id:"ai_editorial", label:"AI Editorial" },
  { id:"domestic",     label:"Domestic" },
  { id:"global",       label:"Global" },
  { id:"ipo",          label:"IPO" },
  { id:"learn",        label:"Learn" },
];
let curCat = "all";
const SEARCH_TABS = ["domestic"];
let articles = [];
// cc_task #125: Knowledge Hub (Learn tab) — separate feed + lazy-loaded bodies
let kbArticles = [];
const _kbCache = {};

// -- AbortController — cancel in-flight fetch on every new tab switch --
let _abortCtrl = null;

const PILL = {
  "Domestic": { id:"domestic", label:"Domestic", bg:"#e8f0fe", fg:"#1d4ed8", bd:"#c3d6fb" },
  "Global":   { id:"global",   label:"Global",   bg:"#f3ecfd", fg:"#7c3aed", bd:"#ddc9fb" },
  "IPO":      { id:"ipo",      label:"IPO",       bg:"#fdf0e1", fg:"#c2620a", bd:"#f6d4a8" },
};

const SENT = {
  positive:{c:"#0fa968",g:"▲",l:"Bullish"}, bullish:{c:"#0fa968",g:"▲",l:"Bullish"},
  negative:{c:"#e23744",g:"▼",l:"Bearish"}, bearish:{c:"#e23744",g:"▼",l:"Bearish"},
  neutral:{c:"#8a96ad",g:"●",l:"Neutral"},
};

const COPY_SVG  = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
const CHECK_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
const X_SVG     = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
const SHARE_SRC = "📊 via Scorr · scorr.in";

if(window.marked && marked.setOptions){ marked.setOptions({ breaks:true, gfm:true }); }

function timeAgo(iso){
  if(!iso) return "";
  const s = Math.floor((Date.now() - new Date(iso).getTime())/1000);
  if(s < 60) return "just now";
  const m = Math.floor(s/60); if(m < 60) return m+"m ago";
  const h = Math.floor(m/60); if(h < 24) return h+"h ago";
  return Math.floor(h/24)+"d ago";
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function renderMd(t){
  if(!t) return "";
  if(window.marked && marked.parse){ try{ return marked.parse(String(t)); }catch(e){} }
  return "<p>"+esc(t).replace(/\n{2,}/g,"</p><p>").replace(/\n/g,"<br>")+"</p>";
}
function readMin(t){
  const words = String(t||"").trim().split(/\s+/).filter(Boolean).length;
  return words ? Math.max(1, Math.ceil(words/200)) : 0;
}
function symStr(a){
  return Array.isArray(a.mentioned_symbols) ? a.mentioned_symbols.filter(Boolean).join(", ") : "";
}
function plainText(t){
  return String(t||"")
    .replace(/```[\s\S]*?```/g, "")
    .replace(/`([^`]+)`/g, "$1")
    .replace(/!\[[^\]]*\]\([^)]*\)/g, "")
    .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1")
    .replace(/^#{1,6}\s*/gm, "")
    .replace(/^\s*>\s?/gm, "")
    .replace(/(\*\*|__)(.*?)\1/g, "$2")
    .replace(/(\*|_)(.*?)\1/g, "$2")
    .replace(/^\s*[-*+]\s+/gm, "• ")
    .replace(/<[^>]+>/g, "")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}
function shareText(a, useFull){
  const head = String(a.headline_clean||"").toUpperCase();
  const raw  = useFull ? (a.full_summary || a.summary || "") : (a.summary || "");
  return head + "\n\n" + plainText(raw) + "\n\n" + SHARE_SRC;
}
function copyBtn(a, useFull){
  const attr = esc(shareText(a, useFull)).replace(/\n/g, "&#10;");
  return `<button class="copy-btn" type="button" title="Copy for LinkedIn" aria-label="Copy for LinkedIn" data-copy="${attr}" onclick="copyStory(this,event)">${COPY_SVG}</button>`;
}
function fallbackCopy(text){
  try{
    const ta = document.createElement("textarea");
    ta.value = text; ta.setAttribute("readonly", "");
    ta.style.position = "fixed"; ta.style.top = "-1000px"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const okc = document.execCommand("copy");
    document.body.removeChild(ta);
    return okc;
  }catch(e){ return false; }
}
function copyStory(btn, ev){
  if(ev){ ev.preventDefault(); ev.stopPropagation(); }
  const text = btn.getAttribute("data-copy") || "";
  function ok(){ btn.classList.remove("failed"); btn.classList.add("copied"); btn.innerHTML = CHECK_SVG; setTimeout(function(){ btn.classList.remove("copied"); btn.innerHTML = COPY_SVG; }, 1500); }
  function bad(){ btn.classList.remove("copied"); btn.classList.add("failed"); btn.innerHTML = X_SVG; setTimeout(function(){ btn.classList.remove("failed"); btn.innerHTML = COPY_SVG; }, 1500); }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(ok).catch(function(){ if(fallbackCopy(text)) ok(); else bad(); });
  } else {
    if(fallbackCopy(text)) ok(); else bad();
  }
}

function buildTabs(){
  document.getElementById("tabs").innerHTML = CATS.map(c =>
    `<button class="tab ${c.id===curCat?'active':''}" onclick="pick('${c.id}')">${c.label}</button>`
  ).join("");
}

function pick(cat){
  if(cat === curCat) return; // no-op if same tab
  curCat = cat;
  const showSearch = SEARCH_TABS.includes(cat);
  document.getElementById("searchbar").style.display = showSearch ? "block" : "none";
  if(!showSearch) document.getElementById("symSearch").value = "";
  buildTabs();
  load();
}

async function load(){
  // cc_task #125: Learn tab uses its own Knowledge Hub feed, not /api/news/polished
  if(curCat === "learn"){ return loadKnowledge(); }
  // -- Cancel any previous in-flight request --
  if(_abortCtrl){ _abortCtrl.abort(); }
  _abortCtrl = new AbortController();
  const signal = _abortCtrl.signal;
  const activeCat = curCat; // capture at call time

  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  document.getElementById("feed").innerHTML = '<div class="msg">Loading&hellip;</div>';

  try{
    const r = await fetch(`${API}/api/news/polished?category=${activeCat}&limit=60`, { signal });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    // Guard: if the user switched tab again while we were fetching, discard
    if(curCat !== activeCat) return;

    articles = d.articles || [];
    const c = d.category_counts || {};
    const total = (c["AI Editorial"]||0)+(c["Domestic"]||0)+(c["Global"]||0)+(c["IPO"]||0);
    document.getElementById("meta").textContent =
      `${total} stories · AI Editorial ${c["AI Editorial"]||0} · Domestic ${c["Domestic"]||0} · Global ${c["Global"]||0} · IPO ${c["IPO"]||0}`;
    render();
  } catch(e){
    if(e.name === "AbortError") return; // tab switched — silently ignore
    if(curCat !== activeCat) return;
    document.getElementById("feed").innerHTML = `<div class="msg">Could not load (${esc(e.message)}). Tap Refresh to try again.</div>`;
  } finally{
    // Only re-enable if this is still the active load
    if(curCat === activeCat) btn.disabled = false;
  }
}

function manualRefresh(){
  // Force reload even if same tab
  const saved = curCat;
  curCat = "__force__";
  curCat = saved;
  load();
}

function pillHTML(cat){
  const p = PILL[cat]; if(!p) return "";
  return `<span class="cat-pill" style="background:${p.bg};color:${p.fg};border-color:${p.bd}" onclick="pick('${p.id}')">${esc(p.label)}</span>`;
}

function artFull(a, isLead){
  const sent = SENT[(a.sentiment||"neutral").toLowerCase()] || SENT.neutral;
  const imp = (a.impact||"").toLowerCase();
  const impClass = (imp === "high" || imp === "mid" || imp === "low") ? "imp-"+imp : "imp-low";
  const impact = imp ? `<span class="art-impact">${esc(imp)} impact</span>` : "";
  const hasFull = !!(a.full_summary && String(a.full_summary).trim());
  const rmins = readMin(hasFull ? a.full_summary : (a.summary||""));
  const rt = rmins ? `<span class="art-rt">${rmins} min read</span>` : "";
  const stand = (hasFull && a.summary && String(a.summary).trim())
    ? `<div class="art-stand">${esc(a.summary)}</div>` : "";
  const bodyHTML = hasFull
    ? renderMd(a.full_summary)
    : (a.summary && String(a.summary).trim()
        ? renderMd(a.summary)
        : `<p class="art-soon">Full analysis coming soon.</p>`);
  return `<article class="art ${impClass}${isLead?' lead':''}">
    ${copyBtn(a, hasFull)}
    <div class="art-head">${esc(a.headline_clean)}</div>
    <div class="art-metarow">${rt}${impact}</div>
    ${stand}
    <div class="art-body">${bodyHTML}</div>
    <div class="art-foot">
      <span class="art-sent" style="color:${sent.c}">${sent.g} ${sent.l}</span>
      <span>·</span><b>Source AI CIO</b>
      <span>·</span><span>${timeAgo(a.published_time)}</span>
    </div>
  </article>`;
}

function artCompact(a, showPill){
  const sent = SENT[(a.sentiment||"neutral").toLowerCase()] || SENT.neutral;
  const imp = (a.impact||"").toLowerCase();
  const impClass = (imp === "high" || imp === "mid" || imp === "low") ? "imp-"+imp : "imp-low";
  const sy = symStr(a);
  const sym = sy ? `<span class="art-sym">${esc(sy)}</span><span>·</span>` : "";
  const pill = showPill ? pillHTML(a.category) : "";
  const hasFull = !!(a.full_summary && String(a.full_summary).trim());
  const bodyRaw = hasFull ? a.full_summary : (a.summary || "");
  const body = String(bodyRaw).trim()
    ? `<div class="art-body">${renderMd(bodyRaw)}</div>` : "";
  return `<article class="art art-compact ${impClass}">
    ${copyBtn(a, hasFull)}
    <div class="art-head">${esc(a.headline_clean)}</div>
    ${body}
    <div class="art-foot">
      ${pill}
      <span class="art-sent" style="color:${sent.c}">${sent.g} ${sent.l}</span>
      <span>·</span>${sym}<span>${esc(a.source||"")}</span>
      <span>·</span><span>${timeAgo(a.published_time)}</span>
    </div>
  </article>`;
}

// ─────────── cc_task #125: Knowledge Hub (Learn tab) ───────────
async function loadKnowledge(){
  if(_abortCtrl){ _abortCtrl.abort(); }
  _abortCtrl = new AbortController();
  const signal = _abortCtrl.signal;
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  document.getElementById("feed").innerHTML = '<div class="msg">Loading&hellip;</div>';
  try{
    const r = await fetch(`${API}/api/knowledge/articles?limit=100`, { signal });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if(curCat !== "learn") return; // tab switched mid-fetch
    kbArticles = d.articles || [];
    const total = d.total || kbArticles.length;
    document.getElementById("meta").textContent = total
      ? `${total} educational ${total===1?"article":"articles"} · evergreen Knowledge Hub`
      : "Knowledge Hub · articles coming soon";
    renderKnowledge();
  } catch(e){
    if(e.name === "AbortError") return;
    if(curCat !== "learn") return;
    document.getElementById("feed").innerHTML = `<div class="msg">Could not load (${esc(e.message)}). Tap Refresh to try again.</div>`;
  } finally{
    if(curCat === "learn") btn.disabled = false;
  }
}

function kbPill(cat){
  if(!cat) return "";
  return `<span class="art-tag">${esc(cat)}</span>`;
}

function kbCard(a){
  const rt = a.reading_time_min ? `<span class="art-rt">${a.reading_time_min} min read</span>` : "";
  const stand = (a.summary && String(a.summary).trim())
    ? `<div class="art-stand-sm">${esc(a.summary)}</div>` : "";
  const sep = (rt && a.category) ? `<span class="art-dot">·</span>` : "";
  return `<article class="art art-compact" id="kb-${esc(a.slug)}">
    <div class="art-head">${esc(a.title)}</div>
    <div class="art-metarow">${kbPill(a.category)}${sep}${rt}</div>
    ${stand}
    <div class="art-body kb-body" data-slug="${esc(a.slug)}" style="display:none"></div>
    <button class="kb-toggle" type="button" onclick="toggleKb('${esc(a.slug)}',this)">Read article &#8595;</button>
  </article>`;
}

function renderKnowledge(){
  const feed = document.getElementById("feed");
  if(!kbArticles.length){
    feed.innerHTML = '<div class="msg">No articles yet — the Knowledge Hub is being written. Check back soon.</div>';
    return;
  }
  feed.innerHTML = kbArticles.map(kbCard).join("");
}

async function toggleKb(slug, btn){
  const card = document.getElementById("kb-"+slug);
  if(!card) return;
  const body = card.querySelector(".kb-body");
  if(body.style.display !== "none"){          // collapse
    body.style.display = "none";
    btn.innerHTML = "Read article &#8595;";
    return;
  }
  btn.disabled = true;
  try{
    let md = _kbCache[slug];
    if(md == null){
      const r = await fetch(`${API}/api/knowledge/articles/${encodeURIComponent(slug)}`);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      md = d.content_md || "";
      _kbCache[slug] = md;
    }
    body.innerHTML = md.trim() ? renderMd(md) : `<p class="art-soon">Full article coming soon.</p>`;
    body.style.display = "block";
    btn.innerHTML = "Collapse &#8593;";
  }catch(e){
    body.innerHTML = `<p class="art-soon">Could not load article (${esc(e.message)}).</p>`;
    body.style.display = "block";
  }finally{
    btn.disabled = false;
  }
}

function render(){
  if(curCat === "learn"){ renderKnowledge(); return; }
  let rows = articles.slice();
  if(SEARCH_TABS.includes(curCat)){
    const q = (document.getElementById("symSearch").value || "").trim().toUpperCase();
    if(q) rows = rows.filter(a => symStr(a).toUpperCase().includes(q));
  }
  const feed = document.getElementById("feed");
  if(!rows.length){
    feed.innerHTML = '<div class="msg">No articles for this filter yet.</div>';
    return;
  }
  let html;
  if(curCat === "all"){
    html = rows.map((a,i) => a.category === "AI Editorial" ? artFull(a, i===0) : artCompact(a, true)).join("");
  } else if(curCat === "ai_editorial"){
    html = rows.map((a,i) => artFull(a, i===0)).join("");
  } else {
    html = rows.map(a => artCompact(a, false)).join("");
  }
  feed.innerHTML = html;
}

if(window.self!==window.top||new URLSearchParams(location.search).has('embed')){
  var _mn=document.getElementById('scorr-nav'); if(_mn) _mn.style.display='none';
}

buildTabs();
document.getElementById("searchbar").style.display = SEARCH_TABS.includes(curCat) ? "block" : "none";
load();
</script>
<script src="/nav_toggle.js" defer></script>
