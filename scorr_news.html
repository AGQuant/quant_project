<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intelligence &#183; Source AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  /* cc#344 page 6: DARK TERMINAL re-skin — :root remapped to the R2 palette (design_refs). */
  :root{
    --bg:#0A0F1E; --card:#121A33; --line:rgba(148,166,210,.14); --line2:rgba(148,166,210,.24);
    --txt:#E9EEFB; --mut:#8C99BD; --dim:#5E6B8F;
    --grn:#2FD48B; --red:#FF5C6C; --blu:#4D7CFE; --amber:#F5B94A;
    --surface2:#182241; --well:#0D1428; --cyan:#37D3E8; --r:18px;
    --tag-bg:rgba(148,166,210,.1); --tag-fg:#8C99BD;
    --sans:'Sora',system-ui,-apple-system,sans-serif;
    --serif:'Newsreader',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;background:var(--bg);color:var(--txt);
    font-family:var(--sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}

  .model-nav{display:flex;align-items:center;gap:2px;height:46px;background:var(--card);
    border-bottom:1px solid var(--line);padding:0 16px;overflow-x:auto;scrollbar-width:none;
    position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(20,35,70,.06)}
  .model-nav::-webkit-scrollbar{display:none}
  .mnav-item{display:flex;align-items:center;gap:5px;padding:0 11px;height:46px;text-decoration:none;
    white-space:nowrap;flex-shrink:0;color:var(--mut);font-size:11.5px;font-weight:600;
    border-bottom:2px solid transparent;transition:.12s}
  .mnav-item:hover{color:var(--txt)}
  .mnav-item.active{border-bottom-color:var(--blu);color:var(--blu)}
  .mnav-item span{font-size:13px}
  .mnav-sep{width:1px;height:20px;background:var(--line);flex-shrink:0;margin:0 4px}

  .wrap{max-width:760px;margin:0 auto;padding:34px 20px calc(90px + env(safe-area-inset-bottom))}
  /* cc#195: widen the center frame so the list fills the screen with small
     margins. Mobile (<768px) keeps the 760px cap = full-width with side padding;
     the sticky tab bar lives inside .wrap so it widens + stays aligned too. */
  @media(min-width:768px){ .wrap{max-width:90vw;padding-left:24px;padding-right:24px} }
  @media(min-width:1200px){ .wrap{max-width:1140px} }

  .masthead{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;
    padding-bottom:18px;border-bottom:2px solid var(--txt)}
  .mast-title{font-family:var(--serif);font-size:34px;font-weight:700;letter-spacing:-.015em;line-height:1.05}
  .mast-sub{font-size:12.5px;color:var(--mut);margin-top:7px}
  .refresh-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;font-size:12px;font-weight:700;
    color:#fff;background:var(--blu);border:none;border-radius:8px;cursor:pointer;transition:.15s}
  .refresh-btn:hover{filter:brightness(1.07)}
  .refresh-btn:disabled{opacity:.55;cursor:default}
  .meta{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);margin-top:13px;font-weight:600}

  /* cc#180: category tab bar stays visible while scrolling long articles (esp.
     Learn). Sticks BELOW the 46px canonical nav on desktop; at top:0 on mobile
     where that nav is hidden (<768px). Solid page-bg + border + z-index 30
     (below nav's 40) so article text never bleeds through. nav_toggle hidden
     state -> stick at the 20px strip height. */
  .tabs{display:flex;gap:24px;border-bottom:1px solid var(--line);margin-top:12px;padding-top:10px;
    overflow-x:auto;scrollbar-width:none;position:sticky;top:46px;z-index:30;background:var(--bg)}
  @media(max-width:767px){
    .tabs{top:0;-webkit-overflow-scrolling:touch;
      /* cc#334 P8: visible affordance the category chips scroll */
      -webkit-mask-image:linear-gradient(to right,transparent,#000 12px,#000 calc(100% - 12px),transparent);
      mask-image:linear-gradient(to right,transparent,#000 12px,#000 calc(100% - 12px),transparent)}
    .tab{min-height:40px;display:inline-flex;align-items:center;font-size:13px}
  }
  html[data-scorr-nav-hidden] .tabs{top:20px}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:0 0 13px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--mut);white-space:nowrap;
    border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .12s;background:none;border-top:0;border-left:0;border-right:0;font-family:inherit}
  .tab:hover{color:var(--txt)}
  .tab.active{color:var(--blu);border-bottom-color:var(--blu)}

  .searchbar{margin-top:18px}
  .searchbar input{width:100%;max-width:340px;padding:9px 13px;border-radius:8px;border:1px solid var(--line2);
    background:var(--card);color:var(--txt);font-size:13px;font-family:var(--sans);outline:none}
  .searchbar input:focus{border-color:var(--blu)}

  .art{padding:26px 0;border-bottom:1px solid var(--line);position:relative}
  .art.lead{padding:30px 0 28px}
  .art-head{font-family:var(--serif);font-size:23px;font-weight:600;line-height:1.28;color:var(--txt);text-wrap:pretty;padding-right:40px}
  .art.lead .art-head{font-size:30px;line-height:1.18;letter-spacing:-.01em;text-wrap:balance}
  .imp-high .art-head{font-size:25px}

  .art-metarow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px}
  .art-tag{background:var(--tag-bg);color:var(--tag-fg);padding:2px 8px;font-size:11px;
    font-weight:500;border-radius:20px;white-space:nowrap}
  .art-dot{color:var(--dim);font-size:11px}
  .art-rt{color:var(--mut);font-size:11.5px;font-weight:500}
  .art-sym{color:var(--blu);font-size:11px;font-weight:700}
  .art-impact{font-size:9.5px;font-weight:800;letter-spacing:.04em;padding:3px 8px;border-radius:5px}
  .imp-high .art-impact{background:rgba(226,55,68,.12);color:var(--red)}
  .imp-mid  .art-impact{background:rgba(217,119,6,.14);color:var(--amber)}
  .imp-low  .art-impact{background:rgba(90,103,129,.10);color:var(--mut)}

  .art-stand{font-size:15px;color:var(--mut);margin-top:14px;line-height:1.6;max-width:64ch;font-weight:500}
  /* cc#195: list rows go full frame-width, but the READING column stays a
     comfortable ~860px (left-aligned with the headings above it) so long lines
     don't hurt readability in the wider frame. */
  .art-body{margin-top:14px;max-width:860px;font-size:15.5px;line-height:1.75;color:var(--txt)}
  .art-body > :first-child{margin-top:0}
  .art-body h1,.art-body h2,.art-body h3,.art-body h4{font-family:var(--serif);line-height:1.25;
    margin:24px 0 10px;font-weight:600;color:var(--txt)}
  .art-body h1{font-size:25px}
  .art-body h2{font-size:21px}
  .art-body h3{font-size:18px}
  .art-body h4{font-size:16px}
  .art-body p{margin:13px 0}
  .art-body ul,.art-body ol{margin:13px 0 13px 22px}
  .art-body li{margin:6px 0}
  .art-body strong{font-weight:700}
  .art-body em{font-style:italic}
  .art-body a{color:var(--blu);text-decoration:underline}
  .art-body blockquote{border-left:3px solid var(--line2);margin:14px 0;padding:2px 0 2px 14px;color:var(--mut)}
  .art-body table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13.5px}
  .art-body th,.art-body td{border:1px solid var(--line);padding:7px 11px;text-align:left;vertical-align:top}
  .art-body th{background:rgba(148,166,210,.08);font-weight:700;color:var(--txt)}
  .art-body tr:nth-child(even) td{background:rgba(148,166,210,.04)}
  .art-body code{background:var(--well);padding:1px 5px;border-radius:4px;font-size:13px;font-family:ui-monospace,Menlo,monospace}
  .art-body pre{background:var(--well);padding:12px 14px;border-radius:8px;overflow-x:auto;margin:14px 0}
  .art-body pre code{background:none;padding:0}
  .art-body hr{border:0;border-top:1px solid var(--line);margin:20px 0}
  .art-soon{color:var(--dim);font-style:italic;font-size:13px}

  .art-foot{display:flex;align-items:center;gap:8px;margin-top:18px;font-size:11.5px;color:var(--dim);flex-wrap:wrap}
  .art-sent{font-weight:600}
  .art-foot b{color:var(--mut);font-weight:600}

  .art-compact{padding:18px 0}
  .art-compact .art-head{font-size:18px;line-height:1.32}
  .art-compact .art-body{font-size:14.5px;line-height:1.65}
  .art-compact .art-foot{margin-top:11px}
  .art-stand-sm{margin-top:8px;font-size:14px;color:var(--mut);line-height:1.55}
  .cat-pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;
    font-size:10px;font-weight:700;cursor:pointer;border:1px solid transparent;letter-spacing:.02em}
  .cat-pill:hover{filter:brightness(.97)}

  .copy-btn{position:absolute;top:14px;right:0;width:32px;height:32px;display:inline-flex;
    align-items:center;justify-content:center;padding:0;border:none;background:none;color:var(--dim);
    cursor:pointer;border-radius:8px;transition:.15s;z-index:2;-webkit-tap-highlight-color:transparent}
  .copy-btn:hover{color:var(--blu);background:rgba(37,99,235,.08)}
  .copy-btn.copied{color:var(--grn)}
  .copy-btn.failed{color:var(--red)}
  .copy-btn svg{display:block;pointer-events:none}

  .kb-toggle{margin-top:14px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--blu);
    background:rgba(37,99,235,.07);border:1px solid var(--line2);border-radius:8px;cursor:pointer;
    font-family:var(--sans);transition:.15s}
  .kb-toggle:hover{background:rgba(37,99,235,.12)}
  .kb-toggle:disabled{opacity:.55;cursor:default}

  .msg{text-align:center;color:var(--mut);font-size:13px;padding:60px 20px}
  .feed-end{text-align:center;color:var(--dim);font-size:12px;padding:24px 20px}
  .foot{font-size:10.5px;color:#b3bccd;text-align:center;margin-top:46px;line-height:1.8}

  @media(max-width:520px){
    .mast-title{font-size:28px}
    .art.lead .art-head{font-size:25px}
    .imp-high .art-head{font-size:21px}
    .art-body{font-size:15px}
    .art-compact .art-head{font-size:17px}
  }
/* cc#194/#195 — Knowledge Hub: filters in a LEFT SIDEBAR on desktop, collapsing
   to horizontal chip rows above the list on mobile. Controls are compact (they
   are controls, not content); the article list uses the full widened frame. */
.kb-shell{display:flex;gap:22px;align-items:flex-start}
/* cc#205: sidebar taller than the viewport was clipping topics below Taxation.
   Cap it to the visible height and let it scroll independently (thin themed bar). */
.kb-sidebar{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;position:sticky;top:96px;max-height:calc(100vh - 108px);overflow-y:auto;overflow-x:hidden;padding-right:5px;scrollbar-width:thin;scrollbar-color:#cbd3e0 transparent}
.kb-sidebar::-webkit-scrollbar{width:6px}
.kb-sidebar::-webkit-scrollbar-thumb{background:#cbd3e0;border-radius:3px}
.kb-sidebar::-webkit-scrollbar-thumb:hover{background:#aeb9cc}
.kb-sidebar::-webkit-scrollbar-track{background:transparent}
.kb-main{flex:1;min-width:0}
.kb-search-wrap{position:relative}
.kb-search{width:100%;padding:9px 32px 9px 11px;border:1px solid rgba(148,166,210,.14);border-radius:9px;font-size:13px;font-family:inherit;outline:none;background:#121A33;color:#E9EEFB}
.kb-search:focus{border-color:#4D7CFE}
.kb-clear{position:absolute;right:5px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;background:transparent;color:#8a94a6;font-size:17px;cursor:pointer;display:none;line-height:1;border-radius:50%}
.kb-clear:hover{background:var(--well);color:#E9EEFB}
.kb-clear.on{display:block}
.kb-sgroup{display:flex;flex-direction:column;gap:7px}
.kb-slabel{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#8a94a6}
.kb-diff{display:flex;flex-wrap:wrap;gap:5px}
.kb-pill{flex-shrink:0;padding:5px 11px;border:1px solid rgba(148,166,210,.14);border-radius:15px;background:#121A33;color:#8C99BD;font-size:12px;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;transition:.1s}
.kb-pill:hover{border-color:#b9c4d6}
.kb-pill.on{background:#4D7CFE;border-color:#4D7CFE;color:#fff}
.kb-pill.beg.on{background:#0a9e63;border-color:#0a9e63}
.kb-pill.pro.on{background:#b45309;border-color:#b45309}
.kb-topics{display:flex;flex-direction:column;gap:1px}
.kb-topic{display:flex;justify-content:space-between;gap:8px;align-items:center;font-size:12.5px;font-weight:600;color:#8C99BD;padding:6px 9px;border-radius:7px;cursor:pointer;white-space:nowrap;overflow:hidden}
.kb-topic>b{font-weight:600;color:#b3bccb;font-size:11px;flex-shrink:0}
.kb-topic:hover{background:rgba(148,166,210,.08);color:#E9EEFB}
.kb-topic.on{background:rgba(77,124,254,.14);color:#4D7CFE}
/* cc#207 — Position News quarantine tab (reading room, grouped by symbol) */
.pn-group{border:1px solid rgba(148,166,210,.14);border-radius:11px;margin-bottom:14px;overflow:hidden;background:#121A33}
.pn-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#182241;border-bottom:1px solid rgba(148,166,210,.12)}
.pn-sym{font-size:14px;font-weight:800;color:#E9EEFB;letter-spacing:.01em}
.pn-origin{font-size:9.5px;font-weight:800;letter-spacing:.03em;padding:2px 7px;border-radius:9px;background:rgba(77,124,254,.14);color:#4D7CFE;text-transform:uppercase}
.pn-origin.sg{background:rgba(47,212,139,.14);color:#2FD48B}.pn-origin.v8sg{background:rgba(155,124,255,.16);color:#9B7CFF}
.pn-badge{margin-left:auto;font-size:11px;font-weight:700;color:#8a94a6}
.pn-item{display:block;padding:10px 14px;border-bottom:1px solid rgba(148,166,210,.08);text-decoration:none;color:inherit}
.pn-item:last-child{border-bottom:none}
.pn-item:hover{background:rgba(148,166,210,.05)}
.pn-hl{font-size:13.5px;font-weight:600;color:#E9EEFB;line-height:1.4}
.pn-meta{font-size:11px;color:#8a94a6;margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pn-src{font-weight:600;color:#8C99BD}
@media(prefers-color-scheme:dark){}
.kb-topic.on>b{color:#4D7CFE}
.kb-count{font-size:11.5px;color:#8a94a6;font-weight:600;margin-bottom:12px}
.kb-chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9.5px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;vertical-align:middle}
.kb-chip.beg{background:#d6f3e6;color:#066b46}
.kb-chip.pro{background:rgba(245,185,74,.14);color:#F5B94A}
/* cc#196 — Knowledge Galaxy preview card + full-screen overlay */
.kb-galaxy{position:relative;margin-bottom:16px;border-radius:12px;overflow:hidden;border:1px solid #1c2b52;cursor:pointer;background:#070b1a}
.kb-galaxy canvas{display:block;width:100%;height:120px}
.kb-galaxy .kb-galaxy-ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:12px 14px;background:linear-gradient(180deg,rgba(7,11,26,0) 30%,rgba(7,11,26,.72))}
.kb-galaxy .kb-galaxy-ttl{color:#e8eefc;font-size:13px;font-weight:800}
.kb-galaxy .kb-galaxy-sub{color:#9fb0d6;font-size:11px;margin-top:1px}
.kb-galaxy .kb-galaxy-btn{align-self:flex-start;margin-top:8px;padding:6px 12px;border-radius:16px;background:#4D7CFE;color:#fff;font-size:11.5px;font-weight:700;border:none;cursor:pointer}
.galaxy-overlay{position:fixed;inset:0;z-index:1000;background:#070b1a;display:none}
.galaxy-overlay.on{display:block}
.galaxy-canvas{position:absolute;inset:0}
/* cc#203: reserve the top-right corner (104px) for the server-injected global
   Logout pill (#scorr-lo, position:fixed z-index:9999) so galaxy controls never
   sit under it; wrap to extra rows on tight widths. */
.galaxy-topbar{position:absolute;top:0;left:0;right:0;z-index:2;display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:calc(10px + env(safe-area-inset-top)) 104px 10px 12px;background:linear-gradient(180deg,rgba(7,11,26,.94),rgba(7,11,26,0))}
.galaxy-title{color:#e8eefc;font-size:13px;font-weight:800;flex:1;min-width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.galaxy-count{display:inline-block;margin-left:6px;padding:2px 8px;border-radius:11px;background:rgba(37,99,235,.22);border:1px solid #2a4d8f;color:#9fc0ff;font-size:10.5px;font-weight:700;vertical-align:middle}
/* cc#203: back-to-Intel control (top-left), dark pill matching galaxy UI, ≥40px touch target */
.galaxy-back{display:inline-flex;align-items:center;gap:5px;height:40px;padding:0 14px 0 10px;border-radius:20px;border:1px solid #29406e;background:rgba(13,20,40,.9);color:#cdd8f2;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);font-family:inherit;flex-shrink:0}
.galaxy-back:hover{border-color:#4D7CFE;color:#fff}
.galaxy-back .ga-arrow{font-size:17px;line-height:1;margin-top:-1px}
@media(max-width:767px){.galaxy-gsearch{flex:1 1 auto;max-width:none}}
.galaxy-gsearch{width:150px;max-width:38vw;padding:7px 10px;border-radius:8px;border:1px solid #29406e;background:#0d1428;color:#e8eefc;font-size:12px;outline:none;font-family:inherit}
.galaxy-gpill{padding:6px 10px;border-radius:14px;border:1px solid #29406e;background:#0d1428;color:#9fb0d6;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap}
.galaxy-gpill.on{background:#4D7CFE;border-color:#4D7CFE;color:#fff}
.galaxy-gpill.beg.on{background:#0a9e63;border-color:#0a9e63}
.galaxy-gpill.pro.on{background:#b45309;border-color:#b45309}
.galaxy-close{width:34px;height:34px;flex-shrink:0;border-radius:50%;border:1px solid #29406e;background:#0d1428;color:#e8eefc;font-size:18px;cursor:pointer;line-height:1}
.galaxy-hint{position:absolute;left:0;right:0;bottom:calc(12px + env(safe-area-inset-bottom));text-align:center;color:#6d80ab;font-size:10.5px;pointer-events:none;z-index:2}
.galaxy-drawer{position:absolute;left:0;right:0;bottom:0;z-index:3;background:#0d1428;border-top:1px solid #1c2b52;border-radius:16px 16px 0 0;padding:16px 18px calc(18px + env(safe-area-inset-bottom));transform:translateY(115%);transition:transform .22s ease;box-shadow:0 -8px 30px rgba(0,0,0,.5)}
.galaxy-drawer.on{transform:translateY(0)}
.galaxy-drawer .gd-cat{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#9fb0d6}
.galaxy-drawer .gd-ttl{color:#e8eefc;font-size:17px;font-weight:800;margin:5px 40px 8px 0;line-height:1.3}
.galaxy-drawer .gd-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.galaxy-drawer .gd-sum{color:#b9c6e4;font-size:13px;line-height:1.55;margin-bottom:14px}
.galaxy-drawer .gd-rt{color:#7f92bd;font-size:11px;font-weight:600}
.galaxy-drawer .gd-read{padding:9px 16px;border-radius:9px;background:#4D7CFE;color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer}
.galaxy-drawer .gd-x{position:absolute;top:12px;right:14px;width:26px;height:26px;border:none;background:transparent;color:#7f92bd;font-size:18px;cursor:pointer}
/* cc#197 fix_3 — in-page full-article overlay (no navigation) */
.galaxy-article{position:absolute;left:0;right:0;bottom:0;height:86vh;z-index:4;background:#0d1428;border-top:1px solid #1c2b52;border-radius:18px 18px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.55);transform:translateY(104%);transition:transform .26s ease;display:flex;flex-direction:column}
.galaxy-article.on{transform:translateY(0)}
.ga-head{display:flex;align-items:center;gap:8px;padding:14px 16px 10px;border-bottom:1px solid #16223f;flex-shrink:0}
.ga-chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex:1;min-width:0}
.ga-chips .gd-cat{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#9fb0d6}
.ga-chips .gd-rt{color:#7f92bd;font-size:11px;font-weight:600}
.ga-x{width:32px;height:32px;flex-shrink:0;border-radius:50%;border:1px solid #29406e;background:#0d1428;color:#e8eefc;font-size:18px;cursor:pointer;line-height:1}
.ga-grab{width:38px;height:4px;border-radius:2px;background:#29406e;margin:8px auto 0;flex-shrink:0}

<body>
<nav class="model-nav" id="scorr-nav"></nav>

<div class="wrap">
  <div class="masthead">
    <div>
      <div class="mast-title">Source AI Intelligence</div>
      <div class="mast-sub">AI-polished market intelligence, updated daily</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">&#8635; Refresh</button>
  </div>

  <div class="meta" id="meta">Loading&hellip;</div>
  <div class="tabs" id="tabs"></div>

  <div class="searchbar" id="searchbar" style="display:none">
    <input id="symSearch" type="text" placeholder="Filter by symbol &mdash; e.g. RELIANCE" oninput="render()">
  </div>

  <div id="feed"><div class="msg">Loading&hellip;</div></div>

  <div class="foot">
    Source AI &middot; polished market intelligence &middot; sources: ET / Moneycontrol / LiveMint / Reuters / Bloomberg / Google News
  </div>
</div>

<script>
const API = "";
// cc#646: tab order per spec (All / Domestic / Global / AI Editorial / IPO / Stock View);
// Learn (Knowledge Hub) stays last — it's a separate evergreen feed, not a news category.
const CATS = [
  { id:"all",          label:"All" },
  { id:"domestic",     label:"Domestic" },
  { id:"global",       label:"Global" },
  { id:"ai_editorial", label:"AI Editorial" },
  { id:"ipo",          label:"IPO" },
  { id:"stock_view",   label:"Stock View" },
  { id:"learn",        label:"Learn" },
];
// cc#294: "Position News" tab relocated to v8_dashboard.html (Master Dashboard is where open
// positions live). Its nav-item, dispatch and render functions were removed from this hub.
let curCat = "all";
const SEARCH_TABS = ["domestic"];
let articles = [];
// cc#492: infinite scroll — 50 initial, 25/batch background pre-fetch, 500 cap per tab.
const NEWS_INITIAL = 50, NEWS_BATCH = 25, NEWS_CAP = 500;
let newsOffset = 0, newsHasMore = true, newsLoadingMore = false, newsCatTotal = Infinity;
// cc_task #125: Knowledge Hub (Learn tab) — separate feed + lazy-loaded bodies
let kbArticles = [];
let kbTotal = 0;                 // cc#204: api.total — source of truth for count assertion + badge
const _kbCache = {};
// cc#194: Knowledge Hub client-side filters (difficulty + category + search)
let kbDiff = "all", kbCat = "all", kbSearch = "";
let kbCatCounts = {}, kbDiffCounts = {}, _kbCats = [];
let _kbSearchDeb = null;

// -- AbortController — cancel in-flight fetch on every new tab switch --
let _abortCtrl = null;

const PILL = {
  "Domestic":   { id:"domestic",   label:"Domestic",   bg:"#e8f0fe", fg:"#1d4ed8", bd:"#c3d6fb" },
  "Global":     { id:"global",     label:"Global",     bg:"#f3ecfd", fg:"#7c3aed", bd:"#ddc9fb" },
  "IPO":        { id:"ipo",        label:"IPO",        bg:"#fdf0e1", fg:"#c2620a", bd:"#f6d4a8" },
  "Stock View": { id:"stock_view", label:"Stock View", bg:"#e6f7f0", fg:"#0f766e", bd:"#bfe8da" },  // cc#646
};

const SENT = {
  positive:{c:"#0fa968",g:"▲",l:"Bullish"}, bullish:{c:"#0fa968",g:"▲",l:"Bullish"},
  negative:{c:"#e23744",g:"▼",l:"Bearish"}, bearish:{c:"#e23744",g:"▼",l:"Bearish"},
  neutral:{c:"#8a96ad",g:"●",l:"Neutral"},
};

const COPY_SVG  = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
const CHECK_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
const X_SVG     = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';

if(window.marked && marked.setOptions){ marked.setOptions({ breaks:true, gfm:true }); }

function timeAgo(iso){
  if(!iso) return "";
  // cc#157: DB timestamps are naive IST (e.g. "2026-07-02T15:25:00", no offset).
  // Without an explicit offset, `new Date()` parses that string in the VIEWER's
  // local timezone, not IST — wrong "ago" for anyone outside IST. Declare the
  // +05:30 offset explicitly so the diff is computed against the true IST instant.
  let ts = String(iso).trim();
  if(!/[Zz]$|[+-]\d{2}:?\d{2}$/.test(ts)) ts += "+05:30";
  const d = new Date(ts);
  if(isNaN(d.getTime())) return "";
  const s = Math.floor((Date.now() - d.getTime())/1000);
  if(s < 60) return "just now";
  const m = Math.floor(s/60); if(m < 60) return m+"m ago";
  const h = Math.floor(m/60); if(h < 24) return h+"h ago";
  return Math.floor(h/24)+"d ago";
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function renderMd(t){
  if(!t) return "";
  if(window.marked && marked.parse){ try{ return marked.parse(String(t)); }catch(e){} }
  return "<p>"+esc(t).replace(/\n{2,}/g,"</p><p>").replace(/\n/g,"<br>")+"</p>";
}
function readMin(t){
  const words = String(t||"").trim().split(/\s+/).filter(Boolean).length;
  return words ? Math.max(1, Math.ceil(words/200)) : 0;
}
function symStr(a){
  return Array.isArray(a.mentioned_symbols) ? a.mentioned_symbols.filter(Boolean).join(", ") : "";
}
function plainText(t){
  return String(t||"")
    .replace(/```[\s\S]*?```/g, "")
    .replace(/`([^`]+)`/g, "$1")
    .replace(/!\[[^\]]*\]\([^)]*\)/g, "")
    .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1")
    .replace(/^#{1,6}\s*/gm, "")
    .replace(/^\s*>\s?/gm, "")
    .replace(/(\*\*|__)(.*?)\1/g, "$2")
    .replace(/(\*|_)(.*?)\1/g, "$2")
    .replace(/^\s*[-*+]\s+/gm, "• ")
    .replace(/<[^>]+>/g, "")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}
function shareText(a, useFull){
  const head = String(a.headline_clean||"").toUpperCase();
  const raw  = useFull ? (a.full_summary || a.summary || "") : (a.summary || "");
  return head + "\n\n" + plainText(raw);
}
function copyBtn(a, useFull){
  const attr = esc(shareText(a, useFull)).replace(/\n/g, "&#10;");
  return `<button class="copy-btn" type="button" title="Copy for LinkedIn" aria-label="Copy for LinkedIn" data-copy="${attr}" onclick="copyStory(this,event)">${COPY_SVG}</button>`;
}
function fallbackCopy(text){
  try{
    const ta = document.createElement("textarea");
    ta.value = text; ta.setAttribute("readonly", "");
    ta.style.position = "fixed"; ta.style.top = "-1000px"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const okc = document.execCommand("copy");
    document.body.removeChild(ta);
    return okc;
  }catch(e){ return false; }
}
function copyStory(btn, ev){
  if(ev){ ev.preventDefault(); ev.stopPropagation(); }
  const text = btn.getAttribute("data-copy") || "";
  function ok(){ btn.classList.remove("failed"); btn.classList.add("copied"); btn.innerHTML = CHECK_SVG; setTimeout(function(){ btn.classList.remove("copied"); btn.innerHTML = COPY_SVG; }, 1500); }
  function bad(){ btn.classList.remove("copied"); btn.classList.add("failed"); btn.innerHTML = X_SVG; setTimeout(function(){ btn.classList.remove("failed"); btn.innerHTML = COPY_SVG; }, 1500); }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(ok).catch(function(){ if(fallbackCopy(text)) ok(); else bad(); });
  } else {
    if(fallbackCopy(text)) ok(); else bad();
  }
}

function buildTabs(){
  document.getElementById("tabs").innerHTML = CATS.map(c =>
    `<button class="tab ${c.id===curCat?'active':''}" onclick="pick('${c.id}')">${c.label}</button>`
  ).join("");
}

function pick(cat){
  if(cat === curCat) return; // no-op if same tab
  curCat = cat;
  const showSearch = SEARCH_TABS.includes(cat);
  document.getElementById("searchbar").style.display = showSearch ? "block" : "none";
  if(!showSearch) document.getElementById("symSearch").value = "";
  buildTabs();
  load();
}

function _newsCatLabel(cat){
  // mirrors backend _CANON_CAT (news_endpoints.py) — used to read the right
  // count out of category_counts for the cap/hasMore calc below.
  return {ai_editorial:"AI Editorial", domestic:"Domestic", global:"Global", ipo:"IPO", stock_view:"Stock View"}[cat];  // cc#646
}

async function load(){
  // cc_task #125: Learn tab uses its own Knowledge Hub feed, not /api/news/polished
  if(curCat === "learn"){ return loadKnowledge(); }
  // cc#294: Position News relocated to v8_dashboard.html — dispatch removed.
  // -- Cancel any previous in-flight request --
  if(_abortCtrl){ _abortCtrl.abort(); }
  _abortCtrl = new AbortController();
  const signal = _abortCtrl.signal;
  const activeCat = curCat; // capture at call time

  // cc#492: fresh tab load resets the infinite-scroll pagination state
  newsOffset = 0; newsHasMore = true; newsLoadingMore = false; newsCatTotal = Infinity;

  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  document.getElementById("feed").innerHTML = '<div class="msg">Loading&hellip;</div>';

  try{
    const r = await fetch(`${API}/api/news/polished?category=${activeCat}&limit=${NEWS_INITIAL}&offset=0`, { signal });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    // Guard: if the user switched tab again while we were fetching, discard
    if(curCat !== activeCat) return;

    articles = d.articles || [];
    newsOffset = articles.length;
    const c = d.category_counts || {};
    const total = (c["AI Editorial"]||0)+(c["Domestic"]||0)+(c["Global"]||0)+(c["IPO"]||0)+(c["Stock View"]||0);  // cc#646
    newsCatTotal = activeCat === "all" ? total : (c[_newsCatLabel(activeCat)] || 0);
    newsHasMore = articles.length < Math.min(newsCatTotal, NEWS_CAP) && articles.length >= NEWS_INITIAL;
    document.getElementById("meta").textContent =
      `${total} stories · AI Editorial ${c["AI Editorial"]||0} · Domestic ${c["Domestic"]||0} · Global ${c["Global"]||0} · IPO ${c["IPO"]||0} · Stock View ${c["Stock View"]||0}`;
    render();
  } catch(e){
    if(e.name === "AbortError") return; // tab switched — silently ignore
    if(curCat !== activeCat) return;
    document.getElementById("feed").innerHTML = `<div class="msg">Could not load (${esc(e.message)}). Tap Refresh to try again.</div>`;
  } finally{
    // Only re-enable if this is still the active load
    if(curCat === activeCat) btn.disabled = false;
  }
}

// cc#492: infinite scroll — background pre-fetch triggered when the user scrolls
// within NEWS_SCROLL_THRESHOLD_PX of the bottom (~5-10 article cards' worth). The
// newsLoadingMore flag is the debounce: it's set before the fetch starts and only
// cleared in `finally`, so a fast scroll-to-bottom can never fire overlapping fetches
// for the same batch — a second scroll event while one is in flight is a no-op.
const NEWS_SCROLL_THRESHOLD_PX = 1800;

async function loadMore(){
  if(curCat === "learn" || curCat === "__force__") return;
  if(newsLoadingMore || !newsHasMore) return;
  if(articles.length >= NEWS_CAP) { newsHasMore = false; render(); return; }
  newsLoadingMore = true;
  const activeCat = curCat;
  const batch = Math.min(NEWS_BATCH, NEWS_CAP - articles.length);
  try{
    const r = await fetch(`${API}/api/news/polished?category=${activeCat}&limit=${batch}&offset=${newsOffset}`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if(curCat !== activeCat) return; // tab switched mid-fetch — discard
    const got = d.articles || [];
    // cc#492: de-dupe by polished id — a reschedule/refresh landing between batches
    // must never produce a duplicate card.
    const seen = new Set(articles.map(a => a.id));
    const fresh = got.filter(a => !seen.has(a.id));
    articles = articles.concat(fresh);
    newsOffset += got.length;
    newsHasMore = got.length >= batch && articles.length < Math.min(newsCatTotal, NEWS_CAP);
    render();
  } catch(e){
    // cc#492: a failed background pre-fetch is silent (no error state) — the user
    // simply gets another chance to trigger it on the next scroll tick.
  } finally{
    newsLoadingMore = false;
  }
}

function _onNewsScroll(){
  if(curCat === "learn") return;
  const scrollBottom = window.scrollY + window.innerHeight;
  const pageHeight = document.documentElement.scrollHeight;
  if(pageHeight - scrollBottom <= NEWS_SCROLL_THRESHOLD_PX){
    loadMore();
  }
}
let _newsScrollTicking = false;
window.addEventListener("scroll", () => {
  if(_newsScrollTicking) return;
  _newsScrollTicking = true;
  requestAnimationFrame(() => { _onNewsScroll(); _newsScrollTicking = false; });
}, { passive: true });

function manualRefresh(){
  // Force reload even if same tab
  const saved = curCat;
  curCat = "__force__";
  curCat = saved;
  load();
}

function pillHTML(cat){
  const p = PILL[cat]; if(!p) return "";
  return `<span class="cat-pill" style="background:${p.bg};color:${p.fg};border-color:${p.bd}" onclick="pick('${p.id}')">${esc(p.label)}</span>`;
}

function artFull(a, isLead){
  const sent = SENT[(a.sentiment||"neutral").toLowerCase()] || SENT.neutral;
  const imp = (a.impact||"").toLowerCase();
  const impClass = (imp === "high" || imp === "mid" || imp === "low") ? "imp-"+imp : "imp-low";
  const impact = imp ? `<span class="art-impact">${esc(imp)} impact</span>` : "";
  const hasFull = !!(a.full_summary && String(a.full_summary).trim());
  const rmins = readMin(hasFull ? a.full_summary : (a.summary||""));
  const rt = rmins ? `<span class="art-rt">${rmins} min read</span>` : "";
  const stand = (hasFull && a.summary && String(a.summary).trim())
    ? `<div class="art-stand">${esc(a.summary)}</div>` : "";
  const bodyHTML = hasFull
    ? renderMd(a.full_summary)
    : (a.summary && String(a.summary).trim()
        ? renderMd(a.summary)
        : `<p class="art-soon">Full analysis coming soon.</p>`);
  return `<article class="art ${impClass}${isLead?' lead':''}">
    ${copyBtn(a, hasFull)}
    <div class="art-head">${esc(a.headline_clean)}</div>
    <div class="art-metarow">${rt}${impact}</div>
    ${stand}
    <div class="art-body">${bodyHTML}</div>
    <div class="art-foot">
      <span class="art-sent" style="color:${sent.c}">${sent.g} ${sent.l}</span>
      <span>·</span><b>Source AI CIO</b>
      <span>·</span><span>${timeAgo(a.published_time)}</span>
    </div>
  </article>`;
}

function artCompact(a, showPill){
  const sent = SENT[(a.sentiment||"neutral").toLowerCase()] || SENT.neutral;
  const imp = (a.impact||"").toLowerCase();
  const impClass = (imp === "high" || imp === "mid" || imp === "low") ? "imp-"+imp : "imp-low";
  // cc#646: symbol chip links to the GVM stock card (/company/SYM). Applies to every compact
  // card (Domestic/Global/IPO/Stock View) — a tapped ticker jumps straight to its GVM report.
  const syArr = Array.isArray(a.mentioned_symbols) ? a.mentioned_symbols.filter(Boolean) : [];
  const symLinks = syArr.map(s =>
    `<a class="art-sym" style="text-decoration:none" href="/company/${encodeURIComponent(s)}">${esc(s)}</a>`).join(", ");
  const sym = symLinks ? `${symLinks}<span>·</span>` : "";
  const pill = showPill ? pillHTML(a.category) : "";
  const hasFull = !!(a.full_summary && String(a.full_summary).trim());
  const bodyRaw = hasFull ? a.full_summary : (a.summary || "");
  const body = String(bodyRaw).trim()
    ? `<div class="art-body">${renderMd(bodyRaw)}</div>` : "";
  return `<article class="art art-compact ${impClass}">
    ${copyBtn(a, hasFull)}
    <div class="art-head">${esc(a.headline_clean)}</div>
    ${body}
    <div class="art-foot">
      ${pill}
      <span class="art-sent" style="color:${sent.c}">${sent.g} ${sent.l}</span>
      <span>·</span>${sym}<span>${esc(a.source||"")}</span>
      <span>·</span><span>${timeAgo(a.published_time)}</span>
    </div>
  </article>`;
}

// cc#294: loadPositionNews()/renderPositionNews() and the /api/news/position fetch were removed
// from this hub — the Position News tab now lives in v8_dashboard.html (unchanged endpoint).

// ─────────── cc_task #125: Knowledge Hub (Learn tab) ───────────
async function loadKnowledge(){
  if(_abortCtrl){ _abortCtrl.abort(); }
  _abortCtrl = new AbortController();
  const signal = _abortCtrl.signal;
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  document.getElementById("feed").innerHTML = '<div class="msg">Loading&hellip;</div>';
  try{
    const r = await fetch(`${API}/api/knowledge/articles?limit=500`, { signal });   // cc#204: was 100 → dropped the 20 oldest (Basics core)
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if(curCat !== "learn") return; // tab switched mid-fetch
    kbArticles = d.articles || [];
    kbCatCounts = d.category_counts || {};
    kbDiffCounts = d.difficulty_counts || {};
    kbDiff = "all"; kbCat = "all"; kbSearch = "";   // cc#194: reset filters on (re)load
    kbTotal = d.total || kbArticles.length;
    // cc#204: assert every article is present — founder had to count stars manually
    console.assert(kbArticles.length === kbTotal, "Knowledge Hub: fetched "+kbArticles.length+" of "+kbTotal+" articles");
    const total = kbTotal;
    document.getElementById("meta").textContent = total
      ? `${total} educational ${total===1?"article":"articles"} · evergreen Knowledge Hub`
      : "Knowledge Hub · articles coming soon";
    renderKnowledge();
  } catch(e){
    if(e.name === "AbortError") return;
    if(curCat !== "learn") return;
    document.getElementById("feed").innerHTML = `<div class="msg">Could not load (${esc(e.message)}). Tap Refresh to try again.</div>`;
  } finally{
    if(curCat === "learn") btn.disabled = false;
  }
}

function kbPill(cat){
  if(!cat) return "";
  return `<span class="art-tag">${esc(cat)}</span>`;
}

function kbDiffChip(d){                          // cc#194: green Beginner / amber Pro chip
  if(d === "Beginner") return '<span class="kb-chip beg">Beginner</span>';
  if(d === "Pro")      return '<span class="kb-chip pro">Pro</span>';
  return "";
}

function kbCard(a){
  const rt = a.reading_time_min ? `<span class="art-rt">${a.reading_time_min} min read</span>` : "";
  const stand = (a.summary && String(a.summary).trim())
    ? `<div class="art-stand-sm">${esc(a.summary)}</div>` : "";
  const chip = kbDiffChip(a.difficulty);
  const chipSep = (chip && a.category) ? `<span class="art-dot">·</span>` : "";
  const sep = (rt && a.category) ? `<span class="art-dot">·</span>` : "";
  return `<article class="art art-compact" id="kb-${esc(a.slug)}">
    <div class="art-head">${esc(a.title)}</div>
    <div class="art-metarow">${chip}${chipSep}${kbPill(a.category)}${sep}${rt}</div>
    ${stand}
    <div class="art-body kb-body" data-slug="${esc(a.slug)}" style="display:none"></div>
    <button class="kb-toggle" type="button" onclick="toggleKb('${esc(a.slug)}',this)">Read article &#8595;</button>
  </article>`;
}

// cc#194: build the filter shell once (search + difficulty + category), then
// filter into #kb-list so typing in the search box never loses focus.
function renderKnowledge(){
  const feed = document.getElementById("feed");
  if(!kbArticles.length){
    feed.innerHTML = '<div class="msg">No articles yet — the Knowledge Hub is being written. Check back soon.</div>';
    return;
  }
  const cats = Object.keys(kbCatCounts).sort();
  _kbCats = cats;   // referenced by index from the chip onclicks (avoids string-escaping bugs, e.g. "Macro & Policy")
  const begN = kbDiffCounts["Beginner"]||0, proN = kbDiffCounts["Pro"]||0;
  const diffPills =
    '<span class="kb-pill'+(kbDiff==="all"?" on":"")+'" onclick="setKbDiff(\'all\')">All</span>'+
    '<span class="kb-pill beg'+(kbDiff==="Beginner"?" on":"")+'" onclick="setKbDiff(\'Beginner\')">Beginner'+(begN?' ('+begN+')':'')+'</span>'+
    '<span class="kb-pill pro'+(kbDiff==="Pro"?" on":"")+'" onclick="setKbDiff(\'Pro\')">Pro'+(proN?' ('+proN+')':'')+'</span>';
  // cc#195: Topics as a vertical list on desktop (left sidebar), horizontal
  // scroll chips on mobile — same elements, CSS switches the layout.
  const topics = ['<span class="kb-topic'+(kbCat==="all"?" on":"")+'" onclick="setKbCatIdx(-1)">All topics</span>']
    .concat(cats.map(function(c,i){
      return '<span class="kb-topic'+(kbCat===c?" on":"")+'" onclick="setKbCatIdx('+i+')">'+esc(c)+' <b>'+(kbCatCounts[c]||0)+'</b></span>';
    })).join("");
  feed.innerHTML =
    '<div class="kb-shell">'+
      '<aside class="kb-sidebar">'+
        '<div class="kb-search-wrap">'+
          '<input class="kb-search" id="kbSearch" type="text" placeholder="Search…" autocomplete="off" value="'+esc(kbSearch)+'">'+
          '<button class="kb-clear'+(kbSearch?" on":"")+'" id="kbClear" type="button" aria-label="Clear search" onclick="clearKbSearch()">&times;</button>'+
        '</div>'+
        '<div class="kb-sgroup"><div class="kb-slabel">Level</div><div class="kb-diff">'+diffPills+'</div></div>'+
        (cats.length>1 ? '<div class="kb-sgroup"><div class="kb-slabel">Topics</div><div class="kb-topics">'+topics+'</div></div>' : '')+
      '</aside>'+
      '<div class="kb-main">'+
        '<div class="kb-galaxy" onclick="openGalaxy()">'+
          '<canvas id="kbGalaxyThumb"></canvas>'+
          '<div class="kb-galaxy-ov">'+
            '<div class="kb-galaxy-ttl">✦ Knowledge Galaxy</div>'+
            '<div class="kb-galaxy-sub">'+kbArticles.length+' articles · '+cats.length+' topics · explore the learning map</div>'+
            '<button class="kb-galaxy-btn" type="button" onclick="event.stopPropagation();openGalaxy()">View Learning Map</button>'+
          '</div>'+
        '</div>'+
        '<div class="kb-count" id="kbCount"></div><div id="kb-list"></div>'+
      '</div>'+
    '</div>';
  drawGalaxyThumb();
  const si = document.getElementById("kbSearch");
  si.addEventListener("input", function(){
    kbSearch = si.value;
    document.getElementById("kbClear").classList.toggle("on", !!kbSearch);
    clearTimeout(_kbSearchDeb);
    _kbSearchDeb = setTimeout(applyKbFilters, 180);
  });
  applyKbFilters();
}

function applyKbFilters(){
  const list = document.getElementById("kb-list");
  if(!list) return;
  const q = kbSearch.trim().toLowerCase();
  const rows = kbArticles.filter(function(a){
    if(kbDiff !== "all" && a.difficulty !== kbDiff) return false;
    if(kbCat  !== "all" && a.category   !== kbCat)  return false;
    if(q){
      const hay = ((a.title||"")+" "+(a.summary||"")).toLowerCase();
      if(hay.indexOf(q) < 0) return false;
    }
    return true;
  });
  const filtered = (kbDiff!=="all" || kbCat!=="all" || q);
  const cnt = document.getElementById("kbCount");
  if(cnt) cnt.textContent = rows.length + (rows.length===1?" article":" articles") + (filtered?" match":"");
  if(!rows.length){
    list.innerHTML = '<div class="msg">No articles match these filters. Clear the search or pick a different category.</div>';
    return;
  }
  list.innerHTML = rows.map(kbCard).join("");
}

function setKbDiff(d){ kbDiff = d; renderKnowledge(); }
function setKbCatIdx(i){ kbCat = (i < 0 ? "all" : _kbCats[i]); renderKnowledge(); }
function clearKbSearch(){
  kbSearch = "";
  const si = document.getElementById("kbSearch");
  if(si){ si.value = ""; si.focus(); }
  const cl = document.getElementById("kbClear"); if(cl) cl.classList.remove("on");
  applyKbFilters();
}

async function toggleKb(slug, btn){
  const card = document.getElementById("kb-"+slug);
  if(!card) return;
  const body = card.querySelector(".kb-body");
  if(body.style.display !== "none"){          // collapse
    body.style.display = "none";
    btn.innerHTML = "Read article &#8595;";
    return;
  }
  btn.disabled = true;
  try{
    let md = _kbCache[slug];
    if(md == null){
      const r = await fetch(`${API}/api/knowledge/articles/${encodeURIComponent(slug)}`);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      md = d.content_md || "";
      _kbCache[slug] = md;
    }
    body.innerHTML = md.trim() ? renderMd(md) : `<p class="art-soon">Full article coming soon.</p>`;
    body.style.display = "block";
    btn.innerHTML = "Collapse &#8593;";
  }catch(e){
    body.innerHTML = `<p class="art-soon">Could not load article (${esc(e.message)}).</p>`;
    body.style.display = "block";
  }finally{
    btn.disabled = false;
  }
}

function render(){
  if(curCat === "learn"){ renderKnowledge(); return; }
  let rows = articles.slice();
  if(SEARCH_TABS.includes(curCat)){
    const q = (document.getElementById("symSearch").value || "").trim().toUpperCase();
    if(q) rows = rows.filter(a => symStr(a).toUpperCase().includes(q));
  }
  const feed = document.getElementById("feed");
  if(!rows.length){
    feed.innerHTML = '<div class="msg">No articles for this filter yet.</div>';
    return;
  }
  let html;
  if(curCat === "all"){
    html = rows.map((a,i) => a.category === "AI Editorial" ? artFull(a, i===0) : artCompact(a, true)).join("");
  } else if(curCat === "ai_editorial"){
    html = rows.map((a,i) => artFull(a, i===0)).join("");
  } else {
    html = rows.map(a => artCompact(a, false)).join("");
  }
  // cc#492: quiet end-of-list state once pagination is exhausted (cap or true end) —
  // no error, just a soft footer note.
  if(!newsHasMore){
    html += `<div class="feed-end">You're all caught up${articles.length>=NEWS_CAP?` — showing the latest ${NEWS_CAP}`:''}.</div>`;
  }
  feed.innerHTML = html;
}

if(window.self!==window.top||new URLSearchParams(location.search).has('embed')){
  var _mn=document.getElementById('scorr-nav'); if(_mn) _mn.style.display='none';
}

buildTabs();
document.getElementById("searchbar").style.display = SEARCH_TABS.includes(curCat) ? "block" : "none";
load();
</script>
<script>
/* cc#196 — Knowledge Galaxy wiring (Knowledge Hub = instance #1 of galaxy_map.js) */
var CAT_COLORS = {"Basics":"#60a5fa","Investing Styles":"#a78bfa","Market Mechanics":"#22d3ee","Instruments":"#f472b6","Macro & Policy":"#fbbf24","Analysis":"#34d399","Alternative Assets":"#fb7185","Planning & Tax":"#c084fc"};
var _galaxy = null, _galaxyCur = null;

function drawGalaxyThumb(){
  var cv = document.getElementById("kbGalaxyThumb"); if(!cv || !kbArticles.length) return;
  var w = cv.clientWidth||300, h=120, dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=w*dpr; cv.height=h*dpr; var g=cv.getContext("2d"); g.setTransform(dpr,0,0,dpr,0,0);
  g.fillStyle="#070b1a"; g.fillRect(0,0,w,h);
  var rg=g.createRadialGradient(w/2,h*0.4,0,w/2,h*0.4,w*0.7); rg.addColorStop(0,"rgba(30,45,90,.5)"); rg.addColorStop(1,"rgba(7,11,26,0)");
  g.fillStyle=rg; g.fillRect(0,0,w,h);
  var n=Math.min(kbArticles.length,60);
  for(var i=0;i<n;i++){ var a=kbArticles[i]; var seed=(i*2654435761+101)>>>0;
    var cx=(seed%1000)/1000*w, cy=((seed>>>10)%1000)/1000*h;
    var col=CAT_COLORS[a.category]||"#60a5fa"; var r=a.difficulty==="Pro"?2.6:1.7;
    g.globalAlpha=.85; g.fillStyle=col; g.beginPath(); g.arc(cx,cy,r,0,6.283); g.fill(); }
  g.globalAlpha=1;
}

function buildGalaxyConfig(){
  // cc#197 fix_1: derive categories from the ACTUAL articles (union) so no
  // category is ever dropped by a hardcoded map — every value gets its cluster.
  var seen={}; kbArticles.forEach(function(a){ if(a.category) seen[a.category]=1; });
  var cats=Object.keys(seen).sort().map(function(c){ return {name:c,color:CAT_COLORS[c]||"#8ca6e6"}; });
  var nodes=kbArticles.map(function(a){ return {
    id:a.slug, label:a.title, category:a.category,
    tier:(a.difficulty==="Pro"?"pro":"beginner"),
    sublabel:(a.reading_time_min?a.reading_time_min+" min read":""),
    payload:a }; });
  return {nodes:nodes, categories:cats, cacheKey:"knowledge", layout:"force"};
}

function galaxyDimPred(){
  var q=(kbSearch||"").trim().toLowerCase();
  if(kbDiff==="all" && kbCat==="all" && !q) return null;
  return function(nd){ var a=nd.payload;
    if(kbDiff!=="all" && a.difficulty!==kbDiff) return false;
    if(kbCat!=="all" && a.category!==kbCat) return false;
    if(q){ var hay=((a.title||"")+" "+(a.summary||"")).toLowerCase(); if(hay.indexOf(q)<0) return false; }
    return true; };
}

function ensureGalaxyOverlay(){
  if(document.getElementById("galaxyOverlay")) return;
  var o=document.createElement("div"); o.className="galaxy-overlay"; o.id="galaxyOverlay";
  o.innerHTML =
    '<div class="galaxy-canvas" id="galaxyCanvas"></div>'+
    '<div class="galaxy-topbar">'+
      '<button class="galaxy-back" onclick="closeGalaxy()" aria-label="Back to Intel"><span class="ga-arrow">‹</span>Intel</button>'+
      '<div class="galaxy-title">✦ Knowledge Galaxy <span class="galaxy-count" id="galaxyCount"></span></div>'+
      '<input class="galaxy-gsearch" id="galaxySearch" type="text" placeholder="Search…" autocomplete="off">'+
      '<span class="galaxy-gpill" id="gpAll" onclick="galaxySetDiff(\'all\')">All</span>'+
      '<span class="galaxy-gpill beg" id="gpBeg" onclick="galaxySetDiff(\'Beginner\')">Beg</span>'+
      '<span class="galaxy-gpill pro" id="gpPro" onclick="galaxySetDiff(\'Pro\')">Pro</span>'+
      '<button class="galaxy-close" onclick="closeGalaxy()" aria-label="Close">&times;</button>'+
    '</div>'+
    '<div class="galaxy-hint">drag to pan · scroll / pinch to zoom · tap a star to read · long-press for title</div>'+
    '<div class="galaxy-article" id="galaxyArticle">'+
      '<div class="ga-grab"></div>'+
      '<div class="ga-head"><div class="ga-chips" id="gaChips"></div><button class="ga-x" onclick="hideGalaxyArticle()" aria-label="Close">&times;</button></div>'+
      '<div class="ga-scroll" id="gaScroll"></div>'+
    '</div>';
  document.body.appendChild(o);
  document.getElementById("galaxySearch").addEventListener("input", function(){ kbSearch=this.value; galaxyRefreshDim(); });
}

function galaxySetDiff(d){ kbDiff=(kbDiff===d?"all":d); galaxyRefreshDim(); }
function galaxyRefreshDim(){
  var a=document.getElementById("gpAll"), be=document.getElementById("gpBeg"), pr=document.getElementById("gpPro");
  if(a) a.classList.toggle("on", kbDiff==="all");
  if(be) be.classList.toggle("on", kbDiff==="Beginner");
  if(pr) pr.classList.toggle("on", kbDiff==="Pro");
  if(_galaxy) _galaxy.setDim(galaxyDimPred());
}

function loadGalaxyScript(cb){
  if(window.GalaxyMap){ cb(); return; }
  var s=document.createElement("script"); s.src="/galaxy_map.js?v=203"; s.onload=cb;
  s.onerror=function(){ alert("Could not load the galaxy map."); };
  document.head.appendChild(s);
}

function openGalaxy(){
  if(!kbArticles.length) return;
  ensureGalaxyOverlay();
  document.getElementById("galaxyOverlay").classList.add("on");
  document.documentElement.style.overflow="hidden";
  var gs=document.getElementById("galaxySearch"); if(gs) gs.value=kbSearch||"";
  galaxyRefreshDim();
  loadGalaxyScript(function(){
    var host=document.getElementById("galaxyCanvas");
    if(_galaxy){ _galaxy.destroy(); _galaxy=null; }
    host.innerHTML="";
    _galaxy = GalaxyMap.create(host, buildGalaxyConfig(), {
      onTap: function(nd){ openGalaxyArticle(nd.payload); },   // cc#197 fix_3: open article in-page
      onCategoryTap: function(){}
    });
    _galaxy.setDim(galaxyDimPred());
    // cc#204: assert every article in the DB is a star (was silently dropping 20)
    console.assert(_galaxy._nodes.length === kbTotal,
      "Knowledge Galaxy: "+_galaxy._nodes.length+" stars vs api.total "+kbTotal);
    if(_galaxy._nodes.length !== kbArticles.length)
      console.warn("Knowledge Galaxy: node/article mismatch "+_galaxy._nodes.length+" vs "+kbArticles.length);
    else
      console.log("Knowledge Galaxy: "+_galaxy._nodes.length+" nodes across "+Object.keys(kbCatCounts).length+" constellations");
    // cc#204: visible count badge sourced from api.total — drift is self-evident forever
    var gb=document.getElementById("galaxyCount"); if(gb) gb.textContent=kbTotal+" topics";
  });
}

function closeGalaxy(){
  if(document.getElementById("galaxyArticle") && document.getElementById("galaxyArticle").classList.contains("on")){ hideGalaxyArticle(); return; }
  var ov=document.getElementById("galaxyOverlay"); if(ov) ov.classList.remove("on");
  document.documentElement.style.overflow="";
  if(typeof curCat!=="undefined" && curCat==="learn") renderKnowledge();   // resync sidebar + list with shared filter state
}

// cc#197 fix_3: tapping a star opens the FULL article in-page (no navigation).
// The galaxy instance is never destroyed, so zoom/pan is preserved on close.
function openGalaxyArticle(a){
  _galaxyCur=a;
  var panel=document.getElementById("galaxyArticle"); if(!panel) return;
  var chip = a.difficulty==="Pro" ? '<span class="kb-chip pro">Pro</span>' : (a.difficulty==="Beginner"?'<span class="kb-chip beg">Beginner</span>':"");
  var rt = a.reading_time_min ? '<span class="gd-rt">'+a.reading_time_min+' min read</span>' : "";
  document.getElementById("gaChips").innerHTML = '<span class="gd-cat">'+esc(a.category||"")+'</span>'+chip+rt;
  var sc=document.getElementById("gaScroll");
  sc.innerHTML = '<h1 class="ga-title">'+esc(a.title||"")+'</h1>'+
                 (a.summary?'<p class="ga-sum">'+esc(a.summary)+'</p>':'')+
                 '<div class="ga-body">Loading…</div>';
  sc.scrollTop=0;
  panel.classList.add("on");
  var slug=a.slug;
  function render(md){ var body=sc.querySelector(".ga-body"); if(!body) return;
    body.innerHTML = (md && md.trim()) ? renderMd(md) : '<p class="ga-soon">Full article coming soon.</p>'; }
  if(_kbCache[slug]!=null){ render(_kbCache[slug]); return; }   // lazy fetch, cache per slug
  fetch(API+"/api/knowledge/articles/"+encodeURIComponent(slug)).then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(d){ _kbCache[slug]=d.content_md||""; render(_kbCache[slug]); })
    .catch(function(){ render(""); });
}
function hideGalaxyArticle(){ var p=document.getElementById("galaxyArticle"); if(p) p.classList.remove("on"); }
</script>
