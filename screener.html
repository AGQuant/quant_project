<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>V12 Screener</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#0a9e63;--blue:#2563eb;--gold:#b45309;--red:#dd3a4a;--bg:#f7f8fc;--ink:#1c2536;--grey:#8a94a6}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column}
/* -- Canonical Scorr model-nav -- */
.model-nav{display:flex;align-items:center;gap:2px;height:46px;background:#fff;border-bottom:1px solid #e4e9f1;padding:0 16px;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(20,35,70,.06);flex-shrink:0}
.model-nav::-webkit-scrollbar{display:none}
.mnav-item{display:flex;align-items:center;gap:5px;padding:0 11px;height:46px;cursor:pointer;border-bottom:2px solid transparent;text-decoration:none;white-space:nowrap;flex-shrink:0;color:#5a6781;font-size:11.5px;font-weight:600;transition:.12s}
.mnav-item:hover{color:#1c2536}
.mnav-item.active{border-bottom-color:var(--blue);color:var(--blue)}
.mnav-sep{width:1px;height:20px;background:#e4e9f1;flex-shrink:0;margin:0 4px}

/* -- two-column shell -- */
.shell{flex:1;display:flex;min-height:0;overflow:hidden}
.fpanel{width:280px;flex-shrink:0;background:#fff;border-right:1px solid #e9edf4;overflow-y:auto;padding:16px 16px 40px;scrollbar-width:thin}
.rpanel{flex:1;min-width:0;overflow-y:auto;padding:20px 22px 60px;display:flex;flex-direction:column}

/* filter panel head */
.fhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.fhead .ttl{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--grey);text-transform:uppercase}
.reset{font-size:11px;font-weight:700;color:var(--blue);cursor:pointer;text-decoration:none}
.reset:hover{text-decoration:underline}

/* cc#191 — saved filter themes (presets), same UI as V13 */
.presets{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f4f9}
.psave{height:28px;padding:0 11px;border:1px dashed var(--blue);border-radius:14px;background:#eef4ff;color:var(--blue);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.psave:hover{background:var(--blue);color:#fff}
.pchip{display:inline-flex;align-items:center;gap:2px;height:28px;padding:0 4px 0 10px;border:1px solid #dce2ec;border-radius:14px;background:#fff;font-size:11px;font-weight:600;color:#5a6781;user-select:none}
.pchip .pname{cursor:pointer;padding:0 2px}
.pchip:hover{border-color:var(--blue)}
.pchip.active{background:var(--blue);border-color:var(--blue);color:#fff}
.pchip .picon{width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-size:11px;opacity:.55;cursor:pointer;color:inherit}
.pchip .picon:hover{opacity:1;background:rgba(20,35,70,.10)}
.pchip.active .picon:hover{background:rgba(255,255,255,.28)}
.pempty{font-size:10.5px;color:var(--grey);font-style:italic}

/* each filter block */
.fb{padding:13px 0;border-top:1px solid #f1f4f9}
.fb:first-of-type{border-top:none}
.fb>.lab{font-size:10px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:block}
.rng{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rng:last-child{margin-bottom:0}
.rng input[type=range]{flex:1;accent-color:var(--blue);height:3px}
.rng .v{font-size:11px;font-weight:700;color:var(--ink);min-width:38px;text-align:right;font-variant-numeric:tabular-nums}
.rng .e{font-size:9.5px;color:var(--grey);width:26px;font-weight:600}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:5px 10px;border:1px solid #dce2ec;border-radius:13px;background:#fff;color:#5a6781;font-size:10.5px;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;transition:.1s}
.pill:hover{border-color:#b9c4d6}
.pill.on{background:var(--blue);border-color:var(--blue);color:#fff}
.nums{display:flex;align-items:center;gap:6px}
input[type=number]{width:100%;padding:7px 8px;border:1px solid #dce2ec;border-radius:7px;font-size:12px;font-family:inherit;outline:none;background:#fff}
input[type=number]:focus{border-color:var(--blue)}
.nums .sepw{color:var(--grey);font-size:11px;flex-shrink:0}
.tog{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-weight:600;color:var(--ink)}
.tog input{width:15px;height:15px;accent-color:var(--green)}
/* segment search dropdown */
.segsearch input[type=text]{width:100%;padding:7px 9px;border:1px solid #dce2ec;border-radius:7px;font-size:12px;font-family:inherit;outline:none;margin-bottom:6px}
.segsearch input[type=text]:focus{border-color:var(--blue)}
.seglist{max-height:148px;overflow-y:auto;border:1px solid #eef1f6;border-radius:7px;padding:4px;scrollbar-width:thin}
.seglist label{display:flex;align-items:center;gap:7px;padding:4px 6px;font-size:11.5px;font-weight:500;border-radius:5px;cursor:pointer;white-space:nowrap}
.seglist label:hover{background:#f1f4f9}
.seglist label.hide{display:none}
.seglist input{width:14px;height:14px;accent-color:var(--blue);flex-shrink:0}
.segcount{font-size:9.5px;color:var(--grey);margin-top:5px}

/* results panel */
.rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.rcount{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--green)}
.rcount.zero{color:var(--grey)}
.rcount .lbl{font-size:13px;font-weight:600;color:var(--grey);margin-left:4px}
.rsub{font-size:11px;color:var(--grey);margin-bottom:16px}
.list{display:flex;flex-direction:column}
.row{display:grid;grid-template-columns:96px 1fr auto auto;align-items:center;gap:14px;padding:11px 12px;border-radius:8px;cursor:pointer;text-decoration:none;color:inherit;transition:.08s}
.row:nth-child(odd){background:#fbfcfe}
.row:hover{background:#eef4ff}
.row .sym{font-weight:800;color:var(--blue);font-size:13px}
.row .nm{color:#3a4760;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .gvm{font-weight:800;font-size:13px;font-variant-numeric:tabular-nums;min-width:34px;text-align:right}
.gvm.g4{color:var(--green)}.gvm.g3{color:var(--blue)}.gvm.g2{color:var(--gold)}.gvm.g1{color:var(--red)}
.vchip{display:inline-flex;align-items:center;justify-content:center;padding:3px 9px;border-radius:11px;font-size:9.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap}
.vchip.g4{background:#d6f3e6;color:#066b46}.vchip.g3{background:#dbeafe;color:#1e40af}.vchip.g2{background:#fcefd9;color:#92510a}.vchip.g1{background:#fde0e3;color:#9f2230}
.more{text-align:center;padding:16px 10px;color:var(--grey);font-size:11.5px}
.empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--grey);font-size:13px;padding:60px 20px;line-height:1.6}
/* skeleton */
.skrow{height:42px;border-radius:8px;margin-bottom:6px;background:linear-gradient(90deg,#f1f4f9 25%,#e7ecf3 37%,#f1f4f9 63%);background-size:400% 100%;animation:sh 1.2s ease infinite}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
.hint{font-size:10.5px;color:var(--blue);font-weight:700;margin-left:6px;opacity:0;transition:.15s}
.hint.on{opacity:1}

/* mobile filter toggle */
.fbtn{display:none}
@media(max-width:768px){
  .shell{flex-direction:column;overflow:visible}
  .fbtn{display:block;width:100%;padding:11px;border:none;border-bottom:1px solid #e4e9f1;background:#fff;font-size:13px;font-weight:700;color:var(--blue);cursor:pointer;font-family:inherit;flex-shrink:0}
  .fpanel{width:100%;border-right:none;border-bottom:1px solid #e9edf4;max-height:none;overflow:visible;display:none;padding-bottom:18px}
  .fpanel.open{display:block}
  .rpanel{overflow:visible;padding:16px 14px 50px}
  .row{grid-template-columns:80px 1fr auto auto;gap:10px}
  .row .nm{font-size:12px}
  .pchip{height:38px;border-radius:19px}
  .pchip .picon{width:28px;height:28px;font-size:13px}
  .psave{height:38px;border-radius:19px}
}
</style>
</head>

<button class="fbtn" id="fbtn" onclick="document.getElementById('fpanel').classList.toggle('open')">&#9776; Filters</button>

<div class="shell">
  <!-- LEFT: filters (rendered from the FILTERS config) -->
  <aside class="fpanel" id="fpanel">
    <div class="presets" id="presets"></div>
    <div class="fhead">
      <span class="ttl">Filters</span>
      <a class="reset" onclick="resetAll()">Reset</a>
    </div>
    <div id="fbody"></div>
  </aside>

  <!-- RIGHT: live results -->
  <main class="rpanel">
    <div class="rhead">
      <span class="rcount zero" id="rcount">&mdash;</span>
      <span class="hint" id="hint">updating&hellip;</span>
    </div>
    <div class="rsub" id="rsub">GVM + V8 + fundamentals + technicals &middot; live as you filter</div>
    <div class="list" id="list"></div>
  </main>
</div>

<script>
var SIZE = 50;
var SCOPE = "v12";                         // cc#191: preset namespace

// ── cc#191: single filter config — ADDING a filter later = one entry here,
//    not new hardcoded HTML/JS. Types: range | numrange | num | pills |
//    segments | checkbox. Element ids for scalar controls equal their query
//    param name, so buildQuery/state stay mechanical.
var FILTERS = [
  {key:"gvm",              type:"range",    label:"GVM Score",              min:0, max:10,  step:0.5, dmin:6, dmax:10,  dec:1, qmin:"gvm_min",              qmax:"gvm_max"},
  {key:"verdict",          type:"pills",    label:"Verdict",   q:"verdict",   options:["EXCELLENT","GOOD","AVERAGE","WEAK"]},
  {key:"v8_basket",        type:"pills",    label:"V8 Basket", q:"v8_basket", options:["buy_reversal","buy_momentum","sell_reversal","sell_momentum","sell_overbought"]},
  {key:"category",         type:"pills",    label:"Category",  q:"category",  options:["Large","Mid","Small"]},
  {key:"segment",          type:"segments", label:"Segment",   q:"segment"},
  {key:"rsi_weekly",       type:"range",    label:"RSI Weekly",             min:0, max:100, step:1,   dmin:0, dmax:100, dec:0, qmin:"rsi_weekly_min",       qmax:"rsi_weekly_max"},
  {key:"dma_50",           type:"numrange", label:"DMA 50 % (min / max)",   qmin:"dma_50_min",          qmax:"dma_50_max"},
  {key:"roce",             type:"num",      label:"ROCE Min %",             ph:"e.g. 15", q:"roce_min"},
  {key:"profit_growth_3y", type:"num",      label:"Profit Growth 3Y Min %", ph:"e.g. 10", q:"profit_growth_3y_min"},
  {key:"exclude_blackout", type:"checkbox", label:"Blackout", text:"Exclude blackout stocks", dval:true, q:"exclude_blackout"},
];

var sel = {};          // pills state: key -> [selected]
var segChecked = [];   // segment state

function $(id){ return document.getElementById(id); }
var EMBED = (window.self !== window.top) || new URLSearchParams(location.search).has('embed');

// ── render the panel from FILTERS ──────────────────────────────────────────
function renderPanel(){
  var html = "";
  FILTERS.forEach(function(f){
    html += '<div class="fb"><span class="lab">'+f.label+'</span>';
    if(f.type==="range"){
      html += '<div class="rng"><span class="e">min</span><input type="range" id="'+f.qmin+'" min="'+f.min+'" max="'+f.max+'" step="'+f.step+'" value="'+f.dmin+'"><span class="v" id="'+f.qmin+'_v">'+f.dmin.toFixed(f.dec)+'</span></div>'
            + '<div class="rng"><span class="e">max</span><input type="range" id="'+f.qmax+'" min="'+f.min+'" max="'+f.max+'" step="'+f.step+'" value="'+f.dmax+'"><span class="v" id="'+f.qmax+'_v">'+f.dmax.toFixed(f.dec)+'</span></div>';
    } else if(f.type==="pills"){
      sel[f.key] = [];
      html += '<div class="pills" id="'+f.key+'"></div>';
    } else if(f.type==="segments"){
      html += '<div class="segsearch"><input type="text" id="seg_search" placeholder="Search segments..." oninput="filterSegs()">'
            + '<div class="seglist" id="seg_list"></div><div class="segcount" id="seg_count">All segments</div></div>';
    } else if(f.type==="numrange"){
      html += '<div class="nums"><input type="number" id="'+f.qmin+'" placeholder="min"><span class="sepw">to</span><input type="number" id="'+f.qmax+'" placeholder="max"></div>';
    } else if(f.type==="num"){
      html += '<input type="number" id="'+f.q+'" placeholder="'+(f.ph||"")+'">';
    } else if(f.type==="checkbox"){
      html += '<label class="tog"><input type="checkbox" id="'+f.q+'"'+(f.dval?" checked":"")+'> '+(f.text||f.label)+'</label>';
    }
    html += '</div>';
  });
  $("fbody").innerHTML = html;

  // wire reactivity + build pill sets
  FILTERS.forEach(function(f){
    if(f.type==="range"){
      [f.qmin,f.qmax].forEach(function(id){ $(id).addEventListener("input", function(){ lbl(); schedule(); }); });
    } else if(f.type==="numrange"){
      [f.qmin,f.qmax].forEach(function(id){ $(id).addEventListener("input", schedule); });
    } else if(f.type==="num"){
      $(f.q).addEventListener("input", schedule);
    } else if(f.type==="checkbox"){
      $(f.q).addEventListener("change", schedule);
    } else if(f.type==="pills"){
      buildPills(f);
    }
  });
}

function buildPills(f){
  var host=$(f.key); if(!host) return; host.innerHTML="";
  f.options.forEach(function(val){
    var b=document.createElement("span"); b.className="pill"; b.textContent=val;
    b.setAttribute("data-val", val);
    b.onclick=function(){
      var i=sel[f.key].indexOf(val);
      if(i>=0){ sel[f.key].splice(i,1); b.classList.remove("on"); }
      else { sel[f.key].push(val); b.classList.add("on"); }
      schedule();
    };
    host.appendChild(b);
  });
}

function lbl(){
  FILTERS.forEach(function(f){
    if(f.type!=="range") return;
    $(f.qmin+"_v").textContent = Number($(f.qmin).value).toFixed(f.dec);
    $(f.qmax+"_v").textContent = Number($(f.qmax).value).toFixed(f.dec);
  });
}

async function loadMeta(){
  try{
    var d=await(await fetch("/api/v12/filters/meta")).json();
    var list=$("seg_list"); if(!list) return;
    (d.segments||[]).forEach(function(s){
      var l=document.createElement("label"); l.setAttribute("data-seg", s.segment.toLowerCase());
      var cb=document.createElement("input"); cb.type="checkbox"; cb.value=s.segment;
      cb.onchange=function(){
        var i=segChecked.indexOf(s.segment);
        if(cb.checked&&i<0) segChecked.push(s.segment);
        else if(!cb.checked&&i>=0) segChecked.splice(i,1);
        $("seg_count").textContent = segChecked.length ? (segChecked.length+" selected") : "All segments";
        schedule();
      };
      l.appendChild(cb); l.appendChild(document.createTextNode(" "+s.segment+" ("+s.count+")"));
      list.appendChild(l);
    });
    syncSegBoxes();   // re-check any segments already in state (e.g. from a loaded preset)
  }catch(e){}
}
function filterSegs(){
  var q=$("seg_search").value.trim().toLowerCase();
  $("seg_list").querySelectorAll("label").forEach(function(l){
    var hit = !q || l.getAttribute("data-seg").indexOf(q)>-1;
    l.classList.toggle("hide", !hit);
  });
}
function syncSegBoxes(){
  var list=$("seg_list"); if(!list) return;
  list.querySelectorAll("input").forEach(function(cb){ cb.checked = segChecked.indexOf(cb.value)>-1; });
  $("seg_count").textContent = segChecked.length ? (segChecked.length+" selected") : "All segments";
}

function numVal(id){ var el=$(id); if(!el) return null; var v=el.value.trim(); return v===""?null:v; }
function addNum(p,id){ var v=numVal(id); if(v!==null) p.append(id, v); }

// only non-default values -> clean URL (per FILTERS config)
function buildQuery(){
  var p=new URLSearchParams();
  FILTERS.forEach(function(f){
    if(f.type==="range"){
      var mn=Number($(f.qmin).value), mx=Number($(f.qmax).value);
      if(mn!==f.dmin) p.append(f.qmin, mn);
      if(mx!==f.dmax) p.append(f.qmax, mx);
    } else if(f.type==="pills"){
      (sel[f.key]||[]).forEach(function(v){ p.append(f.q, v); });
    } else if(f.type==="segments"){
      segChecked.forEach(function(s){ p.append(f.q, s); });
    } else if(f.type==="numrange"){
      addNum(p,f.qmin); addNum(p,f.qmax);
    } else if(f.type==="num"){
      addNum(p,f.q);
    } else if(f.type==="checkbox"){
      if($(f.q).checked !== f.dval) p.append(f.q, String($(f.q).checked));
    }
  });
  p.append("size", SIZE);
  return p;
}

// ── cc#191: capture / restore full filter state (preset payload) ────────────
function captureState(){
  var st={};
  FILTERS.forEach(function(f){
    if(f.type==="range")        st[f.key]={min:Number($(f.qmin).value), max:Number($(f.qmax).value)};
    else if(f.type==="pills")   st[f.key]=(sel[f.key]||[]).slice();
    else if(f.type==="segments")st[f.key]=segChecked.slice();
    else if(f.type==="numrange")st[f.key]={min:($(f.qmin).value||""), max:($(f.qmax).value||"")};
    else if(f.type==="num")     st[f.key]=($(f.q).value||"");
    else if(f.type==="checkbox")st[f.key]=$(f.q).checked;
  });
  return st;
}
function applyState(st){
  st = st || {};
  FILTERS.forEach(function(f){
    var v = st[f.key];
    if(f.type==="range"){
      if(v){ $(f.qmin).value = (v.min!=null?v.min:f.dmin); $(f.qmax).value = (v.max!=null?v.max:f.dmax); }
      else { $(f.qmin).value=f.dmin; $(f.qmax).value=f.dmax; }
    } else if(f.type==="pills"){
      sel[f.key] = Array.isArray(v)? v.slice() : [];
      $(f.key).querySelectorAll(".pill").forEach(function(b){
        b.classList.toggle("on", sel[f.key].indexOf(b.getAttribute("data-val"))>-1);
      });
    } else if(f.type==="segments"){
      segChecked = Array.isArray(v)? v.slice() : [];
      syncSegBoxes();
    } else if(f.type==="numrange"){
      $(f.qmin).value = (v&&v.min!=null)? v.min : "";
      $(f.qmax).value = (v&&v.max!=null)? v.max : "";
    } else if(f.type==="num"){
      $(f.q).value = (v!=null)? v : "";
    } else if(f.type==="checkbox"){
      $(f.q).checked = (v!=null)? !!v : f.dval;
    }
  });
  lbl(); run();
}

function gvmClass(v){
  if(v==null) return "g3";
  v=Number(v);
  if(v>=8) return "g4"; if(v>=6.5) return "g3"; if(v>=5) return "g2"; return "g1";
}
function vchipClass(v){
  return {excellent:"g4",good:"g3",average:"g2",weak:"g1"}[String(v||"").toLowerCase()]||"g3";
}
function openGvm(sym){
  var url="/cio2?model=gvm&symbol="+encodeURIComponent(sym);
  (EMBED ? window.top : window).location.href = url;
}

function rowHtml(r){
  var g=r.gvm_score;
  return '<a class="row" onclick="openGvm(\''+r.symbol.replace(/'/g,"")+'\')">'+
    '<span class="sym">'+r.symbol+'</span>'+
    '<span class="nm">'+(r.company_name||"&mdash;")+'</span>'+
    '<span class="gvm '+gvmClass(g)+'">'+(g==null?"&mdash;":Number(g).toFixed(1))+'</span>'+
    (r.verdict?'<span class="vchip '+vchipClass(r.verdict)+'">'+r.verdict+'</span>':'<span class="vchip g3">&mdash;</span>')+
  '</a>';
}

var seq=0;
function showSkeleton(){
  var rows=""; for(var i=0;i<8;i++) rows+='<div class="skrow"></div>';
  $("list").innerHTML=rows;
}
function setCount(n){
  var c=$("rcount");
  c.innerHTML = n + '<span class="lbl">'+(n===1?"company found":"companies found")+'</span>';
  c.classList.toggle("zero", n===0);
}

async function run(){
  var my=++seq;
  $("hint").classList.add("on");
  try{
    var p=buildQuery();
    var d=await(await fetch("/api/v12/screen?"+p.toString())).json();
    if(my!==seq) return;                 // a newer request superseded this one
    var rows=d.stocks||[], total=d.total||0;
    setCount(total);
    var nf=(d.filters_applied||[]).filter(function(x){return x!=="exclude_blackout";}).length;
    $("rsub").textContent = nf ? (nf+" filter"+(nf>1?"s":"")+" active") : "No filters — full universe";
    if(!rows.length){
      $("list").innerHTML='<div class="empty">No stocks match these filters.<br>Try widening the GVM range or clearing some pills.</div>';
    } else {
      var html=rows.map(rowHtml).join("");
      if(total>rows.length) html+='<div class="more">Showing '+rows.length+' of '+total+' — scroll the list or tighten filters to narrow down.</div>';
      $("list").innerHTML=html;
    }
  }catch(e){
    if(my!==seq) return;
    setCount(0);
    $("list").innerHTML='<div class="empty">Could not load results.<br>'+(e.message||"")+'</div>';
  }finally{
    if(my===seq) $("hint").classList.remove("on");
  }
}

var deb;
function schedule(){
  $("hint").classList.add("on");
  clearTimeout(deb);
  deb=setTimeout(run, 300);
}

function resetAll(){
  FILTERS.forEach(function(f){
    if(f.type==="range"){ $(f.qmin).value=f.dmin; $(f.qmax).value=f.dmax; }
    else if(f.type==="pills"){ sel[f.key]=[]; }
    else if(f.type==="segments"){ segChecked=[]; if($("seg_search")) $("seg_search").value=""; }
    else if(f.type==="numrange"){ $(f.qmin).value=""; $(f.qmax).value=""; }
    else if(f.type==="num"){ $(f.q).value=""; }
    else if(f.type==="checkbox"){ $(f.q).checked=f.dval; }
  });
  document.querySelectorAll(".pill.on").forEach(function(b){ b.classList.remove("on"); });
  syncSegBoxes(); if($("seg_list")){ filterSegs(); }
  ACTIVE_PRESET=null; renderPresets();
  lbl(); run();
}

// ── cc#191: saved filter themes (presets), scope=v12 ────────────────────────
var PRESETS=[], ACTIVE_PRESET=null;
async function loadPresets(){
  try{
    var r=await fetch("/api/v13/presets?scope="+SCOPE);
    if(!r.ok) return;                          // 401 when not authed — skip
    var j=await r.json(); PRESETS=j.presets||[];
    if(ACTIVE_PRESET!=null && !PRESETS.some(function(p){return p.id===ACTIVE_PRESET;})) ACTIVE_PRESET=null;
    renderPresets();
  }catch(e){}
}
function renderPresets(){
  var el=$("presets"); if(!el) return;
  var html='<button class="psave" onclick="savePreset()">&#43; Save theme</button>';
  if(!PRESETS.length){ html+='<span class="pempty">No saved themes</span>'; }
  else PRESETS.forEach(function(p){
    var act=p.id===ACTIVE_PRESET?' active':'';
    var nm=String(p.name).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    html+='<span class="pchip'+act+'">'
        +'<span class="pname" onclick="applyPreset('+p.id+')" title="Load theme">'+nm+'</span>'
        +'<span class="picon" onclick="renamePreset('+p.id+',event)" title="Rename">&#9998;</span>'
        +'<span class="picon" onclick="deletePreset('+p.id+',event)" title="Delete">&times;</span>'
        +'</span>';
  });
  el.innerHTML=html;
}
async function savePreset(){
  var active=PRESETS.find(function(p){return p.id===ACTIVE_PRESET;});
  var name=(prompt("Save current filters as theme:", active?active.name:"")||"").trim();
  if(!name) return;
  try{
    var r=await fetch("/api/v13/presets",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name:name, scope:SCOPE, filters:captureState()})});
    if(!r.ok){ alert("Could not save theme ("+r.status+")"); return; }
    var j=await r.json(); ACTIVE_PRESET=j.preset&&j.preset.id;
    await loadPresets();
  }catch(e){ alert("Could not save theme: "+e.message); }
}
function applyPreset(id){
  var p=PRESETS.find(function(x){return x.id===id;}); if(!p) return;
  ACTIVE_PRESET=id; applyState(p.filters); renderPresets();
}
async function renamePreset(id,ev){
  if(ev) ev.stopPropagation();
  var p=PRESETS.find(function(x){return x.id===id;}); if(!p) return;
  var name=(prompt("Rename theme:", p.name)||"").trim();
  if(!name||name===p.name) return;
  try{
    var r=await fetch("/api/v13/presets/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:name})});
    if(!r.ok){ alert(r.status===409?"That name is already taken":"Rename failed ("+r.status+")"); return; }
    await loadPresets();
  }catch(e){ alert("Rename failed: "+e.message); }
}
async function deletePreset(id,ev){
  if(ev) ev.stopPropagation();
  var p=PRESETS.find(function(x){return x.id===id;}); if(!p) return;
  if(!confirm('Delete theme "'+p.name+'"?')) return;
  try{
    var r=await fetch("/api/v13/presets/"+id,{method:"DELETE"});
    if(!r.ok){ alert("Delete failed ("+r.status+")"); return; }
    if(ACTIVE_PRESET===id) ACTIVE_PRESET=null;
    await loadPresets();
  }catch(e){ alert("Delete failed: "+e.message); }
}

// ── boot ────────────────────────────────────────────────────────────────────
renderPanel();
lbl();
showSkeleton();
loadMeta();
loadPresets();
run();
</script>
