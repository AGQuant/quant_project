<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V8 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@400;500;600;700;800&display=swap');

  :root{
    --bg:#070b14; --bg2:#0b1220; --panel:#0e1626; --panel2:#111c30;
    --line:#1c2940; --line2:#27374f;
    --txt:#dbe4f0; --mut:#7e90ac; --dim:#566080;
    --grn:#27d796; --grn-d:#0f3b2c;
    --red:#ff5e6c; --red-d:#3a1620;
    --blu:#3d8bff; --cyan:#28c8d8; --amber:#f5b53d;
    --shadow:0 10px 40px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:
    radial-gradient(1200px 600px at 80% -10%, #11203a55, transparent),
    radial-gradient(900px 500px at -10% 20%, #0c2a3855, transparent),
    var(--bg);
    color:var(--txt);font-family:'Sora',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1240px;margin:0 auto;padding:20px 18px 60px}

  /* ── Model nav bar ── */
  .model-nav{
    display:flex;align-items:center;gap:4px;
    background:#0b1220;border-bottom:1px solid var(--line);
    padding:0 18px;overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;position:sticky;top:0;z-index:100;
  }
  .model-nav::-webkit-scrollbar{display:none}
  .mnav-brand{font-size:13px;font-weight:800;color:var(--blu);letter-spacing:.5px;
    padding:10px 12px 10px 0;border-right:1px solid var(--line);margin-right:4px;white-space:nowrap}
  .mnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:8px 12px;cursor:pointer;border-bottom:2px solid transparent;
    text-decoration:none;transition:.15s;white-space:nowrap;flex-shrink:0}
  .mnav-item:hover{border-bottom-color:var(--line2)}
  .mnav-item.active{border-bottom-color:var(--blu)}
  .mnav-item .mi-icon{font-size:14px}
  .mnav-item .mi-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
  .mnav-item.active .mi-label{color:var(--blu)}
  .mnav-item:not(.active) .mi-label{color:var(--mut)}
  .mnav-item.soon .mi-label{color:var(--dim)}
  .mnav-item.soon{cursor:default;opacity:.45}
  .mnav-soon{font-size:8px;color:var(--dim);letter-spacing:.3px}

  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:14px 0 18px;border-bottom:1px solid var(--line)}
  .logo{font-weight:800;letter-spacing:.5px;font-size:20px}
  .logo b{color:var(--blu)}
  .tag{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
  .spacer{flex:1}
  .clock{font-family:'Space Mono';font-size:12px;color:var(--mut)}
  .clock b{color:var(--txt)}
  .btn{font:inherit;font-size:12px;font-weight:600;cursor:pointer;
    background:var(--panel2);color:var(--txt);border:1px solid var(--line2);
    padding:8px 14px;border-radius:8px;transition:.15s}
  .btn:hover{border-color:var(--blu);color:#fff}
  .btn.on{background:var(--grn-d);border-color:var(--grn);color:var(--grn)}
  .toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut)}

  .mood{margin:18px 0;border:1px solid var(--line);border-radius:14px;
    background:linear-gradient(135deg,var(--panel),var(--bg2));padding:16px 18px;
    display:flex;align-items:center;gap:22px;flex-wrap:wrap;box-shadow:var(--shadow)}
  .mood .big{font-size:22px;font-weight:800;letter-spacing:.5px}
  .mood .pill{font-size:11px;font-weight:700;padding:5px 12px;border-radius:30px;
    text-transform:uppercase;letter-spacing:1px}
  .moodChecks{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto}
  .chk{font-size:11px;font-family:'Space Mono';padding:6px 10px;border-radius:8px;
    border:1px solid var(--line2);background:var(--bg2)}
  .chk.pass{color:var(--grn);border-color:var(--grn-d)}
  .chk.fail{color:var(--red);border-color:var(--red-d)}
  .slots{display:flex;gap:14px;font-size:12px;color:var(--mut)}
  .slots b{font-size:18px;font-family:'Space Mono'}
  .slots .buy b{color:var(--grn)} .slots .sell b{color:var(--red)}

  /* ── Tabs ── */
  .tabs{display:flex;gap:4px;flex-wrap:wrap;margin:10px 0 0;
    border-bottom:1px solid var(--line);padding-bottom:0}
  .tab{font-size:12.5px;font-weight:600;color:var(--mut);cursor:pointer;
    padding:9px 13px;border-radius:8px 8px 0 0;border:1px solid transparent;
    border-bottom:none;position:relative;top:1px;transition:.15s}
  .tab:hover{color:var(--txt)}
  .tab.active{color:#fff;background:var(--panel);border-color:var(--line);
    box-shadow:0 -2px 0 var(--blu) inset}

  .panel{display:none;animation:fade .25s ease;padding-top:16px}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .ptitle{font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--cyan);
    text-transform:uppercase;margin:4px 0 12px;display:flex;gap:10px;align-items:center}
  .ptitle .ct{font-family:'Space Mono';font-size:11px;color:var(--dim);
    border:1px solid var(--line);padding:2px 8px;border-radius:20px}

  .sec-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:4px}
  .sec-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;position:relative;cursor:default}
  .sec-card .sc-num{position:absolute;top:8px;left:10px;font-family:'Space Mono';
    font-size:10px;color:var(--dim)}
  .sec-card .sc-name{font-size:11px;font-weight:600;color:var(--txt);margin-top:2px;
    line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .sec-card .sc-pct{font-family:'Space Mono';font-size:13px;font-weight:700;margin-top:6px}
  .sec-card .sc-top{font-size:10px;color:var(--mut);margin-top:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sec-card .sc-stocks{font-size:10px;color:var(--dim)}

  .scroll{overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{position:sticky;top:0;background:var(--panel2);color:var(--mut);font-weight:600;
    text-align:right;padding:10px 12px;border-bottom:1px solid var(--line2);
    white-space:nowrap;font-size:11px;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;
    user-select:none}
  th:first-child,td:first-child{text-align:left}
  th:hover{color:var(--txt)}
  td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--line);
    white-space:nowrap;font-family:'Space Mono';font-size:12px}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#16223a}

  .mob-cards{display:none;flex-direction:column;gap:8px}
  .mob-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .mob-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .mob-sym{font-family:'Sora';font-weight:700;font-size:14px;color:#fff}
  .mob-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;font-family:'Sora'}
  .mob-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .mob-chip{font-family:'Space Mono';font-size:11px;padding:3px 8px;border-radius:6px;
    background:var(--bg2);border:1px solid var(--line2);color:var(--txt)}
  .mob-pivot{margin-top:4px}

  @media(max-width:720px){
    .scroll table{min-width:unset}
    .desktop-only{display:none!important}
    .mob-cards{display:flex}
    .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:0}
    .tabs::-webkit-scrollbar{height:3px}
    .tabs::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
    .tab{white-space:nowrap;flex-shrink:0;padding:9px 11px;font-size:12px}
    .mood{flex-direction:column;align-items:flex-start;gap:12px}
    .moodChecks{margin-left:0}
    .cards{grid-template-columns:repeat(2,1fr)}
    .pivot-bar-wrap{width:120px!important}
  }
  @media(min-width:721px){
    .mob-cards{display:none!important}
    .desktop-only{display:block}
    table{min-width:640px}
  }

  .sym{font-family:'Sora';font-weight:600;color:#fff}
  .seg{font-family:'Sora';font-size:11px;color:var(--mut);text-align:left}
  .pos{color:var(--grn)} .neg{color:var(--red)}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;
    font-family:'Sora';letter-spacing:.5px}
  .b-long{background:var(--grn-d);color:var(--grn)}
  .b-short{background:var(--red-d);color:var(--red)}
  .b-tgt{background:var(--grn-d);color:var(--grn)}
  .b-sl{background:var(--red-d);color:var(--red)}
  .empty{padding:30px;text-align:center;color:var(--dim);font-size:13px}
  .err{padding:14px;color:var(--amber);font-size:12px;font-family:'Space Mono';
    border:1px dashed var(--amber);border-radius:10px;background:#2a200a;margin-bottom:10px}
  .score-hi{color:var(--grn)} .score-mid{color:var(--amber)} .score-lo{color:var(--red)}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .card .k{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  .card .v{font-size:24px;font-weight:800;font-family:'Space Mono';margin-top:6px}
  .card .v-sub{font-size:10px;color:var(--dim);margin-top:3px;font-family:'Space Mono'}

  .funnelGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
  .loading{color:var(--dim);font-size:12px;padding:20px;text-align:center;font-family:'Space Mono'}
  .subnav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .subnav .btn.on{background:var(--blu);border-color:var(--blu);color:#fff}

  /* ── Stock Check ── */
  .sc-form{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  .sc-input-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .sc-input{flex:1;min-width:160px;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;
    padding:10px 14px;color:var(--txt);font:inherit;font-size:14px;outline:none}
  .sc-input:focus{border-color:var(--blu)}
  .sc-side-row{display:flex;gap:8px;margin-bottom:12px}
  .sc-side{flex:1;padding:9px 0;border-radius:8px;border:1px solid var(--line2);
    background:transparent;color:var(--mut);font:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
  .sc-side.long.active{border-color:var(--grn);background:var(--grn-d);color:var(--grn)}
  .sc-side.short.active{border-color:var(--red);background:var(--red-d);color:var(--red)}
  .sc-gates{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .sc-gate{background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:12px}
  .sc-gate-label{font-size:11px;color:var(--mut);margin-bottom:8px;line-height:1.4}
  .sc-gate-btns{display:flex;gap:6px}
  .sc-gate-btn{flex:1;padding:6px 0;border-radius:6px;border:1px solid var(--line2);
    background:transparent;color:var(--mut);font:inherit;font-size:11px;cursor:pointer;transition:.15s}
  .sc-gate-btn.pass{border-color:var(--grn);background:var(--grn-d);color:var(--grn)}
  .sc-gate-btn.fail{border-color:var(--red);background:var(--red-d);color:var(--red)}
  .sc-run{width:100%;padding:12px;background:linear-gradient(135deg,#1a3a6b,var(--blu));
    color:#fff;border:none;border-radius:10px;font:inherit;font-weight:800;font-size:14px;
    cursor:pointer;letter-spacing:.5px;transition:.15s}
  .sc-run:hover{opacity:.9}
  .sc-run:disabled{background:var(--panel2);color:var(--dim);cursor:not-allowed}
  .sc-chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .sc-chip{background:var(--bg2);border:1px solid var(--line2);border-radius:16px;
    padding:5px 12px;font-size:11px;color:var(--txt);cursor:pointer;transition:.15s}
  .sc-chip:hover{border-color:var(--blu);color:#fff}
  .sc-verdict{border-radius:14px;padding:18px;margin-bottom:14px;text-align:center;border:2px solid}
  .sc-verdict.strong{border-color:var(--grn);background:var(--grn-d)}
  .sc-verdict.valid{border-color:var(--blu);background:#0d2040}
  .sc-verdict.watch{border-color:var(--amber);background:#2a200a}
  .sc-verdict-label{font-size:30px;font-weight:900;letter-spacing:1px}
  .sc-verdict.strong .sc-verdict-label{color:var(--grn)}
  .sc-verdict.valid .sc-verdict-label{color:var(--blu)}
  .sc-verdict.watch .sc-verdict-label{color:var(--amber)}
  .sc-verdict-sub{font-size:12px;color:var(--mut);margin-top:5px}
  .sc-verdict-score{font-size:18px;font-weight:800;margin-top:8px;font-family:'Space Mono'}
  .sc-tier{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .sc-tier-header{padding:10px 14px;background:var(--panel2);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .sc-tier-title{font-size:12px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.5px}

  .scan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
  .scan-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .scan-card .sk-sym{font-weight:700;font-size:12px;color:#fff;margin-bottom:5px}
  .scan-card .sk-score{font-family:'Space Mono';font-size:13px;font-weight:700;margin-bottom:4px}
  .scan-card .sk-chips{display:flex;flex-wrap:wrap;gap:4px}
  .scan-card .sk-chip{font-family:'Space Mono';font-size:10px;padding:1px 5px;
    border-radius:4px;background:var(--bg2);border:1px solid var(--line2)}
  .funnel-stages{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .funnel-stage{display:flex;align-items:center;gap:8px;padding:7px 12px;
    background:var(--panel);border:1px solid var(--line);border-radius:8px}
  .fs-name{flex:1;font-size:12px;color:var(--txt)}
  .fs-bar{width:80px;height:6px;background:var(--line2);border-radius:3px;overflow:hidden;flex-shrink:0}
  .fs-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
  .fs-surv{font-family:'Space Mono';font-size:11px;color:var(--grn);min-width:28px;text-align:right}
  .fs-kill{font-family:'Space Mono';font-size:11px;color:var(--red);min-width:36px;text-align:right}
  .pc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px}
  .pc-card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  .pc-card .pc-sym{font-weight:700;font-size:12px;color:#fff;margin-bottom:4px}
  .pc-card .pc-score{font-family:'Space Mono';font-size:14px;font-weight:700}
  .pc-card .pc-fail{font-size:10px;color:var(--mut);margin-top:3px;line-height:1.3}
  footer{margin-top:30px;padding-top:16px;border-top:1px solid var(--line);
    font-size:11px;color:var(--dim);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>

<!-- ── Model Nav Bar ── -->
<nav class="model-nav">
  <div class="mnav-brand">SCORR</div>
  <a class="mnav-item active" href="/dashboard">
    <span class="mi-icon">⚡</span>
    <span class="mi-label">V8</span>
  </a>
  <a class="mnav-item" href="/cio2?model=gvm">
    <span class="mi-icon">▦</span>
    <span class="mi-label">GVM</span>
  </a>
  <a class="mnav-item" href="/cio">
    <span class="mi-icon">◉</span>
    <span class="mi-label">Max</span>
  </a>
  <a class="mnav-item soon">
    <span class="mi-icon">⌂</span>
    <span class="mi-label">QB</span>
    <span class="mnav-soon">soon</span>
  </a>
  <a class="mnav-item soon">
    <span class="mi-icon">⟁</span>
    <span class="mi-label">V10</span>
    <span class="mnav-soon">soon</span>
  </a>
</nav>

<div class="wrap">
  <header>
    <div>
      <div class="logo">V8 <b>Dashboard</b></div>
      <div class="tag">Learn More. Score More.</div>
    </div>
    <div class="spacer"></div>
    <div class="clock" id="clock">—</div>
    <div class="toggle">
      <button class="btn on" id="autoBtn" onclick="toggleAuto()">Auto 5m: ON</button>
      <button class="btn" id="refreshBtn" onclick="loadAll()">↻ Refresh</button>
    </div>
  </header>

  <div class="mood" id="mood"><div class="loading">Loading market gate…</div></div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>

  <footer>
    <span id="apiNote">API: <span id="apiBase">—</span></span>
    <span id="lastUpd">Last refresh: —</span>
  </footer>
</div>

<script>
const API_BASE = "";
const BROKERAGE_PER_TRADE = 500;
const EP = {
  mood:         "/api/v8/market_mood",
  metricsAll:   "/api/v8/metrics/all",
  qualified:    b => `/api/v8/qualified/${b}`,
  sellOB:       "/api/v8/sell_overbought?limit=25",
  paper:        "/api/paper/status",
  scan:         "/api/v8/scan",
  funnelDetail: b => `/api/v8/funnel_detail/${b}`,
  passCount:    b => `/api/v8/stock_passcount/${b}`,
  tradeCheck:   "/api/trade-check/v34",
  scorr:        "/api/scorr/chat",
  gvmSearch:    q => `/api/gvm/search?q=${encodeURIComponent(q)}`,
};
const BASKETS = [
  {id:"buy_reversal",label:"Buy Reversal"},{id:"buy_momentum",label:"Buy Momentum"},
  {id:"sell_reversal",label:"Sell Reversal"},{id:"sell_momentum",label:"Sell Momentum"},
];
const ALL5 = [
  {id:"buy_reversal",label:"Buy Reversal"},{id:"buy_momentum",label:"Buy Momentum"},
  {id:"sell_reversal",label:"Sell Reversal"},{id:"sell_momentum",label:"Sell Momentum"},
  {id:"sell_overbought",label:"Sell Overbought"},
];
const TABS = ["Master Dashboard","Buy Reversal","Buy Momentum","Sell Reversal",
  "Sell Momentum","Sell Overbought","Trade Log","Raw Data","Filter Scan","Filter Funnel","Stock Check"];

let AUTO=true, autoTimer=null;
const cache={};

async function getJSON(path){
  const r=await fetch(API_BASE+path,{headers:{'Accept':'application/json'}});
  if(!r.ok) throw new Error(`${path} → HTTP ${r.status}`);
  return r.json();
}
function num(x,d=2){if(x===null||x===undefined||isNaN(x))return"—";return Number(x).toFixed(d);}
function sign(x,d=2){if(x===null||x===undefined||isNaN(x))return"—";const v=Number(x);return(v>=0?"+":"")+v.toFixed(d);}
function cls(x){if(x===null||x===undefined||isNaN(x))return"";return Number(x)>=0?"pos":"neg";}
function inr(x){if(x===null||x===undefined||isNaN(x))return"—";return"₹"+Number(x).toLocaleString('en-IN',{maximumFractionDigits:0});}
function pnlCls(x){return Number(x)>=0?"pos":"neg";}
function netPnl(pnl, trades){return (Number(pnl)||0) - (Number(trades)||1)*BROKERAGE_PER_TRADE;}

function fmtTs(ts){
  if(!ts)return"—";
  try{const d=new Date(ts),ist=new Date(d.getTime()+(5*60+30)*60000);
    return String(ist.getUTCDate()).padStart(2,'0')+' '+
      ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][ist.getUTCMonth()]+' '+
      String(ist.getUTCHours()).padStart(2,'0')+':'+String(ist.getUTCMinutes()).padStart(2,'0');
  }catch(e){return ts;}}

function fmtSince(ts){
  if(!ts)return"—";
  try{const d=new Date(ts),ist=new Date(d.getTime()+(5*60+30)*60000);
    return String(ist.getUTCDate()).padStart(2,'0')+'/'+
      ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][ist.getUTCMonth()]+' '+
      String(ist.getUTCHours()).padStart(2,'0')+':'+String(ist.getUTCMinutes()).padStart(2,'0');
  }catch(e){return"—";}}

function scoreClass(s,t){const p=t?s/t:0;return p>=.8?"score-hi":p>=.5?"score-mid":"score-lo";}

function tick(){
  const ist=new Date(Date.now()+(5*60+30)*60000);
  const hh=String(ist.getUTCHours()).padStart(2,'0'),mm=String(ist.getUTCMinutes()).padStart(2,'0'),ss=String(ist.getUTCSeconds()).padStart(2,'0');
  const mins=ist.getUTCHours()*60+ist.getUTCMinutes(),dow=ist.getUTCDay();
  const open=dow>=1&&dow<=5&&mins>=555&&mins<=930;

const SORTREG={};
function sortTbl(uid,cols,rows,rowFn,opts={}){
  SORTREG[uid]={cols,rows:rows||[],rowFn,sortKey:opts.sortKey??null,dir:opts.dir??-1,empty:opts.empty||"No rows"};
  return `<div id="tw_${uid}" class="desktop-only">${drawTbl(uid)}</div>`;
}
function drawTbl(uid){
  const t=SORTREG[uid];
  if(!t||!t.rows||!t.rows.length)return`<div class="scroll"><div class="empty">${t?t.empty:"No rows"}</div></div>`;
  let rows=t.rows;
  if(t.sortKey){rows=[...rows].sort((a,b)=>{
    const av=a[t.sortKey],bv=b[t.sortKey];
    if(typeof av==='string'||typeof bv==='string')return t.dir*String(av??'').localeCompare(String(bv??''));
    return t.dir*(((av===null||av===undefined)?-1e9:+av)-((bv===null||bv===undefined)?-1e9:+bv));
  });}
  const head=t.cols.map(([k,l])=>`<th onclick="tblSort('${uid}','${k}')">${l}${t.sortKey===k?(t.dir<0?' ▾':' ▴'):''}</th>`).join('');
  return`<div class="scroll"><table><thead><tr>${head}</tr></thead><tbody>${rows.map(t.rowFn).join('')}</tbody></table></div>`;
}
function tblSort(uid,k){
  const t=SORTREG[uid];if(!t)return;
  t.dir=(t.sortKey===k)?-t.dir:-1;t.sortKey=k;
  const el=document.getElementById('tw_'+uid);if(el)el.innerHTML=drawTbl(uid);
}

function pivotBar(cmp, pp, r1, s1){
  if(!pp||!r1||!s1)return'<span style="color:var(--dim);font-size:11px">—</span>';
  const lo=parseFloat(s1),mid=parseFloat(pp),hi=parseFloat(r1),c=parseFloat(cmp||0);
  const range=hi-lo;
  if(range<=0)return'<span style="color:var(--dim);font-size:11px">—</span>';
  const cmpPct=Math.min(98,Math.max(2,(c-lo)/range*100));
  const ppPct=((mid-lo)/range*100).toFixed(1);
  const buyW=(100-parseFloat(ppPct)).toFixed(1);
  const arrowColor=c>=hi?'var(--grn)':c>=mid?'var(--amber)':'var(--red)';
  const arrow=c>=mid?'▲':'▼';
  const cmpFmt=c>=1000?Math.round(c):c.toFixed(1);
  return `<div class="pivot-bar-wrap" style="display:inline-block;width:140px;vertical-align:middle">
    <div style="font-family:'Space Mono';font-size:9px;color:${arrowColor};margin-left:calc(${cmpPct.toFixed(0)}% - 14px);white-space:nowrap">${arrow}${cmpFmt}</div>
    <div style="position:relative;height:14px">
      <div style="position:absolute;top:5px;left:0;right:0;height:3px;background:var(--line2);border-radius:2px"></div>
      <div style="position:absolute;top:5px;left:0;width:${ppPct}%;height:3px;background:#3a1620;border-radius:2px 0 0 2px"></div>
      <div style="position:absolute;top:5px;left:${ppPct}%;width:${buyW}%;height:3px;background:#0f3b2c;border-radius:0 2px 2px 0"></div>
      <div style="position:absolute;top:3px;left:0;width:2px;height:7px;background:var(--red);border-radius:1px"></div>
      <div style="position:absolute;top:3px;left:${ppPct}%;width:2px;height:7px;background:var(--mut);border-radius:1px;transform:translateX(-50%)"></div>
      <div style="position:absolute;top:3px;right:0;width:2px;height:7px;background:var(--grn);border-radius:1px"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:9px;font-family:'Space Mono';line-height:1.3">
      <span style="color:var(--red)">${Math.round(lo)}</span>
      <span style="color:var(--mut)">${Math.round(mid)}</span>
      <span style="color:var(--grn)">${Math.round(hi)}</span>
    </div>
  </div>`;
}

              <span class="sk-chip" style="color:${Number(x.mom_2d)>=0?'var(--grn)':'var(--red)'}">${sign(x.mom_2d,1)}%</span>

              <span class="sk-chip">Vol ${num(x.vol_ratio,1)}×</span>
            </div></div>`;
        }).join('')}</div>`
      : `<div class="empty">No matches</div>`;
  }
  return`<div class="subnav">${nav}</div>`+
    `<div class="ptitle">Filter Scan · ${scanMode} <span class="ct">score_date ${sc.score_date||'—'} · universe ${sc.universe||'—'}</span></div>`+body;
}
function scanSet(m){scanMode=m;document.getElementById('panel8').innerHTML=renderScan();}

let ffBasket='buy_reversal';
function ffSet(b){ffBasket=b;loadFF();}
function preFreezeBanner(){
  const ist=new Date(Date.now()+(5*60+30)*60000);
  const dow=ist.getUTCDay(),mins=ist.getUTCHours()*60+ist.getUTCMinutes();
  if(dow>=1&&dow<=5&&mins<945)
    return`<div class="err" style="margin-top:18px">⚠ Pre-freeze (before 15:45 IST): GVM, RSI(m/w) & sector metrics not yet computed — funnel may understate.</div>`;
  return'';}
async function loadFF(){
  const el=document.getElementById('panel9');if(!el)return;
  const nav=ALL5.map(b=>`<button class="btn ${ffBasket===b.id?'on':''}" onclick="ffSet('${b.id}')">${b.label}</button>`).join('');
  el.innerHTML=`<div class="subnav">${nav}</div><div class="loading">Loading funnel…</div>`;
  let fd=null,pc=null;
  try{fd=await getJSON(EP.funnelDetail(ffBasket));}catch(e){}
  try{pc=await getJSON(EP.passCount(ffBasket));}catch(e){}
  let html=`<div class="subnav">${nav}</div>`;
  if(fd&&fd.stages){
    const maxSurv = Math.max(...fd.stages.map(s=>s.survivors||0),1);
    html+=`<div class="ptitle">Filter Funnel · ${fd.basket.replace(/_/g,' ')} <span class="ct">universe ${fd.universe} → final ${fd.final} · ${fd.filter_count} filters</span></div>`;
    html+=`<div class="funnel-stages">${fd.stages.map(s=>{
      const pct=Math.round((s.survivors/maxSurv)*100);
      const killColor=s.killed>0?'var(--red)':'var(--dim)';
      const barColor=s.killed>0?'var(--amber)':'var(--grn)';
      return`<div class="funnel-stage">
        <div class="fs-name">${s.metric.replace(/_/g,' ')}</div>
        <div class="fs-bar"><div class="fs-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        <div class="fs-surv">${s.survivors}</div>
        <div class="fs-kill" style="color:${killColor}">${s.killed>0?'-'+s.killed:''}</div>
      </div>`;
    }).join('')}</div>`;
  } else html+=`<div class="err">⚠ funnel_detail not available for ${ffBasket}</div>`;
  if(pc&&pc.stocks){
    html+=`<div class="ptitle" style="margin-top:16px">Stock Pass Count <span class="ct">${pc.universe} stocks · max ${pc.filter_count}</span></div>`;
    const sorted=[...pc.stocks].sort((a,b)=>(b.passed||0)-(a.passed||0));
    html+=`<div class="pc-grid">${sorted.map(x=>{
      const sc_cls=scoreClass(x.passed,x.total);
      const fails=(x.failed_filters||[]).slice(0,3).map(f=>f.replace(/_/g,' ')).join(', ');
      return`<div class="pc-card">
        <div class="pc-sym">${x.symbol}</div>
        <div class="pc-score ${sc_cls}">${x.passed}/${x.total}</div>
        <div class="pc-fail">${fails||'all pass'}</div>
      </div>`;
    }).join('')}</div>`;}
  html+=preFreezeBanner();
  el.innerHTML=html;
}

/* ── Stock Check ── */
let scSide='LONG', scGate1=null, scGate2=null, scRunning=false;
const scSuggestions=['RELIANCE','INFY','HDFCBANK','TCS','ONGC','WIPRO','AXISBANK','SBIN'];

function initStockCheck(){
  const el=document.getElementById('panel10');
  if(el&&el.dataset.init)return;
  if(el)el.dataset.init='1';
  renderStockCheckForm();
}

function renderStockCheckForm(){
  const el=document.getElementById('panel10');
  if(!el)return;
  const chips=scSuggestions.map(s=>`<button class="sc-chip" onclick="scSetSymbol('${s}')">${s}</button>`).join('');
  el.innerHTML=`
    <div class="ptitle">Stock Check <span class="ct">v3.3 PRIMARY · v3.4.1 SECONDARY</span></div>
    <div class="sc-form">
      <div class="sc-input-row">
        <input id="scSym" class="sc-input" placeholder="Type symbol e.g. RELIANCE" oninput="scAutoSearch(this.value)" style="text-transform:uppercase" />
      </div>
      <div id="scDropdown" style="display:none;position:relative;z-index:10;margin-top:-8px;margin-bottom:10px;
        background:var(--panel2);border:1px solid var(--line2);border-radius:8px;overflow:hidden"></div>
      <div class="sc-side-row">
        <button class="sc-side long ${scSide==='LONG'?'active':''}" onclick="scSetSide('LONG')">▲ LONG</button>
        <button class="sc-side short ${scSide==='SHORT'?'active':''}" onclick="scSetSide('SHORT')">▼ SHORT</button>
      </div>
      <div class="sc-gates">
        <div class="sc-gate">
          <div class="sc-gate-label">Gate 1 — 5-min chart<br>strength through day?</div>
          <div class="sc-gate-btns">
            <button class="sc-gate-btn ${scGate1===true?'pass':''}" onclick="scSetGate(1,true)">✓ YES</button>
            <button class="sc-gate-btn ${scGate1===false?'fail':''}" onclick="scSetGate(1,false)">✗ NO</button>
          </div>
        </div>
        <div class="sc-gate">
          <div class="sc-gate-label">Gate 2 — 1-Day chart<br>reversal / breakout?</div>
          <div class="sc-gate-btns">
            <button class="sc-gate-btn ${scGate2===true?'pass':''}" onclick="scSetGate(2,true)">✓ YES</button>
            <button class="sc-gate-btn ${scGate2===false?'fail':''}" onclick="scSetGate(2,false)">✗ NO</button>
          </div>
        </div>
      </div>
      <button id="scRunBtn" class="sc-run" onclick="runStockCheck()">RUN TRADE CHECK →</button>
      <div style="margin-top:12px">
        <div style="font-size:10px;color:var(--dim);margin-bottom:6px">Quick checks:</div>
        <div class="sc-chips">${chips}</div>
      </div>
    </div>
    <div id="scResult"></div>`;
}

let scSearchTimer=null;
function scAutoSearch(val){
  clearTimeout(scSearchTimer);
  const sym=(val||'').trim().toUpperCase();
  document.getElementById('scSym').value=sym;
  if(!sym||sym.length<2){document.getElementById('scDropdown').style.display='none';return;}
  scSearchTimer=setTimeout(async()=>{
    try{
      const res=await getJSON(EP.gvmSearch(sym));
      const items=(res.results||[]).slice(0,5);
      const dd=document.getElementById('scDropdown');
      if(!items.length){dd.style.display='none';return;}
      dd.innerHTML=items.map(r=>`<div onclick="scSetSymbol('${r.symbol}')"
        style="padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line);color:var(--txt)"
        onmouseover="this.style.background='var(--panel)'" onmouseout="this.style.background=''">
        <b>${r.symbol}</b> <span style="color:var(--mut);font-size:11px">${r.name||''}</span>
        <span style="float:right;color:var(--cyan);font-family:'Space Mono';font-size:11px">GVM ${num(r.gvm_score,1)}</span>
      </div>`).join('');
      dd.style.display='block';
    }catch(e){document.getElementById('scDropdown').style.display='none';}
  },300);
}

function scSetSymbol(s){
  document.getElementById('scSym').value=s.toUpperCase();
  const dd=document.getElementById('scDropdown');
  if(dd)dd.style.display='none';
}
function scSetSide(s){
  scSide=s;
  document.querySelectorAll('.sc-side').forEach(b=>{
    b.classList.remove('active');
    if((b.classList.contains('long')&&s==='LONG')||(b.classList.contains('short')&&s==='SHORT'))b.classList.add('active');
  });
}
function scSetGate(g,v){
  if(g===1)scGate1=v; else scGate2=v;
  document.querySelectorAll(`.sc-gate:nth-child(${g}) .sc-gate-btn`).forEach((b,i)=>{
    b.classList.remove('pass','fail');
    if(i===0&&v===true)b.classList.add('pass');
    if(i===1&&v===false)b.classList.add('fail');
  });
}

async function runStockCheck(){
  const sym=(document.getElementById('scSym')?.value||'').trim().toUpperCase();
  if(!sym){alert('Enter a symbol');return;}
  if(scGate1===null||scGate2===null){alert('Please set both chart gates');return;}
  if(scRunning)return;
  scRunning=true;
  const btn=document.getElementById('scRunBtn');
  if(btn){btn.disabled=true;btn.textContent='Analysing…';}
  const resEl=document.getElementById('scResult');
  resEl.innerHTML=`<div class="loading">Running trade check on ${sym}…</div>`;
  try{
    const payload={
      message:`Run a complete Trade Check on ${sym} for a ${scSide} trade.\nGate 1 (5-min chart strength): ${scGate1?'PASS':'FAIL'}\nGate 2 (1-Day chart reversal/breakout): ${scGate2?'PASS':'FAIL'}\nSide: ${scSide}\n\nRun BOTH frameworks:\n1. PRIMARY v3.3: Tier1 (${scSide==='LONG'?'11':'10'} rules, min 8) + Tier2 (7 filters, min 5/7). Show full table. Score + verdict.\n2. SECONDARY v3.4.1: One-line weighted score /21.\n\nContext: personal trade check only. Never apply V8 basket/mood rules. Use v8_metrics, gvm_scores, sector_ratings, futures_basis.`,
      claude_on:true,symbol:sym,side:scSide
    };
    const r=await fetch(API_BASE+EP.scorr,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const d=await r.json();
    const text=d.response||d.message||d.answer||JSON.stringify(d);
    resEl.innerHTML=renderScResult(text,sym,scSide);
  }catch(e){
    resEl.innerHTML=`<div class="err">⚠ ${e.message}</div>`;
  }
  scRunning=false;
  if(btn){btn.disabled=false;btn.textContent='RUN TRADE CHECK →';}
}

function renderScResult(text,sym,side){
  const isStrong=/STRONG SETUP|STRONG/i.test(text)&&!/NOT STRONG/i.test(text);
  const isValid=/CONDITIONAL|VALID|ENTER/i.test(text)&&!isStrong;
  const verdictCls=isStrong?'strong':isValid?'valid':'watch';
  const verdictLabel=isStrong?'STRONG SETUP':isValid?'VALID ENTRY':'WATCH / SKIP';
  const t1Match=text.match(/(\d+)\s*\/\s*(11|10|12)\b/);
  const t2Match=text.match(/(\d+)\s*\/\s*7\b/);
  const t1Score=t1Match?t1Match[0]:'—';
  const t2Score=t2Match?t2Match[0]:'—';
  const formatted=text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm,'<div style="font-size:13px;font-weight:700;color:var(--cyan);margin:12px 0 6px">$1</div>')
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>')
    .replace(/✓/g,'<span style="color:var(--grn)">✓</span>')
    .replace(/✗/g,'<span style="color:var(--red)">✗</span>')
    .replace(/PASS/g,'<span style="color:var(--grn);font-weight:700">PASS</span>')
    .replace(/FAIL/g,'<span style="color:var(--red);font-weight:700">FAIL</span>');
  return`
    <div class="sc-verdict ${verdictCls}">
      <div class="sc-verdict-label">${verdictLabel}</div>
      <div class="sc-verdict-sub">${sym} · ${side}</div>
      <div class="sc-verdict-score">Tier1: ${t1Score} &nbsp;|&nbsp; Tier2: ${t2Score}</div>
    </div>
    <div class="sc-tier">
      <div class="sc-tier-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <span class="sc-tier-title">v3.3 + v3.4.1 Full Analysis</span>
        <span style="color:var(--mut);font-size:12px">▼</span>
      </div>
      <div style="padding:14px 16px;font-size:12px;line-height:1.7;color:var(--txt)">${formatted}</div>
    </div>
    <div style="font-size:10px;color:var(--dim);margin-top:8px;padding:8px;background:var(--panel);border-radius:8px">
      Personal trade context only — not V8 algo signals.
    </div>`;
}

function paint(){
  document.getElementById('panel0').innerHTML=renderMaster();
  BASKETS.forEach((b,i)=>document.getElementById('panel'+(i+1)).innerHTML=renderFunnel(b));
  document.getElementById('panel5').innerHTML=renderSellOB();
  document.getElementById('panel6').innerHTML=renderTradeLog();
  document.getElementById('panel7').innerHTML=renderRaw();
  document.getElementById('panel8').innerHTML=renderScan();
  loadFF();
}

async function loadAll(){
  document.getElementById('refreshBtn').textContent='↻ …';
  const errs=[];
  const tasks=[
    ['mood',()=>getJSON(EP.mood)],['metricsAll',()=>getJSON(EP.metricsAll)],
    ['sellOB',()=>getJSON(EP.sellOB)],['paper',()=>getJSON(EP.paper)],
    ['scan',()=>getJSON(EP.scan)],
    ...BASKETS.map(b=>['q_'+b.id,()=>getJSON(EP.qualified(b.id))]),
  ];
  await Promise.all(tasks.map(async([k,fn])=>{
    try{cache[k]=await fn();}catch(e){errs.push(e.message);cache[k]=cache[k]||null;}
  }));
  if(cache.mood)renderMood(cache.mood);
  paint();
  if(errs.length)document.getElementById('panel0').insertAdjacentHTML('afterbegin',
    `<div class="err">⚠ ${errs.length} endpoint(s) failed:<br>${errs.join('<br>')}</div>`);
  document.getElementById('refreshBtn').textContent='↻ Refresh';
  document.getElementById('apiBase').textContent=API_BASE||location.origin;
  const ist=new Date(Date.now()+(5*60+30)*60000);
  document.getElementById('lastUpd').textContent='Last refresh: '+
    String(ist.getUTCHours()).padStart(2,'0')+':'+String(ist.getUTCMinutes()).padStart(2,'0')+':'+String(ist.getUTCSeconds()).padStart(2,'0')+' IST';
}

function toggleAuto(){
  AUTO=!AUTO;const b=document.getElementById('autoBtn');
  b.textContent='Auto 5m: '+(AUTO?'ON':'OFF');b.classList.toggle('on',AUTO);
  if(AUTO){autoTimer=setInterval(loadAll,5*60*1000);}else{clearInterval(autoTimer);}
}

loadAll();
autoTimer=setInterval(loadAll,5*60*1000);
</script>
