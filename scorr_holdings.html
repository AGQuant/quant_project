<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smartgain</title>
<style>
  :root{
    --bg:#f4f6f9;--card:#fff;--border:#e2e7ee;
    --txt:#1c2536;--mut:#5a6781;--dim:#9aa4b5;
    --grn:#0a9e63;--red:#dd3a4a;--blu:#2563eb;
    --font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px}

  .nav{display:flex;align-items:center;gap:2px;height:46px;background:var(--card);
    border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;scrollbar-width:none;
    position:sticky;top:0;z-index:20}
  .nav::-webkit-scrollbar{display:none}
  .nav a{display:flex;align-items:center;gap:5px;padding:0 11px;height:46px;text-decoration:none;
    white-space:nowrap;color:var(--mut);font-size:11.5px;font-weight:600;border-bottom:2px solid transparent}
  .nav a.active{color:var(--blu);border-bottom-color:var(--blu)}
  .nav a:hover{color:var(--txt)}

  .wrap{max-width:700px;margin:0 auto;padding:20px 14px 80px}

  /* Hero M2M */
  .hero{background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:18px 20px;margin-bottom:14px}
  .hero-label{font-size:10px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
  .hero-val{font-size:40px;font-weight:900;font-family:monospace;line-height:1;transition:color .3s}
  .hero-cap{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-top:5px}
  .hero-buckets{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .hero-bucket{background:var(--bg,#f8fafc);border:1px solid var(--border);border-radius:10px;padding:9px 12px}
  .hero-bk-label{font-size:10px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .hero-bk-val{font-size:18px;font-weight:800;font-family:monospace;line-height:1;transition:color .3s}
  .hero-sub{display:flex;align-items:center;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:6px}
  .hero-meta{font-size:11.5px;color:var(--mut)}
  .live-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--grn)}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:blink 1.4s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .refresh-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;
    background:transparent;border:1px solid var(--border);border-radius:8px;
    font-size:11.5px;font-weight:600;color:var(--mut);cursor:pointer;font-family:inherit;transition:.15s}
  .refresh-btn:hover{color:var(--blu);border-color:var(--blu)}
  .refresh-btn.spinning{animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Position cards */
  .pos-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}

  .pos-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:border-color .2s}
  .pos-card:hover{border-color:#c5cfe0}

  .pos-row1{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .pos-sym{font-size:16px;font-weight:800;color:var(--txt)}
  .pos-dir{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.04em}
  .dir-long{background:#e3f6ed;color:var(--grn);border:1px solid #b6e8d0}
  .dir-short{background:#fceaec;color:var(--red);border:1px solid #f5b8bd}
  .pos-mtm{font-size:20px;font-weight:900;font-family:monospace;line-height:1;transition:color .3s}

  .pos-row2{display:flex;align-items:center;gap:10px;margin-top:7px;flex-wrap:wrap}
  .pos-chip{font-size:11.5px;color:var(--mut);font-weight:500}
  .pos-chip b{color:var(--txt);font-weight:700}
  .pos-pct{font-size:12px;font-weight:700;font-family:monospace}
  .pos-ltp{font-size:11.5px;color:var(--mut)}
  .pos-sep{color:var(--dim);font-size:10px}
  .live-pip{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--grn);
    margin-left:3px;vertical-align:middle;animation:blink 1.4s infinite}

  /* Total row */
  .total-card{background:#f8fafc;border:1px solid var(--border);border-radius:12px;
    padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
  .total-label{font-size:12px;font-weight:700;color:var(--mut)}
  .total-val{font-size:22px;font-weight:900;font-family:monospace}

  /* Flash animation for value updates */
  @keyframes flash-grn{0%{background:#e3f6ed}100%{background:transparent}}
  @keyframes flash-red{0%{background:#fceaec}100%{background:transparent}}
  .flash-grn{animation:flash-grn .6s ease}
  .flash-red{animation:flash-red .6s ease}

  .updated{font-size:11px;color:var(--dim);text-align:right;margin-top:6px}
  .empty-msg{text-align:center;padding:50px 20px;color:var(--mut);font-size:13px}

  /* cc#133 */
  .hero-buckets-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
  .hero-bk-sub{font-size:10.5px;font-weight:700;margin-top:3px;font-family:monospace}
  .pos-card.loss{border-color:#f5b8bd!important;border-width:1.5px!important}

  /* cc#138 */
  .pos-row3{display:flex;align-items:center;gap:6px;margin-top:5px}
  .pos-avgcmp{font-size:11px;color:var(--dim);font-family:monospace}

  /* cc#161: explicit "no live price" state -- never blank/dash-only for a
     position we deliberately withheld pricing on. */
  .pos-unavail{font-size:11px;font-weight:700;color:#b45309}

  /* cc#179: M2M Chart V2 (1D/1W/1M/1Y) + Closed Positions tabbed section.
     Range/tab buttons are >=40px touch targets; chart SVG scales via viewBox;
     closed table scrolls horizontally. All data orderbook-native (SPEC_V1). */
  .m2m-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 14px 16px;margin-top:14px}
  .m2m-tabs{display:flex;gap:6px;margin-bottom:12px}
  .m2m-tab{flex:1;height:42px;border:1px solid var(--border);background:#f8fafc;border-radius:10px;
    font-family:inherit;font-size:13px;font-weight:700;color:var(--mut);cursor:pointer;transition:.15s}
  .m2m-tab.active{background:var(--blu);border-color:var(--blu);color:#fff}
  .range-sel{display:flex;gap:6px;margin-bottom:10px}
  .range-btn{flex:1;height:40px;border:1px solid var(--border);background:#f8fafc;border-radius:9px;
    font-family:inherit;font-size:12.5px;font-weight:700;color:var(--mut);cursor:pointer;transition:.15s}
  .range-btn.active{background:#e8effe;border-color:var(--blu);color:var(--blu)}
  .range-btn:hover{border-color:var(--blu)}
  .m2m-head{display:flex;align-items:baseline;justify-content:space-between;margin:2px 2px 8px;flex-wrap:wrap;gap:4px}
  .m2m-legend{font-size:9.5px;color:var(--dim);display:flex;gap:9px}
  .m2m-lg{display:inline-flex;align-items:center;gap:3px}
  .m2m-lg i{width:8px;height:8px;border-radius:2px;display:inline-block}
  #m2m-chart svg{display:block}
  .m2m-cap{font-size:10.5px;color:var(--dim)}
  .cl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:10px}
  .cl-tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:460px}
  .cl-tbl th{background:#f8fafc;color:var(--mut);font-weight:700;font-size:10.5px;text-transform:uppercase;
    letter-spacing:.04em;padding:9px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
  .cl-tbl td{padding:9px 10px;border-bottom:1px solid #f1f4f9;white-space:nowrap}
  .cl-tbl td.num,.cl-tbl th.num{text-align:right;font-family:monospace}
  .cl-tbl .cl-sym{font-weight:800}
  .cl-tbl tbody tr:last-child td{border-bottom:none}
  .cl-tbl tfoot td{border-top:2px solid var(--border);padding:11px 10px;font-size:12.5px}
  .cl-tbl .pos-dir{font-size:9px;padding:2px 7px}

  /* cc#181: TradingView Lightweight Charts container + crosshair tooltip + mismatch banner */
  #m2m-chart{position:relative;min-height:200px}
  .m2m-tip{position:absolute;z-index:5;pointer-events:none;background:#fff;border:1px solid var(--border);
    border-radius:8px;box-shadow:0 4px 14px rgba(20,35,70,.12);padding:7px 9px;font-size:11px;min-width:122px}
  .m2m-tip .tip-h{font-weight:800;font-size:11px;margin-bottom:4px;color:var(--txt)}
  .m2m-tip .tip-row{display:flex;justify-content:space-between;gap:14px;line-height:1.55}
  .m2m-tip .tip-row span{color:var(--mut)}
  .m2m-tip .tip-row b{font-family:monospace}
  .m2m-mismatch{display:none;align-items:flex-start;gap:8px;background:#fff8ec;border:1px solid #f4d79a;
    border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:11.5px;color:#8a5a00;line-height:1.5}
  .m2m-mismatch .mm-ic{font-size:15px;flex-shrink:0}
  .m2m-mismatch b{color:#7a4f00}
  .m2m-mismatch .mm-list{font-family:monospace;font-size:10.5px;margin-top:3px;color:#a06a00;word-break:break-word}
</style>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>

<nav class="nav" id="scorr-nav">
  <a href="/">&#8962; Home</a>
  <a href="/dashboard">&#9889; V8</a>
  <a href="/cio2?model=gvm">&#9702; GVM</a>

  <a href="/check">&#10003; Check</a>
  <a href="/news">&#128240; Intel</a>
  <a href="/scanners">&#8862; Scanners</a>
  <a href="/filters">&#9661; Filters</a>
  <a href="/cio">&#9673; Max</a>
  <a href="/fpc">&#9706; FPC</a>
  <a href="/quant-basket">&#9707; QB</a>
  <a class="active" href="/holdings">&#9670; Holdings</a>
  <a href="/v10">&#9651; V10</a>
</nav>

<div class="wrap">

  <!-- Hero -->
  <div class="hero" id="hero" style="display:none">
    <div class="hero-label">Week M2M &#183; MHK40</div>
    <div class="hero-val" id="hero-val">&#8212;</div>
    <div class="hero-cap">Total = Realised + Unrealised</div>
    <div class="hero-buckets">
      <div class="hero-bucket">
        <div class="hero-bk-label">Realised</div>
        <div class="hero-bk-val" id="hero-realised">&#8212;</div>
      </div>
      <div class="hero-bucket">
        <div class="hero-bk-label">Unrealised</div>
        <div class="hero-bk-val" id="hero-unrealised">&#8212;</div>
      </div>
    </div>
    <div class="hero-buckets-2">
      <div class="hero-bucket">
        <div class="hero-bk-label">Long Value</div>
        <div class="hero-bk-val" id="hero-long-val">&#8212;</div>
        <div class="hero-bk-sub" id="hero-long-pct"></div>
      </div>
      <div class="hero-bucket">
        <div class="hero-bk-label">Short Value</div>
        <div class="hero-bk-val" id="hero-short-val">&#8212;</div>
        <div class="hero-bk-sub" id="hero-short-pct"></div>
      </div>
    </div>
    <div class="hero-sub">
      <span class="hero-meta" id="hero-meta"></span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="live-chip" id="live-chip" style="display:none"><span class="live-dot"></span>Live &#183; Fyers 5-min</span>
        <button class="refresh-btn" id="rfbtn" onclick="refresh()"><span id="rficon">&#8635;</span> Refresh</button>
      </div>
    </div>
  </div>

  <!-- Positions -->
  <div id="pos-wrap">
    <div class="empty-msg">Loading positions&#8230;</div>
  </div>

  <!-- cc#179: M2M Chart V2 + Closed Positions (orderbook-native) -->
  <div class="m2m-card" id="m2m-card" style="display:none">
    <div class="m2m-tabs">
      <button class="m2m-tab active" data-tab="chart" onclick="m2mTab('chart')">M2M Chart</button>
      <button class="m2m-tab" data-tab="closed" onclick="m2mTab('closed')">Closed Positions</button>
    </div>
    <div id="m2m-chart-pane">
      <div class="range-sel">
        <button class="range-btn" data-r="1d" onclick="setRange('1d')">1D</button>
        <button class="range-btn active" data-r="1w" onclick="setRange('1w')">1W</button>
        <button class="range-btn" data-r="1m" onclick="setRange('1m')">1M</button>
        <button class="range-btn" data-r="1y" onclick="setRange('1y')">1Y</button>
      </div>
      <div class="m2m-mismatch" id="m2m-mismatch"></div>
      <div class="m2m-head">
        <span id="m2m-total">&#8212;</span>
        <span class="m2m-legend" id="m2m-legend"></span>
      </div>
      <div id="m2m-chart"><div class="empty-msg">Loading&#8230;</div></div>
      <div class="m2m-cap" id="m2m-cap" style="margin-top:6px"></div>
    </div>
    <div id="m2m-closed-pane" style="display:none"></div>
  </div>

  <div class="updated" id="updated"></div>

</div>

<script>
const API = "";
let lastPositions = {};   // symbol → {mtm, ltp} for smooth in-place update
let firstLoad = true;

/* ── Formatters ── */
const f2 = n => n == null ? "—" : Number(n).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2});
const f0 = n => n == null ? "—" : Number(n).toLocaleString("en-IN",{maximumFractionDigits:0});
const ago = ts => {
  if (!ts) return "";
  const s = Math.floor((Date.now()-new Date(ts))/1000);
  if (s<60) return "just now";
  const m=Math.floor(s/60); return m<60?m+"m ago":Math.floor(m/60)+"h ago";
};
const mtmStr = (n, show_plus=true) => n==null?"—":(n>=0?(show_plus?"+":""):"")+"₹"+f2(Math.abs(n))*(n<0?-1:1);
const colorOf = n => n==null?"var(--mut)":n>=0?"var(--grn)":"var(--red)";

/* cc#161: pricing_method="unavailable" means we deliberately withheld a numeric
   ltp/mtm (stale spot fallback or a structurally fut-less symbol, e.g. NIFTY
   pre-cc#162) rather than present a wrong number as if it were real. */
const reasonLabel = r => {
  if (!r) return "no live price";
  if (r === "no_live_futures_feed") return "no futures feed for this symbol";
  if (r === "no_data") return "no price data";
  const m = /^stale_data_(\d+)d$/.exec(r);
  return m ? `data ${m[1]}d stale` : "no live price";
};

/* ── Holdings ── */
async function loadHoldings(smooth=false) {
  try {
    const r = await fetch(API+"/api/smartgain/m2m");
    const d = await r.json();
    if (d.error) return;

    const pos = d.positions||[];
    /* Three buckets: Realised + Unrealised = Total (headline). cc#115 */
    const realised   = d.realised   != null ? d.realised   : 0;
    const unrealised = d.unrealised != null ? d.unrealised : (d.total_mtm||0);
    const total      = d.total      != null ? d.total      : (realised + unrealised);
    const isLive = d.data_source==="live_fyers";

    /* Hero */
    const hero = document.getElementById("hero");
    hero.style.display="block";
    const hv = document.getElementById("hero-val");
    hv.textContent = (total>=0?"+":"")+"₹"+f2(Math.abs(total));
    hv.style.color = colorOf(total);

    const rv = document.getElementById("hero-realised");
    const uv = document.getElementById("hero-unrealised");
    rv.textContent = (realised>=0?"+":"−")+"₹"+f2(Math.abs(realised));   rv.style.color = colorOf(realised);
    uv.textContent = (unrealised>=0?"+":"−")+"₹"+f2(Math.abs(unrealised)); uv.style.color = colorOf(unrealised);
    document.getElementById("hero-meta").textContent = pos.length+" positions · "+ago(d.last_updated);

    /* cc#133: Long/Short value tiles */
    {
      const lp = pos.filter(p=>p.direction==="LONG");
      const sp = pos.filter(p=>p.direction==="SHORT");
      const lVal  = lp.reduce((s,p)=>s+(p.ltp||0)*(p.qty||0),0);
      const sVal  = sp.reduce((s,p)=>s+(p.ltp||0)*(p.qty||0),0);
      const lMtm  = lp.reduce((s,p)=>s+(p.mtm||0),0);
      const sMtm  = sp.reduce((s,p)=>s+(p.mtm||0),0);
      const lEnt  = lp.reduce((s,p)=>s+(p.entry_price||0)*(p.qty||0),0);
      const sEnt  = sp.reduce((s,p)=>s+(p.entry_price||0)*(p.qty||0),0);
      const lPct  = lEnt>0 ? lMtm/lEnt*100 : null;
      const sPct  = sEnt>0 ? sMtm/sEnt*100 : null;
      const lvEl=document.getElementById("hero-long-val"), lpEl=document.getElementById("hero-long-pct");
      const svEl=document.getElementById("hero-short-val"), spEl=document.getElementById("hero-short-pct");
      if(lvEl){ lvEl.textContent=lp.length?"₹"+f0(lVal):"—"; lvEl.style.color=lp.length?"var(--txt)":"var(--mut)"; }
      if(svEl){ svEl.textContent=sp.length?"₹"+f0(sVal):"—"; svEl.style.color=sp.length?"var(--txt)":"var(--mut)"; }
      if(lpEl){ lpEl.textContent=lPct!=null?(lPct>=0?"+":"")+lPct.toFixed(2)+"% P&L":""; lpEl.style.color=colorOf(lPct); }
      if(spEl){ spEl.textContent=sPct!=null?(sPct>=0?"+":"")+sPct.toFixed(2)+"% P&L":""; spEl.style.color=colorOf(sPct); }
    }
    const lc = document.getElementById("live-chip");
    lc.style.display = isLive?"inline-flex":"none";

    document.getElementById("updated").textContent = "Auto-refreshes every 60s · last updated "+ago(d.last_updated);

    if (!pos.length) {
      document.getElementById("pos-wrap").innerHTML='<div class="empty-msg">No open positions — week starts Monday.</div>';
      firstLoad=false; return;
    }

    /* Smooth in-place update (no flicker after first load) */
    if (!firstLoad && smooth) {
      pos.forEach(p => {
        const card = document.getElementById("card-"+p.symbol);
        if (!card) return;

        const prev = lastPositions[p.symbol]||{};
        const mtmEl = document.getElementById("mtm-"+p.symbol);
        const ltpEl = document.getElementById("ltp-"+p.symbol);
        const pctEl = document.getElementById("pct-"+p.symbol);
        const valEl = document.getElementById("val-"+p.symbol);

        // cc#161: unavailable positions render a distinct row2/row3 structure
        // (no ltp-/pct-/val-/cmp- ids) -- a state flip only takes full effect
        // on the next full render (manual Refresh), but mtmEl always exists so
        // update it now rather than leave a stale numeric MTM on screen.
        const unavail = p.pricing_method === "unavailable";
        const mtmTxt = unavail ? "No live price" : (p.mtm==null?"—":(p.mtm>=0?"+":"−")+"₹"+f2(Math.abs(p.mtm||0)));
        const prevMtm = prev.mtm||0;

        if (mtmEl && (unavail !== (prev.pricing_method === "unavailable") || p.mtm !== prev.mtm)) {
          mtmEl.textContent = mtmTxt;
          mtmEl.style.color = unavail ? "#b45309" : colorOf(p.mtm);
          if (!unavail) {
            const cls = (p.mtm||0) >= prevMtm ? "flash-grn":"flash-red";
            card.classList.remove("flash-grn","flash-red");
            void card.offsetWidth; // reflow
            card.classList.add(cls);
          }
        }
        /* cc#133: loss border on the card itself */
        if((p.mtm||0)<0) card.classList.add("loss"); else card.classList.remove("loss");
        if (ltpEl) ltpEl.textContent = f2(p.ltp);
        const cmpEl = document.getElementById("cmp-"+p.symbol);
        if (cmpEl) cmpEl.textContent = f2(p.ltp);
        if (pctEl) {
          const pct = calcPct(p);
          pctEl.textContent = pct==null?"":((pct>=0?"+":"")+pct.toFixed(2)+"%");
          pctEl.style.color = colorOf(pct);
        }
        if (valEl && p.ltp!=null && p.qty!=null) {
          valEl.textContent = "₹"+f0(p.ltp*p.qty);
        }
      });

      /* Total */
      const te = document.getElementById("total-el");
      if (te) { te.textContent=(total>=0?"+":"")+"₹"+f2(Math.abs(total)); te.style.color=colorOf(total); }

      lastPositions = {};
      pos.forEach(p=>lastPositions[p.symbol]=p);
      return;
    }

    /* Full render */
    lastPositions = {};
    pos.forEach(p=>lastPositions[p.symbol]=p);

    let html = '<div class="pos-list">';
    pos.forEach(p => {
      const unavail = p.pricing_method === "unavailable";
      const pct = calcPct(p);
      const pctTxt = pct==null?"":((pct>=0?"+":"")+pct.toFixed(2)+"%");
      const val = p.ltp!=null&&p.qty!=null ? "₹"+f0(p.ltp*p.qty) : "";
      const dirCls = p.direction==="LONG"?"dir-long":"dir-short";
      const mtmTxt = unavail ? "No live price" : (p.mtm==null?"—":((p.mtm>=0?"+":"−")+"₹"+f2(Math.abs(p.mtm))));
      const livePip = p.is_live?'<span class="live-pip"></span>':"";

      const lossCls = (p.mtm||0)<0?" loss":"";

      // cc#161: unavailable positions get an explicit warning row instead of
      // ltp/%/CMP derived from a number we deliberately withheld.
      const row2 = unavail
        ? `<span class="pos-chip"><b>${p.qty}</b> qty</span>
           <span class="pos-sep">·</span>
           <span class="pos-unavail">&#9888; ${reasonLabel(p.reason)}</span>`
        : `<span class="pos-chip"><b>${p.qty}</b> qty</span>
           <span class="pos-sep">·</span>
           <span class="pos-chip" id="val-${p.symbol}">${val}</span>
           <span class="pos-sep">·</span>
           <span class="pos-ltp">₹<span id="ltp-${p.symbol}">${f2(p.ltp)}</span>${livePip}</span>
           <span class="pos-sep">·</span>
           <span class="pos-pct" id="pct-${p.symbol}" style="color:${colorOf(pct)}">${pctTxt}</span>`;

      const row3 = unavail
        ? `<span class="pos-avgcmp">Avg ₹${f2(p.entry_price)} · <span class="pos-unavail">No live price</span></span>`
        : `<span class="pos-avgcmp">Avg ₹${f2(p.entry_price)} · CMP ₹<span id="cmp-${p.symbol}">${f2(p.ltp)}</span></span>`;

      html+=`<div class="pos-card${lossCls}" id="card-${p.symbol}">
        <div class="pos-row1">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="pos-sym">${p.symbol}</span>
            <span class="pos-dir ${dirCls}">${p.direction}</span>
          </div>
          <span class="pos-mtm" id="mtm-${p.symbol}" style="color:${unavail?'#b45309':colorOf(p.mtm)}">${mtmTxt}</span>
        </div>
        <div class="pos-row2">${row2}</div>
        <div class="pos-row3">${row3}</div>
      </div>`;
    });
    html+="</div>";

    html+=`<div class="total-card">
      <span class="total-label">Total M2M</span>
      <span class="total-val" id="total-el" style="color:${colorOf(total)}">${(total>=0?"+":"")+"₹"+f2(Math.abs(total))}</span>
    </div>`;

    document.getElementById("pos-wrap").innerHTML=html;
    firstLoad=false;

  } catch(e) { console.error(e); }
}

function calcPct(p) {
  if (p.ltp==null||p.entry_price==null||p.entry_price===0) return null;
  return p.direction==="LONG"
    ? (p.ltp-p.entry_price)/p.entry_price*100
    : (p.entry_price-p.ltp)/p.entry_price*100;
}

/* ── Refresh ── */
async function refresh(smooth=false) {
  const btn=document.getElementById("rfbtn");
  const ic=document.getElementById("rficon");
  ic.style.animation="spin .7s linear infinite";
  btn.disabled=true;
  await loadHoldings(smooth);
  ic.style.animation="";
  btn.disabled=false;
}

/* ══ cc#179: M2M Chart V2 (1D/1W/1M/1Y) + Closed Positions ══
   All series come from /api/smartgain/daily_m2m?range=... which replays
   smartgain_orders (FIFO) + smartgain_opening_positions — never snapshots. */
const MON3=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const sgn=n=>n==null?"—":(n>=0?"+":"−")+"₹"+f2(Math.abs(n));
const fmtDate=iso=>{ if(!iso)return""; const p=iso.slice(0,10).split("-"); return (+p[2])+" "+MON3[+p[1]-1]; };
const rangeCap={"1d":"today (5-min)","1w":"this week","1m":"last 30d","1y":"last 365d"};
let curRange="1w", closedRendered=false;

function renderChart(d){
  const S=d.series||[];
  if(!S.length) return '<div class="empty-msg">No data for this range.</div>';
  const range=d.range;
  const bars=(range==="1w"||range==="1m");
  const lineKey=(range==="1d")?"m2m":"cumulative";
  const W=680,H=200,padL=10,padR=10,padT=18,padB=26;
  let vals=[]; S.forEach(p=>{ if(bars) vals.push(p.m2m); vals.push(p[lineKey]); });
  let lo=Math.min(0,...vals), hi=Math.max(0,...vals);
  if(hi===lo){hi+=1;lo-=1;}
  const span=hi-lo, plotW=W-padL-padR, plotH=H-padT-padB, n=S.length;
  const y=v=>padT+(hi-v)/span*plotH, zeroY=y(0);
  const slotW=plotW/n;
  const cx=i=> bars ? padL+slotW*(i+0.5) : padL+(n===1?plotW/2:plotW*i/(n-1));
  let barsSvg="";
  if(bars){
    const bw=Math.max(2,Math.min(22,slotW*0.55));
    S.forEach((p,i)=>{ const yv=y(p.m2m),top=Math.min(yv,zeroY),h=Math.max(1.5,Math.abs(zeroY-yv));
      const col=p.m2m>=0?"var(--grn)":"var(--red)";
      barsSvg+=`<rect x="${cx(i)-bw/2}" y="${top}" width="${bw}" height="${h}" rx="2" fill="${col}" opacity="0.85"><title>${p.label}: ${sgn(p.m2m)}</title></rect>`;
    });
  }
  const pts=S.map((p,i)=>[cx(i),y(p[lineKey])]);
  const poly=pts.length>1?`<polyline points="${pts.map(p=>p.join(",")).join(" ")}" fill="none" stroke="var(--blu)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`:"";
  const dots=(n<=40)?S.map((p,i)=>`<circle cx="${cx(i)}" cy="${y(p[lineKey])}" r="2.6" fill="var(--blu)" stroke="#fff" stroke-width="1"><title>${p.label}: ${sgn(p[lineKey])}</title></circle>`).join(""):"";
  const step=Math.max(1,Math.ceil(n/6)); let labels="";
  S.forEach((p,i)=>{ if(i%step===0||i===n-1) labels+=`<text x="${cx(i)}" y="${H-6}" text-anchor="middle" font-size="8.5" fill="var(--dim)">${p.label}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="M2M ${range} chart">
    <line x1="${padL}" y1="${zeroY}" x2="${W-padR}" y2="${zeroY}" stroke="var(--border)" stroke-width="1"/>
    ${barsSvg}${poly}${dots}${labels}</svg>`;
}

function chartLegend(range){
  const bars=(range==="1w"||range==="1m");
  const lineLbl=(range==="1d")?"Intraday M2M":"Cumulative";
  return (bars?'<span class="m2m-lg"><i style="background:var(--grn)"></i>Daily M2M</span>':"")+
    `<span class="m2m-lg"><i style="background:var(--blu);border-radius:50%"></i>${lineLbl}</span>`;
}

/* cc#181: interactive chart via TradingView Lightweight Charts v4 (crosshair +
   custom tooltip, touch). Falls back to the SVG renderer if the CDN lib is
   unavailable (offline). Home card SVG (cc#166) is untouched. */
const GRN="#0a9e63", RED="#dd3a4a", BLU="#2563eb";
let _lw=null, _lwRO=null;
const keyStr=t=> t==null?"":(typeof t==="object"
  ? t.year+"-"+String(t.month).padStart(2,"0")+"-"+String(t.day).padStart(2,"0")
  : String(t));
function _tkey(d,p){                     // LWC time value for a point
  if(d.range==="1w"||d.range==="1m"){    // cc#239: LWC business-day series needs an OBJECT
    const iso=p.date.slice(0,10);        // {year,month(1-idx),day}; a raw string degenerates
    return {year:+iso.slice(0,4), month:+iso.slice(5,7), day:+iso.slice(8,10)};  // to a bare day digit
  }
  if(d.range!=="1d") return p.date.slice(0,10);        // 1y business-day string (unchanged)
  const dd=d.target_day;                               // fake-UTC so axis shows IST HH:MM
  return Math.floor(Date.UTC(+dd.slice(0,4),+dd.slice(5,7)-1,+dd.slice(8,10),
                             +p.label.slice(0,2),+p.label.slice(3,5))/1000);
}
function tipHTML(range,p){
  const row=(l,v,c)=>`<div class="tip-row"><span>${l}</span><b style="color:${c||"var(--txt)"}">${sgn(v)}</b></div>`;
  if(range==="1d") return `<div class="tip-h">${p.label} IST</div>`+
    row("M2M",p.m2m,p.m2m>=0?GRN:RED)+row("Realised",p.realised)+row("Unrealised",p.unrealised);
  if(range==="1y") return `<div class="tip-h">${fmtDate(p.date)}</div>`+
    row("Cumulative",p.cumulative,p.cumulative>=0?GRN:RED);
  return `<div class="tip-h">${fmtDate(p.date)}</div>`+
    row("Day M2M",p.m2m,p.m2m>=0?GRN:RED)+row("Cumulative",p.cumulative);
}
function renderLWChart(d){
  const el=document.getElementById("m2m-chart");
  const S=d.series||[];
  if(!S.length){ el.innerHTML='<div class="empty-msg">No data for this range.</div>'; return; }
  if(!window.LightweightCharts){ el.innerHTML=renderChart(d); return; }   // CDN offline -> SVG fallback
  if(_lw){ try{_lw.remove();}catch(e){} _lw=null; }
  if(_lwRO){ _lwRO.disconnect(); _lwRO=null; }
  el.innerHTML="";
  const H=window.matchMedia("(max-width:560px)").matches?240:260;
  const w=el.clientWidth||320, range=d.range;
  const chart=LightweightCharts.createChart(el,{
    width:w, height:H,
    layout:{ background:{type:"solid",color:"#ffffff"}, textColor:"#5a6781", fontSize:11,
             fontFamily:"-apple-system,BlinkMacSystemFont,Inter,sans-serif" },
    grid:{ vertLines:{visible:false}, horzLines:{color:"#eef1f6"} },
    rightPriceScale:{ borderVisible:false },
    timeScale:{ borderVisible:false, timeVisible:range==="1d", secondsVisible:false, fixLeftEdge:true, fixRightEdge:true },
    crosshair:{ mode:LightweightCharts.CrosshairMode.Normal,
      vertLine:{ width:1, color:"#c5cfe0", labelBackgroundColor:BLU },
      horzLine:{ color:"#c5cfe0", labelBackgroundColor:BLU } },
    // horzTouchDrag on => LWC handles the horizontal touch as a crosshair track
    // (data fills the viewport with fixLeftEdge/fixRightEdge so nothing scrolls);
    // vertTouchDrag off => vertical swipes pass through to the page scroll.
    handleScroll:{ mouseWheel:false, pressedMouseMove:true, horzTouchDrag:true, vertTouchDrag:false },
    handleScale:{ mouseWheel:false, pinch:false, axisPressedMouseMove:false, axisDoubleClickReset:false },
  });
  _lw=chart;
  const byKey={};
  if(range==="1w"||range==="1m"){
    const hist=chart.addHistogramSeries({ base:0, priceLineVisible:false, lastValueVisible:false });
    hist.setData(S.map(p=>{ const t=_tkey(d,p); byKey[keyStr(t)]=p;
      return { time:t, value:p.m2m, color:p.m2m>=0?GRN:RED }; }));
    const line=chart.addLineSeries({ color:BLU, lineWidth:2, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:true });
    line.setData(S.map(p=>({ time:_tkey(d,p), value:p.cumulative })));
  } else {
    const vk=(range==="1d")?"m2m":"cumulative";
    const area=chart.addAreaSeries({ lineColor:BLU, topColor:"rgba(37,99,235,0.18)", bottomColor:"rgba(37,99,235,0.02)",
      lineWidth:2, priceLineVisible:false, lastValueVisible:false });
    area.setData(S.map(p=>{ const t=_tkey(d,p); byKey[keyStr(t)]=p; return { time:t, value:p[vk] }; }));
  }
  chart.timeScale().fitContent();
  const tip=document.createElement("div"); tip.className="m2m-tip"; tip.style.display="none"; el.appendChild(tip);
  chart.subscribeCrosshairMove(param=>{
    if(!param.time||!param.point||param.point.x<0||param.point.y<0){ tip.style.display="none"; return; }
    const p=byKey[keyStr(param.time)];
    if(!p){ tip.style.display="none"; return; }
    tip.innerHTML=tipHTML(range,p);
    tip.style.display="block";
    const cw=el.clientWidth, tw=tip.offsetWidth||130;
    let x=param.point.x+14; if(x+tw>cw) x=param.point.x-tw-14; if(x<0)x=4;
    tip.style.left=x+"px"; tip.style.top=Math.max(4,param.point.y-10)+"px";
  });
  _lwRO=new ResizeObserver(()=>{ if(_lw) _lw.applyOptions({width:el.clientWidth}); });
  _lwRO.observe(el);
}

function renderMismatchBanner(d){
  const el=document.getElementById("m2m-mismatch");
  const mm=d.holdings_mismatch||[];
  if(!mm.length){ el.style.display="none"; el.innerHTML=""; return; }
  const list=mm.map(m=>`${m.symbol} ${m.direction}: broker ${m.holdings_qty} vs replay ${m.replay_qty}`).join(" · ");
  el.innerHTML=`<span class="mm-ic">&#9888;</span><div><b>Replay vs broker holdings mismatch</b> — latest orderbook batch missing, values may be stale.<div class="mm-list">${list}</div></div>`;
  el.style.display="flex";
}

function renderClosed(d){
  const C=d.closed_all||[];
  if(!C.length) return '<div class="empty-msg">No closed trades yet.</div>';
  const rows=C.map(c=>{ const pc=c.pnl>=0?"var(--grn)":"var(--red)";
    return `<tr><td>${fmtDate(c.close_date)}</td><td class="cl-sym">${c.symbol}</td>
      <td><span class="pos-dir ${c.direction==="LONG"?"dir-long":"dir-short"}">${c.direction}</span></td>
      <td class="num">${c.qty}</td><td class="num">${f2(c.entry)}</td><td class="num">${f2(c.exit)}</td>
      <td class="num" style="color:${pc};font-weight:700">${sgn(c.pnl)}</td></tr>`; }).join("");
  const total=C[0].running_total;   // newest-first list -> [0] carries the grand total
  return `<div class="cl-wrap"><table class="cl-tbl">
    <thead><tr><th>Date</th><th>Symbol</th><th>Side</th><th class="num">Qty</th><th class="num">Entry</th><th class="num">Exit</th><th class="num">Realised</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td colspan="6" style="text-align:right;font-weight:700">Total Realised</td>
      <td class="num" style="color:${total>=0?"var(--grn)":"var(--red)"};font-weight:800">${sgn(total)}</td></tr></tfoot>
  </table></div>`;
}

async function loadM2M(range){
  try{
    const r=await fetch(API+"/api/smartgain/daily_m2m?range="+range);
    const d=await r.json();
    document.getElementById("m2m-card").style.display="block";
    // cc#181: checksum banner rides on every range response — wrong data can never
    // render silently. Update whenever the key is present.
    if(Array.isArray(d.holdings_mismatch)) renderMismatchBanner(d);
    if(range===curRange && document.querySelector(".m2m-tab.active").dataset.tab==="chart"){
      renderLWChart(d);                                   // cc#181: interactive chart (SVG fallback inside)
      const t=d.total_m2m||0;
      document.getElementById("m2m-total").innerHTML=`<b style="font-size:20px;font-family:monospace;color:${t>=0?"var(--grn)":"var(--red)"}">${sgn(t)}</b> <span style="color:var(--mut);font-size:11px">${rangeCap[range]||""}</span>`;
      document.getElementById("m2m-legend").innerHTML=chartLegend(range);
      let cap=(range==="1m"||range==="1y")&&d.from_date?"Orderbook history from "+fmtDate(d.from_date)+" — earlier data accrues over time.":
                (range==="1d"&&d.target_day?"Intraday replay for "+fmtDate(d.target_day):"");
      (d.notes||[]).forEach(nn=>{ if(nn.indexOf("partial")>-1) cap+=(cap?" · ":"")+nn; });
      // cc#181: chart-tab freshness from computed_at (recompute-on-call, never
      // the weekend-stale smartgain_holdings.updated_at).
      if(d.computed_at) cap+=(cap?" · ":"")+"recomputed "+ago(d.computed_at);
      document.getElementById("m2m-cap").textContent=cap;
    }
    // closed_all is range-independent full history (absent only for 1d) — render once.
    if(d.closed_all && !closedRendered){
      document.getElementById("m2m-closed-pane").innerHTML=renderClosed(d);
      closedRendered=true;
    }
  }catch(e){ console.error("m2m",e); document.getElementById("m2m-chart").innerHTML='<div class="empty-msg">Could not load chart.</div>'; }
}

function setRange(range){
  curRange=range;
  document.querySelectorAll(".range-btn").forEach(b=>b.classList.toggle("active",b.dataset.r===range));
  document.getElementById("m2m-chart").innerHTML='<div class="empty-msg">Loading&#8230;</div>';
  loadM2M(range);
}

function m2mTab(tab){
  document.querySelectorAll(".m2m-tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.getElementById("m2m-chart-pane").style.display=tab==="chart"?"block":"none";
  document.getElementById("m2m-closed-pane").style.display=tab==="closed"?"block":"none";
  if(tab==="closed" && !closedRendered) loadM2M("1w");   // ensure closed_all is fetched
  if(tab==="chart") loadM2M(curRange);
}

/* ── Nav hide in iframe ── */
if(window.self!==window.top||new URLSearchParams(location.search).has("embed")){
  const n=document.getElementById("scorr-nav");if(n)n.style.display="none";
}

/* ── Boot ── */
refresh(false);
setInterval(()=>refresh(true), 60000);
loadM2M("1w");                       // cc#179: default range + populates Closed tab
</script>
