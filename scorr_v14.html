<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V14 · Intraday</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap');
  /* cc#442: V14 intraday engine page — dark terminal skin (V-family, design_refs/scorr_v8_R2). */
  :root{
    --bg:#0A0F1E;--bg2:#0D1428;--panel:#121A33;--panel2:#182241;
    --line:rgba(148,166,210,.14);--line2:rgba(148,166,210,.24);
    --txt:#E9EEFB;--mut:#8C99BD;--dim:#5E6B8F;
    --grn:#2FD48B;--grn-d:rgba(47,212,139,.14);--red:#FF5C6C;--red-d:rgba(255,92,108,.13);
    --blu:#4D7CFE;--cyan:#37D3E8;--amber:#F5B94A;--violet:#9B7CFF;
    --shadow:0 18px 44px rgba(3,7,20,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:'Sora',sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1280px;margin:0 auto;padding:12px 18px 44px}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:4px 0 12px;border-bottom:1px solid var(--line)}
  .logo{font-weight:800;letter-spacing:.5px;font-size:20px}.logo b{color:var(--blu)}
  .tag{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
  .spacer{flex:1}
  .clock{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:11px;color:var(--mut)}
  .ptitle{font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--cyan);text-transform:uppercase;margin:16px 0 10px;display:flex;gap:8px;align-items:center}
  .ptitle .ct{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:11px;color:var(--dim);border:1px solid var(--line);padding:2px 8px;border-radius:20px}
  .chip{display:inline-flex;align-items:center;font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid;white-space:nowrap}
  .c-orb{color:var(--blu);border-color:var(--blu);background:rgba(77,124,254,.12)}
  .c-vwap{color:var(--cyan);border-color:var(--cyan);background:rgba(55,211,232,.12)}
  .c-r1{color:var(--violet);border-color:var(--violet);background:rgba(155,124,255,.12)}
  .c-long{color:var(--grn);border-color:var(--grn);background:var(--grn-d)}
  .c-short{color:var(--red);border-color:var(--red);background:var(--red-d)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:6px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
  .card .k{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  .card .v{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:18px;font-weight:700;margin-top:4px}
  .scroll{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{position:sticky;top:0;background:var(--panel2);color:var(--mut);font-weight:600;text-align:right;padding:9px 11px;border-bottom:1px solid var(--line2);white-space:nowrap;font-size:10px;letter-spacing:.3px;text-transform:uppercase}
  th:first-child,td:first-child{text-align:left}
  td{padding:8px 11px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:12px}
  td.sym{font-family:'Sora';font-weight:700}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(148,166,210,.06)}
  .pos{color:var(--grn)}.neg{color:var(--red)}
  .loading{color:var(--mut);font-size:13px;padding:20px 4px}
  .empty{color:var(--dim);font-size:13px;padding:20px 12px;text-align:center}
  .note{font-size:10px;color:var(--dim);margin:4px 0 0}
  /* cc#458: Replay Day */
  .rbtn{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:11px;font-weight:700;color:var(--blu);background:rgba(77,124,254,.12);border:1px solid var(--blu);border-radius:8px;padding:6px 12px;cursor:pointer;letter-spacing:.3px}
  .rbtn:hover{background:rgba(77,124,254,.22)}
  .rp-ov{position:fixed;inset:0;background:rgba(6,10,22,.94);z-index:200;display:none;overflow-y:auto;padding:18px}
  .rp-ov.open{display:block}
  .rp-wrap{max-width:1180px;margin:0 auto}
  .rp-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px}
  .rp-clock{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:34px;font-weight:700;color:var(--txt);letter-spacing:1px}
  .rp-clock small{font-size:13px;color:var(--dim);font-weight:700;margin-left:4px}
  .rp-bar{flex:1;min-width:160px;height:6px;background:var(--panel2);border-radius:4px;overflow:hidden}
  .rp-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--blu),var(--cyan));width:0%}
  .rp-speed{display:inline-flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
  .rp-speed button{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:11px;color:var(--mut);background:var(--panel);border:0;padding:6px 11px;cursor:pointer}
  .rp-speed button.on{background:var(--blu);color:#fff}
  .rp-x{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:12px;color:var(--mut);background:var(--panel);border:1px solid var(--line2);border-radius:8px;padding:6px 12px;cursor:pointer}
  .rp-toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--blu);color:var(--txt);font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:13px;font-weight:700;padding:12px 22px;border-radius:10px;box-shadow:var(--shadow);opacity:0;transition:opacity .3s;z-index:210;pointer-events:none}
  .rp-toast.show{opacity:1}
  /* cc#457: trade logic-memory i-button + popover */
  .ibtn{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--panel2);border:1px solid var(--line2);color:var(--mut);font-size:9px;font-weight:700;font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;cursor:pointer;vertical-align:middle;margin-left:6px}
  .ibtn:hover{border-color:var(--blu);color:var(--blu)}
  .ti-ov{position:fixed;inset:0;background:rgba(6,10,22,.78);z-index:220;display:none;align-items:center;justify-content:center;padding:18px}
  .ti-ov.open{display:flex}
  .ti-box{background:var(--panel);border:1px solid var(--line2);border-radius:14px;max-width:460px;width:100%;max-height:88vh;overflow-y:auto;padding:18px 20px 20px;box-shadow:var(--shadow);position:relative}
  .ti-close{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;border:1px solid var(--line2);background:var(--panel2);color:var(--mut);cursor:pointer;font-size:13px}
  .ti-h{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-right:30px}
  .ti-sec{font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--cyan);margin:15px 0 5px}
  .ti-row{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:5px 0;border-bottom:1px solid var(--line)}
  .ti-row:last-child{border-bottom:none}
  .ti-row .k{color:var(--mut)}
  .ti-row .v{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;color:var(--txt);font-weight:700;text-align:right}
</style>
</head>
<body>
<nav id="scorr-nav"></nav>
<div class="wrap">
  <header>
    <div class="logo">V14 · <b>Intraday</b></div>
    <div class="spacer"></div>
    <button id="replayBtn" class="rbtn">&#9654; Replay Day</button>
    <div class="clock" id="clk">--:--</div>
  </header>
  <div id="root"><div class="loading">Loading V14 intraday engine…</div></div>
</div>
<!-- cc#458: Replay Day overlay -->
<div class="rp-ov" id="rpOv">
  <div class="rp-wrap">
    <div class="rp-top">
      <div class="rp-clock" id="rpClock">09:15 <small>IST</small></div>
      <div class="rp-bar"><i id="rpBarFill"></i></div>
      <div class="rp-speed"><button data-dur="30000" class="on" id="rpS30">30s</button><button data-dur="60000" id="rpS60">60s</button></div>
      <button class="rp-x" id="rpClose">&#10005; Close</button>
    </div>
    <div id="rpBody"></div>
  </div>
</div>
<div class="rp-toast" id="rpToast"></div>
<!-- cc#457: trade logic-memory popover -->
<div class="ti-ov" id="tiOv" onclick="if(event.target===this)closeTradeInfo()"><div class="ti-box" id="tiBox"></div></div>
<script>
const EP={pos:"/api/v14/positions",trades:"/api/v14/trades?limit=200",summary:"/api/v14/summary"};
const D={open:[],closed:[],tags:[],cost:{},daily:null,dayLog:[]};
async function getJSON(u){const r=await fetch(u,{headers:{'Accept':'application/json'}});if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function num(v,d=2){return v==null||isNaN(v)?'--':Number(v).toFixed(d);}
function sign(v,d=2){if(v==null||isNaN(v))return'--';const n=Number(v);return(n>=0?'+':'')+n.toFixed(d);}
function tagChip(t){const c=t==='ORB'?'c-orb':t==='VWAP-RECLAIM'?'c-vwap':'c-r1';return`<span class="chip ${c}">${esc(t)}</span>`;}
function sideChip(s){const lng=(s||'').toLowerCase()==='long';return`<span class="chip ${lng?'c-long':'c-short'}">${lng?'LONG':'SHORT'}</span>`;}
function fmtT(ts){if(!ts)return'--';const d=new Date(ts);if(isNaN(d))return'--';const i=new Date(d.getTime()+(5*60+30)*60000);return String(i.getUTCHours()).padStart(2,'0')+':'+String(i.getUTCMinutes()).padStart(2,'0');}

function rSummary(){
  const t=D.tags||[];
  const cost=D.cost||{};
  const totals=t.reduce((a,x)=>({n:a.n+x.trades,w:a.w+x.wins,pts:a.pts+(x.net_points||0)}),{n:0,w:0,pts:0});
  const head=['TAG','TRADES','WIN RATE','NET PTS','AVG NET %'];
  const body=t.length?t.map(x=>`<tr>
    <td>${tagChip(x.tag)}</td>
    <td>${x.trades}</td>
    <td class="${x.win_rate>=55?'pos':x.win_rate>0?'':'neg'}">${x.win_rate}%</td>
    <td class="${(x.net_points||0)>=0?'pos':'neg'}">${sign(x.net_points,1)}</td>
    <td class="${(x.avg_net_pct||0)>=0?'pos':'neg'}">${sign(x.avg_net_pct,3)}%</td></tr>`).join('')
    :`<tr><td colspan="5" class="empty">No closed trades yet today.</td></tr>`;
  return `<div class="ptitle">Per-tag day summary <span class="ct">${totals.n} closed · ${totals.n?Math.round(100*totals.w/totals.n):0}% WR · net ${sign(totals.pts,1)} pts</span></div>
    <div class="scroll"><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>
    <div class="note">Costs per trade: Rs ${cost.flat_rs??500} flat + ${cost.slippage_pct??0.05}% slippage (net % is after slippage). Viability gate: ship only setups clearing 55% WR after costs at 1:1 (BT7 replay).</div>`;
}
function basisCell(rs,sign,dir){
  if(rs==null)return'<td style="color:var(--dim)">--</td>';
  const col=(sign==='premium')?'var(--grn)':(sign==='discount')?'var(--red)':'var(--mut)';
  return `<td style="color:${col}" title="${esc(sign||'')} · ${esc(dir||'')}">${num(rs,1)}<span style="color:var(--dim);font-size:9px"> ${(dir||'').slice(0,4)}</span></td>`;
}
function rOpen(){
  const head=['TAG','SIDE','SYMBOL','ENTRY(F)','EQ SIG','STOP','TARGET','T·BASIS','BASIS','RESULTS','SINCE'];
  const body=D.open.length?D.open.map(p=>`<tr>
    <td>${tagChip(p.tag)}</td><td>${sideChip(p.side)}</td>
    <td class="sym">${esc(p.symbol)}<span class="ibtn" onclick="tradeInfo('${p.id}')" title="Trade logic memory">i</span></td>
    <td>${num(p.entry_px)}</td>
    <td style="color:var(--mut)">${num(p.eq_signal_px)}</td>
    <td class="neg">${num(p.stop_px)}</td>
    <td class="pos">${num(p.target_px)}</td>
    <td style="color:var(--mut);font-size:10px">${esc(p.target_basis||'--')}</td>
    ${basisCell(p.basis_entry_rs,p.basis_entry_sign,p.basis_dir_entry)}
    <td style="color:${p.results_date?'var(--amber)':'var(--dim)'};font-size:10px">${esc(p.results_date||'--')}</td>
    <td style="color:var(--dim)">${fmtT(p.entry_ts)}</td></tr>`).join('')
    :`<tr><td colspan="11" class="empty">No open positions.</td></tr>`;
  return `<div class="ptitle">Open positions <span class="ct">${D.open.length} / 4 slots · entry priced on FUT</span></div>
    <div class="scroll"><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function rClosed(){
  const head=['DATE','TAG','SIDE','SYMBOL','ENTRY','EXIT','REASON','BASIS↔','PNL PTS','NET %'];
  const body=D.closed.length?D.closed.map(p=>`<tr>
    <td style="color:var(--mut);font-size:10px">${esc(p.trade_date)}</td>
    <td>${tagChip(p.tag)}</td><td>${sideChip(p.side)}</td>
    <td class="sym">${esc(p.symbol)}<span class="ibtn" onclick="tradeInfo('${p.id}')" title="Trade logic memory">i</span></td>
    <td>${num(p.entry_px)}</td><td>${num(p.exit_px)}</td>
    <td style="color:var(--mut);font-size:10px">${esc(p.exit_reason||'')}</td>
    <td style="font-size:10px;color:var(--dim)" title="entry ${esc(p.basis_entry_sign||'')}/${esc(p.basis_dir_entry||'')} → exit ${esc(p.basis_exit_sign||'')}/${esc(p.basis_dir_exit||'')}">${num(p.basis_entry_rs,1)}→${num(p.basis_exit_rs,1)}</td>
    <td class="${(p.pnl_pts||0)>=0?'pos':'neg'}">${sign(p.pnl_pts,1)}</td>
    <td class="${(p.net_pnl_pct||0)>=0?'pos':'neg'}">${sign(p.net_pnl_pct,2)}%</td></tr>`).join('')
    :`<tr><td colspan="10" class="empty">No closed trades yet.</td></tr>`;
  return `<div class="ptitle">Closed trades <span class="ct">${D.closed.length} logged</span></div>
    <div class="scroll"><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>
    <div class="note">Every row carries a full gates snapshot at entry (in v14_trades.gates_snapshot) for evening per-tag analysis.</div>`;
}
function rDaily(){
  const d=D.daily; if(!d)return'';
  const o=d.open||{},c=d.closed_today||{};
  const cell=(k,v,col)=>`<div class="card"><div class="k">${k}</div><div class="v" style="color:${col||'var(--txt)'}">${v}</div></div>`;
  const c1=(x)=>x>=0?'var(--grn)':'var(--red)';
  return `<div class="ptitle">Daily P&amp;L <span class="ct">${d.asof||''} · as-of</span></div>
    <div class="cards">
      ${cell('Open P&L (MTM)', sign(o.mtm_pct,2)+'%', c1(o.mtm_pct||0))}
      ${cell('Open positions', (o.positions||0)+' / 4')}
      ${cell('Closed today', sign(c.net_pct,2)+'%', c1(c.net_pct||0))}
      ${cell('Closed WR', (c.win_rate||0)+'%', (c.win_rate||0)>=55?'var(--grn)':'var(--amber)')}
      ${cell('Day net (comb.)', sign(d.combined_net_pct,2)+'%', c1(d.combined_net_pct||0))}
    </div>`;
}
function rDayLog(){
  const l=D.dayLog||[]; if(!l.length)return'';
  const head=['DATE','TRADES','WIN RATE','GROSS PTS','COST %','NET %'];
  const body=l.map(x=>`<tr>
    <td class="sym">${esc(x.date)}</td><td>${x.trades}</td>
    <td class="${x.win_rate>=55?'pos':''}">${x.win_rate}%</td>
    <td class="${(x.gross_pts||0)>=0?'pos':'neg'}">${sign(x.gross_pts,1)}</td>
    <td style="color:var(--mut)">${num(x.cost_pct,3)}%</td>
    <td class="${(x.net_pct||0)>=0?'pos':'neg'}">${sign(x.net_pct,2)}%</td></tr>`).join('');
  return `<div class="ptitle">Day log <span class="ct">${l.length} days</span></div>
    <div class="scroll"><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function render(){document.getElementById('root').innerHTML=rDaily()+rSummary()+rOpen()+rClosed()+rDayLog();}
async function load(){
  try{
    const [pos,tr,sm]=await Promise.all([getJSON(EP.pos),getJSON(EP.trades),getJSON(EP.summary)]);
    D.open=(pos&&pos.open_positions)||[]; D.closed=(tr&&tr.closed_trades)||[];
    D.tags=(sm&&sm.by_tag)||[]; D.cost=(sm&&sm.cost)||{}; D.daily=(sm&&sm.daily_pnl)||null; D.dayLog=(sm&&sm.day_log)||[];
  }catch(e){document.getElementById('root').innerHTML=`<div class="empty">V14 feed failed: ${esc(e.message)}</div>`;return;}
  render();
}
// ── cc#458: Replay Day — compress the 09:15→15:30 session into ~30s of live animation from the
// closed v14_trades already loaded (D.closed). Pure client-side: no re-fetch during replay. Doubles
// as evening review + investor demo. Trades animate in at entry_ts, MTM ticks (entry→exit px linearly
// interpolated by the clock), flip to closed at exit_ts with the exit-reason + P&L flash. ──
const RP={raf:null,dur:30000,trades:[],openSeen:new Set(),closedSeen:new Set(),flash:{},running:false};
const RP_START=555, RP_END=930;   // 09:15 .. 15:30 as IST minutes-of-day
function istMin(ts){if(!ts)return null;const d=new Date(ts);if(isNaN(d))return null;const i=new Date(d.getTime()+(5*60+30)*60000);return i.getUTCHours()*60+i.getUTCMinutes();}
function minToHM(m){m=Math.max(0,Math.round(m));return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function rpCurPx(t,clk){if(clk>=t.xm)return t.exit_px;if(clk<=t.em)return t.entry_px;return t.entry_px+(t.exit_px-t.entry_px)*((clk-t.em)/(t.xm-t.em));}
function rpMtm(t,px){const lng=(t.side||'').toLowerCase()==='long';return lng?((px-t.entry_px)/t.entry_px*100):((t.entry_px-px)/t.entry_px*100);}
function rpCard(k,v,col){return `<div class="card"><div class="k">${k}</div><div class="v" style="color:${col||'var(--txt)'}">${v}</div></div>`;}
let RP_TOAST_T=null;
function toastRP(msg){const el=document.getElementById('rpToast');el.textContent=msg;el.classList.add('show');if(RP_TOAST_T)clearTimeout(RP_TOAST_T);RP_TOAST_T=setTimeout(()=>el.classList.remove('show'),3600);}
function startReplay(){
  const src=(D.closed||[]).filter(t=>t.entry_ts&&t.exit_ts&&t.entry_px!=null&&t.exit_px!=null);
  if(!src.length){toastRP('No trades to replay for this day');return;}
  RP.trades=src.map((t,i)=>{const em=istMin(t.entry_ts);let xm=istMin(t.exit_ts);if(xm==null||em==null)return null;if(xm<=em)xm=em+1;return {...t,_id:t.id!=null?t.id:('x'+i),em,xm};}).filter(Boolean).sort((a,b)=>a.em-b.em);
  if(!RP.trades.length){toastRP('No timestamped trades to replay');return;}
  RP.openSeen=new Set();RP.closedSeen=new Set();RP.flash={};RP.running=true;
  document.getElementById('rpOv').classList.add('open');
  const t0=performance.now();
  function frame(now){
    if(!RP.running)return;
    const frac=Math.min(1,(now-t0)/RP.dur);
    renderReplay(RP_START+frac*(RP_END-RP_START), frac, now);
    if(frac<1){RP.raf=requestAnimationFrame(frame);}
    else{RP.running=false;const net=RP.trades.reduce((a,t)=>a+(t.net_pnl_pct||0),0);toastRP('✓ Replay complete · day net '+sign(net,2)+'%');}
  }
  RP.raf=requestAnimationFrame(frame);
}
function stopReplay(){RP.running=false;if(RP.raf)cancelAnimationFrame(RP.raf);document.getElementById('rpOv').classList.remove('open');}
function renderReplay(clk, frac, now){
  document.getElementById('rpClock').innerHTML=minToHM(clk)+' <small>IST</small>';
  document.getElementById('rpBarFill').style.width=(frac*100).toFixed(1)+'%';
  const open=RP.trades.filter(t=>clk>=t.em&&clk<t.xm);
  const closed=RP.trades.filter(t=>clk>=t.xm);
  open.forEach(t=>{if(!RP.openSeen.has(t._id)){RP.openSeen.add(t._id);RP.flash[t._id]={t:'in',u:now+900};}});
  closed.forEach(t=>{if(!RP.closedSeen.has(t._id)){RP.closedSeen.add(t._id);RP.flash[t._id]={t:(t.net_pnl_pct>=0?'win':'loss'),u:now+1000};}});
  const rowBg=id=>{const f=RP.flash[id];if(!f||now>=f.u)return '';return 'background:'+(f.t==='in'?'rgba(77,124,254,.28)':f.t==='win'?'rgba(47,212,139,.30)':'rgba(255,92,108,.30)')+';';};
  const openMTM=open.reduce((a,t)=>a+rpMtm(t,rpCurPx(t,clk)),0);
  const closedNet=closed.reduce((a,t)=>a+(t.net_pnl_pct||0),0);
  const dayNet=openMTM+closedNet, c1=x=>x>=0?'var(--grn)':'var(--red)';
  const cards=`<div class="cards">${rpCard('Clock',minToHM(clk))}${rpCard('Open MTM',sign(openMTM,2)+'%',c1(openMTM))}${rpCard('Open / Closed',open.length+' / '+closed.length)}${rpCard('Day net',sign(dayNet,2)+'%',c1(dayNet))}</div>`;
  const oh=['TAG','SIDE','SYMBOL','ENTRY','CUR PX','MTM %','SINCE'];
  const ob=open.length?open.map(t=>{const px=rpCurPx(t,clk),m=rpMtm(t,px);return `<tr style="${rowBg(t._id)}"><td>${tagChip(t.tag)}</td><td>${sideChip(t.side)}</td><td class="sym">${esc(t.symbol)}</td><td>${num(t.entry_px)}</td><td>${num(px)}</td><td class="${m>=0?'pos':'neg'}">${sign(m,2)}%</td><td style="color:var(--dim)">${minToHM(t.em)}</td></tr>`;}).join(''):`<tr><td colspan="7" class="empty">No open positions.</td></tr>`;
  const ch=['TAG','SIDE','SYMBOL','ENTRY','EXIT','REASON','NET %','@'];
  const cb=closed.length?[...closed].sort((a,b)=>b.xm-a.xm).map(t=>`<tr style="${rowBg(t._id)}"><td>${tagChip(t.tag)}</td><td>${sideChip(t.side)}</td><td class="sym">${esc(t.symbol)}</td><td>${num(t.entry_px)}</td><td>${num(t.exit_px)}</td><td style="color:var(--mut);font-size:10px">${esc(t.exit_reason||'')}</td><td class="${(t.net_pnl_pct||0)>=0?'pos':'neg'}">${sign(t.net_pnl_pct,2)}%</td><td style="color:var(--dim)">${minToHM(t.xm)}</td></tr>`).join(''):`<tr><td colspan="8" class="empty">No closed trades yet.</td></tr>`;
  const tags={};closed.forEach(t=>{const g=tags[t.tag]||(tags[t.tag]={n:0,w:0,net:0});g.n++;if((t.net_pnl_pct||0)>0)g.w++;g.net+=(t.net_pnl_pct||0);});
  const tb=Object.keys(tags).length?Object.entries(tags).map(([k,g])=>`<tr><td>${tagChip(k)}</td><td>${g.n}</td><td class="${g.w/g.n>=0.55?'pos':''}">${Math.round(100*g.w/g.n)}%</td><td class="${g.net>=0?'pos':'neg'}">${sign(g.net,2)}%</td></tr>`).join(''):`<tr><td colspan="4" class="empty">&mdash;</td></tr>`;
  document.getElementById('rpBody').innerHTML=cards
    +`<div class="ptitle">Open positions <span class="ct">${open.length} live &middot; MTM ticking</span></div><div class="scroll"><table><thead><tr>${oh.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${ob}</tbody></table></div>`
    +`<div class="ptitle">Closed trades <span class="ct">${closed.length} done &middot; net ${sign(closedNet,2)}%</span></div><div class="scroll"><table><thead><tr>${ch.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${cb}</tbody></table></div>`
    +`<div class="ptitle">Per-tag <span class="ct">live</span></div><div class="scroll"><table><thead><tr><th>TAG</th><th>TRADES</th><th>WR</th><th>NET %</th></tr></thead><tbody>${tb}</tbody></table></div>`;
}
document.getElementById('replayBtn').onclick=startReplay;
document.getElementById('rpClose').onclick=stopReplay;
document.querySelectorAll('.rp-speed button').forEach(b=>b.onclick=()=>{RP.dur=+b.getAttribute('data-dur');document.querySelectorAll('.rp-speed button').forEach(x=>x.classList.remove('on'));b.classList.add('on');if(RP.running){stopReplay();startReplay();}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&RP.running)stopReplay();});

// ── cc#457: trade "logic memory" popover — the full WHY of a trade from gates_snapshot + the
// bracket/exit/basis/cost columns already stored per row. Dynamic: renders whatever jsonb keys exist
// (skips the sim flag + nulls), so future rule additions show with no UI change. Same popover style as
// the cc#452 scorecard i-buttons. Works on open + closed rows. ──
const GS_LABELS={v10:'V10 state',mood:'Market mood',volx:'VolX (×)',day_pct:'Day %',gap_pct:'Gap %',cmp_vs_pp:'CMP vs PP',vwap_side:'VWAP side',turnover_rank:'Turnover rank',r1_touch:'R1 touch',oi_red_bar:'OI bar',room_to_pp_pct:'Room to PP %',fall_from_high_pct:'Fall from high %',touch_count:'Touch #',dip_depth_pct:'Dip depth %',sector_vs_stock:'Sector vs stock',reclaim:'VWAP reclaim'};
function gsLabel(k){return GS_LABELS[k]||k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
function gsVal(k,v){if(typeof v==='boolean')return v?'yes':'no';if(typeof v==='number')return /_pct$/.test(k)?(v+'%'):String(v);return esc(String(v));}
function findTrade(id){return (D.open||[]).concat(D.closed||[]).find(t=>String(t.id)===String(id));}
function tiRow(k,v){return `<div class="ti-row"><span class="k">${k}</span><span class="v">${v}</span></div>`;}
function tradeInfo(id){
  const t=findTrade(id);if(!t)return;
  const gs=t.gates_snapshot||{};
  const entryRows=Object.keys(gs).filter(k=>k!=='sim'&&gs[k]!=null).map(k=>tiRow(gsLabel(k),gsVal(k,gs[k]))).join('')||tiRow('&mdash;','no snapshot stored');
  const dur=(t.entry_ts&&t.exit_ts)?Math.round((new Date(t.exit_ts)-new Date(t.entry_ts))/60000):null;
  const cost=D.cost||{};
  const exChip=t.exit_reason?`<span class="chip ${t.exit_reason==='target'?'c-long':t.exit_reason==='stop'?'c-short':'c-orb'}">${esc(t.exit_reason)}</span>`:'--';
  let h=`<button class="ti-close" onclick="closeTradeInfo()">&times;</button>`
    +`<div class="ti-h">${esc(t.symbol)} ${tagChip(t.tag)} ${sideChip(t.side)}</div>`
    +`<div class="ti-sec">Entry logic</div>`+entryRows
    +`<div class="ti-sec">Bracket</div>`
      +tiRow('Entry (FUT)',num(t.entry_px))
      +(t.eq_signal_px!=null?tiRow('Eq signal',num(t.eq_signal_px)):'')
      +tiRow('Target',num(t.target_px)+(t.target_basis?` <span style="color:var(--dim);font-size:10px">${esc(t.target_basis)}</span>`:''))
      +tiRow('Stop',num(t.stop_px))
      +(t.atr!=null?tiRow('ATR',num(t.atr)):'');
  if(t.exit_reason||t.exit_px!=null){
    h+=`<div class="ti-sec">Exit</div>`+tiRow('Reason',exChip)
      +(t.exit_px!=null?tiRow('Exit px',num(t.exit_px)):'')
      +(dur!=null?tiRow('Duration',dur+' min'):'')
      +(t.net_pnl_pct!=null?tiRow('Net P&amp;L',`<span class="${t.net_pnl_pct>=0?'pos':'neg'}">${sign(t.net_pnl_pct,2)}%</span>`):'');
  }
  if(t.basis_entry_rs!=null||t.basis_exit_rs!=null){
    h+=`<div class="ti-sec">Basis memory</div>`
      +tiRow('Entry basis',(t.basis_entry_rs!=null?num(t.basis_entry_rs,1):'--')+` <span style="color:var(--dim);font-size:10px">${esc(((t.basis_entry_sign||'')+' '+(t.basis_dir_entry||'')).trim())}</span>`)
      +(t.basis_exit_rs!=null?tiRow('Exit basis',num(t.basis_exit_rs,1)+` <span style="color:var(--dim);font-size:10px">${esc(((t.basis_exit_sign||'')+' '+(t.basis_dir_exit||'')).trim())}</span>`):'');
  }
  h+=`<div class="ti-sec">Costs</div>`+tiRow('Flat',`Rs ${cost.flat_rs??500}`)+tiRow('Slippage',`${cost.slippage_pct??0.05}%`)
    +((t.net_pnl_pct!=null&&t.pnl_pct!=null)?tiRow('Gross &rarr; net',`${sign(t.pnl_pct,2)}% &rarr; ${sign(t.net_pnl_pct,2)}%`):'');
  document.getElementById('tiBox').innerHTML=h;
  document.getElementById('tiOv').classList.add('open');
}
function closeTradeInfo(){document.getElementById('tiOv').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTradeInfo();});

function tick(){const i=new Date(Date.now()+(5*60+30)*60000);document.getElementById('clk').textContent=String(i.getUTCHours()).padStart(2,'0')+':'+String(i.getUTCMinutes()).padStart(2,'0')+' IST';}
tick();setInterval(tick,1000);
load();setInterval(load,60000);
</script>
