<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scorr · Sector Analysis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;padding:0;background:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:13px;color:#1c2536}
table{border-collapse:collapse;width:100%}
th{background:#f8fafc;padding:7px 8px;font-size:10px;font-weight:700;color:#5a6781;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e2e7ee;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:#2563eb}
td{padding:5px 8px;border-bottom:1px solid #edf1f6;vertical-align:middle;white-space:nowrap}
tr:hover td{background:#f0f4f9;cursor:pointer}
.mono{font-family:'SFMono-Regular',Consolas,monospace}
button.tab{padding:8px 16px;border-radius:0;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cfd8e3;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo} = React;

const C = {bg:"#f4f6f9",card:"#fff",border:"#e2e7ee",accent:"#2563eb",green:"#0a9e63",red:"#dd3a4a",gold:"#b45309",orange:"#d97706",text:"#1c2536",muted:"#5a6781"};
const VC = {"Strong Buy":"#0a9e63","Buy":"#22a06b","Watch":"#d97706","Exit":"#dd3a4a"};

const fmt  = (v,d=2) => v==null ? "—" : Number(v).toFixed(d);
const pct  = (v,d=1) => v==null ? "—" : (v>0?"+":"")+Number(v).toFixed(d)+"%";
const clr  = v => v==null ? C.muted : v>0 ? C.green : v<0 ? C.red : C.muted;
const sclr = s => s>=7 ? C.green : s>=4 ? C.orange : C.red;
const clip = (s,n=28) => s&&s.length>n ? s.slice(0,n)+"…" : (s||"");
const MEDALS = ["🥇","🥈","🥉"];

function Dots({row}) {
  const sigs = [
    row.gvm >= 6.5,
    (row.gvm_change||0) > 0,
    (row.inst_change||0) > 0,
    (row.qoq_profit||0) > 10,
    (row.annual_upside||0) > 15,
  ];
  const labels = ["GVM≥6.5","GVMδ>0","Inst+","QoQ>10%","Upside>15%"];
  return (
    <span style={{display:"inline-flex",gap:3,marginLeft:6}}>
      {sigs.map((ok,i)=>(
        <span key={i} title={labels[i]}
          style={{width:7,height:7,borderRadius:"50%",display:"inline-block",
            background:ok?"#0a9e63":"#dd3a4a",opacity:0.85}}/>
      ))}
    </span>
  );
}

function RankCard({row, rank, isBottom}) {
  const border = isBottom ? C.red : C.green;
  const shadow = isBottom ? "0 1px 6px rgba(221,58,74,.12)" : "0 1px 6px rgba(10,158,99,.12)";
  return (
    <div style={{flex:"0 0 auto",width:176,background:C.card,border:`1.5px solid ${border}`,
        borderRadius:8,padding:"10px 12px",boxShadow:shadow,cursor:"pointer",transition:"transform .1s"}}
      onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
      onMouseLeave={e=>e.currentTarget.style.transform=""}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:rank<3&&!isBottom?18:12,lineHeight:1}}>
          {!isBottom && rank<3 ? MEDALS[rank] : <span style={{fontWeight:800,color:C.muted,fontFamily:"monospace"}}>#{rank+1}</span>}
        </span>
        <span style={{fontSize:19,fontWeight:900,color:sclr(row.composite_score),fontFamily:"monospace",letterSpacing:"-1px"}}>
          {fmt(row.composite_score,1)}
        </span>
      </div>
      <div style={{fontSize:12,fontWeight:700,color:C.text,marginTop:5,lineHeight:1.3}}>{clip(row.segment,22)}</div>
      <div style={{fontSize:10,color:C.muted,marginTop:3}}>
        GVM <b style={{color:row.gvm>=7?C.green:row.gvm>=6?C.orange:C.red}}>{fmt(row.gvm)}</b>
        <span style={{marginLeft:6}}>↑ {row.top_stock}</span>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:7}}>
        <span style={{fontSize:10,fontWeight:700,color:VC[row.verdict]||C.muted}}>{row.verdict}</span>
        <Dots row={row}/>
      </div>
    </div>
  );
}

function Strip({top5, cold, onSel}) {
  return (
    <div style={{background:"#fff",borderBottom:`1px solid ${C.border}`,padding:"12px 20px"}}>
      <div style={{display:"flex",gap:0,alignItems:"flex-start"}}>
        {/* TOP 5 */}
        <div style={{flex:"0 0 auto",marginRight:16}}>
          <div style={{fontSize:10,fontWeight:700,color:C.green,marginBottom:8,letterSpacing:".06em"}}>
            🔥 TOP 5 · HIGHEST SCORE
          </div>
          <div style={{display:"flex",gap:8}}>
            {top5.map((r,i)=>(
              <div key={r.segment} onClick={()=>onSel(r)}>
                <RankCard row={r} rank={i} isBottom={false}/>
              </div>
            ))}
          </div>
        </div>

        <div style={{width:1,background:C.border,margin:"0 0 0 0",alignSelf:"stretch",flexShrink:0}}/>

        {/* COLD: score < 4 */}
        <div style={{flex:1,minWidth:0,marginLeft:16}}>
          <div style={{fontSize:10,fontWeight:700,color:C.red,marginBottom:8,letterSpacing:".06em"}}>
            ❄️ COLD SECTORS · Score &lt; 4.0 &nbsp;
            <span style={{background:"#fef2f2",color:C.red,border:"1px solid #fecaca",
              borderRadius:10,padding:"1px 7px",fontSize:9,fontWeight:800}}>
              {cold.length}
            </span>
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
            {cold.map((r,i)=>(
              <div key={r.segment} onClick={()=>onSel(r)}>
                <RankCard row={r} rank={i} isBottom={true}/>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{fontSize:9,color:C.muted,marginTop:8}}>
        Score 0–10 · Percentile rank avg of 5 signals: GVM · GVM Δ14d · Institutional flow (median) · QoQ profit (median) · Annual upside · Dots = signal pass/fail
      </div>
    </div>
  );
}

function Detail({row, onClose}) {
  if (!row) return null;
  const sigs = [
    {lbl:"GVM",     sub:"Quality",       v:row.gvm,           fmt:v=>fmt(v),     good:v=>v>=6.5},
    {lbl:"GVM Δ14d",sub:"Trend",         v:row.gvm_change,    fmt:v=>(v>0?"+":"")+fmt(v,3), good:v=>v>0},
    {lbl:"Inst %",  sub:"FII+DII median",v:row.inst_change,   fmt:v=>pct(v),     good:v=>v>0},
    {lbl:"QoQ %",   sub:"Profit median", v:row.qoq_profit,    fmt:v=>pct(v,1),   good:v=>v>10},
    {lbl:"Upside %",sub:"PE-based",      v:row.annual_upside, fmt:v=>pct(v,1),   good:v=>v>15},
  ];
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 18px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{fontSize:15,fontWeight:800}}>{row.segment}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:3}}>
            {row.stocks_count} stocks · ₹{row.total_mcap}L Cr · Top: <b style={{color:C.accent}}>{row.top_stock}</b> (GVM {row.top_stock_gvm})
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:26,fontWeight:900,color:sclr(row.composite_score),fontFamily:"monospace"}}>{fmt(row.composite_score,2)}</div>
            <div style={{fontSize:9,color:C.muted}}>/ 10 composite</div>
          </div>
          <span style={{fontSize:12,fontWeight:700,color:VC[row.verdict]||C.muted}}>{row.verdict}</span>
          <button onClick={onClose} style={{fontSize:18,border:"none",background:"none",cursor:"pointer",color:C.muted,lineHeight:1}}>×</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:12}}>
        {sigs.map(s=>{
          const ok = s.v!=null && s.good(s.v);
          const col = s.v==null ? C.muted : ok ? C.green : C.red;
          return (
            <div key={s.lbl} style={{background:"#f8fafc",border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px"}}>
              <div style={{fontSize:10,color:C.muted}}>{s.lbl}</div>
              <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{s.sub}</div>
              <div style={{fontSize:16,fontWeight:900,color:col,fontFamily:"monospace"}}>{s.v==null?"—":s.fmt(s.v)}</div>
              <div style={{width:6,height:6,borderRadius:"50%",background:col,marginTop:4}}/>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:20,fontSize:11,color:C.muted}}>
        <span>G <b className="mono" style={{color:C.green}}>{fmt(row.g_score)}</b></span>
        <span>V <b className="mono" style={{color:C.gold}}>{fmt(row.v_score)}</b></span>
        <span>M <b className="mono" style={{color:C.accent}}>{fmt(row.m_score)}</b></span>
        <span style={{marginLeft:"auto",fontSize:10}}>as of {row.score_date}</span>
      </div>
    </div>
  );
}

function useSort(def, defDir="desc") {
  const [k, setK] = useState(def);
  const [d, setD] = useState(defDir);
  const toggle = key => { if(key===k) setD(p=>p==="desc"?"asc":"desc"); else {setK(key);setD("desc");} };
  const Th = ({k:key,lbl,r}) => (
    <th onClick={()=>toggle(key)} style={{textAlign:r?"right":"left"}}>
      {lbl}{k===key?(d==="desc"?"↓":"↑"):""}
    </th>
  );
  return {sortK:k, sortD:d, Th};
}

function RankTab({data, onSel}) {
  const {sortK, sortD, Th} = useSort("composite_score");
  const rows = useMemo(()=>
    [...data].sort((a,b)=>{
      const av=a[sortK]??-Infinity, bv=b[sortK]??-Infinity;
      return sortD==="desc"?bv-av:av-bv;
    }), [data,sortK,sortD]);
  return (
    <div style={{overflowX:"auto",background:C.card,border:`1px solid ${C.border}`,borderRadius:8}}>
      <table>
        <thead><tr>
          <th style={{width:32,textAlign:"center"}}>#</th>
          <Th k="segment" lbl="Segment"/>
          <Th k="composite_score" lbl="Score" r/>
          <Th k="gvm" lbl="GVM" r/>
          <Th k="g_score" lbl="G" r/>
          <Th k="v_score" lbl="V" r/>
          <Th k="m_score" lbl="M" r/>
          <Th k="gvm_change" lbl="GVMδ14d" r/>
          <Th k="inst_change" lbl="Inst%" r/>
          <Th k="qoq_profit" lbl="QoQ%" r/>
          <Th k="annual_upside" lbl="Upside%" r/>
          <Th k="verdict" lbl="Verdict"/>
          <Th k="stocks_count" lbl="Stks" r/>
          <th>Top Pick</th>
        </tr></thead>
        <tbody>
          {rows.map((r,i)=>(
            <tr key={r.segment} onClick={()=>onSel(r)}
              style={{background:r.composite_score<4?"#fff5f5":undefined}}>
              <td className="mono" style={{textAlign:"center",color:C.muted,fontSize:11}}>{i+1}</td>
              <td style={{fontWeight:600,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis"}}>{clip(r.segment,30)}</td>
              <td className="mono" style={{textAlign:"right",fontWeight:900,color:sclr(r.composite_score)}}>{fmt(r.composite_score,2)}</td>
              <td className="mono" style={{textAlign:"right",color:r.gvm>=7?C.green:r.gvm>=6?C.orange:C.red}}>{fmt(r.gvm)}</td>
              <td className="mono" style={{textAlign:"right",color:C.green}}>{fmt(r.g_score)}</td>
              <td className="mono" style={{textAlign:"right",color:C.gold}}>{fmt(r.v_score)}</td>
              <td className="mono" style={{textAlign:"right",color:C.accent}}>{fmt(r.m_score)}</td>
              <td className="mono" style={{textAlign:"right",color:clr(r.gvm_change)}}>{r.gvm_change==null?"—":(r.gvm_change>0?"+":"")+fmt(r.gvm_change,3)}</td>
              <td className="mono" style={{textAlign:"right",color:clr(r.inst_change)}}>{pct(r.inst_change)}</td>
              <td className="mono" style={{textAlign:"right",color:clr(r.qoq_profit)}}>{pct(r.qoq_profit,1)}</td>
              <td className="mono" style={{textAlign:"right",color:clr(r.annual_upside)}}>{pct(r.annual_upside,1)}</td>
              <td style={{color:VC[r.verdict]||C.muted,fontSize:11,fontWeight:600}}>{r.verdict}</td>
              <td className="mono" style={{textAlign:"right",color:C.muted,fontSize:11}}>{r.stocks_count}</td>
              <td style={{color:C.accent,fontSize:11}}>{r.top_stock}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function GVMTab({data, onSel}) {
  const [mode, setMode] = useState("composite_score");
  const rows = useMemo(()=>[...data].sort((a,b)=>b[mode]-a[mode]).slice(0,25), [data,mode]);
  const MODES = [
    ["composite_score","Score"],["gvm","GVM"],["g_score","G · Growth"],
    ["v_score","V · Value"],["m_score","M · Momentum"]
  ];
  return (
    <div>
      <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:C.muted,fontWeight:700}}>RANK BY:</span>
        {MODES.map(([k,l])=>(
          <button key={k} onClick={()=>setMode(k)} style={{
            cursor:"pointer",borderRadius:6,fontSize:11,fontWeight:600,padding:"5px 10px",
            border:`1px solid ${mode===k?C.accent:C.border}`,
            background:mode===k?"#eff4ff":"#fff",color:mode===k?C.accent:C.muted}}>
            {l}
          </button>
        ))}
        <span style={{marginLeft:"auto",fontSize:10,color:C.muted}}>Top 25 · Click for detail</span>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        {rows.map((r,i)=>(
          <div key={r.segment} onClick={()=>onSel(r)} style={{
            display:"flex",alignItems:"center",gap:10,padding:"8px 14px",
            borderBottom:i<rows.length-1?`1px solid ${C.border}`:"none",cursor:"pointer"}}
            onMouseEnter={e=>e.currentTarget.style.background="#f0f4f9"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div className="mono" style={{fontSize:11,color:C.muted,width:22,textAlign:"right"}}>{i+1}</div>
            <div style={{width:210,fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.segment}</div>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
              {[["g_score",C.green,"G"],["v_score",C.gold,"V"],["m_score",C.accent,"M"]].map(([k,col,lbl])=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
                  <span className="mono" style={{width:18,fontSize:10,color:col,fontWeight:700}}>{lbl}</span>
                  <div style={{flex:1,height:5,background:"#f0f4f9",borderRadius:3}}>
                    <div style={{height:5,width:(r[k]/10*100)+"%",background:col,borderRadius:3}}/>
                  </div>
                  <span className="mono" style={{fontSize:11,color:col,width:30,textAlign:"right"}}>{fmt(r[k])}</span>
                </div>
              ))}
            </div>
            <div className="mono" style={{fontSize:13,fontWeight:800,color:r.gvm>=7?C.green:r.gvm>=6?C.orange:C.red,width:36,textAlign:"right"}}>{fmt(r.gvm)}</div>
            <div className="mono" style={{fontSize:13,fontWeight:900,color:sclr(r.composite_score),width:32,textAlign:"right"}}>{fmt(r.composite_score,1)}</div>
            <div style={{fontSize:11,color:VC[r.verdict]||C.muted,fontWeight:600,width:60}}>{r.verdict}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Loading() {
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:12}}>
      <div style={{width:32,height:32,border:"3px solid #e2e7ee",borderTop:`3px solid ${C.accent}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{color:C.muted,fontSize:12}}>Loading sector data from Railway…</div>
    </div>
  );
}

function App() {
  const [d, setD]     = useState(null);
  const [err, setE]   = useState(null);
  const [tab, setTab] = useState("rank");
  const [sel, setSel] = useState(null);

  useEffect(()=>{
    fetch("/api/sector/rotation")
      .then(r=>r.json())
      .then(data=>{ data.error ? setE(data.error) : setD(data); })
      .catch(e=>setE(e.message));
  },[]);

  if (err) return <div style={{padding:40,color:C.red,fontSize:13}}>⚠ {err}</div>;
  if (!d)  return <Loading/>;

  const stats = {
    buy:  d.all.filter(r=>["Strong Buy","Buy"].includes(r.verdict)).length,
    hi:   d.all.filter(r=>r.composite_score>=7).length,
    cold: d.all.filter(r=>r.composite_score<4).length,
  };

  const TABS = [["rank","Composite Rank"],["gvm","G · V · M"]];

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"12px 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
          <div>
            <span style={{fontSize:13,fontWeight:800,color:C.text}}>SCORR · Sector Analysis</span>
            <span style={{fontSize:10,color:C.muted,marginLeft:10}}>
              {d.total_segments} segments · {d.score_date} · 5-signal percentile composite
            </span>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:16,fontSize:11}}>
            <span>Buy+: <b style={{color:C.green}}>{stats.buy}</b></span>
            <span>Score≥7: <b style={{color:C.green}}>{stats.hi}</b></span>
            <span>Cold&lt;4: <b style={{color:C.red}}>{stats.cold}</b></span>
          </div>
        </div>
        <div style={{display:"flex",marginTop:10,borderBottom:`1px solid ${C.border}`,marginLeft:-20,paddingLeft:20,marginBottom:-13}}>
          {TABS.map(([id,lbl])=>(
            <button key={id} className="tab" onClick={()=>setTab(id)} style={{
              borderBottom:`2px solid ${tab===id?C.accent:"transparent"}`,
              color:tab===id?C.accent:C.muted,fontWeight:tab===id?700:500}}>
              {lbl}
            </button>
          ))}
        </div>
      </div>

      <Strip top5={d.top5} cold={d.bottom5} onSel={setSel}/>

      {sel && <div style={{padding:"12px 20px 0"}}><Detail row={sel} onClose={()=>setSel(null)}/></div>}

      <div style={{padding:"12px 20px 24px",maxWidth:1440,margin:"0 auto"}}>
        {tab==="rank" && <RankTab data={d.all} onSel={setSel}/>}
        {tab==="gvm"  && <GVMTab  data={d.all} onSel={setSel}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
