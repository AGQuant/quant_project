function score(gvm, rotation, inst, profit, delta) {
  const pa = rotation==="HOT"?25:rotation==="REVERTING"?18:rotation==="FADING"?12:rotation==="COLD"?5:12;
  const gvmPts = Math.round(Math.max(0,Math.min(25,((gvm-5)/5)*25)));
  const d=delta||0, dPts=d>0.3?15:d>0.15?12:d>0?9:d<-0.3?1:d<-0.1?4:7;
  const i=inst||0, iPts=i>2?20:i>1?17:i>0.5?14:i>0.1?11:i>-0.1?8:i>-0.5?5:2;
  const p=Math.max(-200,Math.min(200,profit||0)), ePts=p>100?15:p>50?12:p>20?10:p>0?7:p>-50?4:1;
  return {pa,gvmPts,dPts,iPts,ePts,total:pa+gvmPts+dPts+iPts+ePts};
}

const rotMap=Object.fromEntries(RD.map(([s,w,m])=>[s,{wk:w,mo:m}]));
const mfMap=Object.fromEntries(MF.map(([s,i,p,d])=>[s,{inst:i,profit:p,delta:d}]));
const MERGED=SR.map(([seg,n,gvm,g,v,m,top,tgvm,verdict,mcap])=>{
  const rot=rotMap[seg]; const mf=mfMap[seg]||{};
  const rotation=rot?(rot.wk>0&&rot.mo>0?"HOT":rot.wk>0?"REVERTING":rot.mo>0?"FADING":"COLD"):null;
  const f=score(gvm,rotation,mf.inst,mf.profit,mf.delta);
  return{seg,n,gvm,g,v,m,top,tgvm,verdict,mcap,wk:rot?rot.wk:null,mo:rot?rot.mo:null,
    inst:mf.inst,profit:mf.profit,delta:mf.delta,rotation,
    pa:f.pa,gvmPts:f.gvmPts,dPts:f.dPts,iPts:f.iPts,ePts:f.ePts,composite:f.total};
});

function useTbl(def,defDir="desc"){
  const [k,setK]=useState(def); const [d,setD]=useState(defDir);
  const sort=key=>{ if(key===k)setD(p=>p==="desc"?"asc":"desc"); else{setK(key);setD("desc");} };
  const apply=arr=>[...arr].sort((a,b)=>{const av=a[k]??-Infinity,bv=b[k]??-Infinity;return d==="desc"?bv-av:av-bv;});
  const Th=({k:key,lbl,r})=><th onClick={()=>sort(key)} style={{textAlign:r?"right":"left"}}>{lbl}{k===key?(d==="desc"?"↓":"↑"):""}</th>;
  return{apply,Th};
}

            <Th k="delta" lbl="GVMδ7d" r/><Th k="composite" lbl="Score" r/>
            <Th k="rotation" lbl="Rotation"/><Th k="verdict" lbl="Verdict"/>
            <Th k="n" lbl="Stocks" r/><Th k="mcap" lbl="₹LCr" r/><th>Top</th>
          </tr></thead>
          <tbody>
            {filtered.map((s,i)=>(
              <tr key={s.seg} onClick={()=>onSel(s)}>
                <td style={{color:C.muted,fontSize:11}}>{i+1}</td>
                <td style={{fontWeight:600,maxWidth:200}}>{short(s.seg,30)}</td>
                <td className="mono" style={{textAlign:"right",fontWeight:800,color:s.gvm>=7?C.green:s.gvm>=6?C.gold:C.red}}>{s.gvm}</td>
                <td className="mono" style={{textAlign:"right",color:C.green}}>{s.g}</td>
                <td className="mono" style={{textAlign:"right",color:C.gold}}>{s.v}</td>
                <td className="mono" style={{textAlign:"right",color:C.accent}}>{s.m}</td>
                <td className="mono" style={{textAlign:"right",color:s.wk==null?C.muted:s.wk>=0?C.green:C.red}}>{s.wk!=null?pn(s.wk):"—"}</td>
                <td className="mono" style={{textAlign:"right",color:s.mo==null?C.muted:s.mo>=0?C.green:C.red}}>{s.mo!=null?pn(s.mo):"—"}</td>
                <td className="mono" style={{textAlign:"right",color:s.inst==null?C.muted:s.inst>=0?C.green:C.red}}>{s.inst!=null?pn(s.inst):"—"}</td>
                <td className="mono" style={{textAlign:"right",color:s.profit==null?C.muted:s.profit>=0?C.green:C.red}}>{s.profit!=null?`${s.profit>0?"+":""}${s.profit}%`:"—"}</td>
                <td className="mono" style={{textAlign:"right",color:s.delta==null?C.muted:s.delta>0?C.green:s.delta<0?C.red:C.muted}}>{s.delta!=null?(s.delta>0?"+":"")+s.delta.toFixed(3):"—"}</td>
                <td className="mono" style={{textAlign:"right",fontWeight:700,color:sc(s.composite)}}>{s.composite}</td>
                <td style={{color:RC2[s.rotation]||C.muted,fontSize:11,fontWeight:600}}>{s.rotation||"—"}</td>
                <td style={{color:VC[s.verdict]||C.muted,fontSize:11,fontWeight:600}}>{s.verdict}</td>
                <td className="mono" style={{textAlign:"right",color:C.muted}}>{s.n}</td>
                <td className="mono" style={{textAlign:"right",color:C.muted}}>{s.mcap}</td>
                <td style={{color:C.accent,fontSize:11}}>{s.top}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function GVMTab({onSel}){
  const [mode,setMode]=useState("gvm");
  const rows=useMemo(()=>[...MERGED].sort((a,b)=>b[mode]-a[mode]).slice(0,25),[mode]);
  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center"}}>
        <span style={{fontSize:11,color:C.muted,fontWeight:700}}>RANK BY:</span>
        {[["gvm","GVM"],["g","G · Growth"],["v","V · Value"],["m","M · Momentum"]].map(([k,l])=>
          <button key={k} className={mode===k?"on":""} onClick={()=>setMode(k)}>{l}</button>
        )}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:10,fontSize:11,color:C.muted}}>
        <span><span style={{display:"inline-block",width:10,height:10,background:C.green,borderRadius:2,marginRight:4}}/>G · Growth</span>
        <span><span style={{display:"inline-block",width:10,height:10,background:C.gold,borderRadius:2,marginRight:4}}/>V · Value</span>
        <span><span style={{display:"inline-block",width:10,height:10,background:C.accent,borderRadius:2,marginRight:4}}/>M · Momentum</span>
        <span style={{marginLeft:"auto"}}>Top 25 · Bar = score/10</span>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        {rows.map((s,i)=>(
          <div key={s.seg} onClick={()=>onSel(s)} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderBottom:i<rows.length-1?`1px solid ${C.grid}`:"none",cursor:"pointer"}}
            onMouseEnter={e=>e.currentTarget.style.background="#f0f4f9"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div style={{fontSize:11,color:C.muted,width:22,textAlign:"right"}}>{i+1}</div>
            <div style={{width:200,fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.seg}</div>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
              {[["g",C.green],["v",C.gold],["m",C.accent]].map(([k,col])=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:24,fontSize:10,color:col,fontWeight:700}}>{k.toUpperCase()} {s[k]}</div>
                  <div style={{flex:1,height:5,background:"#f0f4f9",borderRadius:3}}>
                    <div style={{height:5,width:(s[k]/10*100)+"%",background:col,borderRadius:3}}/>
                  </div>
                </div>
              ))}
            </div>
            <div className="mono" style={{fontSize:14,fontWeight:800,color:s.gvm>=7?C.green:s.gvm>=6?C.gold:C.red,width:36,textAlign:"right"}}>{s.gvm}</div>
            <div style={{fontSize:11,color:VC[s.verdict]||C.muted,fontWeight:600,width:56}}>{s.verdict}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("composite");
  const [sel,setSel]=useState(null);
  const stats=useMemo(()=>({
    hot:MERGED.filter(s=>s.rotation==="HOT").length,
    buy:MERGED.filter(s=>["Strong Buy","Buy"].includes(s.verdict)).length,
    strong:MERGED.filter(s=>s.composite>=70).length,
  }),[]);
  const TABS=[["composite","Composite Score"],["rotation","Rotation Matrix"],["leaderboard","Leaderboard"],["gvm","G · V · M"]];
  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"12px 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
          <div>
            <span style={{fontSize:12,fontWeight:800,color:C.text}}>SCORR · Sector Analysis</span>
            <span style={{fontSize:10,color:C.muted,marginLeft:10}}>129 segments · 5-factor scoring · 12-Jun-2026</span>
          </div>
          <div style={{display:"flex",gap:10,marginLeft:"auto",fontSize:11}}>
            <span>Buy+: <b style={{color:C.green}}>{stats.buy}</b></span>
            <span>🔥 HOT: <b style={{color:C.gold}}>{stats.hot}</b></span>
            <span>Score≥70: <b style={{color:C.green}}>{stats.strong}</b></span>
          </div>
        </div>
        <div style={{display:"flex",gap:0,marginTop:10,borderBottom:`1px solid ${C.border}`,marginBottom:-13,marginLeft:-20,paddingLeft:20}}>
          {TABS.map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 16px",borderRadius:0,border:"none",borderBottom:`2px solid ${tab===id?C.accent:"transparent"}`,background:"transparent",color:tab===id?C.accent:C.muted,fontWeight:tab===id?700:500,fontSize:12}}>
              {lbl}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"16px 20px",maxWidth:1400,margin:"0 auto"}}>
        {sel&&<Panel s={sel} onClose={()=>setSel(null)}/>}
        {tab==="composite"&&<CompositeTab onSel={setSel}/>}
        {tab==="rotation"&&<RotationTab onSel={setSel}/>}
        {tab==="leaderboard"&&<LeaderboardTab onSel={setSel}/>}
        {tab==="gvm"&&<GVMTab onSel={setSel}/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
