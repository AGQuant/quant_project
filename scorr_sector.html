<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sector</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* cc#348: theme-aware — dark defaults; mobile.css light override flips these */
:root{--bg:#0A0F1E;--panel:#121A33;--surface2:#182241;--well:#0D1428;--txt:#E9EEFB;--mut:#8C99BD;--dim:#5E6B8F;--line:rgba(148,166,210,.14);--line2:rgba(148,166,210,.24)}

*,*::before,*::after{box-sizing:border-box}
body{margin:0;padding:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:13px;color:var(--txt)}
table{border-collapse:collapse;width:100%}
th{background:var(--surface2);padding:7px 8px;font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:#4D7CFE}
td{padding:5px 8px;border-bottom:1px solid rgba(148,166,210,.12);vertical-align:middle;white-space:nowrap}
tr:hover td{background:rgba(148,166,210,.07);cursor:pointer}
.mono{font-family:'SFMono-Regular',Consolas,monospace}
button.tab{padding:8px 16px;border-radius:0;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── Canonical Scorr model-nav ── */
.model-nav{display:flex;align-items:center;gap:2px;height:46px;background:var(--panel);
  border-bottom:1px solid var(--line);padding:0 16px;overflow-x:auto;scrollbar-width:none;
  position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(20,35,70,.06)}
.model-nav::-webkit-scrollbar{display:none}
.mnav-item{display:flex;align-items:center;gap:5px;padding:0 11px;height:46px;cursor:pointer;
  border-bottom:2px solid transparent;text-decoration:none;white-space:nowrap;flex-shrink:0;
  color:var(--mut);font-size:11.5px;font-weight:600;transition:.12s}
.mnav-item:hover{color:var(--txt)}
.mnav-item.active{border-bottom-color:#9B7CFF;color:#9B7CFF}
.mnav-item.soon{opacity:.35;cursor:default;pointer-events:none}
.mnav-sep{width:1px;height:20px;background:var(--line);flex-shrink:0;margin:0 4px}
@media(max-width:768px){
  body{font-size:12px}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  /* cc#334 P8: 11px type floor + 44px tappable sortable headers */
  th{padding:10px 7px;font-size:11px;height:44px;vertical-align:middle}
  td{padding:7px;font-size:11px}
  .model-nav{padding:0 8px}
  button.tab{padding:7px 12px;font-size:11px;min-height:40px}
  /* keep rank/segment identity pinned while the wide table scrolls */
  table th:first-child,table td:first-child{position:sticky;left:0;background:var(--panel);z-index:1}
}
/* cc#334 P8: segment grid 2-col<=480 / 1-col<=360 (any .seg-grid / .sector-grid) */
@media(max-width:480px){ .seg-grid,.sector-grid{grid-template-columns:1fr 1fr!important} }
@media(max-width:360px){ .seg-grid,.sector-grid{grid-template-columns:1fr!important} }
</style>
<script>
if(window.self!==window.top||new URLSearchParams(location.search).has('embed')){
  document.addEventListener('DOMContentLoaded',function(){var _mn=document.getElementById('scorr-nav');if(_mn)_mn.style.display='none';});
}
</script>
</head>
<body>
<nav class="model-nav" id="scorr-nav"></nav>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;

const C = {bg:"var(--bg)",card:"#fff",border:"var(--line)",accent:"#4D7CFE",green:"#2FD48B",red:"#FF5C6C",gold:"#F5B94A",orange:"#F5B94A",purple:"#9B7CFF",text:"var(--txt)",muted:"var(--mut)"};
const VC = {"Excellent":"#2FD48B","Good":"#4D7CFE","Average":"#F5B94A","Weak":"#FF5C6C"};

const fmt  = (v,d=2) => v==null ? "—" : Number(v).toFixed(d);
const pct  = (v,d=1) => v==null ? "—" : (v>0?"+":"")+Number(v).toFixed(d)+"%";
const clr  = v => v==null ? C.muted : v>0 ? C.green : v<0 ? C.red : C.muted;
const sclr = s => s>=7 ? C.green : s>=4 ? C.orange : C.red;
const peClr = v => v==null ? C.muted : v<30 ? C.green : v<50 ? C.gold : C.red;
const mcapFmt = v => { if(v==null) return "—"; v=Number(v); return v>=100000?(v/100000).toFixed(1)+"LCr":v>=1000?(v/1000).toFixed(1)+"KCr":Math.round(v)+"Cr"; };
const clip = (s,n=28) => s&&s.length>n ? s.slice(0,n)+"…" : (s||"");
const MEDALS = ["🥇","🥈","🥉"];

function Dots({row}) {
  const sigs = [row.gvm>=6.5,(row.gvm_change||0)>0,(row.inst_change||0)>0,(row.qoq_profit||0)>10,(row.annual_upside||0)>15];
  const labels = ["GVM≥6.5","GVMδ>0","Inst+","QoQ>10%","Upside>15%"];
  return (
    <span style={{display:"inline-flex",gap:3,marginLeft:6}}>
      {sigs.map((ok,i)=>(
        <span key={i} title={labels[i]} style={{width:7,height:7,borderRadius:"50%",display:"inline-block",background:ok?"#2FD48B":"#FF5C6C",opacity:0.85}}/>
      ))}
    </span>
  );
}

function RankCard({row, rank, isBottom}) {
  const border = isBottom ? C.red : C.green;
  const shadow = isBottom ? "0 1px 6px rgba(221,58,74,.12)" : "0 1px 6px rgba(10,158,99,.12)";
  return (
    <div style={{flex:"0 0 auto",width:176,background:C.card,border:`1.5px solid ${border}`,borderRadius:8,padding:"10px 12px",boxShadow:shadow,cursor:"pointer",transition:"transform .1s"}}
      onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
      onMouseLeave={e=>e.currentTarget.style.transform=""}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:rank<3&&!isBottom?18:12,lineHeight:1}}>
          {!isBottom&&rank<3?MEDALS[rank]:<span style={{fontWeight:800,color:C.muted,fontFamily:"monospace"}}>#{rank+1}</span>}
        </span>
        <span style={{fontSize:19,fontWeight:900,color:sclr(row.composite_score),fontFamily:"monospace",letterSpacing:"-1px"}}>{fmt(row.composite_score,1)}</span>
      </div>
      <div style={{fontSize:12,fontWeight:700,color:C.text,marginTop:5,lineHeight:1.3}}>{clip(row.segment,22)}</div>
      <div style={{fontSize:10,color:C.muted,marginTop:3}}>GVM <b style={{color:row.gvm>=7?C.green:row.gvm>=6?C.orange:C.red}}>{fmt(row.gvm)}</b></div>
      <div style={{marginTop:4,display:"flex",flexDirection:"column",gap:2}}>
        {(row.top_stocks&&row.top_stocks.length?row.top_stocks:[{symbol:row.top_stock,day_ret:null}]).slice(0,2).map((p,j)=>(
          <div key={j} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:10}}>
            <span style={{fontWeight:700,color:C.text}}>{p.symbol||"—"}</span>
            <span className="mono" style={{fontWeight:700,color:clr(p.day_ret)}}>{p.day_ret==null?"—":pct(p.day_ret,1)}</span>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:7}}>
        <span style={{fontSize:10,fontWeight:700,color:VC[row.verdict]||C.muted}}>{row.verdict}</span>
        <Dots row={row}/>
      </div>
    </div>
  );
}

function Strip({top5, cold, onSel}) {
  return (
    <div style={{background:"#fff",borderBottom:`1px solid ${C.border}`,padding:"12px 20px"}}>
      <div style={{display:"flex",gap:0,alignItems:"flex-start"}}>
        <div style={{flex:"0 0 auto",marginRight:16}}>
          <div style={{fontSize:10,fontWeight:700,color:C.green,marginBottom:8,letterSpacing:".06em"}}>🔥 TOP 5 · HIGHEST SCORE</div>
          <div style={{display:"flex",gap:8}}>{top5.map((r,i)=><div key={r.segment} onClick={()=>onSel(r)}><RankCard row={r} rank={i} isBottom={false}/></div>)}</div>
        </div>
        <div style={{width:1,background:C.border,margin:"0 0 0 0",alignSelf:"stretch",flexShrink:0}}/>
        <div style={{flex:1,minWidth:0,marginLeft:16}}>
          <div style={{fontSize:10,fontWeight:700,color:C.red,marginBottom:8,letterSpacing:".06em"}}>
            ❄️ COLD SECTORS · Score &lt; 4.0 &nbsp;
            <span style={{background:"rgba(255,92,108,.08)",color:C.red,border:"1px solid #fecaca",borderRadius:10,padding:"1px 7px",fontSize:9,fontWeight:800}}>{cold.length}</span>
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
            {cold.map((r,i)=><div key={r.segment} onClick={()=>onSel(r)}><RankCard row={r} rank={i} isBottom={true}/></div>)}
          </div>
        </div>
      </div>
      <div style={{fontSize:9,color:C.muted,marginTop:8}}>Score 0–10 · Percentile rank avg of 5 signals: GVM · GVM Δ14d · Institutional flow (median) · QoQ profit (median) · Annual upside · Dots = signal pass/fail</div>
    </div>
  );
}

function SectorBrief({segment, defaultOpen=false, hideConstituents=false}) {
  const [brief, setBrief] = useState(null);
  const [loading, setLoading] = useState(false);
  const [open, setOpen] = useState(defaultOpen);
  const load = (refresh=false) => {
    setLoading(true);
    fetch(`/api/sector/brief?segment=${encodeURIComponent(segment)}${refresh?"&refresh=true":""}`)
      .then(r=>r.json()).then(d=>{ setBrief(d); setLoading(false); }).catch(()=>setLoading(false));
  };
  useEffect(()=>{ if(defaultOpen) load(); },[]);  // auto-load when opened by default (Sector Search)
  const toggle = () => { if (!open && !brief) load(); setOpen(p=>!p); };
  return (
    <div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={toggle} style={{cursor:"pointer",borderRadius:6,fontSize:11,fontWeight:700,padding:"5px 12px",border:`1px solid ${C.purple}`,background:open?"#f5f3ff":"#fff",color:C.purple}}>
          {open?"▲ Hide":"▼ Sector Brief"} · Education
        </button>
        {brief && !loading && <span style={{fontSize:9,color:C.muted}}>{brief.cached?"cached":"freshly generated"} · Claude Haiku</span>}
        {brief && open && <button onClick={()=>load(true)} style={{fontSize:9,color:C.muted,border:"none",background:"none",cursor:"pointer",textDecoration:"underline"}}>Refresh</button>}
        {loading && <span style={{fontSize:10,color:C.muted}}>Generating brief… ~3s</span>}
      </div>
      {open && brief && !brief.error && (
        <div style={{marginTop:10,display:"grid",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"start"}}>
            <div style={{background:"var(--surface2)",border:`1px solid ${C.border}`,borderRadius:6,padding:"10px 12px"}}>
              <div style={{fontSize:9,fontWeight:700,color:C.purple,marginBottom:4,letterSpacing:".05em"}}>WHAT IS THIS SECTOR</div>
              <div style={{fontSize:12,color:C.text,lineHeight:1.6}}>{brief.what_is_it}</div>
            </div>
            <div style={{background:"#f5f3ff",border:`1px solid #ddd6fe`,borderRadius:6,padding:"10px 12px",minWidth:160}}>
              <div style={{fontSize:9,fontWeight:700,color:C.purple,marginBottom:6,letterSpacing:".05em"}}>APPLICATION TYPE</div>
              <div style={{fontSize:11,fontWeight:600,color:C.purple,lineHeight:1.7}}>{brief.application_type}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:6,borderTop:`1px solid #ddd6fe`,paddingTop:6}}>{brief.business_model}</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{background:"rgba(47,212,139,.08)",border:"1px solid #bbf7d0",borderRadius:6,padding:"10px 12px"}}>
              <div style={{fontSize:9,fontWeight:700,color:C.green,marginBottom:6,letterSpacing:".05em"}}>🚀 KEY GROWTH DRIVERS</div>
              {(brief.growth_drivers||[]).map((d,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:5}}>
                  <span style={{color:C.green,fontWeight:700,fontSize:11,flexShrink:0}}>{i+1}.</span>
                  <span style={{fontSize:11,color:"#166534",lineHeight:1.4}}>{d}</span>
                </div>
              ))}
            </div>
            <div style={{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:6,padding:"10px 12px"}}>
              <div style={{fontSize:9,fontWeight:700,color:C.red,marginBottom:6,letterSpacing:".05em"}}>⚠️ KEY RISKS</div>
              {(brief.key_risks||[]).map((r,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:5}}>
                  <span style={{color:C.red,fontWeight:700,fontSize:11,flexShrink:0}}>{i+1}.</span>
                  <span style={{fontSize:11,color:"#991b1b",lineHeight:1.4}}>{r}</span>
                </div>
              ))}
            </div>
          </div>
          {!hideConstituents && brief.constituents && brief.constituents.length > 0 && (
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}>
              <div style={{fontSize:9,fontWeight:700,color:C.muted,padding:"8px 12px",borderBottom:`1px solid ${C.border}`,letterSpacing:".05em"}}>
                CONSTITUENTS · {brief.constituents.length} companies ranked by GVM
              </div>
              <div style={{overflowX:"auto"}}>
                <table>
                  <thead><tr>
                    <th style={{textAlign:"left"}}>#</th><th style={{textAlign:"left"}}>Symbol</th>
                    <th style={{textAlign:"left"}}>Company</th><th style={{textAlign:"right"}}>GVM</th>
                    <th style={{textAlign:"right"}}>G</th><th style={{textAlign:"right"}}>V</th>
                    <th style={{textAlign:"right"}}>M</th><th style={{textAlign:"left"}}>Verdict</th>
                  </tr></thead>
                  <tbody>
                    {brief.constituents.map((s,i)=>(
                      <tr key={s.symbol}>
                        <td className="mono" style={{color:C.muted,fontSize:10}}>{i+1}</td>
                        <td style={{fontWeight:700,color:C.accent,fontSize:11}}>{s.symbol}</td>
                        <td style={{fontSize:11,color:C.text,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis"}}>{s.company_name}</td>
                        <td className="mono" style={{textAlign:"right",fontWeight:800,color:s.gvm_score>=7?C.green:s.gvm_score>=6?C.orange:C.red}}>{fmt(s.gvm_score)}</td>
                        <td className="mono" style={{textAlign:"right",color:C.green,fontSize:11}}>{fmt(s.g_score)}</td>
                        <td className="mono" style={{textAlign:"right",color:C.gold,fontSize:11}}>{fmt(s.v_score)}</td>
                        <td className="mono" style={{textAlign:"right",color:C.accent,fontSize:11}}>{fmt(s.m_score)}</td>
                        <td style={{color:VC[s.verdict]||C.muted,fontSize:10,fontWeight:600}}>{s.verdict}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}
      {open && brief?.error && <div style={{marginTop:8,fontSize:11,color:C.red}}>⚠ {brief.error}</div>}
    </div>
  );
}

function Detail({row, onClose}) {
  if (!row) return null;
  const sigs = [
    {lbl:"GVM",sub:"Quality",v:row.gvm,fmt:v=>fmt(v),good:v=>v>=6.5},
    {lbl:"GVM Δ14d",sub:"Trend",v:row.gvm_change,fmt:v=>(v>0?"+":"")+fmt(v,3),good:v=>v>0},
    {lbl:"Inst %",sub:"FII+DII median",v:row.inst_change,fmt:v=>pct(v),good:v=>v>0},
    {lbl:"QoQ %",sub:"Profit median",v:row.qoq_profit,fmt:v=>pct(v,1),good:v=>v>10},
    {lbl:"Upside %",sub:"PE-based",v:row.annual_upside,fmt:v=>pct(v,1),good:v=>v>15},
  ];
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 18px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{fontSize:15,fontWeight:800}}>{row.segment}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:3}}>{row.stocks_count} stocks · ₹{row.total_mcap}L Cr</div>
          <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
            {(row.top_stocks&&row.top_stocks.length?row.top_stocks:[{symbol:row.top_stock,gvm:row.top_stock_gvm,day_ret:null}]).slice(0,2).map((p,j)=>(
              <span key={j} style={{display:"inline-flex",alignItems:"center",gap:7,background:"var(--surface2)",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px"}}>
                <b style={{color:C.accent,fontSize:12}}>{p.symbol||"—"}</b>
                <span className="mono" style={{fontSize:10,color:C.muted}}>GVM {fmt(p.gvm)}</span>
                <span className="mono" style={{fontSize:11,fontWeight:700,color:clr(p.day_ret)}}>{p.day_ret==null?"—":pct(p.day_ret,1)}</span>
              </span>
            ))}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:26,fontWeight:900,color:sclr(row.composite_score),fontFamily:"monospace"}}>{fmt(row.composite_score,2)}</div>
            <div style={{fontSize:9,color:C.muted}}>/ 10 composite</div>
          </div>
          <span style={{fontSize:12,fontWeight:700,color:VC[row.verdict]||C.muted}}>{row.verdict}</span>
          <button onClick={onClose} style={{fontSize:18,border:"none",background:"none",cursor:"pointer",color:C.muted,lineHeight:1}}>×</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:12}}>
        {sigs.map(s=>{
          const ok=s.v!=null&&s.good(s.v); const col=s.v==null?C.muted:ok?C.green:C.red;
          return (
            <div key={s.lbl} style={{background:"var(--surface2)",border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px"}}>
              <div style={{fontSize:10,color:C.muted}}>{s.lbl}</div>
              <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{s.sub}</div>
              <div style={{fontSize:16,fontWeight:900,color:col,fontFamily:"monospace"}}>{s.v==null?"—":s.fmt(s.v)}</div>
              <div style={{width:6,height:6,borderRadius:"50%",background:col,marginTop:4}}/>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:20,fontSize:11,color:C.muted}}>
        <span>G <b className="mono" style={{color:C.green}}>{fmt(row.g_score)}</b></span>
        <span>V <b className="mono" style={{color:C.gold}}>{fmt(row.v_score)}</b></span>
        <span>M <b className="mono" style={{color:C.accent}}>{fmt(row.m_score)}</b></span>
        <span style={{marginLeft:"auto",fontSize:10}}>as of {row.score_date}</span>
      </div>
      <SectorBrief segment={row.segment}/>
    </div>
  );
}

function useSort(def, defDir="desc") {
  const [k, setK] = useState(def); const [d, setD] = useState(defDir);
  const toggle = key => { if(key===k) setD(p=>p==="desc"?"asc":"desc"); else {setK(key);setD("desc");} };
  const Th = ({k:key,lbl,r}) => (
    <th onClick={()=>toggle(key)} style={{textAlign:r?"right":"left"}}>
      {lbl}{k===key?(d==="desc"?"↓":"↑"):""}
    </th>
  );
  return {sortK:k, sortD:d, Th};
}

function RankTab({data, onSel}) {
  const {sortK, sortD, Th} = useSort("composite_score");
  const rows = useMemo(()=>[...data].sort((a,b)=>{const av=a[sortK]??-Infinity,bv=b[sortK]??-Infinity;return sortD==="desc"?bv-av:av-bv;}),[data,sortK,sortD]);
  return (
    <div style={{overflowX:"auto",background:C.card,border:`1px solid ${C.border}`,borderRadius:8}}>
      <table>
        <thead><tr>
          <th style={{width:32,textAlign:"center"}}>#</th>
          <Th k="segment" lbl="Segment"/>
          <Th k="composite_score" lbl="Score" r/>
          <Th k="gvm" lbl="GVM" r/>
          <Th k="g_score" lbl="G" r/>
          <Th k="v_score" lbl="V" r/>
          <Th k="m_score" lbl="M" r/>
          <Th k="gvm_change" lbl="GVMδ14d" r/>
          <Th k="inst_change" lbl="Inst%" r/>
          <Th k="qoq_profit" lbl="QoQ%" r/>
          <Th k="annual_upside" lbl="Upside%" r/>
          <Th k="verdict" lbl="Verdict"/>
          <Th k="stocks_count" lbl="Stks" r/>
          <th>Top 2 Picks · 1D</th>
        </tr></thead>
        <tbody>
          {rows.map((r,i)=>(
            <tr key={r.segment} onClick={()=>onSel(r)} style={{background:r.composite_score<4?"#fff5f5":undefined}}>
              <td className="mono" style={{textAlign:"center",color:C.muted,fontSize:11}}>{i+1}</td>
              <td style={{fontWeight:600,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis"}}>{clip(r.segment,30)}</td>
              <td className="mono" style={{textAlign:"right",fontWeight:900,color:sclr(r.composite_score)}}>{fmt(r.composite_score,2)}</td>
              <td className="mono" style={{textAlign:"right",color:r.gvm>=7?C.green:r.gvm>=6?C.orange:C.red}}>{fmt(r.gvm)}</td>
              <td className="mono" style={{textAlign:"right",color:C.green}}>{fmt(r.g_score)}</td>
              <td className="mono" style={{textAlign:"right",color:C.gold}}>{fmt(r.v_score)}</td>
              <td className="mono" style={{textAlign:"right",color:C.accent}}>{fmt(r.m_score)}</td>
              <td className="mono" style={{textAlign:"right",color:clr(r.gvm_change)}}>{r.gvm_change==null?"—":(r.gvm_change>0?"+":"")+fmt(r.gvm_change,3)}</td>
              <td className="mono" style={{textAlign:"right",color:clr(r.inst_change)}}>{pct(r.inst_change)}</td>
              <td className="mono" style={{textAlign:"right",color:clr(r.qoq_profit)}}>{pct(r.qoq_profit,1)}</td>
              <td className="mono" style={{textAlign:"right",color:clr(r.annual_upside)}}>{pct(r.annual_upside,1)}</td>
              <td style={{color:VC[r.verdict]||C.muted,fontSize:11,fontWeight:600}}>{r.verdict}</td>
              <td className="mono" style={{textAlign:"right",color:C.muted,fontSize:11}}>{r.stocks_count}</td>
              <td style={{fontSize:11}}>
                {(r.top_stocks&&r.top_stocks.length?r.top_stocks:[{symbol:r.top_stock,day_ret:null}]).slice(0,2).map((p,j)=>(
                  <span key={j} style={{marginRight:8,whiteSpace:"nowrap"}}>
                    <b style={{color:C.accent}}>{p.symbol}</b> <span className="mono" style={{color:clr(p.day_ret),fontSize:10}}>{p.day_ret==null?"":pct(p.day_ret,1)}</span>
                  </span>
                ))}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function GVMTab({data, onSel}) {
  const [mode, setMode] = useState("composite_score");
  const rows = useMemo(()=>[...data].sort((a,b)=>b[mode]-a[mode]).slice(0,25),[data,mode]);
  const MODES = [["composite_score","Score"],["gvm","GVM"],["g_score","G · Growth"],["v_score","V · Value"],["m_score","M · Momentum"]];
  return (
    <div>
      <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:C.muted,fontWeight:700}}>RANK BY:</span>
        {MODES.map(([k,l])=>(
          <button key={k} onClick={()=>setMode(k)} style={{cursor:"pointer",borderRadius:6,fontSize:11,fontWeight:600,padding:"5px 10px",border:`1px solid ${mode===k?C.accent:C.border}`,background:mode===k?"rgba(77,124,254,.14)":"#fff",color:mode===k?C.accent:C.muted}}>{l}</button>
        ))}
        <span style={{marginLeft:"auto",fontSize:10,color:C.muted}}>Top 25 · Click for detail + brief</span>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        {rows.map((r,i)=>(
          <div key={r.segment} onClick={()=>onSel(r)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",borderBottom:i<rows.length-1?`1px solid ${C.border}`:"none",cursor:"pointer"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(148,166,210,.07)"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div className="mono" style={{fontSize:11,color:C.muted,width:22,textAlign:"right"}}>{i+1}</div>
            <div style={{width:210,fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.segment}</div>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
              {[["g_score",C.green,"G"],["v_score",C.gold,"V"],["m_score",C.accent,"M"]].map(([k,col,lbl])=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
                  <span className="mono" style={{width:18,fontSize:10,color:col,fontWeight:700}}>{lbl}</span>
                  <div style={{flex:1,height:5,background:"rgba(148,166,210,.07)",borderRadius:3}}><div style={{height:5,width:(r[k]/10*100)+"%",background:col,borderRadius:3}}/></div>
                  <span className="mono" style={{fontSize:11,color:col,width:30,textAlign:"right"}}>{fmt(r[k])}</span>
                </div>
              ))}
            </div>
            <div className="mono" style={{fontSize:13,fontWeight:800,color:r.gvm>=7?C.green:r.gvm>=6?C.orange:C.red,width:36,textAlign:"right"}}>{fmt(r.gvm)}</div>
            <div className="mono" style={{fontSize:13,fontWeight:900,color:sclr(r.composite_score),width:32,textAlign:"right"}}>{fmt(r.composite_score,1)}</div>
            <div style={{fontSize:11,color:VC[r.verdict]||C.muted,fontWeight:600,width:60}}>{r.verdict}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

const THEME_COLORS = ["#9B7CFF","#37D3E8","#2FD48B","#F5B94A","#FF5C6C","#9B7CFF","#4D7CFE","#F5B94A","#37D3E8","#2FD48B"];

function ThemesSection() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState(null);
  useEffect(()=>{
    fetch("/api/sector/themes").then(r=>r.json()).then(d=>{ setData(d); setLoading(false); }).catch(()=>setLoading(false));
  },[]);
  if (loading) return (<div style={{textAlign:"center",padding:"30px",color:"var(--mut)",fontSize:12,marginTop:24}}><div style={{width:24,height:24,border:"2px solid var(--line)",borderTop:"2px solid #9B7CFF",borderRadius:"50%",animation:"spin 0.8s linear infinite",display:"inline-block",marginBottom:8}}/><div>Loading emerging themes…</div></div>);
  if (!data || data.error) return null;
  return (
    <div style={{marginTop:32}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,paddingBottom:12,borderBottom:"2px solid var(--line)"}}>
        <span style={{fontSize:22}}>🌱</span>
        <div>
          <div style={{fontSize:16,fontWeight:800,color:"var(--txt)"}}>Top 10 Emerging Investment Themes</div>
          <div style={{fontSize:11,color:"var(--mut)",marginTop:2}}>Cross-sector structural plays · Expert reasoning · Live GVM-ranked companies · Click any theme to expand</div>
        </div>
      </div>
      <div style={{display:"grid",gap:10}}>
        {data.themes.map((t,i)=>{
          const col = THEME_COLORS[i] || "#9B7CFF";
          const isOpen = expanded===i;
          return (
            <div key={i} style={{background:"#fff",border:"1px solid var(--line)",borderRadius:10,overflow:"hidden",borderLeft:`4px solid ${col}`,boxShadow:isOpen?"0 4px 16px rgba(0,0,0,.06)":"0 1px 3px rgba(0,0,0,.04)"}}>
              <div onClick={()=>setExpanded(isOpen?null:i)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="var(--surface2)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{width:30,height:30,borderRadius:"50%",background:col,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,flexShrink:0}}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:800,color:"var(--txt)"}}>{t.theme_name}</div>
                  <div style={{fontSize:11,color:"var(--mut)",marginTop:2,fontStyle:"italic"}}>{t.tagline}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  <span style={{fontSize:10,fontWeight:700,color:col,background:col+"15",border:`1px solid ${col}40`,borderRadius:20,padding:"3px 10px"}}>{t.macro_tailwind}</span>
                  <span style={{fontSize:10,color:"var(--mut)",background:"var(--bg)",border:"1px solid var(--line)",borderRadius:20,padding:"3px 10px"}}>{(t.companies||[]).length} companies</span>
                  <span style={{color:"var(--mut)",fontSize:16,fontWeight:700,lineHeight:1}}>{isOpen?"−":"+"}</span>
                </div>
              </div>
              {isOpen && (
                <div style={{borderTop:"1px solid var(--line)",padding:"18px 16px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                    <div>
                      <div style={{background:"var(--surface2)",border:"1px solid var(--line)",borderRadius:8,padding:"12px 14px",marginBottom:14,borderLeft:`3px solid ${col}`}}>
                        <div style={{fontSize:10,fontWeight:700,color:col,marginBottom:6,letterSpacing:".06em"}}>WHY THIS THEME IS EMERGING NOW</div>
                        <div style={{fontSize:12,color:"var(--txt)",lineHeight:1.7}}>{t.reasoning}</div>
                      </div>
                      <div style={{fontSize:10,fontWeight:700,color:col,marginBottom:8,letterSpacing:".06em"}}>🚀 KEY STRUCTURAL DRIVERS</div>
                      {(t.key_drivers||[]).map((d,j)=>(<div key={j} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start",background:"rgba(47,212,139,.08)",border:"1px solid #bbf7d0",borderRadius:6,padding:"8px 10px"}}><span style={{width:20,height:20,borderRadius:"50%",background:col,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,flexShrink:0,marginTop:1}}>{j+1}</span><span style={{fontSize:11,color:"#166534",lineHeight:1.5}}>{d}</span></div>))}
                    </div>
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:"var(--mut)",marginBottom:8,letterSpacing:".06em"}}>FOCUSED COMPANIES · Ranked by GVM Score</div>
                      <div style={{background:"var(--surface2)",border:"1px solid var(--line)",borderRadius:8,overflow:"hidden"}}>
                        <table style={{fontSize:11}}>
                          <thead><tr style={{background:"rgba(148,166,210,.07)"}}><th style={{padding:"6px 10px",textAlign:"left",fontSize:9,fontWeight:700,color:"var(--mut)"}}>#</th><th style={{padding:"6px 10px",textAlign:"left",fontSize:9,fontWeight:700,color:"var(--mut)"}}>Symbol</th><th style={{padding:"6px 10px",textAlign:"left",fontSize:9,fontWeight:700,color:"var(--mut)"}}>Company</th><th style={{padding:"6px 10px",textAlign:"right",fontSize:9,fontWeight:700,color:"var(--mut)"}}>GVM</th><th style={{padding:"6px 10px",textAlign:"left",fontSize:9,fontWeight:700,color:"var(--mut)"}}>Segment</th></tr></thead>
                          <tbody>{(t.companies||[]).map((co,k)=>(<tr key={k} style={{borderTop:"1px solid rgba(148,166,210,.12)"}}><td style={{padding:"5px 10px",color:"var(--mut)",fontSize:10}}>{k+1}</td><td style={{padding:"5px 10px",fontWeight:800,color:"#4D7CFE",fontFamily:"monospace"}}>{co.symbol}</td><td style={{padding:"5px 10px",color:"var(--txt)",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{co.company_name}</td><td style={{padding:"5px 10px",textAlign:"right",fontWeight:900,fontFamily:"monospace",color:co.gvm_score>=7?"#2FD48B":co.gvm_score>=6?"#F5B94A":"#FF5C6C"}}>{Number(co.gvm_score).toFixed(2)}</td><td style={{padding:"5px 10px",color:"var(--mut)",fontSize:9,maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{co.segment}</td></tr>))}</tbody>
                        </table>
                      </div>
                      <div style={{marginTop:10}}><div style={{fontSize:9,color:"var(--mut)",fontWeight:700,marginBottom:5,letterSpacing:".05em"}}>RELATED SEGMENTS</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{(t.related_segments||[]).map((s,k)=>(<span key={k} style={{fontSize:9,color:col,background:col+"12",border:`1px solid ${col}35`,borderRadius:20,padding:"3px 9px",fontWeight:600}}>{s}</span>))}</div></div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{fontSize:9,color:"var(--mut)",textAlign:"center",marginTop:12,paddingTop:12,borderTop:"1px solid var(--line)"}}>Themes curated by Scorr · Companies ranked by live GVM score · Updated with market data</div>
    </div>
  );
}

function SectorSearch({allSectors}) {
  const [query, setQuery] = useState("");
  const [selected, setSelected] = useState(null);
  const [brief, setBrief] = useState(null);
  const [loading, setLoading] = useState(false);
  const [showSug, setShowSug] = useState(false);
  const boxRef = useRef(null);

  const names = useMemo(()=>[...new Set(allSectors.map(r=>r.segment))].sort((a,b)=>a.localeCompare(b)),[allSectors]);
  const matches = useMemo(()=>{
    const q=query.trim().toLowerCase();
    if(!q) return [];
    return names.filter(n=>n.toLowerCase().includes(q)).slice(0,12);
  },[query,names]);

  useEffect(()=>{
    const h=e=>{ if(boxRef.current && !boxRef.current.contains(e.target)) setShowSug(false); };
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[]);

  const pick = (seg) => {
    setSelected(seg); setQuery(seg); setShowSug(false); setBrief(null); setLoading(true);
    fetch(`/api/sector/brief?segment=${encodeURIComponent(seg)}`)
      .then(r=>r.json()).then(dd=>{ setBrief(dd); setLoading(false); }).catch(()=>setLoading(false));
  };

  const stocks = useMemo(()=>{
    const c = (brief && brief.constituents) || [];
    return [...c].sort((a,b)=>(b.gvm_score==null?-Infinity:b.gvm_score)-(a.gvm_score==null?-Infinity:a.gvm_score));
  },[brief]);

  return (
    <div>
      <div ref={boxRef} style={{position:"relative",maxWidth:520,marginBottom:18}}>
        <input value={query}
          onChange={e=>{setQuery(e.target.value);setShowSug(true);if(!e.target.value)setSelected(null);}}
          onFocus={()=>setShowSug(true)}
          onKeyDown={e=>{ if(e.key==="Enter"&&matches[0]) pick(matches[0]); }}
          placeholder="Search a sector — type to filter (e.g. MSME, Banks, Pharma)…"
          style={{width:"100%",padding:"11px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.text,fontSize:13,outline:"none"}}/>
        {showSug && matches.length>0 && (
          <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden",zIndex:30,boxShadow:"0 8px 24px rgba(25,40,70,.12)",maxHeight:320,overflowY:"auto"}}>
            {matches.map(n=>(
              <div key={n} onClick={()=>pick(n)} style={{padding:"9px 14px",fontSize:12,cursor:"pointer",borderBottom:`1px solid ${C.border}`,color:C.text}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(148,166,210,.07)"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{n}</div>
            ))}
          </div>
        )}
      </div>

      {!selected && (
        <div style={{textAlign:"center",padding:"48px 20px",color:C.muted,fontSize:13,background:C.card,border:`1px dashed ${C.border}`,borderRadius:8}}>
          🔍 Search a sector above to see all stocks and sector intelligence
        </div>
      )}

      {selected && loading && (
        <div style={{textAlign:"center",padding:"40px",color:C.muted,fontSize:12}}>
          <div style={{width:26,height:26,border:"2px solid var(--line)",borderTop:`2px solid ${C.purple}`,borderRadius:"50%",animation:"spin 0.8s linear infinite",display:"inline-block",marginBottom:8}}/>
          <div>Loading {selected}…</div>
        </div>
      )}

      {selected && !loading && brief && brief.error && (
        <div style={{padding:"14px",fontSize:12,color:C.red,background:"#fff5f5",border:"1px solid #fecaca",borderRadius:8}}>⚠ {brief.error}</div>
      )}

      {selected && !loading && brief && !brief.error && (
        <div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:13,fontWeight:800,color:C.text}}>{selected}</span>
              <span style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:".05em"}}>{stocks.length} STOCKS · RANKED BY GVM</span>
            </div>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>
                  <th style={{textAlign:"left"}}>#</th><th style={{textAlign:"left"}}>Symbol</th>
                  <th style={{textAlign:"left"}}>Company</th><th style={{textAlign:"right"}}>GVM</th>
                  <th style={{textAlign:"right"}}>G</th><th style={{textAlign:"right"}}>V</th>
                  <th style={{textAlign:"right"}}>M</th><th style={{textAlign:"left"}}>Verdict</th>
                  <th style={{textAlign:"right"}}>MCap</th><th style={{textAlign:"right"}}>Close</th>
                  <th style={{textAlign:"right"}}>PE</th><th style={{textAlign:"right"}}>Fwd PE</th>
                </tr></thead>
                <tbody>
                  {stocks.map((s,i)=>(
                    <tr key={s.symbol}>
                      <td className="mono" style={{color:C.muted,fontSize:10}}>{i+1}</td>
                      <td style={{fontWeight:700,color:C.accent,fontSize:11}}>{s.symbol}</td>
                      <td style={{fontSize:11,color:C.text,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis"}}>{s.company_name}</td>
                      <td className="mono" style={{textAlign:"right",fontWeight:800,color:s.gvm_score>=7?C.green:s.gvm_score>=6?C.gold:C.red}}>{fmt(s.gvm_score)}</td>
                      <td className="mono" style={{textAlign:"right",color:C.green,fontSize:11}}>{fmt(s.g_score)}</td>
                      <td className="mono" style={{textAlign:"right",color:C.gold,fontSize:11}}>{fmt(s.v_score)}</td>
                      <td className="mono" style={{textAlign:"right",color:C.accent,fontSize:11}}>{fmt(s.m_score)}</td>
                      <td style={{color:VC[s.verdict]||C.muted,fontSize:10,fontWeight:600}}>{s.verdict}</td>
                      <td className="mono" style={{textAlign:"right",fontSize:11,color:C.muted}}>{mcapFmt(s.market_cap)}</td>
                      <td className="mono" style={{textAlign:"right",fontSize:11}}>{s.prev_close==null?"—":"₹"+fmt(s.prev_close,2)}</td>
                      <td className="mono" style={{textAlign:"right",fontSize:11,color:peClr(s.pe)}}>{s.pe==null?"—":fmt(s.pe,1)+"x"}</td>
                      <td className="mono" style={{textAlign:"right",fontSize:11,color:peClr(s.fwd_pe)}}>{s.fwd_pe==null?"—":fmt(s.fwd_pe,1)+"x"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          <SectorBrief segment={selected} defaultOpen={true} hideConstituents={true} key={selected}/>
        </div>
      )}
    </div>
  );
}

function Loading() {
  return (<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:12}}><div style={{width:32,height:32,border:"3px solid var(--line)",borderTop:`3px solid ${C.accent}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/><div style={{color:C.muted,fontSize:12}}>Loading sector data from Railway…</div></div>);
}

function App() {
  const [d, setD] = useState(null);
  const [err, setE] = useState(null);
  const [tab, setTab] = useState("themes");
  const [sel, setSel] = useState(null);
  useEffect(()=>{
    fetch("/api/sector/rotation").then(r=>r.json()).then(data=>{ data.error?setE(data.error):setD(data); }).catch(e=>setE(e.message));
  },[]);
  if (err) return <div style={{padding:40,color:C.red,fontSize:13}}>⚠ {err}</div>;
  if (!d)  return <Loading/>;
  const stats = {buy:d.all.filter(r=>["Excellent","Good"].includes(r.verdict)).length,hi:d.all.filter(r=>r.composite_score>=7).length,cold:d.all.filter(r=>r.composite_score<4).length};
  const TABS = [["themes","Themes"],["search","Sector Search"],["rank","Rank Table"],["gvm","G · V · M"]];
  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"12px 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
          <div><span style={{fontSize:13,fontWeight:800,color:C.text}}>SCORR · Sector Analysis</span><span style={{fontSize:10,color:C.muted,marginLeft:10}}>{d.total_segments} segments · {d.score_date} · 5-signal percentile composite</span></div>
          <div style={{marginLeft:"auto",display:"flex",gap:16,fontSize:11}}><span>Buy+: <b style={{color:C.green}}>{stats.buy}</b></span><span>Score≥7: <b style={{color:C.green}}>{stats.hi}</b></span><span>Cold&lt;4: <b style={{color:C.red}}>{stats.cold}</b></span></div>
        </div>
        <div style={{display:"flex",marginTop:10,borderBottom:`1px solid ${C.border}`,marginLeft:-20,paddingLeft:20,marginBottom:-13}}>
          {TABS.map(([id,lbl])=>(<button key={id} className="tab" onClick={()=>setTab(id)} style={{borderBottom:`2px solid ${tab===id?C.accent:"transparent"}`,color:tab===id?C.accent:C.muted,fontWeight:tab===id?700:500}}>{lbl}</button>))}
        </div>
      </div>
      <Strip top5={d.top5} cold={d.bottom5} onSel={setSel}/>
      {sel && <div style={{padding:"12px 20px 0"}}><Detail row={sel} onClose={()=>setSel(null)}/></div>}
      <div style={{padding:"12px 20px 40px",maxWidth:1440,margin:"0 auto"}}>
        {tab==="themes" && <ThemesSection/>}
        {tab==="search" && <SectorSearch allSectors={d.all}/>}
        {tab==="rank"   && <RankTab data={d.all} onSel={setSel}/>}
        {tab==="gvm"    && <GVMTab  data={d.all} onSel={setSel}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script src="/nav_toggle.js" defer></script>
</body>
</html>
