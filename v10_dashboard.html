<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorr · V10 Dashboard</title>
<style>
  :root{
    --bg:#f6f8fb; --card:#ffffff; --card2:#fbfcfe; --panel:#ffffff;
    --line:#e4e9f1; --line2:#d4dbe7;
    --txt:#1c2536; --mut:#5a6781; --dim:#8a96ad;
    --grn:#0fa968; --red:#e23744; --blu:#2563eb; --cyan:#0891b2; --amber:#d97706; --violet:#7c3aed;
    --font:'Sora',system-ui,-apple-system,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --shadow:0 1px 4px rgba(20,35,70,.06);
  }
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;background:var(--bg);color:var(--txt);
    font-family:var(--font);font-size:16px;line-height:1.5}

  /* shared Scorr model-nav (light) */
  .model-nav{display:flex;align-items:center;gap:2px;height:46px;background:var(--panel);
    border-bottom:1px solid var(--line);padding:0 16px;overflow-x:auto;scrollbar-width:none;
    position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
  .model-nav::-webkit-scrollbar{display:none}
  .mnav-item{display:flex;align-items:center;gap:5px;padding:0 11px;height:46px;cursor:pointer;
    border-bottom:2px solid transparent;text-decoration:none;white-space:nowrap;flex-shrink:0;
    color:var(--mut);font-size:11.5px;font-weight:600;transition:.12s}
  .mnav-item:hover{color:var(--txt)}
  .mnav-item.active{border-bottom-color:var(--blu);color:var(--blu)}
  .mnav-sep{width:1px;height:20px;background:var(--line);flex-shrink:0;margin:0 4px}

  .wrap{max-width:1280px;margin:0 auto;padding:14px 16px 50px}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:6px 0 12px;border-bottom:1px solid var(--line);margin-bottom:12px;flex-wrap:wrap;gap:10px}
  .tb-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .brand{font-size:18px;font-weight:900;color:var(--blu);letter-spacing:-.4px}
  .tb-pipe{color:var(--line2)}
  .tb-title{font-size:13px;font-weight:700;color:var(--txt)}
  .tb-meta{font-size:9px;color:var(--mut);background:var(--card2);border:1px solid var(--line);
    padding:3px 8px;border-radius:5px;font-family:var(--mono)}
  .tb-right{display:flex;align-items:center;gap:14px}
  .tb-clock{font-family:var(--mono);font-size:11px;color:var(--mut)}
  .tb-pnl{text-align:right}
  .tb-pnl .lbl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .tb-pnl .val{font-family:var(--mono);font-size:15px;font-weight:800}

  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px;box-shadow:var(--shadow)}
  .card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
  .card-hd .t{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
  .card-hd .s{font-size:8px;color:var(--dim);margin-top:2px}

  .row{display:grid;gap:10px;margin-bottom:10px}
  .r-2-16{grid-template-columns:3fr 1.6fr}
  .r-3{grid-template-columns:1fr 1.4fr 1fr}
  @media(max-width:900px){.r-2-16,.r-3{grid-template-columns:1fr}}

  /* badges */
  .bdg{display:inline-flex;align-items:center;border-radius:5px;padding:2px 8px;
    font-size:10px;font-weight:700;font-family:var(--mono);white-space:nowrap;
    border:1px solid;line-height:1.4}
  .bdg.sm{padding:1px 6px;font-size:9px}

  /* mood pulse */
  .mood{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px;
    border-radius:12px;padding:12px 14px;border:1px solid;box-shadow:var(--shadow)}
  .mood-dots{display:flex;gap:3px}
  .pdot{width:6px;height:6px;border-radius:50%;animation:pdot 1.5s ease-in-out infinite}
  .pdot:nth-child(2){animation-delay:.28s}.pdot:nth-child(3){animation-delay:.56s}
  @keyframes pdot{0%,100%{opacity:.9;transform:scale(1)}50%{opacity:.25;transform:scale(.55)}}
  .mood-gate{font-weight:800;font-size:14px}
  .mood-conds{display:flex;gap:6px;flex:1;flex-wrap:wrap}
  .mc{background:var(--card2);border-radius:6px;padding:3px 9px;border:1px solid;
    display:flex;gap:6px;align-items:center}
  .mc .l{font-size:9px;color:var(--mut)}
  .mc .v{font-family:var(--mono);font-size:11px;font-weight:700}
  .mood-slots{display:flex;gap:6px}
  .slot{border-radius:6px;padding:5px 13px;text-align:center;border:1px solid}
  .slot .n{font-family:var(--mono);font-size:15px;font-weight:900}
  .slot .l{font-size:8px;color:var(--mut);margin-top:1px}

  /* signal */
  .sig-grid{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .sig-sym{font-family:var(--mono);font-size:22px;font-weight:900;line-height:1}
  .sig-tags{display:flex;gap:6px;margin-top:6px;align-items:center}
  .sig-boxes{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex:1}
  .sbox{background:var(--card2);border:1px solid var(--line);border-radius:6px;padding:6px 8px}
  .sbox .l{font-size:8px;color:var(--dim);margin-bottom:2px}
  .sbox .v{font-family:var(--mono);font-size:12px;font-weight:800}
  .sig-pnl{text-align:center;min-width:70px}
  .conf-bar{width:64px;height:4px;background:var(--line);border-radius:2px;margin:5px auto 2px;overflow:hidden}
  .conf-fill{height:100%;border-radius:2px}

  /* dual signal (NIFTY + BANKNIFTY) */
  .sig-dual{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:760px){.sig-dual{grid-template-columns:1fr}}
  .sig-col{border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:var(--card2)}
  .sig-col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .sig3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
  .sig-ets{display:flex;gap:10px;font-family:var(--mono);font-size:10px;color:var(--mut)}
  .sig-ets b{font-weight:800}

  /* max pain */
  .mp-big{font-family:var(--mono);font-size:30px;font-weight:900;line-height:1}
  .mp-row{display:flex;justify-content:space-between;align-items:center;
    padding:5px 0;border-bottom:1px solid var(--line);font-size:11px}
  .mp-row:last-child{border-bottom:none}
  .mp-l{color:var(--mut)}
  .mp-v{font-family:var(--mono);font-weight:800}
  .mp-pending{font-size:10px;color:var(--dim);padding:18px 4px;text-align:center}

  /* big metric */
  .big-val{font-family:var(--mono);font-size:26px;font-weight:900}
  .big-chg{font-family:var(--mono);font-size:12px}

  /* ADR */
  .adr-cells{display:flex;gap:6px;margin-bottom:8px}
  .adr-cell{flex:1;border-radius:6px;padding:7px 6px;text-align:center;border:1px solid}
  .adr-cell .n{font-family:var(--mono);font-size:20px;font-weight:900}
  .adr-cell .l{font-size:8px;color:var(--mut);margin-top:3px}
  .adr-bar{display:flex;height:6px;border-radius:3px;overflow:hidden}
  .adr-pct{display:flex;justify-content:space-between;margin-top:3px;font-size:8px}

  /* pivots */
  .pvt-row{display:flex;justify-content:space-between;align-items:center;
    padding:3px 5px;border-radius:4px;margin-bottom:2px}
  .pvt-l{font-family:var(--mono);font-size:11px;font-weight:800;width:26px}
  .pvt-v{font-family:var(--mono);font-size:11px;color:var(--txt)}
  .pvt-d{font-family:var(--mono);font-size:9px;color:var(--mut)}
  .pvt-cmp{display:flex;justify-content:space-between;padding:6px 5px 0;
    border-top:1px solid var(--line);margin-top:4px}

  /* OI */
  .oi-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .oi-card{background:var(--card2);border-radius:8px;padding:10px;border:1px solid}
  .oi-card .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .oi-card .nm{font-size:10px;color:var(--mut);font-weight:700}
  .oi-val{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--txt)}
  .oi-sub{display:flex;gap:14px;margin-top:6px}
  .oi-sub .l{font-size:8px;color:var(--dim)}
  .oi-sub .v{font-family:var(--mono);font-size:12px;font-weight:700}
  .oi-charts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .oi-chart-lbl{font-size:8px;color:var(--mut);margin-bottom:4px}

  /* tables */
  .tbl-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:11px}
  thead th{padding:5px 8px;color:var(--mut);font-weight:700;text-align:left;
    font-size:9px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--line)}
  tbody td{padding:6px 8px;border-bottom:1px solid var(--line)}
  tbody tr:hover td{background:rgba(37,99,235,.03)}
  .td-mono{font-family:var(--mono)}
  .empty-row td{padding:14px 8px;text-align:center;color:var(--mut);font-size:10px}

  /* IVP bar */
  .ivp-wrap{display:flex;align-items:center;gap:7px}
  .ivp-track{width:48px;height:5px;background:var(--line);border-radius:3px;overflow:hidden;flex-shrink:0}
  .ivp-fill{height:100%;border-radius:3px}
  .ivp-val{font-family:var(--mono);font-size:11px;font-weight:800}

  /* settings */
  .set-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  @media(max-width:760px){.set-grid{grid-template-columns:repeat(2,1fr)}}
  .set-box{background:var(--card2);border-radius:6px;padding:6px 8px;border:1px solid var(--line)}
  .set-box .k{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .set-box .v{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--txt)}

  /* legend */
  .legend{display:flex;gap:20px;margin-top:10px;padding:6px 10px;
    background:var(--card2);border-radius:6px;flex-wrap:wrap}
  .lg{display:flex;align-items:center;gap:5px}
  .lg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
  .lg .l{font-size:8px;color:var(--mut)}

  .note{font-size:8px;color:var(--dim);margin-top:6px;text-align:right}
  .foot{text-align:center;padding:16px 0 4px;font-size:8px;color:var(--dim);
    border-top:1px solid var(--line);margin-top:8px}
  .loading{padding:60px 20px;text-align:center;color:var(--mut);font-size:13px}

  /* mini sparkline svg */
  svg.spark{display:block;width:100%;height:auto}
</style>
</head>

<script>
/* ════════════════════════════════════════════════════════════════
   SCORR V10 DASHBOARD — vanilla JS, light theme, zero framework
   No React, no Babel, no transpile. Cannot freeze on load.
   Charts = hand-drawn inline SVG sparklines.
════════════════════════════════════════════════════════════════ */

/* ---- theme tokens (read from CSS vars for consistency) ---- */
const CS = getComputedStyle(document.documentElement);
const C = {
  grn:   CS.getPropertyValue('--grn').trim()   || '#0fa968',
  red:   CS.getPropertyValue('--red').trim()   || '#e23744',
  blu:   CS.getPropertyValue('--blu').trim()   || '#2563eb',
  cyan:  CS.getPropertyValue('--cyan').trim()  || '#0891b2',
  amber: CS.getPropertyValue('--amber').trim() || '#d97706',
  violet:CS.getPropertyValue('--violet').trim()|| '#7c3aed',
  txt:   CS.getPropertyValue('--txt').trim()   || '#1c2536',
  mut:   CS.getPropertyValue('--mut').trim()   || '#5a6781',
  line:  CS.getPropertyValue('--line').trim()  || '#e4e9f1',
  card:  CS.getPropertyValue('--card').trim()  || '#ffffff',
};
/* semantic: green=up, red=down (light-theme palette) */
const UP = C.grn, DN = C.red;

/* ---- Black-Scholes (r=0.065, T=dte/365, hVol direct) ---- */
const ncdf = x => {
  const a=[0.254829592,-0.284496736,1.421413741,-1.453152027,1.061405429];
  const p=0.3275911, s=x<0?-1:1, ax=Math.abs(x)/Math.sqrt(2), t=1/(1+p*ax);
  return 0.5*(1+s*(1-(((((a[4]*t+a[3])*t)+a[2])*t+a[1])*t+a[0])*t*Math.exp(-ax*ax)));
};
const bsCall=(S,K,T,r,v)=>{ if(!T||!v||S<=0)return 0;
  const d1=(Math.log(S/K)+(r+v*v/2)*T)/(v*Math.sqrt(T)), d2=d1-v*Math.sqrt(T);
  return S*ncdf(d1)-K*Math.exp(-r*T)*ncdf(d2); };
const bsPut=(S,K,T,r,v)=>{ if(!T||!v||S<=0)return 0;
  const d1=(Math.log(S/K)+(r+v*v/2)*T)/(v*Math.sqrt(T)), d2=d1-v*Math.sqrt(T);
  return K*Math.exp(-r*T)*ncdf(-d2)-S*ncdf(-d1); };

/* ---- format helpers ---- */
const pct = (n,d=2)=>(n>=0?'+':'')+Number(n).toFixed(d)+'%';
const sgn = (n,d=2)=>(n>=0?'+':'')+Number(n).toFixed(d);
const cx  = n => n>=0 ? UP : DN;
const num = (v,d=0)=>(typeof v==='number'?v:Number(v)||0).toLocaleString('en-IN',{maximumFractionDigits:d});
const fK  = n => Math.abs(n)>=1e7?(n/1e7).toFixed(2)+'Cr':Math.abs(n)>=1e5?(n/1e5).toFixed(1)+'L':num(n);
const esc = s => String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

/* badge html */
function bdg(text, color, sm){
  return `<span class="bdg${sm?' sm':''}" style="color:${color};background:${color}1f;border-color:${color}55">${esc(text)}</span>`;
}

/* ---- inline SVG sparkline ----
   pts = array of numbers. liveLast highlights final point. refLine optional y-value. */
function sparkline(pts, color, {w=180,h=55,liveLast=false,refLine=null,refMin=null}={}){
  if(!pts || !pts.length) return `<svg class="spark" viewBox="0 0 ${w} ${h}"></svg>`;
  const vals = pts.map(Number);
  let mn = Math.min(...vals), mx = Math.max(...vals);
  if(refLine!=null){ mn=Math.min(mn,refLine); mx=Math.max(mx,refLine); }
  if(refMin!=null){ mn=Math.min(mn,refMin); }
  if(mn===mx){ mn-=1; mx+=1; }
  const pad=4, iw=w-pad*2, ih=h-pad*2;
  const X = i => pad + (vals.length===1?iw/2:(i/(vals.length-1))*iw);
  const Y = v => pad + ih - ((v-mn)/(mx-mn))*ih;
  const d = vals.map((v,i)=>`${i===0?'M':'L'}${X(i).toFixed(1)} ${Y(v).toFixed(1)}`).join(' ');
  let svg = `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`;
  if(refLine!=null){
    const ry=Y(refLine).toFixed(1);
    svg += `<line x1="${pad}" y1="${ry}" x2="${w-pad}" y2="${ry}" stroke="${C.line}" stroke-width="1" stroke-dasharray="3 2"/>`;
  }
  svg += `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  if(liveLast){
    const lx=X(vals.length-1).toFixed(1), ly=Y(vals[vals.length-1]).toFixed(1);
    svg += `<circle cx="${lx}" cy="${ly}" r="3.5" fill="${color}" stroke="${C.card}" stroke-width="1.5"/>`;
  }
  svg += `</svg>`;
  return svg;
}

/* dual-line svg (NIFTY + BANKNIFTY on one chart) */
function dualSpark(a, b, ca, cb, {w=200,h=72,refZero=false}={}){
  const av=a.map(Number), bv=b.map(Number), all=av.concat(bv);
  let mn=Math.min(...all), mx=Math.max(...all);
  if(refZero){ mn=Math.min(mn,0); mx=Math.max(mx,0); }
  if(mn===mx){mn-=1;mx+=1;}
  const pad=4, iw=w-pad*2, ih=h-pad*2;
  const X=(i,n)=>pad+(n===1?iw/2:(i/(n-1))*iw);
  const Y=v=>pad+ih-((v-mn)/(mx-mn))*ih;
  const path=(vv,col)=>`<path d="${vv.map((v,i)=>`${i===0?'M':'L'}${X(i,vv.length).toFixed(1)} ${Y(v).toFixed(1)}`).join(' ')}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>`;
  let svg=`<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`;
  if(refZero){ const zy=Y(0).toFixed(1); svg+=`<line x1="${pad}" y1="${zy}" x2="${w-pad}" y2="${zy}" stroke="${C.line}" stroke-width="1" stroke-dasharray="3 2"/>`; }
  svg+=path(av,ca)+path(bv,cb)+`</svg>`;
  return svg;
}

/* mini bar chart (dual series) */
function dualBars(a,b,ca,cb,{w=200,h=72}={}){
  const av=a.map(Number), bv=b.map(Number), all=av.concat(bv);
  const mx=Math.max(...all,1), n=av.length;
  const pad=4, iw=w-pad*2, ih=h-pad*2, grp=iw/n, bw=grp*0.35;
  let svg=`<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`;
  for(let i=0;i<n;i++){
    const x0=pad+i*grp+grp*0.1;
    const ha=(av[i]/mx)*ih, hb=(bv[i]/mx)*ih;
    svg+=`<rect x="${x0.toFixed(1)}" y="${(pad+ih-ha).toFixed(1)}" width="${bw.toFixed(1)}" height="${ha.toFixed(1)}" fill="${ca}" opacity="0.85"/>`;
    svg+=`<rect x="${(x0+bw+1).toFixed(1)}" y="${(pad+ih-hb).toFixed(1)}" width="${bw.toFixed(1)}" height="${hb.toFixed(1)}" fill="${cb}" opacity="0.7"/>`;
  }
  svg+=`</svg>`;
  return svg;
}

/* ════════════════════════════════════════════════════════════════
   DATA  (D holds live values; safe defaults until loadLive fills)
════════════════════════════════════════════════════════════════ */
const SIG0 = { dir:'FLAT', st:'—', ema:'—', entry:0, cmp:0, chg:0, pp:0, tgt:0, sl:0, str:0 };
const D = {
  _updated:'—',
  mood:{ gate:'—', fails:0, adr:0, nD:0, nW:0, nM:0, bSlots:0, sSlots:0, soSlots:0 },
  sig:{ NIFTY:{...SIG0}, BANKNIFTY:{...SIG0} },
  idx:{ NIFTY:{cmp:0,chg:0,pp:0}, BANKNIFTY:{cmp:0,chg:0,pp:0} },
  vix:{ cur:0, chg:0, data:[] },
  adr:{ adv:0, dec:0, unch:0, ratio:0 },
  pcr:{ nifty:{cur:0,chg:0,data:[]}, bnk:{cur:0,chg:0,data:[]} },
  maxpain:{ status:'loading', strike:0, spot:0, distance:0, distance_pct:0, expiry:null },
  buildup:{ long:[], short:[], pending:true },
  open:[], closed:[],
  cfg:{ stP:150,stM:3,stTf:'10m',emaF:3,emaS:10,emaTf:'30m',entry:'09:20–15:20',cut:'15:20',lotN:65,lotB:30,legs:'FUT + ATM write',gapExit:'ON' },
  v8q:[],
};

/* ════════════════════════════════════════════════════════════════
   LIVE WIRING — each loader behind its own try/catch
════════════════════════════════════════════════════════════════ */
async function getJSON(u){ const r=await fetch(u); if(!r.ok) throw new Error(u+' '+r.status); return r.json(); }
const rowsOf = x => Array.isArray(x)?x:(x&&Array.isArray(x.rows))?x.rows:(x&&Array.isArray(x.data))?x.data:(x&&Array.isArray(x.stocks))?x.stocks:(x&&Array.isArray(x.open_positions))?x.open_positions:(x&&Array.isArray(x.closed_trades))?x.closed_trades:[];
const istNow = () => new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
function isMarketHours(){
  const d=istNow(), day=d.getDay();
  if(day===0||day===6) return false;
  const m=d.getHours()*60+d.getMinutes();
  return m>=555 && m<=935;   // 09:15–15:35 IST
}

async function loadMood(){
  const m = await getJSON('/api/v8/market_mood');
  const cv = l => { const c=(m.checks||[]).find(x=>x.filter===l); return c?Number(c.value):0; };
  D.mood = { gate:(m.mood||'—').toUpperCase(), fails:m.fails??0, adr:cv('ADR'),
             nD:cv('Nifty Day'), nW:cv('Nifty Week'), nM:cv('Nifty Month'),
             bSlots:m.buy_slots??0, sSlots:m.sell_slots??0, soSlots:m.so_slots??0 };
}
function mapSig(s){
  if(!s || (s.status!=='ok' && !s.signal)) return {...SIG0};
  const sig = s.signal;
  const dir = sig==='BUY'?'LONG':sig==='SELL'?'SHORT':'FLAT';
  return { dir,
           st:  s.st_dir==='up'?'BUY':'SELL',
           ema: s.gate_zone==='buy'?'BUY':'SELL',
           entry:Number(s.price)||0, cmp:Number(s.price)||0, chg:0, pp:0,
           tgt:Number(s.target)||0, sl:Number(s.stop)||0,
           str: s.st_flip?85:60 };
}
async function loadSignals(){
  const [n,b] = await Promise.all([
    getJSON('/api/v10/signal?symbol=NIFTY50').catch(()=>null),
    getJSON('/api/v10/signal?symbol=BANKNIFTY').catch(()=>null),
  ]);
  D.sig = { NIFTY:mapSig(n), BANKNIFTY:mapSig(b) };
}
async function loadADR(){
  const a = await getJSON('/api/v8/adr');
  D.adr = { adv:a.advances||0, dec:a.declines||0, unch:a.unchanged||0, ratio:Number(a.adr)||0 };
}
async function loadVix(){
  const v = await getJSON('/api/v10/vix');
  const data = Array.isArray(v.data)?v.data.map(Number):[];
  D.vix = { cur:Number(v.cur)||0, chg:Number(v.chg)||0, data, label:v.label||'India VIX' };
}
function mkPcr(resp){
  const rows = rowsOf(resp).slice().reverse();
  const last8 = rows.slice(-8);
  const data = last8.map(r=>Number(r.pcr));
  const cur = data.length?data[data.length-1]:0;
  const prev = data.length>1?data[data.length-2]:cur;
  return { cur, chg:cur-prev, data };
}
async function loadPCR(){
  const [n,b] = await Promise.all([
    getJSON('/api/daily/pcr?underlying=NIFTY&days=8'),
    getJSON('/api/daily/pcr?underlying=BANKNIFTY&days=8'),
  ]);
  D.pcr = { nifty:mkPcr(n), bnk:mkPcr(b) };
}
async function loadIdx(){
  /* CMP + day change (domestic_live) and weekly pivot PP (paper pivots) per index,
     merged into the signal boxes for NIFTY + BANKNIFTY. */
  const [pv,dl] = await Promise.all([
    getJSON('/api/paper/pivots?limit=300').catch(()=>null),
    getJSON('/api/v8/domestic_live').catch(()=>null),
  ]);
  const pvRows = rowsOf(pv);
  const map = { NIFTY:'NIFTY50', BANKNIFTY:'BANKNIFTY' };
  for(const k of ['NIFTY','BANKNIFTY']){
    const feed = map[k];
    const dlx = dl && dl[feed];
    const pvx = pvRows.find(r=>r.symbol===feed);
    D.idx[k] = { cmp: dlx?Number(dlx.close)||0:0, chg: dlx?Number(dlx.chg_pct)||0:0,
                 pp: pvx?Number(pvx.pp)||0:0 };
  }
}
async function loadMaxPain(){
  const m = await getJSON('/api/v10/maxpain?symbol=NIFTY');
  if(m.status==='ok'){
    D.maxpain = { status:'ok', strike:Number(m.max_pain_strike)||0,
                  spot:Number(m.spot)||0, distance:Number(m.distance)||0,
                  distance_pct:Number(m.distance_pct)||0, expiry:m.expiry||null };
  } else {
    D.maxpain = { status:'no_data', strike:0, spot:0, distance:0, distance_pct:0, expiry:null };
  }
}
function mapBuild(r){
  return { sym:r.symbol, price:Number(r.price)||0, day:Number(r.day_1d)||0,
           oi:r.oi!=null?Number(r.oi):null, oiChg:r.oi_chg!=null?Number(r.oi_chg):null,
           basis:r.basis!=null?Number(r.basis):null,
           volR:r.vol_ratio!=null?Number(r.vol_ratio):null, sig:r.signal||'NEUTRAL' };
}
async function loadBuildup(){
  const b = await getJSON('/api/v10/buildup?limit=15');
  D.buildup = { long:(b.long_buildup||[]).map(mapBuild),
                short:(b.short_buildup||[]).map(mapBuild),
                pending: !!b.oi_feed_pending };
}
function normSide(s){ return (s||'').toUpperCase()==='SHORT'?'SHORT':'LONG'; }
/* V10 trades indices only — drop stray V8 stock-futures rows from fallback feeds */
const IDX_SET = ['NIFTY','BANKNIFTY','NIFTY50','BANKNIFTY50'];
function idxOnly(r){ return IDX_SET.includes((r.symbol||'').toUpperCase()) || !!r.opt_type; }
async function loadOpen(){
  /* V10 own positions first, fall back to V8 */
  let rows=[];
  try{ rows = rowsOf(await getJSON('/api/v10/positions')); }catch(e){}
  if(!rows.length){ try{ rows = rowsOf(await getJSON('/api/v8/positions')); }catch(e){} }
  rows = rows.filter(idxOnly);
  D.open = rows.map((x,i)=>{
    const entry=Number(x.entry_price)||0, cmp=Number(x.cmp||x.current_price)||entry;
    const dir=normSide(x.direction||x.side);
    const pPct=entry?((dir==='SHORT'?entry-cmp:cmp-entry)/entry*100):0;
    return { id:x.id||i, sym:x.symbol, side:dir,
             type:x.opt_type?'OPT':'FUT', str:x.opt_strike||null, opt:x.opt_type||null,
             entry, cmp, tgt:Number(x.target)||0, sl:Number(x.sl||x.stop_loss)||0, qty:Number(x.qty)||0,
             pnl:Number(x.unrealised_pnl||x.pnl)||0, pPct,
             eng:(x.strategy&&/v10/i.test(x.strategy))?'V10':(x.basket?'V8':'V10') };
  });
}
function fmtDate(s){ if(!s)return '—'; const d=new Date(s); if(isNaN(d))return String(s).slice(0,10);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}); }
async function loadClosed(){
  let rows=[];
  try{ rows = rowsOf(await getJSON('/api/v10/trades?limit=10')); }catch(e){}
  if(!rows.length){ try{ rows = rowsOf(await getJSON('/api/v8/trades?limit=10')); }catch(e){} }
  rows = rows.filter(idxOnly);
  D.closed = rows.slice(0,10).map((x,i)=>{
    const entry=Number(x.entry||x.entry_price)||0, ex=Number(x.exit||x.exit_price)||0;
    const dir=normSide(x.direction||x.side);
    const pnl=Number(x.pnl)||0;
    const pPct=entry?((dir==='SHORT'?entry-ex:ex-entry)/entry*100):0;
    return { id:x.id||i, sym:x.symbol, side:dir, entry, exit:ex, pnl, pPct,
             rsn:(x.result||'').toUpperCase()||(pnl>=0?'TGT':'SL'),
             dt:fmtDate(x.trade_date||x.exit_time||x.exit_date),
             eng:(x.strategy&&/v10/i.test(x.strategy))?'V10':(x.basket?'V8':'V10') };
  });
}
const BKT=[['buy_reversal','BUY_REV'],['buy_momentum','BUY_MOM'],
           ['sell_reversal','SELL_REV'],['sell_momentum','SELL_MOM'],['sell_overbought','SELL_OB']];
async function loadQual(){
  const out=[];
  for(const [b,lab] of BKT){
    try{
      const r=await getJSON('/api/v8/qualified/'+b+'?limit=4');
      for(const s of rowsOf(r.stocks||r)){
        if(out.length>=14) break;
        const spot=Number(s.cmp)||0;
        out.push({ sym:s.symbol, bkt:lab, spot,
                   atm:Number(s.atm_strike)||(spot?Math.round(spot/50)*50:0),
                   cPx:s.cPx!=null?Number(s.cPx):null, pPx:s.pPx!=null?Number(s.pPx):null,
                   hVol:Number(s.hVol)||0, ivp:s.ivp!=null?Number(s.ivp):0, dte:Number(s.dte)||0 });
      }
    }catch(e){}
  }
  if(out.length) D.v8q = out;
}

async function loadLive(){
  const tasks=[loadMood,loadSignals,loadIdx,loadVix,loadADR,loadPCR,loadMaxPain,loadBuildup,loadOpen,loadClosed,loadQual];
  await Promise.all(tasks.map(fn=>fn().catch(e=>console.warn('[v10]',fn.name,e.message))));
  D._updated = istNow().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

  return `<div class="topbar">
    <div class="tb-left">
      <span class="brand">SCORR</span><span class="tb-pipe">|</span>
      <span class="tb-title">V10 Dashboard</span>
      <span class="tb-meta">ST150/3 · EMA3/10 · NIFTY+BNK</span>
    </div>
    <div class="tb-right">
      <span style="font-size:8px;color:var(--dim)">updated ${D._updated}</span>

function rMood(){
  const {gate,fails,adr,nD,nW,nM,bSlots,sSlots,soSlots}=D.mood;
  const mc = fails===0?UP:fails===1?C.amber:fails>=3?DN:'#ea580c';
  const conds=[['ADR',adr.toFixed(2),adr>=1.0],['Nifty D',pct(nD),nD>=0],['Nifty W',pct(nW),nW>=0],['Nifty M',pct(nM),nM>=0]];
  const condHtml = conds.map(([l,v,ok])=>{
    const col=ok?UP:DN;
    return `<div class="mc" style="border-color:${col}33"><span class="l">${l}</span>
      <span class="v" style="color:${col}">${v}</span>
      <span style="font-size:10px;color:${col}">${ok?'✓':'✗'}</span></div>`;
  }).join('');
  const slots=[[bSlots+'B',UP,'BUY'],[sSlots+'S',DN,'SELL'],[soSlots+'SO',C.amber,'OB POOL']];
  const slotHtml=slots.map(([n,col,l])=>
    `<div class="slot" style="background:${col}14;border-color:${col}44"><div class="n" style="color:${col}">${n}</div><div class="l">${l}</div></div>`).join('');
  const dots=[0,1,2].map(()=>`<div class="pdot" style="background:${mc}"></div>`).join('');
  return `<div class="mood" style="border-color:${mc}55;background:linear-gradient(90deg,var(--card) 0%,${mc}0a 100%)">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="mood-dots">${dots}</div>
      <span class="mood-gate" style="color:${mc}">${esc(gate)}</span>
      <span style="font-size:9px;color:var(--mut)">(${fails} fail)</span>
    </div>
    <div class="mood-conds">${condHtml}</div>
    <div class="mood-slots">${slotHtml}</div></div>`;
}

function sigCol(sym, s, ix){
  const dir=s.dir;
  const c = dir==='LONG'?UP:dir==='SHORT'?DN:C.mut;
  const tag = dir==='LONG'?'▲ LONG':dir==='SHORT'?'▼ SHORT':'— FLAT';
  const boxes=[
    ['CMP', ix.cmp?num(ix.cmp):'—', C.blu],
    ['DAY CHG', ix.cmp?pct(ix.chg):'—', cx(ix.chg)],
    ['PIVOT PP', ix.pp?num(ix.pp):'—', C.amber],
  ];
  const boxHtml=boxes.map(([l,v,col])=>`<div class="sbox"><div class="l">${l}</div><div class="v" style="color:${col}">${v}</div></div>`).join('');
  const ets = (dir==='FLAT')
    ? `<span style="color:var(--mut)">No active trade — awaiting flip</span>`
    : `<span>Entry <b style="color:var(--txt)">${num(s.entry)}</b></span>
       <span>Tgt <b style="color:${UP}">${num(s.tgt)}</b></span>
       <span>SL <b style="color:${DN}">${num(s.sl)}</b></span>`;
  return `<div class="sig-col" style="border-color:${c}44">
    <div class="sig-col-hd">
      <div class="sig-sym" style="color:${c}">${esc(sym)}</div>${bdg(tag,c,true)}</div>
    <div class="sig-tags" style="margin:0 0 8px">
      <span style="font-size:9px;color:var(--mut)">ST</span>${bdg(s.st,s.st==='BUY'?UP:DN,true)}
      <span style="font-size:9px;color:var(--mut)">EMA</span>${bdg(s.ema,s.ema==='BUY'?UP:DN,true)}</div>
    <div class="sig3">${boxHtml}</div>
    <div class="sig-ets">${ets}</div>
  </div>`;
}
function rSignal(){
  return `<div class="card">
    <div class="card-hd"><div><div class="t">V10 Active Signals</div>
      <div class="s">SuperTrend 150/3 (10m) · EMA 3/10 (30m) · NIFTY + BANKNIFTY</div></div></div>

function rVix(){
  const {cur,chg,data,label}=D.vix;
  const has = data && data.length;
  const vc = cur<15?UP:cur<20?C.amber:DN;
  const vl = cur<15?'CALM':cur<20?'MODERATE':'ELEVATED';
  return `<div class="card">
    <div class="card-hd"><div class="t">${esc(label||'India VIX')}</div>${bdg(vl,vc)}</div>
    <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:6px">
      <span class="big-val" style="color:${vc}">${has?cur.toFixed(2):'—'}</span>
      <span class="big-chg" style="color:${cx(chg)}">${has?sgn(chg,2):''}</span></div>
    ${has?sparkline(data, vc, {liveLast:true,h:55}):'<div style="font-size:8px;color:var(--dim)">no VIX feed yet</div>'}
  </div>`;
}

function rADR(){
  const {adv,dec,unch,ratio}=D.adr;
  const tot=adv+dec+unch;
  const rc = ratio>=2?UP:ratio>=1?'#10b981':ratio>=0.5?C.amber:DN;
  const cells=[['▲ ADV',adv,UP],['▼ DEC',dec,DN],['— UNC',unch,C.mut]];
  const cellHtml=cells.map(([l,v,col])=>`<div class="adr-cell" style="background:${col}12;border-color:${col}22"><div class="n" style="color:${col}">${v}</div><div class="l">${l}</div></div>`).join('');
  return `<div class="card">
    <div class="card-hd"><div><div class="t">Advance / Decline</div><div class="s">Nifty 500</div></div>${bdg('A/D '+ratio.toFixed(2),rc)}</div>
    <div class="adr-cells">${cellHtml}</div>
    <div class="adr-bar"><div style="flex:${adv||1};background:${UP}"></div><div style="flex:${dec||1};background:${DN}"></div><div style="flex:${unch||1};background:${C.line}"></div></div>
    <div class="adr-pct"><span class="td-mono" style="color:${UP}">${tot?(adv/tot*100).toFixed(0):0}%</span>
      <span style="color:var(--mut)">${tot} stocks</span>
      <span class="td-mono" style="color:${DN}">${tot?(dec/tot*100).toFixed(0):0}%</span></div>
  </div>`;
}

function rPCR(){
  const pc = v=>v<0.7?DN:v<0.9?UP:v<1.1?C.amber:DN;
  const pl = v=>v<0.7?'BEARISH':v<0.9?'BULLISH':v<1.1?'NEUTRAL':'BEARISH';
  const one=(name,d)=>{
    const col=pc(d.cur);
    const chart = d.data&&d.data.length ? sparkline(d.data,col,{liveLast:true,h:55,refLine:1.0}) : '<div style="font-size:8px;color:var(--dim)">no data</div>';
    return `<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span style="font-size:9px;color:var(--mut);font-weight:700">${name}</span>${bdg(pl(d.cur),col,true)}</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:2px">
        <span class="td-mono" style="font-size:20px;font-weight:900;color:${col}">${d.cur.toFixed(2)}</span>
        <span class="td-mono" style="font-size:10px;color:${cx(d.chg)}">${sgn(d.chg,2)}</span></div>
      ${chart}</div>`;
  };
  return `<div class="card">
    <div class="card-hd"><div><div class="t">PCR Trend</div><div class="s">7-day history · ● = live</div></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${one('NIFTY',D.pcr.nifty)}${one('BANKNIFTY',D.pcr.bnk)}</div>
  </div>`;
}

function rMaxPain(){
  const m=D.maxpain;
  if(m.status!=='ok' || !m.strike){
    return `<div class="card">
      <div class="card-hd"><div><div class="t">Nifty Max Pain</div>
        <div class="s">Nearest expiry · latest OI</div></div></div>
      <div class="mp-pending">Option chain data pending</div>
    </div>`;
  }
  const above = m.distance>=0;            // strike above spot
  const badge = above?'ABOVE SPOT':'BELOW SPOT';
  const bc = above?DN:UP;                  // max pain above spot = bearish pull, below = bullish
  return `<div class="card">
    <div class="card-hd"><div><div class="t">Nifty Max Pain</div>
      <div class="s">Nearest expiry · latest OI</div></div>${bdg(badge,bc)}</div>
    <div style="display:flex;align-items:baseline;gap:8px;margin:2px 0 10px">
      <span class="mp-big" style="color:${C.blu}">${num(m.strike)}</span>

    <div class="mp-row"><span class="mp-l">Spot</span><span class="mp-v">${num(m.spot)}</span></div>
    <div class="mp-row"><span class="mp-l">Distance</span>
      <span class="mp-v" style="color:${bc}">${sgn(m.distance,0)} (${sgn(m.distance_pct,2)}%)</span></div>

      <span class="mp-v">${m.expiry?esc(String(m.expiry)):'—'}</span></div>
  </div>`;
}

  return `<div class="card" style="margin-bottom:10px">
    <div class="card-hd"><div class="t">Closed Trades (${D.closed.length})</div>
      <div style="display:flex;gap:8px;align-items:center">${bdg('WR '+wr+'%',UP)}
        <span class="td-mono" style="font-size:13px;font-weight:800;color:${cx(tot)}">₹${fK(tot)}</span></div></div>
    <div class="tbl-scroll"><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>
  </div>`;
}

function rSettings(){
  const {stP,stM,stTf,emaF,emaS,emaTf,entry,cut,lotN,lotB,legs,gapExit}=D.cfg;
  const p=[['Engine','V10 ST + EMA'],['Symbols','NIFTY · BANKNIFTY'],
    ['SuperTrend',`${stP}/${stM} · ${stTf}`],['EMA Gate',`${emaF}/${emaS} · ${emaTf}`],
    ['Trade Legs',legs],['Entry Window',`${entry} IST`],['Entry Cutoff',`${cut} IST`],
    ['Gap Exit',gapExit],['Lot NIFTY',`${lotN} units`],['Lot BANKNIFTY',`${lotB} units`]];
  const boxes=p.map(([k,v])=>`<div class="set-box"><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`).join('');
  return `<div class="card" style="margin-bottom:10px">
    <div class="card-hd"><div><div class="t">Entry / Exit Settings</div><div class="s">V10 Configuration · Locked 16-Jun-2026</div></div></div>
    <div class="set-grid">${boxes}</div>
  </div>`;
}

function rQual(){
  const RF=0.065;
  const ivpColor=v=>v>=70?DN:v>=30?C.amber:UP;
  const ivpLabel=v=>v>=70?'RICH':v>=30?'MID':'CHEAP';
  const head=['SYMBOL','BASKET','STRIKE','CE / PE','OPTION VALUE','IVP','REGIME','TRUE VALUE','MKT vs BS'];
  const rows=D.v8q.map(q=>{
    const isBuy=q.bkt.startsWith('BUY');
    const T=q.dte/365, optPx=isBuy?q.cPx:q.pPx, optTyp=isBuy?'CE':'PE', sideC=isBuy?UP:DN;
    const tv = isBuy?bsCall(q.spot,q.atm,T,RF,q.hVol):bsPut(q.spot,q.atm,T,RF,q.hVol);
    return {...q, optPx, optTyp, sideC, trueVal:tv, richness:optPx!=null?optPx-tv:null};
  });
  const body = rows.length ? rows.map(r=>{
    const ic=ivpColor(r.ivp), rich=r.richness;
    const mktBs = rich!=null
      ? `<span class="td-mono" style="font-size:11px;font-weight:700;color:${rich>0?DN:UP}">${rich>=0?'+':''}${rich.toFixed(2)}</span><span style="font-size:8px;color:var(--mut);margin-left:5px">${rich>0?'↑ rich':'↓ cheap'}</span>`
      : `<span class="td-mono" style="font-size:10px;color:var(--mut)" title="No live equity option chain — using BS theoretical">≈ fair</span>`;
    const optCell = r.optPx!=null
      ? `<span class="td-mono" style="font-weight:800;font-size:13px;color:${r.sideC}">${r.optPx.toFixed(2)}</span>`
      : `<span class="td-mono" style="font-weight:700;font-size:12px;color:var(--mut)" title="BS theoretical estimate — live price requires equity option chain">~${r.trueVal.toFixed(2)}</span>`;
    return `<tr>
      <td class="td-mono" style="font-weight:800;font-size:12px">${esc(r.sym)}</td>
      <td>${bdg(r.bkt,r.sideC,true)}</td>
      <td class="td-mono" style="font-weight:700;color:${C.blu}">${num(r.atm)}</td>
      <td>${bdg(r.optTyp,r.sideC,true)}</td>
      <td>${optCell}</td>
      <td><div class="ivp-wrap"><div class="ivp-track"><div class="ivp-fill" style="width:${r.ivp}%;background:${ic}"></div></div>
        <span class="ivp-val" style="color:${ic}">${r.ivp}%</span></div></td>
      <td>${bdg(ivpLabel(r.ivp),ic,true)}</td>
      <td class="td-mono" style="font-weight:700">${r.trueVal.toFixed(2)}</td>
      <td>${mktBs}</td></tr>`;
  }).join('') : `<tr class="empty-row"><td colspan="9">No qualified stocks right now</td></tr>`;
  const legend=[[DN,'IVP > 70 · Premium expensive → sell side'],[C.amber,'IVP 30–70 · Normal range'],[UP,'IVP < 30 · Premium cheap → buy side']]
    .map(([c,l])=>`<div class="lg"><div class="lg-dot" style="background:${c}"></div><span class="l">${l}</span></div>`).join('');
  return `<div class="card" style="margin-bottom:10px">
    <div class="card-hd"><div><div class="t">V8 Qualified — ATM Options</div>
      <div class="s">BUY → CE (call) · SELL → PE (put) · IVP = 1yr percentile · True Value = BS @ 30d realized vol</div></div></div>
    <div class="tbl-scroll"><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>
    <div class="legend">${legend}</div>
    <div class="note" style="text-align:left">~ = BS theoretical price (live equity option chain pending)</div>
  </div>`;
}

function buildupTable(title, rows, accent){
  const sigCol = s => s==='LONG_BUILD'?UP : s==='SHORT_BUILD'?DN
                    : s==='SHORT_COVER'?C.amber : s==='LONG_UNWIND'?'#ea580c' : C.mut;
  const head=['SYMBOL','PRICE','DAY %','OI (Cr)','OI CHG','VOL R','BASIS','SIGNAL'];
  const body = rows.length ? rows.map(r=>`<tr>
    <td class="td-mono" style="font-weight:800;font-size:12px">${esc(r.sym)}</td>
    <td class="td-mono">${num(r.price,2)}</td>
    <td class="td-mono" style="font-weight:700;color:${cx(r.day)}">${pct(r.day)}</td>
    <td class="td-mono" style="color:${r.oi!=null?C.txt:'var(--dim)'}">${r.oi!=null?fK(r.oi):'—'}</td>
    <td class="td-mono" style="color:${r.oiChg!=null?cx(r.oiChg):'var(--dim)'}">${r.oiChg!=null?sgn(r.oiChg/1e5,1)+'L':'—'}</td>
    <td class="td-mono" style="color:var(--dim)">${r.volR!=null?r.volR.toFixed(2):'—'}</td>
    <td class="td-mono" style="color:${r.basis!=null?cx(r.basis):'var(--dim)'}">${r.basis!=null?sgn(r.basis,1):'—'}</td>
    <td>${bdg(r.sig.replace('_',' '),sigCol(r.sig),true)}</td></tr>`).join('')
    : `<tr class="empty-row"><td colspan="8">No data</td></tr>`;
  return `<div style="flex:1;min-width:300px">
    <div style="font-size:10px;font-weight:700;color:${accent};text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">${title}</div>
    <div class="tbl-scroll"><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div>
  </div>`;
}
function rBuildup(){
  const b=D.buildup;
  const note = b.pending
    ? `<div class="note">OI · OI CHG · VOL R · BASIS feed pending — ranking by intraday price move</div>`
    : '';
  return `<div class="card" style="margin-bottom:10px">
    <div class="card-hd"><div><div class="t">Futures Buildup — Stock F&O</div>
      <div class="s">Top movers this session · long (price ↑) vs short (price ↓)</div></div></div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      ${buildupTable('▲ Long Buildup', b.long, UP)}
      ${buildupTable('▼ Short Buildup', b.short, DN)}
    </div>
    ${note}
  </div>`;
}

function render(){
  document.getElementById('app').innerHTML =
    rTopBar() + rMood() +
    `<div class="row r-2-16">${rSignal()}${rVix()}</div>` +
    `<div class="row r-3">${rADR()}${rPCR()}${rMaxPain()}</div>` +
    rOpen() + rClosed() + rSettings() + rQual() + rBuildup() +
    `<div class="foot">SCORR · Learn More. Score More. · Invest like an institution. · V10 Dashboard</div>`;
}

/* ════════════════════════════════════════════════════════════════
   BOOT  +  clock tick  +  5-min market-hours refresh
════════════════════════════════════════════════════════════════ */
async function boot(){
  await loadLive();
  render();
}
boot();
/* live clock — re-render topbar only every second (cheap) */
setInterval(()=>{ const el=document.querySelector('.topbar'); if(el) el.outerHTML=rTopBar(); }, 1000);
/* full refresh every 5 min, market hours only */
setInterval(()=>{ if(isMarketHours()) loadLive().then(render); }, 300000);

/* hide own nav when embedded */
if(window.self!==window.top || new URLSearchParams(location.search).has('embed')){
  const mn=document.getElementById('scorr-nav'); if(mn) mn.style.display='none';
}
</script>
</body>
</html>
