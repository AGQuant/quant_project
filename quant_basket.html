<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QB</title>
<style>
/* cc#348: theme-aware — dark defaults; mobile.css light override flips these */
:root{--bg:#0A0F1E;--panel:#121A33;--surface2:#182241;--well:#0D1428;--txt:#E9EEFB;--mut:#8C99BD;--dim:#5E6B8F;--line:rgba(148,166,210,.14);--line2:rgba(148,166,210,.24)}

  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap');
  :root {
    --bg:var(--bg); --card:#fff; --panel:#fff;
    --line:var(--line); --line2:var(--line2);
    --txt:var(--txt); --mut:var(--mut); --dim:var(--dim);
    --grn:#2FD48B; --red:#FF5C6C; --blu:#4D7CFE; --cyan:#37D3E8; --amber:#F5B94A;
    --font:'Sora',system-ui,-apple-system,sans-serif;
    --shadow:0 1px 4px rgba(20,35,70,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;line-height:1.55}

  .model-nav{display:flex;align-items:center;gap:2px;height:46px;background:var(--panel);
    border-bottom:1px solid var(--line);padding:0 16px;overflow-x:auto;scrollbar-width:none;
    position:sticky;top:0;z-index:20;box-shadow:var(--shadow)}
  .model-nav::-webkit-scrollbar{display:none}
  .mnav-item{display:flex;align-items:center;gap:5px;padding:0 11px;height:46px;cursor:pointer;
    border-bottom:2px solid transparent;text-decoration:none;white-space:nowrap;flex-shrink:0;
    color:var(--mut);font-size:11.5px;font-weight:600;transition:.12s}
  .mnav-item:hover{color:var(--txt)}
  .mnav-item.active{border-bottom-color:var(--blu);color:var(--blu)}
  .mnav-item.soon{opacity:.35;cursor:default;pointer-events:none}
  .mnav-sep{width:1px;height:20px;background:var(--line);flex-shrink:0;margin:0 4px}

  .wrap{max-width:980px;margin:0 auto;padding:28px 16px 60px}

  .ph{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:24px}
  .ph-left .ph-title{font-size:20px;font-weight:700}
  .ph-left .ph-sub{font-size:12px;color:var(--mut);margin-top:3px}
  .ph-stats{display:flex;gap:0;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .ph-stat{padding:10px 18px;border-right:1px solid var(--line);text-align:right}
  .ph-stat:last-child{border-right:none}
  .ph-stat .sk{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
  .ph-stat .sv{font-size:16px;font-weight:700}

  .basket-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  @media(max-width:780px){.basket-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:440px){.basket-grid{grid-template-columns:1fr}}

  .bcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;
    cursor:pointer;transition:.15s;border-top:3px solid var(--blu);display:flex;flex-direction:column}
  .bcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(20,30,50,.09);border-color:var(--blu)}
  .bcard.active{box-shadow:0 0 0 3px rgba(37,99,235,.15)}
  .bc-name{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:2px}
  .bc-rule{font-size:10px;color:var(--dim);margin-bottom:14px;line-height:1.4}
  .bc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .bc-m .mk{font-size:9px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
  .bc-m .mv{font-size:16px;font-weight:700}
  .bc-divider{border:none;border-top:1px solid var(--line);margin:10px 0}
  .bc-foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
  .bc-info{font-size:10px;color:var(--mut)}
  .bc-info b{color:var(--txt);font-weight:600}
  .bc-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px;border:1px solid;white-space:nowrap}
  .bc-badge.ok{background:rgba(47,212,139,.1);color:var(--grn);border-color:#a7f3d0}
  .bc-badge.warn{background:var(--panel)beb;color:var(--amber);border-color:#fcd34d}
  .bc-badge.risk{background:rgba(255,92,108,.08);color:var(--red);border-color:#fca5a5}

  .bc-criteria{margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
  .bc-crit-row{display:flex;gap:6px;margin-bottom:6px;align-items:flex-start}
  .bc-crit-row:last-child{margin-bottom:0}
  .bc-crit-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
    padding:2px 6px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:1px}
  .bc-crit-label.entry{background:rgba(77,124,254,.14);color:#4D7CFE}
  .bc-crit-label.exit{background:rgba(255,92,108,.08);color:#FF5C6C}
  .bc-crit-text{font-size:10px;color:var(--mut);line-height:1.5}

  .bc-click{font-size:10px;color:var(--blu);margin-top:10px;text-align:center;font-weight:500}

  .pos{color:var(--grn);font-weight:700}
  .neg{color:var(--red);font-weight:700}
  .neu{color:var(--txt)}

  .alerts-box{background:var(--card);border:1px solid #fca5a5;border-radius:14px;padding:14px 16px;margin-bottom:20px}
  .alerts-hd{font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
  .alert-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px}
  .alert-row:last-child{border:none;padding-bottom:0}
  .ar-sym{font-weight:700;min-width:80px}
  .ar-basket{color:var(--mut);min-width:70px}
  .ar-val{color:var(--red);font-weight:600;flex:1}
  .ar-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
  .ar-chip.hs1{background:rgba(255,92,108,.08);color:var(--red)}
  .ar-chip.hs2{background:var(--panel)beb;color:var(--amber)}

  .overlay{position:fixed;inset:0;background:rgba(10,18,36,.48);z-index:50;display:none;align-items:flex-end}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border-radius:20px 20px 0 0;width:100%;max-height:82vh;
    display:flex;flex-direction:column;box-shadow:0 -6px 36px rgba(20,35,70,.15)}
  .modal-hd{display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid var(--line);flex-shrink:0}
  .modal-title{font-size:15px;font-weight:700}
  .modal-sub{font-size:11px;color:var(--mut);margin-top:2px}
  .modal-close{font-size:22px;color:var(--dim);cursor:pointer;border:none;background:none;line-height:1}
  .modal-tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--line);flex-shrink:0}
  .mtab{font-size:12px;font-weight:600;padding:11px 14px;cursor:pointer;
    border-bottom:2px solid transparent;color:var(--mut);transition:.12s}
  .mtab.active{border-bottom-color:var(--blu);color:var(--blu)}
  .modal-body{flex:1;overflow-y:auto;padding:0 0 20px}

  .tbl-wrap{overflow-x:auto;padding:0 20px}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
  th{text-align:left;padding:8px 8px 6px;color:var(--dim);font-size:10px;font-weight:600;
    text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:8px;border-bottom:1px solid var(--line);white-space:nowrap}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--surface2)}
  /* cc#552: the row highlight used --surface2 (opaque navy) which stayed dark inside the light
     modal (unreadable). Light theme gets a soft-blue tint + dark text; dark theme keeps the navy. */
  :root[data-theme="light"] tr:hover td{background:rgba(77,124,254,.12);color:#14213E}

  .summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 20px;border-bottom:1px solid var(--line)}
  .sr-item .sk{font-size:10px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .sr-item .sv{font-size:15px;font-weight:700}

  .msg{font-size:12px;color:var(--mut);padding:24px 20px;text-align:center}
  .err-msg{font-size:12px;color:var(--red);padding:24px 20px;text-align:center}
  @media(max-width:768px){
    body{font-size:12px}
    table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  }
</style>
</head>
<body>

<nav class="model-nav" id="scorr-nav"></nav>

<div class="wrap">
  <div class="ph">
    <div class="ph-left">
      <div class="ph-title">Quant Basket</div>
      <div class="ph-sub">Equity Buy &amp; Hold · GVM-Screened · 6 Baskets · Click any basket for holdings</div>
      <!-- cc#557: V12 Basket Builder folded into the QB page (removed from top nav) -->
      <a href="/v12" title="Build & backtest your own rotation basket (V12)" style="display:inline-flex;align-items:center;gap:7px;margin-top:12px;border:1px solid var(--blu);border-radius:9px;padding:7px 14px;font-size:12.5px;font-weight:700;color:var(--blu);background:rgba(77,124,254,.10);text-decoration:none">&#8863; Basket Builder &rarr;</a>
    </div>
    <div class="ph-stats">
      <div class="ph-stat"><div class="sk">Capital</div><div class="sv" id="s-cap">—</div></div>
      <div class="ph-stat"><div class="sk">Total P&amp;L</div><div class="sv" id="s-pnl">—</div></div>
      <div class="ph-stat"><div class="sk">Portfolio Alpha</div><div class="sv" id="s-alpha">—</div></div>
      <div class="ph-stat"><div class="sk">Positions</div><div class="sv" id="s-pos">—</div></div>
    </div>
  </div>

  <div class="basket-grid" id="basket-grid">
    <div class="msg" style="grid-column:1/-1">Loading…</div>
  </div>

  <div id="alerts-wrap"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <div>
        <div class="modal-title" id="modal-title">—</div>
        <div class="modal-sub" id="modal-sub">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-tabs">
      <div class="mtab active" id="tab-holdings" onclick="switchTab('holdings')">Holdings</div>
      <div class="mtab" id="tab-rebalance" onclick="switchTab('rebalance')">Rebalance History</div>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="msg">Loading…</div>
    </div>
  </div>
</div>

<script>
const BNAMES = {large_cap:'Large Cap',mid_cap:'Mid Cap',small_cap:'Small Cap',alpha_multicap:'Alpha Multicap',breakout_52w:'52W Breakout',contra_value:'Contra Value'};
const BRULE  = {
  large_cap:'GVM×0.5 + Mom×0.5 · GVM ≥ 7.0 · ΔGVM(180d) > +0.5 · Mcap Top 100 · Monthly',
  mid_cap:'GVM ≥ 7.5 · G ≥ 7.0 · Top-20 by M-Score · Rank 101–250 · Monthly',
  small_cap:'GVM ≥ 8.0 · V ≥ 7.5 · ΔGVM(180d) > +0.5 · 8 themes · mcap rank > 250 · Quarterly',
  alpha_multicap:'GVM×0.5 + Mom×0.5 · GVM ≥ 7.5 · V ≥ 7.5 · Mom > 7 · ΔGVM(180d) > +0.5 · Nifty 500 · Monthly',
  breakout_52w:'GVM ≥ 7.5 · Near 52W high · At month high · Vol ≥ 21d avg · Top-10 by 1Y return · Monthly',
  contra_value:'G ≥ 7 · V ≥ 7.5 · M ≤ 6.5 · Sector GVM > 6 · Above 20DMA · Top-10 by Value · Monthly'
};
const BCOL = {large_cap:'#2FD48B',mid_cap:'#4D7CFE',small_cap:'#F5B94A',alpha_multicap:'#9B7CFF',breakout_52w:'#37D3E8',contra_value:'#F472B6'};
const BASKETS = ['large_cap','mid_cap','small_cap','alpha_multicap','breakout_52w','contra_value'];

const BCRITERIA = {
  large_cap: {
    entry: 'Composite = GVM×0.5 + Momentum×0.5 · Universe mcap Top 100 · Hard gates: GVM ≥ 7.0 AND ΔGVM(180d) > +0.5 · 10-filter gauntlet retired (RSI-M / PE-mult / upside / FII+DII / 1Y / 50&200 DMA / sector gates all redundant inside G/V/M) · Top-12 equal weight ₹5L/12; <10 qualify → ₹50k/name + cash',
    exit:  'HS1: −20% from entry (nightly) · Monthly (6th): exit max 3 holdings ranked outside composite top-20, worst rank first; refills pass both gates · No HS2, no trailing stop'
  },
  mid_cap: {
    entry: 'Universe mcap rank 101–250 · Hard gates: GVM ≥ 7.5 AND G ≥ 7.0 (V gate dropped — excluded 0 stocks) · Rank by M-Score (8 peer-relative momentum metrics, replaces avg raw 1M+3M+6M+1Y) · Top-20 equal weight ₹5L/20 = ₹25k/name; <10 qualify → ₹50k/name + cash',
    exit:  'HS1: −20% absolute · HS2: vs Nifty ≤ −10% from entry · Monthly re-screen: exit if not top-20 by M among gate-passers · Exit stack unchanged in V2'
  },
  small_cap: {
    entry: 'Universe: mcap rank > 250 · Hard gates: GVM ≥ 8.0 AND V ≥ 7.5 AND ΔGVM(180d) > +0.5 AND segment avg GVM ≥ 6.0 · Must map to 1 of 8 themes (Energy Transition & Grid · EV Auto Tech & Precision · Financial Inclusion & Digital Finance · Healthcare & Life Sciences · Digital India & Tech · Gold & Jewellery Consumption · Consumption & Lifestyle · Cement & Industrial Build-out) · Sizing: N qualifiers (≤20) equal ₹5L/N; N < 10 → ₹50k/name + rest cash · Entry-only (gates apply to new entries; current holdings unaffected)',
    exit:  'HS1: −20% absolute · HS2: vs Nifty ≤ −10% from entry · Quarterly theme/GVM screen · Exit rules unchanged in V2'
  },
  alpha_multicap: {
    entry: 'Composite score = GVM×0.5 + Momentum×0.5 · Universe Nifty 500 · Hard gates: GVM ≥ 7.5 AND V ≥ 7.5 AND M > 7 AND ΔGVM(180d) > +0.5 (gvm_now − gvm_180d_ago) · Top-12 by composite, equal weight (~₹41k/slot on ₹5L) · Fewer than 12 qualify → hold cash for empty slots (returns computed on full 12-slot capital)',
    exit:  'HS1: −20% from entry (nightly 01:15) · Monthly (6th): exit max 3 holdings ranked outside composite top-25, worst rank first; refills must pass all entry gates incl ΔGVM · No HS2, no trailing stop'
  },
  breakout_52w: {
    entry: 'Universe: full universe, mcap > ₹1,000 Cr · Screen: GVM ≥ 7.5 AND near 52-week high (week_index_52 ≥ 90) AND at month high (month_index ≥ 90) AND volume ≥ 21-day avg (vol_ratio_21 ≥ 1.0) · Selection: >10 qualify → top 10 by 1-Year Return; 5–10 → hold all; <5 → fully cash (dead-tape trap guard) · Sizing: ₹50k/slot always (₹5L/10)',
    exit:  'HS1: −15% from entry (tighter — a broken breakout) · Quality exit: GVM drops below 7.2 (nightly EOD) · No HS2, no rank exit, no trailing — two clean reasons: failed breakout or lost quality'
  },
  contra_value: {
    entry: 'Thesis: quality (G ≥ 7) trading cheap (V ≥ 7.5) in a healthy sector (avg GVM > 6), momentum washed out (M ≤ 6.5) but the turn just starting (above 20-DMA) · Universe: full universe, GVM > 7, mcap > ₹1,000 Cr · No month-high gate (contradicts the contra thesis) · Selection: max 10, top 10 by V-Score (deepest value first) · Sizing: ₹50k/slot, empty slots cash',
    exit:  'HS1: −20% from entry (contra needs room) · Quality fail: GVM drops below 6.8 (nightly) · Profit-take: M recovers to ≥ 8 → exit with profit (M_RECOVERED — the only QB profit-taking exit; momentum recovery completes the contra thesis) · No HS2, no rank exit'
  }
};

let curBasket = null, curTab = 'holdings';

const f = (n,pre='₹') => {
  if(n==null||n===undefined) return '—';
  const a=Math.abs(+n);
  const s=a>=100000?pre+(a/100000).toFixed(2)+'L':pre+a.toLocaleString('en-IN');
  return (+n)<0?'−'+s:s;
};
const pct=(n,d=2)=>n==null?'—':(+n>=0?'+':'')+((+n).toFixed(d))+'%';
const c=(n)=>+n>0?'pos':+n<0?'neg':'neu';

async function init(){
  try{
    const [qb,alpha,reg]=await Promise.all([
      fetch('/api/performance/qb').then(r=>r.json()),
      fetch('/api/performance/alpha').then(r=>r.json()),
      fetch('/api/qb/registry').then(r=>r.json()),
    ]);

    const tot=qb.total_pnl||0;
    const alp=alpha.total?.alpha;
    document.getElementById('s-cap').textContent='₹20,00,000';
    document.getElementById('s-pnl').innerHTML=`<span class="${c(tot)}">${f(tot)}</span>`;
    document.getElementById('s-alpha').innerHTML=`<span class="${c(alp)}">${pct(alp)} vs N500</span>`;
    document.getElementById('s-pos').textContent=qb.total_positions||'—';

    const bmap={};
    (qb.baskets||[]).forEach(b=>{bmap[b.basket]={...b}});
    (alpha.baskets||[]).forEach(b=>{if(bmap[b.basket]){bmap[b.basket].alpha=b.alpha;bmap[b.basket].return_pct=b.return_pct;}});
    const rmap={};
    (Array.isArray(reg)?reg:[reg]).forEach(r=>{if(r&&r.basket_name)rmap[r.basket_name]=r;});

    const grid=document.getElementById('basket-grid');
    grid.innerHTML='';
    BASKETS.forEach(key=>{
      const d=bmap[key]||{};
      const r=rmap[key]||{};
      const ret=d.return_pct, alp=d.alpha, pnl=d.pnl||0, pos=d.positions||0;
      const reb=r.next_rebalance?(r.next_rebalance+'').split('T')[0]:'—';
      const mv=d.market_value;
      const crit=BCRITERIA[key];

      // HS2 thresholds per basket
      const hs2={large_cap:-10,mid_cap:-5,small_cap:-5,alpha_multicap:-8};
      const allPos=(qb.positions||[]).filter(p=>p.basket===key);
      const atRisk=allPos.filter(p=>p.pnl_pct<(hs2[key]+5));
      let badge='<span class="bc-badge ok">No risk</span>';
      if(atRisk.length>0){
        const hs1=atRisk.filter(p=>p.pnl_pct<-20).length;
        badge=hs1>0?`<span class="bc-badge risk">${hs1} near HS1</span>`:`<span class="bc-badge warn">${atRisk.length} near HS2</span>`;
      }

      const card=document.createElement('div');
      card.className='bcard';
      card.style.borderTopColor=BCOL[key];
      card.onclick=()=>openModal(key,card);
      card.innerHTML=`
        <div class="bc-name">${BNAMES[key]}</div>
        <div class="bc-rule">${BRULE[key]}</div>
        <div class="bc-metrics">
          <div class="bc-m"><div class="mk">Return</div><div class="mv ${c(ret)}">${pct(ret)}</div></div>
          <div class="bc-m"><div class="mk">Alpha N500</div><div class="mv ${c(alp)}">${pct(alp)}</div></div>
          <div class="bc-m"><div class="mk">P&amp;L</div><div class="mv ${c(pnl)}">${f(pnl)}</div></div>
          <div class="bc-m"><div class="mk">Mkt Value</div><div class="mv neu">${f(mv)}</div></div>
        </div>
        <hr class="bc-divider">
        <div class="bc-foot">
          <div class="bc-info">${pos} positions &nbsp;·&nbsp; Reb <b>${reb}</b></div>
          ${badge}
        </div>
        <div class="bc-criteria">
          <div class="bc-crit-row">
            <span class="bc-crit-label entry">Entry</span>
            <span class="bc-crit-text">${crit.entry}</span>
          </div>
          <div class="bc-crit-row">
            <span class="bc-crit-label exit">Exit</span>
            <span class="bc-crit-text">${crit.exit}</span>
          </div>
        </div>
        <div class="bc-click">↗ View holdings &amp; history</div>`;
      grid.appendChild(card);
    });

    // alerts using per-basket HS2
    const hs2thresh={large_cap:-10,mid_cap:-5,small_cap:-5,alpha_multicap:-8};
    const atRiskAll=(qb.positions||[]).filter(p=>p.pnl_pct<(hs2thresh[p.basket]+5));
    if(atRiskAll.length){
      const rows=atRiskAll.map(p=>`
        <div class="alert-row">
          <span class="ar-sym">${p.symbol}</span>
          <span class="ar-basket">${BNAMES[p.basket]||p.basket}</span>
          <span class="ar-val">${pct(p.pnl_pct)} from entry</span>
          <span class="ar-chip ${+p.pnl_pct<-20?'hs1':'hs2'}">${+p.pnl_pct<-20?'HS1 ≤−20%':'Near HS2'}</span>
        </div>`).join('');
      document.getElementById('alerts-wrap').innerHTML=`<div class="alerts-box">
        <div class="alerts-hd">⚠ Exit Alerts · HS1=−20% · HS2: Large −10% · Mid/Small −5% · Alpha −8%</div>
        ${rows}</div>`;
    }

  }catch(e){
    document.getElementById('basket-grid').innerHTML=`<div class="err-msg" style="grid-column:1/-1">Failed: ${e.message}</div>`;
  }
}

function openModal(key,card){
  curBasket=key;
  document.querySelectorAll('.bcard').forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
  document.getElementById('modal-title').textContent=BNAMES[key];
  document.getElementById('modal-sub').textContent=BRULE[key];
  document.getElementById('overlay').classList.add('open');
  switchTab('holdings');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('overlay')){
    document.getElementById('overlay').classList.remove('open');
    document.querySelectorAll('.bcard').forEach(c=>c.classList.remove('active'));
  }
}

async function switchTab(tab){
  curTab=tab;
  ['holdings','rebalance'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  const body=document.getElementById('modal-body');
  body.innerHTML='<div class="msg">Loading…</div>';
  if(tab==='holdings') await showHoldings(body);
  else await showRebalance(body);
}

async function showHoldings(body){
  try{
    const [data,summ]=await Promise.all([
      fetch(`/api/qb/positions?basket_name=${curBasket}&status=open`).then(r=>r.json()),
      fetch(`/api/qb/summary?basket_name=${curBasket}`).then(r=>r.json()),
    ]);
    let sum='';
    if(summ&&!summ.error){
      sum=`<div class="summary-row">
        <div class="sr-item"><div class="sk">Open Positions</div><div class="sv">${summ.open_positions||0}</div></div>
        <div class="sr-item"><div class="sk">Market Value</div><div class="sv">${f(summ.market_value)}</div></div>
        <div class="sr-item"><div class="sk">Unrealised P&amp;L</div><div class="sv ${c(summ.unrealised_pnl)}">${f(summ.unrealised_pnl)}</div></div>
        <div class="sr-item"><div class="sk">Total P&amp;L</div><div class="sv ${c(summ.total_pnl)}">${f(summ.total_pnl)}</div></div>
      </div>`;
    }
    if(!Array.isArray(data)||!data.length){body.innerHTML=sum+'<div class="msg">No open positions.</div>';return;}
    body.innerHTML=sum+`<div class="tbl-wrap"><table>
      <thead><tr>
        <th>Symbol</th><th>Entry ₹</th><th>CMP ₹</th><th>Qty</th><th>Cost</th><th>Value</th><th>P&amp;L</th><th>%</th><th>GVM</th><th>Stop ₹</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td><strong>${r.symbol}</strong></td>
        <td>${r.entry_price!=null?(+r.entry_price).toFixed(0):'—'}</td>
        <td>${r.current_price!=null?(+r.current_price).toFixed(0):'—'}</td>
        <td>${r.qty||'—'}</td>
        <td>${r.cost_basis!=null?'₹'+(+r.cost_basis/1000).toFixed(1)+'K':'—'}</td>
        <td>${r.current_value!=null?'₹'+(+r.current_value/1000).toFixed(1)+'K':'—'}</td>
        <td class="${c(r.pnl)}">${r.pnl!=null?(+r.pnl>=0?'+':'')+'₹'+Math.abs(+r.pnl).toLocaleString('en-IN'):'—'}</td>
        <td class="${c(r.pnl_pct)}">${pct(r.pnl_pct)}</td>
        <td>${r.gvm!=null?(+r.gvm).toFixed(1):'—'}</td>
        <td>${r.stop_loss_price!=null?(+r.stop_loss_price).toFixed(0):'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }catch(e){body.innerHTML=`<div class="err-msg">Error: ${e.message}</div>`;}
}

async function showRebalance(body){
  try{
    const data=await fetch(`/api/qb/rebalance_log?basket_name=${curBasket}&limit=10`).then(r=>r.json());
    if(!Array.isArray(data)||!data.length){body.innerHTML='<div class="msg">No rebalance history yet. First rebalance: Large Cap + Mid Cap on 4 Jul 2026.</div>';return;}
    body.innerHTML=`<div class="tbl-wrap"><table>
      <thead><tr>
        <th>Date</th><th>Stocks In</th><th>Stocks Out</th><th>Held</th><th>Portfolio Value</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td>${r.rebalance_date||'—'}</td>
        <td class="pos">+${r.stocks_in||0}</td>
        <td class="neg">−${r.stocks_out||0}</td>
        <td>${r.stocks_held||0}</td>
        <td>${r.total_portfolio_value!=null?'₹'+(+r.total_portfolio_value/100000).toFixed(2)+'L':'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }catch(e){body.innerHTML=`<div class="err-msg">Error: ${e.message}</div>`;}
}

init();
</script>
